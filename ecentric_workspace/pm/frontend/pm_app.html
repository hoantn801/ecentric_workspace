<script>
(function(){
  var PM="ecentric_workspace.pm.api.";
  var COLS=["Backlog","To Do","In Progress","Blocked","Review","Done","Cancelled"];
  var CRUMB={dashboard:"Tổng quan",projects:"Dự án",tasks:"Nhiệm vụ",board:"Kanban",gantt:"Gantt",timesheet:"Timesheet",recurring:"Recurring",notifications:"Thông báo"};
  var LIVE=(location.protocol!=="file:");  // live over http(s); mock only for offline file:// preview
  var el=function(id){return document.getElementById(id);};
  function st(s){return "st-"+(s||"Backlog").replace(/\s/g,"");}
  function pst(s){return "pst-"+(s||"").replace(/\s/g,"");}
  function esc(s){return (s==null?"":String(s)).replace(/[&<>"]/g,function(c){return({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"})[c];});}
  function stripTags(s){return (s==null?"":String(s)).replace(/<[^>]*>/g,"");}
  function pmFieldInput(label,inner){return '<div class="pm-field"><label>'+label+'</label>'+inner+'</div>';}
  function ymd(s){return s?String(s).slice(0,10):"";}
  function badge(s){return '<span class="pm-badge '+st(s)+'">'+esc(s||"-")+'</span>';}
  function names(a){if(!a)return [];try{return JSON.parse(a);}catch(e){return [a];}}
  function ini(em){if(!em)return "?";var p=em.split("@")[0].split(/[._]/);return ((p[0]||"")[0]||"").toUpperCase()+((p[1]||"")[0]||"").toUpperCase();}

  function getCsrf(){return (window.frappe&&window.frappe.csrf_token)||window.csrf_token||(document.cookie.match(/csrf_token=([^;]+)/)||[])[1]||"";}
  function _parseR(r){return r.text().then(function(tx){var j={};try{j=JSON.parse(tx);}catch(e){}
    if(!r.ok){var mm=j.exception||j._server_messages||j.exc_type||("HTTP "+r.status);throw new Error(typeof mm==="string"?mm:JSON.stringify(mm));}
    return j.message;});}
  function apiFetch(method,args){
    var read=/\.(list|get|summary|gantt|get_transitions|get_active|get_for_task|list_mine|report|control_center|detail)$/.test(method)||/get_logged_user/.test(method);
    if(read){var qs=Object.keys(args).map(function(k){return encodeURIComponent(k)+"="+encodeURIComponent(args[k]);}).join("&");
      return fetch("/api/method/"+method+(qs?("?"+qs):""),{method:"GET",credentials:"include",headers:{"Accept":"application/json"}}).then(_parseR);}
    return fetch("/api/method/"+method,{method:"POST",credentials:"include",headers:{"Content-Type":"application/json","Accept":"application/json","X-Frappe-CSRF-Token":getCsrf()},body:JSON.stringify(args)}).then(_parseR);}
  function api(method,args){args=args||{};
    if(!LIVE){return mock(method,args);}
    if(window.frappe && typeof frappe.call==="function"){return new Promise(function(res,rej){frappe.call({method:method,args:args,callback:function(r){res(r.message);},error:function(e){rej(e);}});});}
    return apiFetch(method,args);}

  var M=null;
  function seed(){ if(M)return;
    M={p:[{name:"PROJ-0001",project_name:"Website Revamp",status:"Open",percent_complete:42,ec_department:"Operations",ec_manager:"hoan.tran@ecentric.vn"},
         {name:"PROJ-0002",project_name:"ERP Rollout",status:"Open",percent_complete:18,ec_department:"Operations",ec_manager:"vinh@ecentric.vn"},
         {name:"PROJ-0003",project_name:"Brand Refresh",status:"Completed",percent_complete:100,ec_department:"Marketing",ec_manager:"linh@ecentric.vn"}], t:[]};
    var d=[["Design homepage","To Do","PROJ-0001"],["API auth","In Progress","PROJ-0001"],["QA pass","Review","PROJ-0001"],
      ["DB schema","Backlog","PROJ-0002"],["Migrate data","Blocked","PROJ-0002"],["Kickoff","Done","PROJ-0002"],["Logo set","Done","PROJ-0003"]];
    d.forEach(function(x,i){M.t.push({name:"TASK-100"+i,subject:x[0],workflow_state:x[1],status:"Open",project:x[2],parent_task:null,
      exp_end_date:"2026-06-1"+i,priority:"Medium",_assign:i%2?'["hoan.tran@ecentric.vn"]':null,owner:"hoan.tran@ecentric.vn"});});}
  var TR={"Backlog":[["Move to To Do","To Do"],["Cancel","Cancelled"]],"To Do":[["Start","In Progress"],["Cancel","Cancelled"]],
    "In Progress":[["Block","Blocked"],["Submit for Review","Review"],["Cancel","Cancelled"]],"Blocked":[["Unblock","In Progress"],["Cancel","Cancelled"]],
    "Review":[["Mark Done","Done"],["Request Changes","In Progress"],["Cancel","Cancelled"]],"Done":[["Reopen","In Progress"]],"Cancelled":[]};
  function mock(method,args){seed();return new Promise(function(res){setTimeout(function(){var m=method.replace(PM,"");
    if(m==="dashboard.summary"){res({my_tasks:3,team_tasks:M.t.length,overdue:1,due_this_week:2,scope:"department"});}
    else if(m==="dashboard.control_center"){var u=window._pmUser||"hoan.tran@ecentric.vn";var _as=function(t){return names(t._assign);};var _ac=function(t){return ["Done","Cancelled"].indexOf(t.workflow_state)<0;};var td2=new Date().toISOString().slice(0,10);
      var mn=M.t.filter(function(t){return _as(t).indexOf(u)>=0;});
      var mc={overdue:mn.filter(function(t){return t.exp_end_date&&t.exp_end_date<td2&&_ac(t);}).length,today:mn.filter(function(t){return t.exp_end_date===td2;}).length,week:mn.filter(function(t){return _ac(t)&&!!t.exp_end_date;}).length,review:mn.filter(function(t){return t.workflow_state==="Review";}).length,blocked:mn.filter(function(t){return t.workflow_state==="Blocked";}).length};
      var wl={};M.t.forEach(function(t){_as(t).forEach(function(uu){var w=wl[uu]||(wl[uu]={assignee:uu,active:0,overdue:0,due_week:0,in_progress:0,blocked:0});if(_ac(t))w.active++;if(t.workflow_state==="In Progress")w.in_progress++;if(t.workflow_state==="Blocked")w.blocked++;});});
      var ovd=M.t.filter(function(t){return t.exp_end_date&&t.exp_end_date<td2&&_ac(t);});var blk=M.t.filter(function(t){return t.workflow_state==="Blocked";});var rvw=M.t.filter(function(t){return t.workflow_state==="Review";});
      res({is_leader:true,unread:2,timer:M.tm?{task:M.tm.task,status:M.tm.status}:null,my:{counts:mc,overdue:mn.filter(function(t){return t.workflow_state==="Blocked";}),review:mn.filter(function(t){return t.workflow_state==="Review";}),blocked:mn.filter(function(t){return t.workflow_state==="Blocked";})},team:{active:M.t.filter(_ac).length,overdue:ovd.length,blocked:blk.length,review:rvw.length,no_assignee:M.t.filter(function(t){return _as(t).length===0;}).length,no_due:M.t.filter(function(t){return !t.exp_end_date;}).length,completed_week:M.t.filter(function(t){return t.workflow_state==="Done";}).length},workload:Object.keys(wl).map(function(k){return wl[k];}),attention:{overdue:ovd,blocked:blk,review:rvw}});}
    else if(m==="projects.list"){var rws=M.p.map(function(p){var ts=M.t.filter(function(t){return t.project===p.name;});var dn=ts.filter(function(t){return t.workflow_state==="Done";}).length;return Object.assign({},p,{task_total:ts.length,task_done:dn,progress:ts.length?Math.round(dn*100/ts.length):0});});res({rows:rws,total:rws.length});}
    else if(m==="projects.get"){var p=M.p.filter(function(x){return x.name===args.name;})[0];var c={};M.t.filter(function(t){return t.project===args.name;}).forEach(function(t){c[t.workflow_state]=(c[t.workflow_state]||0)+1;});res({project:p,task_status_counts:c});}
    else if(m==="projects.create"){var nm2="PROJ-"+(9000+M.p.length);M.p.unshift({name:nm2,project_name:args.project_name,status:"Open",percent_complete:0,ec_department:"",ec_manager:args.manager||""});res({name:nm2,project_name:args.project_name});}
    else if(m==="projects.detail"){var pp=M.p.filter(function(x){return x.name===args.name;})[0]||{};var tt=M.t.filter(function(t){return t.project===args.name;});var asg2=function(t){return names(t._assign);};var ac2=function(t){return ["Done","Cancelled"].indexOf(t.workflow_state)<0;};var td3=new Date().toISOString().slice(0,10);var risk={active:tt.filter(ac2).length,overdue:tt.filter(function(t){return t.exp_end_date&&t.exp_end_date<td3&&ac2(t);}).length,blocked:tt.filter(function(t){return t.workflow_state==="Blocked";}).length,review:tt.filter(function(t){return t.workflow_state==="Review";}).length,no_assignee:tt.filter(function(t){return asg2(t).length===0;}).length,no_due:tt.filter(function(t){return !t.exp_end_date;}).length,completed:tt.filter(function(t){return t.workflow_state==="Done";}).length};var total2=tt.length;var lvl=(risk.overdue>0||risk.blocked>0)?"high":((risk.no_assignee+risk.no_due)>=Math.max(3,total2/2)?"medium":"low");res({project:pp,total:total2,risk:risk,risk_level:lvl,progress:total2?Math.round(risk.completed*100/total2):0});}
    else if(m==="tasks.list"){res({rows:M.t.filter(function(t){return !args.project||t.project===args.project;}),view:args.view||"list"});}
    else if(m==="tasks.get"){res({task:M.t.filter(function(x){return x.name===args.name;})[0],subtasks:[]});}
    else if(m==="tasks.get_transitions"){var t=M.t.filter(function(x){return x.name===args.name;})[0];res({current:t.workflow_state,transitions:(TR[t.workflow_state]||[]).map(function(a){return{action:a[0],next_state:a[1]};})});}
    else if(m==="tasks.set_status"){var t=M.t.filter(function(x){return x.name===args.name;})[0];var nx=(TR[t.workflow_state]||[]).filter(function(a){return a[0]===args.action;})[0];if(nx)t.workflow_state=nx[1];res({name:t.name,workflow_state:t.workflow_state});}
    else if(m==="tasks.create"){var nm="TASK-"+(2000+M.t.length);M.t.push({name:nm,subject:args.subject,workflow_state:"Backlog",status:"Open",project:args.project,parent_task:args.parent_task||null,_assign:null,owner:"you@ecentric.vn"});res({name:nm,subject:args.subject,project:args.project});}
    else if(m==="tasks.assign"){var t=M.t.filter(function(x){return x.name===args.name;})[0];t._assign=JSON.stringify(args.users);res({name:t.name,assigned:args.users,_assign:t._assign});}
    else if(m==="tasks.gantt"){var gt=M.t.filter(function(t){return t.project===args.project;});res({project:args.project,rows:gt.map(function(t,i){return {id:t.name,name:t.name,subject:t.subject,project:t.project,start:(i===gt.length-1?null:"2026-06-0"+(i+1)),end:(i===gt.length-1?null:"2026-06-1"+i),progress:[20,55,80,100,0,40,65][i%7],workflow_state:t.workflow_state,parent_task:t.parent_task,dependencies:[]};})});}
    else if(m==="timesheet.list"){if(!M.ts)M.ts=[];var tr=M.ts.filter(function(x){return x.task===args.task;});res({rows:tr,total_hours:tr.reduce(function(a,b){return a+b.hours;},0)});}
    else if(m==="timesheet.log"){if(!M.ts)M.ts=[];var w={task:args.task,project:null,from_time:(args.log_date||"2026-06-02")+" 09:00:00",hours:parseFloat(args.hours),description:args.description,owner:"you@ecentric.vn"};M.ts.push(w);res({timesheet:"TS-"+M.ts.length,task:args.task,hours:w.hours});}
    else if(m==="timer.get_active"){if(!M.tm)return res({active:false});var e3=M.tm.acc+(M.tm.status==="Running"?Math.floor((Date.now()-M.tm.t0)/1000):0);res({active:true,task:M.tm.task,project:null,status:M.tm.status,elapsed_seconds:e3});}
    else if(m==="timer.start"){M.tm={task:args.task,acc:0,t0:Date.now(),status:"Running"};res({active:true,task:args.task,status:"Running",elapsed_seconds:0});}
    else if(m==="timer.pause"){if(M.tm&&M.tm.status==="Running"){M.tm.acc+=Math.floor((Date.now()-M.tm.t0)/1000);M.tm.status="Paused";}res({active:!!M.tm});}
    else if(m==="timer.resume"){if(M.tm&&M.tm.status==="Paused"){M.tm.t0=Date.now();M.tm.status="Running";}res({active:!!M.tm});}
    else if(m==="timer.stop"){var tm=M.tm||{acc:0,t0:Date.now(),status:"Running",task:args.task};var tot=tm.acc+(tm.status==="Running"?Math.floor((Date.now()-tm.t0)/1000):0);var hr=Math.round(tot/3600*100)/100;if(!M.ts)M.ts=[];M.ts.push({task:tm.task,from_time:"2026-06-03 09:00:00",hours:hr,description:"Timer",owner:"you@ecentric.vn"});M.tm=null;res({timesheet:"TS",task:tm.task,hours:hr,seconds:tot});}
    else if(m==="recurrence.get_for_task"){if(!M.rec)M.rec=[];var rg=M.rec.filter(function(x){return x.source_task===args.task&&(x.status==="Active"||x.status==="Paused");})[0];res(rg?Object.assign({exists:true},rg):{exists:false});}
    else if(m==="recurrence.create"){if(!M.rec)M.rec=[];var rc={name:"REC-"+(M.rec.length+1),source_task:args.source_task,project:"PROJ-0001",frequency:args.frequency,status:"Active",start_date:args.start_date,next_run_date:args.start_date,end_date:args.end_date,max_occurrences:parseInt(args.max_occurrences)||0,occurrences_done:0,last_task:null};M.rec.push(rc);res(rc);}
    else if(m==="recurrence.list"){if(!M.rec)M.rec=[];res({rows:M.rec});}

  function renderGantt(b,rows){
    if(!rows.length){return emptyBox(b,"Dự án chưa có nhiệm vụ.");}
    var sched=rows.filter(function(t){return dnum(t.start)!=null&&dnum(t.end)!=null;}); var unsched=rows.filter(function(t){return dnum(t.start)==null||dnum(t.end)==null;});
    var html="";
    if(sched.length){
      var starts=sched.map(function(t){return dnum(t.start);}); var ends=sched.map(function(t){return dnum(t.end);});
      var min=Math.min.apply(null,starts); var max=Math.max.apply(null,ends); if(max<=min){max=min+86400000;} var span=max-min;
      var T=5, ticks="", grid="";
      for(var i=0;i<=T;i++){var p=i/T*100; ticks+='<div class="tick" style="left:'+p+'%">'+fmtD(min+span*i/T)+'</div>'; grid+='<div class="gl" style="left:'+p+'%"></div>';}
      var todayMs=dnum(new Date().toISOString().slice(0,10));
      if(todayMs!=null&&todayMs>=min&&todayMs<=max){grid+='<div class="g-today" style="left:'+((todayMs-min)/span*100)+'%"></div>';}
      html+='<div class="gantt-wrap"><div class="gantt"><div class="gantt-axis"><div></div><div class="ticks">'+ticks+'</div></div>';
      sched.forEach(function(t){var s=dnum(t.start),e=dnum(t.end); var left=(s-min)/span*100; var w=Math.max((e-s)/span*100,1.5);
        var col=gColor(t.workflow_state); var prog=Math.max(0,Math.min(100,Math.round(t.progress||0)));
        var ind=t.parent_task?'<span class="ind"></span>':'';
        html+='<div class="gantt-row"><div class="gantt-label" data-task="'+esc(t.id)+'">'+ind+esc(t.subject||t.id)+'</div>'+
          '<div class="gantt-track"><div class="gantt-grid">'+grid+'</div>'+
          '<div class="gantt-bar" data-task="'+esc(t.id)+'" title="'+esc((t.subject||"")+" · "+(t.workflow_state||"")+" · "+prog+"%")+'" style="left:'+left+'%;width:'+w+'%;background:'+col+'"><div class="fill" style="width:'+prog+'%"></div><div class="lab">'+(w>12?esc(t.workflow_state||"")+(prog?" "+prog+"%":""):"")+'</div></div></div></div>';
      });
      html+='</div></div>';
    } else { html+='<div class="pm-state">Chưa có nhiệm vụ nào đủ ngày bắt đầu/kết thúc.</div>'; }
    if(unsched.length){ html+='<div style="padding:12px 16px;border-top:1px solid var(--gray-100)"><div style="font-size:11px;font-weight:600;color:var(--gray-500);text-transform:uppercase;letter-spacing:.4px;margin-bottom:8px">Chưa lên lịch ('+unsched.length+') — thêm ngày để hiện trên timeline</div>'+
        unsched.map(function(t){return '<div class="pm-sub"><span data-task="'+esc(t.id)+'" style="cursor:pointer;flex:1">'+esc(t.subject||t.id)+'</span><span style="display:flex;align-items:center;gap:8px">'+badge(t.workflow_state)+'<button class="pm-btn g-add" data-add="'+esc(t.id)+'">+ Thêm ngày</button></span></div>';}).join("")+'</div>'; }
    b.innerHTML=html;
    Array.prototype.forEach.call(b.querySelectorAll("[data-task]"),function(x){x.onclick=function(){openTask(x.getAttribute("data-task"));};});
    Array.prototype.forEach.call(b.querySelectorAll("[data-add]"),function(x){x.onclick=function(e){e.stopPropagation();openTaskEdit(x.getAttribute("data-add"));};});}

      var html="";order.forEach(function(g){var gr=groups[g];if(!gr||!gr.length)return;
        html+='<div class="nt-day-h">'+g+'</div>'+gr.map(function(n){var ty=notifType(n.subject);
          return '<div class="nt-item'+(n.read?"":" unread")+'" data-task="'+esc(n.document_name||"")+'"><span style="display:flex;align-items:center;gap:8px;min-width:0">'+(n.read?"":'<b style="color:var(--navy)">●</b>')+'<span class="pm-tag '+ty[1]+'">'+ty[0]+'</span><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(stripTags(n.subject))+'</span></span><span style="font-size:11px;color:var(--gray-400);white-space:nowrap">'+esc((n.creation||"").slice(0,16))+'</span></div>';}).join("");});
      b.innerHTML=html;
      Array.prototype.forEach.call(b.querySelectorAll("[data-task]"),function(x){x.onclick=function(){var t=x.getAttribute("data-task");if(t)openTask(t);};});
    }).catch(function(e){errBox(c,e);});}

  function soon(view){var c=el("pm-view");var map={gantt:["Gantt","Biểu đồ Gantt theo ngày bắt đầu/kết thúc của nhiệm vụ."],timesheet:["Timesheet","Ghi nhận giờ làm việc theo nhiệm vụ (native Timesheet)."],recurring:["Recurring","Nhiệm vụ lặp: daily / weekly / biweekly / monthly."],notifications:["Thông báo","Thông báo giao việc, cập nhật, quá hạn."]};
    var v=map[view]||["Sắp có",""]; c.innerHTML=head(v[0],v[1])+'<div class="panel"><div class="pm-state"><svg class="icon em-ic"><use href="#p-'+(view==="notifications"?"bell":view==="timesheet"?"clock":view==="recurring"?"repeat":"gantt")+'"/></svg><div>Đang phát triển — sẽ có ở bước tiếp theo của Phase này.</div></div></div>';}

  var VIEWS={dashboard:showDashboard,projects:showProjects,tasks:showTasks,board:showBoard,gantt:showGantt,timesheet:showTimesheet,recurring:showRecurring,notifications:showNotifications};
  function go(v){window._curView=v;Array.prototype.forEach.call(el("pm-nav").querySelectorAll(".nav-item[data-view]"),function(b){b.classList.toggle("active",b.getAttribute("data-view")===v);});
    el("pm-crumb").textContent=CRUMB[v]||"Tổng quan"; (VIEWS[v]||showDashboard)();}
  Array.prototype.forEach.call(el("pm-nav").querySelectorAll(".nav-item[data-view]"),function(b){b.onclick=function(){go(b.getAttribute("data-view"));};});
  el("pm-search").addEventListener("keydown",function(e){if(e.key==="Enter"){F.q=this.value.trim().toLowerCase();go("tasks");}});

  function fillUser(){
    if(!LIVE){ window._pmUser="hoan.tran@ecentric.vn"; el("pm-av").textContent="PV"; el("pm-uname").textContent="Preview User"; el("pm-urole").textContent="Mock"; el("pm-preview").style.display="inline-block"; return; }
    api("frappe.auth.get_logged_user").then(function(u){ u=u||"User"; window._pmUser=u; el("pm-av").textContent=ini(u); el("pm-uname").textContent=u.split("@")[0]; el("pm-urole").textContent="Thành viên PM"; }).catch(function(){ el("pm-uname").textContent="Người dùng"; });
  }
  function refreshBadge(){api(PM+"notifications.list_mine",{limit:1}).then(function(d){var b=el("tb-badge");if(!b)return;if(d&&d.unread){b.textContent=d.unread>99?"99+":d.unread;b.style.display="block";}else{b.style.display="none";}}).catch(function(){});}
  function refreshTimerChip(){var chip=el("tb-timer");if(!chip)return;
    api(PM+"timer.get_active").then(function(ac){
      if(ac&&ac.active){window._activeTimer={task:ac.task,status:ac.status,base:ac.elapsed_seconds||0,t0:Date.now()};
        chip.style.display="inline-flex";
        chip.innerHTML='<span class="tg-dot"></span><span class="tt-name">'+esc(ac.task)+'</span><span class="tt-clock">'+fmtDur(ac.elapsed_seconds||0)+'</span>';
        startTimerClock(ac.status==="Running");
      } else {window._activeTimer=null;chip.style.display="none";stopTimerClock();}
    }).catch(function(){});}
  function startTimerClock(run){stopTimerClock();if(!run)return;window._tcTick=setInterval(function(){var cl=document.querySelector("#tb-timer .tt-clock");var at=window._activeTimer;if(!cl||!at){stopTimerClock();return;}cl.textContent=fmtDur(at.base+Math.floor((Date.now()-at.t0)/1000));},1000);}
  function stopTimerClock(){if(window._tcTick){clearInterval(window._tcTick);window._tcTick=null;}}
  if(el("tb-new"))el("tb-new").onclick=function(){newTask(null);};
  if(el("tb-bell"))el("tb-bell").onclick=function(){go("notifications");};
  if(el("tb-timer"))el("tb-timer").onclick=function(){if(window._activeTimer&&window._activeTimer.task)openTask(window._activeTimer.task);};
  fillUser(); refreshBadge(); loadRecSet(); refreshTimerChip(); setInterval(refreshTimerChip,20000); go("dashboard");
})();
</script>

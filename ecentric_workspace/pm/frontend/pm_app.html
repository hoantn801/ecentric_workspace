  stat-card) extracted from the live /home page so it matches the site 1:1.
  Sidebar is self-generated in the same pattern (not a shared component).
  Calls ONLY PM v2 APIs (no pm_app_get_app_data). Runs live (frappe.call) or
  previews offline with mock data. Marker: ec-pm-root. NOT deployed yet.
-->
<style>

    padding: 0 !important; margin: 0 !important; max-width: none !important; }

<style>

(function(){

  function getCsrf(){return (window.frappe&&window.frappe.csrf_token)||window.csrf_token||(document.cookie.match(/csrf_token=([^;]+)/)||[])[1]||"";}

    return fetch("/api/method/"+method,{method:"POST",credentials:"include",headers:{"Content-Type":"application/json","Accept":"application/json","X-Frappe-CSRF-Token":getCsrf()},body:JSON.stringify(args)}).then(_parseR);}

  var M=null;
  function seed(){ if(M)return;
    M={p:[{name:"PROJ-0001",project_name:"Website Revamp",status:"Open",percent_complete:42,ec_department:"Operations",ec_manager:"hoan.tran@ecentric.vn"},
         {name:"PROJ-0002",project_name:"ERP Rollout",status:"Open",percent_complete:18,ec_department:"Operations",ec_manager:"vinh@ecentric.vn"},
         {name:"PROJ-0003",project_name:"Brand Refresh",status:"Completed",percent_complete:100,ec_department:"Marketing",ec_manager:"linh@ecentric.vn"}], t:[]};
    var d=[["Design homepage","To Do","PROJ-0001"],["API auth","In Progress","PROJ-0001"],["QA pass","Review","PROJ-0001"],
      ["DB schema","Backlog","PROJ-0002"],["Migrate data","Blocked","PROJ-0002"],["Kickoff","Done","PROJ-0002"],["Logo set","Done","PROJ-0003"]];
    d.forEach(function(x,i){M.t.push({name:"TASK-100"+i,subject:x[0],workflow_state:x[1],status:"Open",project:x[2],parent_task:null,
      exp_end_date:"2026-06-1"+i,priority:"Medium",_assign:i%2?'["hoan.tran@ecentric.vn"]':null,owner:"hoan.tran@ecentric.vn"});});}
  var TR={"Backlog":[["Move to To Do","To Do"],["Cancel","Cancelled"]],"To Do":[["Start","In Progress"],["Cancel","Cancelled"]],
    "In Progress":[["Block","Blocked"],["Submit for Review","Review"],["Cancel","Cancelled"]],"Blocked":[["Unblock","In Progress"],["Cancel","Cancelled"]],
    "Review":[["Mark Done","Done"],["Request Changes","In Progress"],["Cancel","Cancelled"]],"Done":[["Reopen","In Progress"]],"Cancelled":[]};
  function mock(method,args){seed();return new Promise(function(res){setTimeout(function(){var m=method.replace(PM,"");
    if(m==="dashboard.summary"){res({my_tasks:3,team_tasks:M.t.length,overdue:1,due_this_week:2,scope:"department"});}
    else if(m==="dashboard.control_center"){var u=window._pmUser||"hoan.tran@ecentric.vn";var _as=function(t){return names(t._assign);};var _ac=function(t){return ["Done","Cancelled"].indexOf(t.workflow_state)<0;};var td2=new Date().toISOString().slice(0,10);
      var mn=M.t.filter(function(t){return _as(t).indexOf(u)>=0;});
      var mc={overdue:mn.filter(function(t){return t.exp_end_date&&t.exp_end_date<td2&&_ac(t);}).length,today:mn.filter(function(t){return t.exp_end_date===td2;}).length,week:mn.filter(function(t){return _ac(t)&&!!t.exp_end_date;}).length,review:mn.filter(function(t){return t.workflow_state==="Review";}).length,blocked:mn.filter(function(t){return t.workflow_state==="Blocked";}).length};
      var wl={};M.t.forEach(function(t){_as(t).forEach(function(uu){var w=wl[uu]||(wl[uu]={assignee:uu,active:0,overdue:0,due_week:0,in_progress:0,blocked:0});if(_ac(t))w.active++;if(t.workflow_state==="In Progress")w.in_progress++;if(t.workflow_state==="Blocked")w.blocked++;});});
      var ovd=M.t.filter(function(t){return t.exp_end_date&&t.exp_end_date<td2&&_ac(t);});var blk=M.t.filter(function(t){return t.workflow_state==="Blocked";});var rvw=M.t.filter(function(t){return t.workflow_state==="Review";});
      res({is_leader:true,unread:2,timer:M.tm?{task:M.tm.task,status:M.tm.status}:null,my:{counts:mc,overdue:mn.filter(function(t){return t.workflow_state==="Blocked";}),review:mn.filter(function(t){return t.workflow_state==="Review";}),blocked:mn.filter(function(t){return t.workflow_state==="Blocked";})},team:{active:M.t.filter(_ac).length,overdue:ovd.length,blocked:blk.length,review:rvw.length,no_assignee:M.t.filter(function(t){return _as(t).length===0;}).length,no_due:M.t.filter(function(t){return !t.exp_end_date;}).length,completed_week:M.t.filter(function(t){return t.workflow_state==="Done";}).length},workload:Object.keys(wl).map(function(k){return wl[k];}),attention:{overdue:ovd,blocked:blk,review:rvw},status_dist:(function(){var s={};["Backlog","To Do","In Progress","Blocked","Review","Done","Cancelled"].forEach(function(x){s[x]=M.t.filter(function(t){return t.workflow_state===x;}).length;});return s;})(),priority_dist:(function(){var p={Urgent:0,High:0,Medium:0,Low:0,"—":0};M.t.forEach(function(t){var k=t.priority||"—";p[k]=(p[k]||0)+1;});return p;})(),project_risk:(function(){var r={};M.t.forEach(function(t){if(!t.project)return;var a=r[t.project]||(r[t.project]={project:t.project,project_name:((M.p.filter(function(x){return x.name===t.project;})[0]||{}).project_name)||t.project,total:0,overdue:0,blocked:0,review:0});a.total++;if(t.exp_end_date&&t.exp_end_date<td2&&_ac(t))a.overdue++;if(t.workflow_state==="Blocked")a.blocked++;if(t.workflow_state==="Review")a.review++;});return Object.keys(r).map(function(k){var a=r[k];a.risk_level=(a.overdue>0||a.blocked>0)?"high":"low";return a;});})()});}
    else if(m==="dashboard.my_tasklist"){var u4=window._pmUser||"hoan.tran@ecentric.vn";var as4=function(t){return names(t._assign);};var ac4=function(t){return ["Done","Cancelled"].indexOf(t.workflow_state)<0;};var td4=new Date().toISOString().slice(0,10);var mine4=M.t.filter(function(t){return as4(t).indexOf(u4)>=0;});var att=[],wk=[],nd=[],dn=[];mine4.forEach(function(t){var ws=t.workflow_state;if(ws==="Done"){dn.push(t);return;}if(!ac4(t))return;var od=t.exp_end_date&&t.exp_end_date<td4;if(od||t.exp_end_date===td4||ws==="Blocked"||ws==="Review")att.push(t);else if(ws==="In Progress"||t.exp_end_date)wk.push(t);else nd.push(t);});res({user:u4,timer:M.tm?{task:M.tm.task,status:M.tm.status}:null,counts:{attention:att.length,week:wk.length,nodue:nd.length,done:dn.length},attention:att,week:wk,nodue:nd,done:dn});}
    else if(m==="projects.list"){var rws=M.p.map(function(p){var ts=M.t.filter(function(t){return t.project===p.name;});var dn=ts.filter(function(t){return t.workflow_state==="Done";}).length;return Object.assign({},p,{task_total:ts.length,task_done:dn,progress:ts.length?Math.round(dn*100/ts.length):0});});res({rows:rws,total:rws.length});}
    else if(m==="projects.get"){var p=M.p.filter(function(x){return x.name===args.name;})[0];var c={};M.t.filter(function(t){return t.project===args.name;}).forEach(function(t){c[t.workflow_state]=(c[t.workflow_state]||0)+1;});res({project:p,task_status_counts:c});}
    else if(m==="projects.create"){var nm2="PROJ-"+(9000+M.p.length);M.p.unshift({name:nm2,project_name:args.project_name,status:"Open",percent_complete:0,ec_department:"",ec_manager:args.manager||""});res({name:nm2,project_name:args.project_name});}
    else if(m==="projects.detail"){var pp=M.p.filter(function(x){return x.name===args.name;})[0]||{};var tt=M.t.filter(function(t){return t.project===args.name;});var asg2=function(t){return names(t._assign);};var ac2=function(t){return ["Done","Cancelled"].indexOf(t.workflow_state)<0;};var td3=new Date().toISOString().slice(0,10);var risk={active:tt.filter(ac2).length,overdue:tt.filter(function(t){return t.exp_end_date&&t.exp_end_date<td3&&ac2(t);}).length,blocked:tt.filter(function(t){return t.workflow_state==="Blocked";}).length,review:tt.filter(function(t){return t.workflow_state==="Review";}).length,no_assignee:tt.filter(function(t){return asg2(t).length===0;}).length,no_due:tt.filter(function(t){return !t.exp_end_date;}).length,completed:tt.filter(function(t){return t.workflow_state==="Done";}).length};var total2=tt.length;var lvl=(risk.overdue>0||risk.blocked>0)?"high":((risk.no_assignee+risk.no_due)>=Math.max(3,total2/2)?"medium":"low");res({project:pp,total:total2,risk:risk,risk_level:lvl,progress:total2?Math.round(risk.completed*100/total2):0});}
    else if(m==="tasks.list"){res({rows:M.t.filter(function(t){return !args.project||t.project===args.project;}),view:args.view||"list"});}
    else if(m==="tasks.get"){res({task:M.t.filter(function(x){return x.name===args.name;})[0],subtasks:[]});}

    else if(m==="tasks.set_status"){var t=M.t.filter(function(x){return x.name===args.name;})[0];var nx=(TR[t.workflow_state]||[]).filter(function(a){return a[0]===args.action;})[0];if(nx)t.workflow_state=nx[1];res({name:t.name,workflow_state:t.workflow_state});}
    else if(m==="tasks.create"){var nm="TASK-"+(2000+M.t.length);M.t.push({name:nm,subject:args.subject,workflow_state:"Backlog",status:"Open",project:args.project,parent_task:args.parent_task||null,_assign:null,owner:"you@ecentric.vn"});res({name:nm,subject:args.subject,project:args.project});}
    else if(m==="tasks.assign"){var t=M.t.filter(function(x){return x.name===args.name;})[0];t._assign=JSON.stringify(args.users);res({name:t.name,assigned:args.users,_assign:t._assign});}
    else if(m==="tasks.gantt"){var gt=M.t.filter(function(t){return t.project===args.project;});res({project:args.project,rows:gt.map(function(t,i){return {id:t.name,name:t.name,subject:t.subject,project:t.project,start:(i===gt.length-1?null:"2026-06-0"+(i+1)),end:(i===gt.length-1?null:"2026-06-1"+i),progress:[20,55,80,100,0,40,65][i%7],workflow_state:t.workflow_state,parent_task:t.parent_task,priority:t.priority,_assign:t._assign,dependencies:[]};})});}
    else if(m==="tasks.gantt_all"){var gts=M.t.filter(function(t){return !args.project||args.project==="all"||t.project===args.project;});res({rows:gts.map(function(t,i){var pn=(M.p.filter(function(x){return x.name===t.project;})[0]||{}).project_name||t.project;return {id:t.name,name:t.name,subject:t.subject,project:t.project,project_name:pn,start:(i%5===4?null:"2026-06-0"+((i%8)+1)),end:(i%5===4?null:"2026-06-1"+(i%8)),progress:[20,55,80,100,0,40,65][i%7],workflow_state:t.workflow_state,parent_task:t.parent_task,priority:t.priority,_assign:t._assign};})});}

    else if(m==="timer.get_active"){if(!M.tm)return res({active:false});var e3=M.tm.acc+(M.tm.status==="Running"?Math.floor((Date.now()-M.tm.t0)/1000):0);res({active:true,task:M.tm.task,project:null,status:M.tm.status,elapsed_seconds:e3});}

  var PDF_LBL={open:"Đang mở",overdue:"Quá hạn",blocked:"Blocked",review:"Chờ duyệt",noassignee:"Chưa giao",nodue:"Chưa có hạn",completed:"Hoàn thành"};

  // Project-workspace-only list renderer: hierarchy (parent->child, indented, collapsible) when unfiltered;
  // flat filtered list when a health metric is active. Columns: Nhiệm vụ / Trạng thái / Ưu tiên / Hạn / Người nhận (no Dự án).
  // Does NOT touch the global taskTable used by Công việc + My Work.
  function pdRow(t,depth,hasChildren,childCount,collapsed){var a=names(t._assign);
    var pri=t.priority?'<span class="pm-tag '+({Urgent:"tg-urgent",High:"tg-high",Medium:"tg-medium",Low:"tg-low"}[t.priority]||"tg-low")+'">'+esc(t.priority)+'</span>':'<span style="color:var(--gray-300)">-</span>';
    var lead=hasChildren?'<span class="pd-tcaret'+(collapsed?' collapsed':'')+'" data-tcol="'+esc(t.name)+'" title="Thu/mở">▾</span>':(depth>0?'<span class="pd-tlead">↳</span>':'<span class="pd-tcaret-sp"></span>');
    var cnt=hasChildren?' <span class="pd-tcount">'+childCount+' nv con</span>':'';
    return '<tr data-task="'+esc(t.name)+'" class="pd-trow'+(depth>0?' pd-child':'')+' '+pmDepthClass(depth)+'"><td class="t-main"><span class="pd-tname" style="padding-left:'+(depth*20)+'px">'+lead+'<span class="pd-ttitle">'+esc(t.subject||t.name)+'</span>'+cnt+'</span>'+(labelChips(t,2)?'<div class="pm-labels-row" style="margin-top:4px">'+labelChips(t,2)+'</div>':'')+'</td><td>'+badge(t.workflow_state)+'</td><td>'+pri+'</td><td>'+esc(fmtEndCell(t))+'</td><td>'+pmAssignee(t,false)+'</td>'+(window._isLeader?'<td class="pm-act-col">'+pmTaskMenuHtml(t.name)+'</td>':'')+'</tr>';}
  function pdTaskTable(host,rows){if(!host)return;rows=rows||[];
    if(!rows.length){return emptyBox(host,"Chưa có nhiệm vụ.");}
    var head='<div class="pd-tbl-wrap"><table class="pm-tbl pd-tbl"><thead><tr><th>Nhiệm vụ</th><th>Trạng thái</th><th>Ưu tiên</th><th>Hạn</th><th>Người nhận</th>'+(window._isLeader?'<th class="pm-act-col"></th>':'')+'</tr></thead><tbody>';
    var body="";
    if(window._pdFilter){ /* filtered -> flat (avoid orphaned children) */
      var fr=pdFilterRows(rows);
      if(!fr.length){return emptyBox(host,"Không có nhiệm vụ khớp bộ lọc.");}
      body=fr.map(function(t){return pdRow(t,0,false,0,false);}).join("");
    } else { /* unfiltered -> hierarchy */
      var byId={},byParent={},roots=[];
      rows.forEach(function(t){byId[t.name]=t;});
      rows.forEach(function(t){var p=t.parent_task;if(p&&byId[p]){(byParent[p]=byParent[p]||[]).push(t);}else{roots.push(t);}});
      window._pdTreeCollapsed=window._pdTreeCollapsed||{};
      function walk(t,depth){var kids=byParent[t.name]||[];var hc=kids.length>0;var col=!!window._pdTreeCollapsed[t.name];
        body+=pdRow(t,depth,hc,kids.length,col);
        if(hc&&!col)kids.forEach(function(c){walk(c,depth+1);});}
      roots.forEach(function(t){walk(t,0);});
    }
    host.innerHTML=head+body+'</tbody></table></div>';
    Array.prototype.forEach.call(host.querySelectorAll("tr[data-task]"),function(tr){tr.onclick=function(){openTask(tr.getAttribute("data-task"));};});
    pmWireTaskMenus(host);
    Array.prototype.forEach.call(host.querySelectorAll(".pd-tcaret[data-tcol]"),function(x){x.onclick=function(e){e.stopPropagation();var id=x.getAttribute("data-tcol");window._pdTreeCollapsed=window._pdTreeCollapsed||{};window._pdTreeCollapsed[id]=!window._pdTreeCollapsed[id];pdTaskTable(host,rows);};});}
  function renderSumInto(host,m){if(!host)return;var ks=Object.keys(m||{}).sort().reverse();if(!ks.length){return emptyBox(host,"Không có dữ liệu.");}

  // Badge hierarchy — primary (critical, always first) then secondary. Status Blocked/
  // Waiting-Review are conveyed by the canonical status badge / kanban column (not
  // duplicated here). Array structure lets custom user labels be appended later (roadmap).
  function taskTagList(t){var a=names(t._assign);var pr=t.priority;var P=[],S=[];
    if(isOverdue(t))P.push('<span class="pm-tag tg-overdue">Quá hạn</span>');
    if(pr==="Urgent")P.push('<span class="pm-tag tg-urgent">Urgent</span>');
    if(window._activeTimer&&window._activeTimer.task===t.name)P.push('<span class="pm-tag tg-timer"><span class="tg-dot"></span>Đang chạy</span>');
    if(pr&&pr!=="Urgent"&&pr!=="Low")S.push('<span class="pm-tag '+({High:"tg-high",Medium:"tg-medium"}[pr]||"tg-medium")+'">'+esc(pr)+'</span>'); /* G4.8c: Low has no badge */
    if(window._recSet&&window._recSet[t.name])S.push('<span class="pm-tag tg-recurring">Lặp</span>');
    /* G4.8c: no "Chưa giao" tag here — the assignee column already conveys it (gray). */
    if(!t.exp_end_date)S.push('<span class="pm-tag tg-nodue">Chưa có hạn</span>');

    else{ctrl=document.createElement("input");ctrl.type="text";ctrl.value=t.subject||"";}
    elx.innerHTML="";elx.appendChild(ctrl);ctrl.focus();
    var done=false;
    function rewire(html){elx.removeAttribute("data-editing");elx.innerHTML=html;elx.onclick=function(){startInline(elx,t,name);};}

      if(done)return;var val=ctrl.value,payload={name:name};
      if(field==="subject"){if(!val.trim()){toast("Tiêu đề không được trống",true);try{ctrl.focus();}catch(_){}return;}payload.subject=val.trim();}
      else if(field==="priority"){payload.priority=val;}
      else if(field==="start"){var ed=ymd(t.exp_end_date);if(val&&ed&&ed<val){toast("Bắt đầu không được sau hạn",true);try{ctrl.focus();}catch(_){}return;}payload.exp_start_date=val||"";}
      else if(field==="end"){var sd=ymd(t.exp_start_date);if(val&&sd&&val<sd){toast("Hạn không được trước ngày bắt đầu",true);try{ctrl.focus();}catch(_){}return;}payload.exp_end_date=val||"";}

        if(field==="subject"){t.subject=payload.subject;}
        else if(field==="priority"){t.priority=payload.priority;}
        else if(field==="start"){t.exp_start_date=payload.exp_start_date;}
        else if(field==="end"){t.exp_end_date=payload.exp_end_date;}
        else if(field==="desc"){t.description=payload.description;}

    });

  function showAssignments(){var c=el("pm-view");spin(c);window._asgTab=window._asgTab||"in";

                 api(PM+"assignment.list_outgoing").catch(function(){return {rows:[]};})]).then(function(res){
      var inc=(res[0].rows||[]),out=(res[1].rows||[]);
      /* G5.2 item2: each card's COUNT is the length of the exact {row,tab} set it renders when active.
         respond=incoming Pending, awaiting=outgoing Pending, reschedule=outgoing Reschedule Proposed,
         done=Accepted/Rejected/Cancelled merged (in+out) deduped by request name, each row keeps its
         own perspective so the right actions render. No total-across-perspectives while showing one tab. */
      var DONE=["Accepted","Rejected","Cancelled"];

      var respondSet=pairs(inc,function(r){return r.status==="Pending";},"in");
      var awaitingSet=pairs(out,function(r){return r.status==="Pending";},"out");
      var reschedSet=pairs(out,function(r){return r.status==="Reschedule Proposed";},"out");
      var seen={},doneSet=[];

        .concat(pairs(out,function(r){return DONE.indexOf(r.status)>=0;},"out"))
        .forEach(function(x){if(!seen[x.r.name]){seen[x.r.name]=1;doneSet.push(x);}});

      Array.prototype.forEach.call(c.querySelectorAll("[data-asgf]"),function(b){b.onclick=function(){var k=b.getAttribute("data-asgf");window._asgFilter=(window._asgFilter===k)?"":k;showAssignments();};});

      renderAsgPairs(el("asg-body"),disp);

  function renderAsgPairs(host,pairs){

    Array.prototype.forEach.call(host.querySelectorAll("[data-asg-act]"),function(b){b.onclick=function(){asgAction(b.getAttribute("data-asg-name"),b.getAttribute("data-asg-act"),b.closest(".asg-card"));};});

  function asgCard(r,tab){var who=(tab==="in")?("Từ: "+esc(r.requested_by)):("Đến: "+esc(r.recipient));

      acts='<div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px">'+

        '<button class="pm-btn" data-asg-act="reschedule" data-asg-name="'+esc(r.name)+'">Đề xuất lịch khác</button></div>';}

      (r.message?'<div style="font-size:12.5px;margin-top:4px">'+esc(r.message)+'</div>':"")+counter+
      (r.response_reason&&r.status==="Rejected"?'<div style="font-size:12px;color:var(--pink);margin-top:4px">Lý do từ chối: '+esc(r.response_reason)+'</div>':"")+

        if(mode.v==="exist"){var tk=el("rcf-task").value;if(!tk){toast("Chọn nhiệm vụ",true);return;}_busy(true);
          api(PM+"recurrence.create",{source_task:tk,frequency:freq,start_date:rstart,end_date:rend}).then(function(){toast("Đã tạo lịch lặp");closeD();showRecurring();}).catch(function(e){toast("Lỗi: "+errOf(e),true);_busy(false);});return;}
        var subj=el("rcf-subject").value.trim();if(!subj){toast("Nhập tên nhiệm vụ",true);return;}_busy(true);
        var lbls=pmGetLabels(el("rcf-labels")); /* G5.2 §B: read from shared picker (was dead checkbox query) */
        api(PM+"recurrence.create_with_task",{subject:subj,frequency:freq,project:el("rcf-project").value||"",assignee:el("rcf-assignee").value.trim()||null,description:el("rcf-desc").value||null,priority:el("rcf-priority").value||null,exp_start_date:el("rcf-sd").value||null,exp_end_date:el("rcf-ed").value||null,pm_start_time:el("rcf-st").value||null,pm_end_time:el("rcf-et").value||null,start_date:rstart,end_date:rend,checklist_template:el("rcf-tmpl").value||null,labels:lbls.length?JSON.stringify(lbls):null}).then(function(){toast("Đã tạo việc định kỳ");closeD();showRecurring();}).catch(function(e){toast("Lỗi: "+errOf(e),true);_busy(false);});};
    }).catch(function(e){errBox(c,e);});}

  function tsSum(rows,pred){var s=0;rows.forEach(function(r){if(pred(r))s+=(r.hours||0);});return Math.round(s*100)/100;}
  function showTimesheet(){var c=el("pm-view");spin(c);
    api(PM+"timesheet.report",window._tsF||{}).then(function(d){renderTimesheet(c,d);}).catch(function(e){errBox(c,e);});}
  function renderTimesheet(c,d){var rows=d.rows||[];var F=window._tsF||{};
    var projs=uniq(rows.map(function(r){return r.project;}));var users=uniq(rows.map(function(r){return r.owner;}));
    var mon=new Date().toISOString().slice(0,7);
    var dd=new Date();var dow=(dd.getDay()+6)%7;var m0=new Date(dd);m0.setDate(dd.getDate()-dow);var ws=m0.toISOString().slice(0,10);var we=new Date(m0);we.setDate(m0.getDate()+6);var weStr=we.toISOString().slice(0,10);
    c.innerHTML=head("Timesheet","Tổng hợp worktime từ native Timesheet")+
      '<div class="pm-filters">'+
        '<select class="pm-sel" id="ts-user"><option value="">Mọi người</option>'+users.map(function(u){return opt(u,u,F.user);}).join("")+'</select>'+
        '<select class="pm-sel" id="ts-proj"><option value="">Mọi dự án</option>'+projs.map(function(p){return opt(p,p,F.project);}).join("")+'</select>'+
        '<input class="pm-input" id="ts-task" placeholder="Task..." value="'+esc(F.task||"")+'" style="background-image:none;padding-left:11px;min-width:140px">'+
        '<input class="pm-input" id="ts-from" type="date" value="'+esc(F.from_date||"")+'" style="background-image:none;padding-left:11px" title="Từ">'+
        '<input class="pm-input" id="ts-to" type="date" value="'+esc(F.to_date||"")+'" style="background-image:none;padding-left:11px" title="Đến">'+
        '<button class="pm-btn primary" id="ts-apply">Lọc</button><button class="pm-btn" id="ts-clear">Xoá lọc</button></div>'+
      '<div class="stats-strip">'+sc("s-navy","Tổng giờ",Math.round((d.total_hours||0)*100)/100)+sc("s-yellow","Tuần này",tsSum(rows,function(r){var x=(r.from_time||"").slice(0,10);return x>=ws&&x<=weStr;}))+sc("s-pink","Tháng này",tsSum(rows,function(r){return (r.from_time||"").slice(0,7)===mon;}))+sc("s-green","Số log",rows.length)+'</div>'+
      '<div class="panel"><div class="panel-header"><div class="panel-title">Tổng hợp</div><div class="seg"><button data-sum="by_month" class="active">Tháng</button><button data-sum="by_week">Tuần</button><button data-sum="by_day">Ngày</button></div></div><div id="ts-sum"></div></div>'+
      '<div class="panel"><div class="panel-header"><div class="panel-title">Chi tiết log</div></div><div id="ts-tbl"></div></div>';
    el("ts-apply").onclick=function(){window._tsF={user:el("ts-user").value||null,project:el("ts-proj").value||null,task:el("ts-task").value||null,from_date:el("ts-from").value||null,to_date:el("ts-to").value||null};showTimesheet();};
    el("ts-clear").onclick=function(){window._tsF={};showTimesheet();};
    Array.prototype.forEach.call(c.querySelectorAll("[data-sum]"),function(b){b.onclick=function(){Array.prototype.forEach.call(c.querySelectorAll("[data-sum]"),function(x){x.classList.toggle("active",x===b);});renderSum(d,b.getAttribute("data-sum"));};});
    renderSum(d,"by_month");
    var tb=el("ts-tbl");
    if(!rows.length){return emptyBox(tb,"Không có log worktime.");}
    tb.innerHTML='<table class="pm-tbl"><thead><tr><th>Ngày</th><th>Task</th><th>Dự án</th><th>Giờ</th><th>Mô tả</th><th>Người</th></tr></thead><tbody>'+
      rows.map(function(r){return '<tr><td>'+esc((r.from_time||"").slice(0,10))+'</td><td class="t-main" data-task="'+esc(r.task||"")+'" style="cursor:pointer">'+esc(r.task||"-")+'</td><td>'+esc(r.project||"-")+'</td><td>'+esc(r.hours)+'h</td><td>'+esc(r.description||"")+'</td><td>'+esc(r.owner||"")+'</td></tr>';}).join("")+'</tbody></table>';
    Array.prototype.forEach.call(tb.querySelectorAll("[data-task]"),function(x){x.onclick=function(){var t=x.getAttribute("data-task");if(t)openTask(t);};});}
  function renderSum(d,key){renderSumInto(el("ts-sum"),d[key]||{});}

  function notifBucket(cr){var d=(cr||"").slice(0,10);if(!d)return "Cũ hơn";
    var td=new Date().toISOString().slice(0,10);var y=new Date(Date.now()-86400000).toISOString().slice(0,10);
    if(d===td)return "Hôm nay";if(d===y)return "Hôm qua";
    var dt=new Date();var dow=(dt.getDay()+6)%7;var m0=new Date(dt);m0.setDate(dt.getDate()-dow);var ws=m0.toISOString().slice(0,10);
    if(d>=ws)return "Tuần này";return "Cũ hơn";}
  function notifType(s){s=s||"";if(s.indexOf("[Overdue]")>=0||s.toLowerCase().indexOf("qua han")>=0||s.indexOf("quá hạn")>=0)return ["Quá hạn","tg-overdue"];
    if(s.indexOf("->")>=0||s.indexOf("→")>=0)return ["Trạng thái","tg-medium"];
    if(s.indexOf("giao")>=0)return ["Giao việc","tg-recurring"];
    if(s.toLowerCase().indexOf("recurring")>=0||s.indexOf("Lặp")>=0)return ["Lặp","tg-low"];
    return ["Thông báo","tg-low"];}
  function showNotifications(){ window.location.href="/app/notification-log"; }  // PM notif view retired -> Global NC

  function soon(view){var c=el("pm-view");var map={gantt:["Gantt","Biểu đồ Gantt theo ngày bắt đầu/kết thúc của nhiệm vụ."],timesheet:["Timesheet","Ghi nhận giờ làm việc theo nhiệm vụ (native Timesheet)."],recurring:["Recurring","Nhiệm vụ lặp: daily / weekly / biweekly / monthly."],notifications:["Thông báo","Thông báo giao việc, cập nhật, quá hạn."]};
    var v=map[view]||["Sắp có",""]; c.innerHTML=head(v[0],v[1])+'<div class="panel"><div class="pm-state"><svg class="icon em-ic"><use href="#p-'+(view==="notifications"?"bell":view==="timesheet"?"clock":view==="recurring"?"repeat":"gantt")+'"/></svg><div>Đang phát triển — sẽ có ở bước tiếp theo của Phase này.</div></div></div>';}

  // PM notification UI retired: the topbar bell + sidebar "Thông báo" now use the
  // Global Notification Center. The sidebar item is kept for compatibility but
  // opens /app/notification-log in a NEW TAB (G4.3) so the /pm SPA is never
  // replaced by raw Desk. The nav onclick below short-circuits before go() so
  // _curView / active nav / breadcrumb stay on the current PM view.
  function redirectToGlobalNotifications(){ window.open("/app/notification-log","_blank","noopener"); }
  var VIEWS={dashboard:showDashboard,mytasks:showMyTasks,projects:showProjects,work:showWork,tasks:showTasks,board:showBoard,gantt:showGantt,calendar:showCalendar,timesheet:showTimesheet,recurring:showRecurring,assignments:showAssignments,notifications:redirectToGlobalNotifications};
  function go(v){if(window.PMCharts)PMCharts.disposeAll();window._pmOpenProject=null;var WM={tasks:"list",board:"board",gantt:"gantt",calendar:"calendar",table:"table",work:null};var isW=Object.prototype.hasOwnProperty.call(WM,v);var navKey=isW?"work":v;
    window._curView=navKey;Array.prototype.forEach.call(el("pm-nav").querySelectorAll(".nav-item[data-view]"),function(b){b.classList.toggle("active",b.getAttribute("data-view")===navKey);});
    el("pm-crumb").textContent=isW?"Công việc":(CRUMB[v]||"Tổng quan");
    if(isW){if(WM[v])window._workView=WM[v];try{localStorage.setItem("pm_work_view",window._workView||"list");}catch(_){}showWork();}
    else (VIEWS[v]||showDashboard)();
    if(typeof pmSyncHash==="function")pmSyncHash();}
  /* G5.2 §7: canonical hash route-state (frontend-only; backend permission still enforced on every
     API call). Preserves the current view + task/project detail on F5, Back/Forward and deep links.
     No reload; a single expected-hash guard prevents feedback loops. */
  var _pmExpectedHash="";
  function pmSetHash(h){ h=h||"#overview"; _pmExpectedHash=h; if(location.hash!==h){ try{location.hash=h;}catch(_){} } }
  function pmBaseHash(){
    var v=window._curView;
    if(window._pmOpenProject) return "#project/"+encodeURIComponent(window._pmOpenProject);
    if(v==="work") return "#work/"+(window._workView||"list");
    if(v==="assignments") return "#assignments/"+(window._asgTab||"in");
    var m={dashboard:"#overview",mytasks:"#mywork",projects:"#projects",timesheet:"#timesheet",recurring:"#recurring"};
    return m[v]||"#overview";
  }
  function pmSyncHash(){ if(!window._pmTaskOpen) pmSetHash(pmBaseHash()); }
  function pmApplyRoute(){
    var h=(location.hash||"").replace(/^#\/?/,""); _pmExpectedHash=location.hash;
    var p=h.split("/"), head=p[0]||"overview";
    var VMAP={overview:"dashboard",mywork:"mytasks",projects:"projects",timesheet:"timesheet",recurring:"recurring"};
    if(head==="task"&&p[1]){ go("work"); openTask(decodeURIComponent(p[1])); return; }
    if(head==="project"&&p[1]){ go("projects"); openProject(decodeURIComponent(p[1])); return; }
    if(head==="assignments"){ window._asgTab=(p[1]==="out")?"out":"in"; go("assignments"); return; }
    if(head==="work"){ var w2v={list:"tasks",board:"board",calendar:"calendar",gantt:"gantt",table:"table"}; go(w2v[p[1]]||"tasks"); return; }
    if(VMAP[head]){ go(VMAP[head]); return; }
    go("dashboard"); /* invalid route -> Overview */
  }
  window.addEventListener("hashchange",function(){ if(location.hash===_pmExpectedHash) return; pmApplyRoute(); });
  /* G5.2 §B: ONE reusable smart label picker. Used by Task create/edit, Recurring create and the
     canonical Task Request mode. host = container el; opts.labels = catalogue [{name,label_name,
     color_key,is_active}]; opts.selected = [ids]. Selection lives on host._pmSel; read back with
     pmGetLabels(host). Chips + "+ Chọn nhãn" popover (search, hide-selected, "+ Tạo nhãn mới" via
     the governed labels.create_label). Submits the same [label_id] JSON as before. */
  function pmGetLabels(host){ return (host&&host._pmSel)?host._pmSel.slice():[]; }
  /* G5.2 fix: multi-assignee chip input. host = container; chips live on host._chips; read with
     pmEmailChipsGet(host). Enter/comma/semicolon/blur -> chip; Backspace on empty removes last;
     duplicates rejected case-insensitively. Submits a string[] (never one comma-joined email). */
  function pmEmailChipsGet(host){ return (host&&host._chips)?host._chips.slice():[]; }
  /* G5.2 UX guard: update the max chips allowed (Request mode = 1) and re-render; existing chips
     are NEVER auto-removed when the max shrinks — the input just disables until the user reduces. */
  function pmEmailChipsSetMax(host, n){ if(host){ host._max=n; if(host._render) host._render(); } }
  function pmEmailChips(host, opts){
    if(!host) return; opts=opts||{};
    host._chips=(opts.values||[]).slice();
    host._max=opts.max||1e9;
    function changed(){ if(typeof opts.onChange==="function"){ try{ opts.onChange(pmEmailChipsGet(host)); }catch(_){} } }
    function addRaw(text){ String(text||"").split(/[,;\n]/).forEach(function(p){ var v=(p||"").trim(); if(!v) return;
      if(host._chips.length>=host._max) return; /* respect max (Request mode = 1) */
      if(!host._chips.some(function(x){return x.toLowerCase()===v.toLowerCase();})) host._chips.push(v); }); }
    function render(){
      var full=host._chips.length>=host._max;
      var chips=host._chips.map(function(v,i){ return '<span class="pm-chip">'+esc(v)+'<button type="button" class="pm-chip-x" data-ci="'+i+'" aria-label="Bỏ">×</button></span>'; }).join("");
      host.innerHTML='<div class="pm-chipwrap">'+chips+'<input type="text" class="pm-chip-in"'+(full?' disabled':'')+' placeholder="'+esc(full?"":(opts.placeholder||"Nhập email và nhấn Enter"))+'"></div>';
      Array.prototype.forEach.call(host.querySelectorAll("[data-ci]"),function(b){ b.onclick=function(){ host._chips.splice(+b.getAttribute("data-ci"),1); render(); changed(); var i2=host.querySelector(".pm-chip-in"); if(i2&&!i2.disabled)i2.focus(); }; });
      var inp=host.querySelector(".pm-chip-in");
      inp.onkeydown=function(e){
        if(e.key==="Enter"||e.key===","||e.key===";"){ e.preventDefault(); if(inp.value.trim()){ addRaw(inp.value); inp.value=""; render(); changed(); var i3=host.querySelector(".pm-chip-in"); if(i3&&!i3.disabled)i3.focus(); } }
        else if(e.key==="Backspace"&&!inp.value&&host._chips.length){ host._chips.pop(); render(); changed(); var i4=host.querySelector(".pm-chip-in"); if(i4&&!i4.disabled)i4.focus(); }
      };
      inp.onblur=function(){ if(inp.value.trim()){ addRaw(inp.value); inp.value=""; render(); changed(); } };
    }
    host._render=render;
    render();
  }
  function pmLabelPicker(host, opts){
    if(!host) return; opts=opts||{};
    host._pmCat=(opts.labels||[]).slice(); host._pmSel=(opts.selected||[]).slice();
    function cat(id){ for(var i=0;i<host._pmCat.length;i++){ if(host._pmCat[i].name===id) return host._pmCat[i]; } return {name:id,label_name:id,color_key:"gray"}; }
    function closePop(){ var p=host.querySelector(".pm-lblpop"); if(p){p.hidden=true;p.innerHTML="";} document.removeEventListener("mousedown",outside,true); document.removeEventListener("keydown",onEsc,true); }
    function outside(e){ if(!host.contains(e.target)) closePop(); }
    function onEsc(e){ if(e.key==="Escape"){ e.stopPropagation(); closePop(); } }
    function createNew(){ var nm=window.prompt("Tên nhãn mới:"); if(!nm||!nm.trim()) return; nm=nm.trim();
      api(PM+"labels.create_label",{label_name:nm,color_key:"blue"}).then(function(r){ var id=(r&&(r.name||r.label_name))||nm; host._pmCat.push({name:id,label_name:nm,color_key:(r&&r.color_key)||"blue",is_active:1}); if(host._pmSel.indexOf(id)<0)host._pmSel.push(id); closePop(); render(); }).catch(function(e){ toast("Lỗi tạo nhãn: "+errOf(e),true); }); }
    function openPop(){ var pop=host.querySelector(".pm-lblpop");
      var avail=host._pmCat.filter(function(l){ return host._pmSel.indexOf(l.name)<0 && (l.is_active===undefined||l.is_active); });
      pop.innerHTML='<div class="pm-lblpop-in"><input class="pm-input pm-lblsearch" placeholder="Tìm nhãn..."><div class="pm-lbllist">'+
        (avail.length?avail.map(function(l){ return '<button type="button" class="pm-lblopt2" data-pickid="'+esc(l.name)+'"><span class="pm-lbl pm-lbl-'+esc(l.color_key||"gray")+'">'+esc(l.label_name||l.name)+'</span></button>'; }).join(""):'<div class="pm-lblnone">Không còn nhãn để chọn</div>')+
        '</div><button type="button" class="pm-lblnew" data-lblnew="1"><svg class="icon icon-sm"><use href="#p-plus"/></svg> Tạo nhãn mới</button></div>';
      pop.hidden=false;
      var srch=pop.querySelector(".pm-lblsearch"); if(srch){ try{srch.focus();}catch(_){} srch.oninput=function(){ var q=this.value.trim().toLowerCase(); Array.prototype.forEach.call(pop.querySelectorAll(".pm-lblopt2"),function(o){ o.style.display=o.textContent.toLowerCase().indexOf(q)>=0?"":"none"; }); }; }
      Array.prototype.forEach.call(pop.querySelectorAll("[data-pickid]"),function(b){ b.onclick=function(e){ e.stopPropagation(); host._pmSel.push(b.getAttribute("data-pickid")); closePop(); render(); }; });
      var nb=pop.querySelector("[data-lblnew]"); if(nb) nb.onclick=function(e){ e.stopPropagation(); createNew(); };
      setTimeout(function(){ document.addEventListener("mousedown",outside,true); document.addEventListener("keydown",onEsc,true); },0);
    }
    function render(){
      var chips=host._pmSel.map(function(id){ var l=cat(id); return '<span class="pm-lblchip pm-lbl-'+esc(l.color_key||"gray")+'">'+esc(l.label_name||id)+'<button type="button" class="pm-lblchip-x" data-rmlid="'+esc(id)+'" aria-label="Bỏ nhãn">×</button></span>'; }).join("");
      host.innerHTML='<div class="pm-lblwrap">'+chips+'<button type="button" class="pm-lbladd" data-lbladd="1"><svg class="icon icon-sm"><use href="#p-plus"/></svg> Chọn nhãn</button></div><div class="pm-lblpop" hidden></div>';
      Array.prototype.forEach.call(host.querySelectorAll("[data-rmlid]"),function(b){ b.onclick=function(e){ e.stopPropagation(); var id=b.getAttribute("data-rmlid"); host._pmSel=host._pmSel.filter(function(x){return x!==id;}); render(); }; });
      host.querySelector("[data-lbladd]").onclick=function(e){ e.stopPropagation(); openPop(); };
    }
    render();
  }
  Array.prototype.forEach.call(el("pm-nav").querySelectorAll(".nav-item[data-view]"),function(b){b.onclick=function(){var v=b.getAttribute("data-view");if(v==="notifications"){window.open("/app/notification-log","_blank","noopener");return;}go(v);};});
  el("pm-search").addEventListener("keydown",function(e){if(e.key==="Enter"){F.q=this.value.trim().toLowerCase();go("tasks");}});

  function fillUser(){
    if(!LIVE){ window._pmUser="hoan.tran@ecentric.vn"; el("pm-av").textContent="PV"; el("pm-uname").textContent="Preview User"; el("pm-urole").textContent="Mock"; el("pm-preview").style.display="inline-block"; return; }
    api("frappe.auth.get_logged_user").then(function(u){ u=u||"User"; window._pmUser=u; el("pm-av").textContent=ini(u); el("pm-uname").textContent=u.split("@")[0]; el("pm-urole").textContent="Thành viên PM"; }).catch(function(){ el("pm-uname").textContent="Người dùng"; });
  }
  // PM badge retired -> Global Notification Center owns the unread badge on the bell.
  // No-op kept so existing call sites stay valid; PM notifications API is not called
  // from the frontend anymore (backend API itself is left untouched).
  function refreshBadge(){ /* retired: handled by Global Notification Center */ }
  function refreshTimerChip(){var chip=el("tb-timer");if(!chip)return;
    api(PM+"timer.get_active").then(function(ac){
      if(ac&&ac.active){window._activeTimer={task:ac.task,status:ac.status,base:ac.elapsed_seconds||0,t0:Date.now()};
        chip.style.display="inline-flex";
        chip.innerHTML='<span class="tg-dot"></span><span class="tt-name">'+esc(ac.task)+'</span><span class="tt-clock">'+fmtDur(ac.elapsed_seconds||0)+'</span>';
        startTimerClock(ac.status==="Running");
      } else {window._activeTimer=null;chip.style.display="none";stopTimerClock();}
    }).catch(function(){});}
  function startTimerClock(run){stopTimerClock();if(!run)return;window._tcTick=setInterval(function(){var cl=document.querySelector("#tb-timer .tt-clock");var at=window._activeTimer;if(!cl||!at){stopTimerClock();return;}cl.textContent=fmtDur(at.base+Math.floor((Date.now()-at.t0)/1000));},1000);}
  function stopTimerClock(){if(window._tcTick){clearInterval(window._tcTick);window._tcTick=null;}}
  if(el("tb-new"))el("tb-new").onclick=function(){newTask(null);};
  // tb-bell is now a canonical Global Notification Center bell (anchor +
  // data-ec-notification-bell="1"); the global asset handles plain-click (dropdown)
  // and Ctrl/Cmd/middle-click keeps the native /app/notification-log link. No PM handler.
  if(el("tb-timer"))el("tb-timer").onclick=function(){if(window._activeTimer&&window._activeTimer.task)openTask(window._activeTimer.task);};
  fillUser(); loadRecSet(); refreshTimerChip(); setInterval(refreshTimerChip,20000); pmApplyRoute();
})();
</script>

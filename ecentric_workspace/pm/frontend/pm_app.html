  /* No transform transition on the baseline: when closeD removes .expanded the modal must jump off-screen instantly (no animated side-slide). Modal open/close animation is opacity-only on .expanded. */
  .pm-drawer{ position:fixed; top:0; right:0; height:100%; width:440px; max-width:94vw; background:#fff; box-shadow:-10px 0 40px rgba(0,0,0,.16); transform:translateX(100%); z-index:81; display:flex; flex-direction:column; }

  function dcD(t){return t.exp_end_date?String(t.exp_end_date).slice(0,10):null;}
  function dcActive(t){return ["Done","Cancelled"].indexOf(t.workflow_state)<0;}
  function dcToday10(){return new Date().toISOString().slice(0,10);}
  function dcWeek10(){var e=new Date();e.setDate(e.getDate()+7);return e.toISOString().slice(0,10);}
  function dcIsOverdue(t){var d=dcD(t);return !!(d&&d<dcToday10()&&dcActive(t));}
  function dcIsToday(t){return dcD(t)===dcToday10()&&dcActive(t);}
  function dcIsWeek(t){var d=dcD(t);return !!(d&&d>dcToday10()&&d<=dcWeek10()&&dcActive(t));}
  var DC_REASON={overdue:["Quá hạn","#c0392b","#fcebeb"],blocked:["Blocked","#a32d2d","#fcebeb"],review:["Chờ duyệt","#925f00","#fff7e6"],today:["Hôm nay","#1f2d80","#eef0fb"],week:["Tuần này","#185fa5","#e6f1fb"],noassignee:["Chưa giao","#925f00","#fff7e6"],nodue:["Chưa có hạn","#4b5563","#f3f4f6"]};
  function dcReasonBadge(r){var m=DC_REASON[r]||["","",""];return '<span class="dc-reason" style="color:'+m[1]+';background:'+m[2]+'">'+m[0]+'</span>';}
  function dcReasonOf(t){if(!dcActive(t))return null;
    if(dcIsOverdue(t))return "overdue";
    if(t.workflow_state==="Blocked")return "blocked";
    if(t.workflow_state==="Review")return "review";
    if(dcIsToday(t))return "today";
    if(dcIsWeek(t))return "week";
    if(names(t._assign).length===0)return "noassignee";
    if(!t.exp_end_date)return "nodue";
    return null;}
  function dcProjectHealth(tasks,projs){var by={};
    tasks.forEach(function(t){var p=t.project;if(!p)return;var a=by[p]||(by[p]={open:0,overdue:0,blocked:0,review:0,noass:0,nodue:0,total:0,done:0});
      a.total++;if(t.workflow_state==="Done")a.done++;if(dcActive(t))a.open++;if(dcIsOverdue(t))a.overdue++;if(t.workflow_state==="Blocked")a.blocked++;if(t.workflow_state==="Review")a.review++;if(dcActive(t)&&names(t._assign).length===0)a.noass++;if(dcActive(t)&&!t.exp_end_date)a.nodue++;});
    var out=projs.map(function(p){var a=by[p.name]||{open:0,overdue:0,blocked:0,review:0,noass:0,nodue:0,total:0,done:0};
      var lvl=(a.overdue>0||a.blocked>0)?"high":((a.review>0||a.noass>0)?"attention":"stable");
      return {name:p.name,project_name:p.project_name||p.name,manager:p.ec_manager||"-",progress:(p.progress!=null?p.progress:0),lvl:lvl,a:a};});
    var rank={high:0,attention:1,stable:2};
    out.sort(function(x,y){return (rank[x.lvl]-rank[y.lvl])||(y.a.overdue-x.a.overdue)||(y.a.open-x.a.open);});return out;}
  function dcWorkload(tasks){var wl={};
    tasks.forEach(function(t){names(t._assign).forEach(function(u){var w=wl[u]||(wl[u]={u:u,open:0,overdue:0,today:0,week:0,blocked:0,review:0,nodue:0});
      if(dcActive(t))w.open++;if(dcIsOverdue(t))w.overdue++;if(dcIsToday(t))w.today++;if(dcIsWeek(t))w.week++;if(t.workflow_state==="Blocked")w.blocked++;if(t.workflow_state==="Review")w.review++;if(dcActive(t)&&!t.exp_end_date)w.nodue++;});});
    return Object.keys(wl).map(function(k){return wl[k];}).sort(function(a,b){return b.open-a.open;});}
  function dcFocus(tasks){var out=[];tasks.forEach(function(t){var r=dcReasonOf(t);if(r)out.push({t:t,r:r});});
    var rank={overdue:0,blocked:1,review:2,today:3,week:4,noassignee:5,nodue:6};

  function mwFocus(mine,recTasks){var items=[],seen={};
    recTasks.forEach(function(t){if(!t||seen[t.name])return;seen[t.name]=1;items.push({t:t,reason:recTaskReason(t),isRec:true,rank:5});}); /* recurring-today = rank 5 (in scope) */

      var rank={overdue:1,blocked:2,review:3,today:4,week:6,noassignee:7,nodue:7}[r]||8;
      items.push({t:t,reason:r,isRec:false,rank:rank});});
    items.sort(function(a,b){return (a.rank-b.rank)||((dcD(a.t)||"9999")<(dcD(b.t)||"9999")?-1:1);});
    return items;}

  function pdTaskTable(host,rows){if(!host)return;rows=rows||[];
    if(!rows.length){return emptyBox(host,"Chưa có nhiệm vụ.");}
    var head='<div class="pd-tbl-wrap"><table class="pm-tbl pd-tbl"><thead><tr><th>Nhiệm vụ</th><th>Trạng thái</th><th>Ưu tiên</th><th>Hạn</th><th>Người nhận</th></tr></thead><tbody>';

      body=fr.map(function(t){return pdRow(t,0,false,0,false);}).join("");
    } else { /* unfiltered -> hierarchy */
      var byId={},byParent={},roots=[];
      rows.forEach(function(t){byId[t.name]=t;});
      rows.forEach(function(t){var p=t.parent_task;if(p&&byId[p]){(byParent[p]=byParent[p]||[]).push(t);}else{roots.push(t);}});

        body+=pdRow(t,depth,hc,kids.length,col);

  // Badge hierarchy — primary (critical, always first) then secondary. Status Blocked/
  // Waiting-Review are conveyed by the canonical status badge / kanban column (not
  // duplicated here). Array structure lets custom user labels be appended later (roadmap).
  function taskTagList(t){var a=names(t._assign);var pr=t.priority;var P=[],S=[];
    if(isOverdue(t))P.push('<span class="pm-tag tg-overdue">Quá hạn</span>');
    if(pr==="Urgent")P.push('<span class="pm-tag tg-urgent">Urgent</span>');
    if(window._activeTimer&&window._activeTimer.task===t.name)P.push('<span class="pm-tag tg-timer"><span class="tg-dot"></span>Đang chạy</span>');
    if(pr&&pr!=="Urgent")S.push('<span class="pm-tag '+({High:"tg-high",Medium:"tg-medium",Low:"tg-low"}[pr]||"tg-low")+'">'+esc(pr)+'</span>');
    if(window._recSet&&window._recSet[t.name])S.push('<span class="pm-tag tg-recurring">Lặp</span>');

  function presetMatch(t){var p=F.preset;if(!p)return true;var u=window._pmUser||"";var td=new Date().toISOString().slice(0,10);var asg=names(t._assign);var due=t.exp_end_date||"";

  // Move existing bar: pointer drag preserves duration, snaps to day, commits via tasks.update.

  // Snap to day, min duration 1 day (clamp), commit via tasks.update, keep-scroll reload + undo.

  function recBadge(s){return s==="Active"?"st-Done":s==="Paused"?"st-Review":s==="Cancelled"?"st-Cancelled":"st-Backlog";}

  function ruleHealth(r,t){
    var maxed=r.status==="Completed"||((r.max_occurrences||0)>0&&(r.occurrences_done||0)>=r.max_occurrences);
    if(maxed)return "maxed";
    if(r.status!=="Active")return null; /* Paused/Cancelled have no health */
    var today=new Date().toISOString().slice(0,10);
    var nrd=r.next_run_date?String(r.next_run_date).slice(0,10):null;var lrd=r.last_run_date?String(r.last_run_date).slice(0,10):null;
    if(nrd&&nrd<=today&&lrd!==today)return "notgen";
    if(t&&(dcIsOverdue(t)||t.workflow_state==="Blocked"))return "risk";
    if(t&&dcActive(t)&&(lrd===today||names(t._assign).length===0))return "attention";
    return "stable";}
  function ruleHealthBadge(k){

    if(k==="notgen")return '<span class="pm-badge" style="background:#fdebd0;color:#a05a00">Chưa sinh hôm nay</span>';

    if(k==="attention")return '<span class="pm-badge st-Review">Cần chú ý</span>';

    host.innerHTML=alerts.slice(0,20).map(function(x){
      var bd=x.kind==="notgen"?'<span class="dc-reason" style="color:#a05a00;background:#fdebd0">Chưa sinh hôm nay</span>':recReasonBadge(x.kind);
      var title=x.t?(x.t.subject||x.t.name):("Chưa sinh: "+x.r.source_task);var proj=(x.t&&x.t.project)||x.r.project||"";
      return '<div class="rec-alert" data-task="'+esc(x.task)+'">'+bd+'<span class="rec-alert-main">'+esc(title)+(proj?' <span style="color:var(--gray-400)">· '+esc(proj)+'</span>':'')+'</span><span class="rec-alert-rule">'+esc(x.r.source_task)+'</span></div>';}).join("");
    Array.prototype.forEach.call(host.querySelectorAll("[data-task]"),function(x){x.onclick=function(){openTask(x.getAttribute("data-task"));};});}
  function recTodayTable(host,rows){if(!host)return;if(!rows.length){return emptyBox(host,"Hôm nay chưa có nhiệm vụ định kỳ nào được sinh.");}
    host.innerHTML='<div class="pd-tbl-wrap"><table class="pm-tbl pd-tbl"><thead><tr><th>Nhiệm vụ</th><th>Dự án</th><th>Người nhận</th><th>Trạng thái</th><th>Hạn</th><th>Quy tắc nguồn</th><th>Tình trạng</th><th></th></tr></thead><tbody>'+
      rows.map(function(x){var t=x.t,r=x.r;var a=t?names(t._assign):[];var noass=t&&a.length===0;
        return '<tr'+(t?' data-task="'+esc(t.name)+'"':'')+'><td class="t-main">'+esc(t?(t.subject||t.name):r.last_task)+'</td><td>'+esc((t&&t.project)||r.project||"-")+'</td><td>'+(a.length?'<span class="pm-mini-av" title="'+esc(a[0])+'">'+ini(a[0])+'</span>':'<span style="color:var(--gray-400)">Chưa giao</span>')+'</td><td>'+(t?badge(t.workflow_state):"-")+'</td><td>'+esc((t&&t.exp_end_date)||"-")+'</td><td>'+esc(r.source_task)+'</td><td>'+recReasonBadge(recTaskReason(t))+(noass&&recTaskReason(t)!=="noassignee"?' <span class="dc-reason" style="color:#925f00;background:#fff7e6">Chưa giao</span>':'')+'</td><td style="text-align:right">'+(t?'<button class="pm-btn rec-open" data-task="'+esc(t.name)+'">Mở</button>':'')+'</td></tr>';}).join("")+'</tbody></table></div>';
    Array.prototype.forEach.call(host.querySelectorAll("[data-task]"),function(x){x.onclick=function(e){if(e)e.stopPropagation();openTask(x.getAttribute("data-task"));};});}
  function recRuleTable(host,rules,tmap,showActions){if(!host)return;if(!rules.length){return emptyBox(host,"Không có quy tắc.");}
    host.innerHTML='<div class="pd-tbl-wrap"><table class="pm-tbl pd-tbl"><thead><tr><th>Task gốc</th><th>Tần suất</th><th>Lần kế</th><th>Đã tạo</th><th>Tối đa</th><th>Task mới nhất</th><th>Trạng thái</th><th>Health</th>'+(showActions?'<th></th>':'')+'</tr></thead><tbody>'+
      rules.map(function(r){var lt=r.last_task&&tmap[r.last_task];
        return '<tr><td class="t-main">'+esc(r.source_task)+'</td><td>'+esc(FREQ_VN[r.frequency]||r.frequency)+'</td><td>'+esc(r.next_run_date||"-")+'</td><td>'+(r.occurrences_done||0)+'</td><td>'+(r.max_occurrences?r.max_occurrences:"—")+'</td><td'+(lt?' class="dc-link" data-task="'+esc(r.last_task)+'" style="cursor:pointer"':'')+'>'+esc(r.last_task||"-")+'</td><td><span class="pm-badge '+recBadge(r.status)+'">'+esc(r.status)+'</span></td><td>'+ruleHealthBadge(ruleHealth(r,lt))+'</td>'+
          (showActions?'<td style="text-align:right;white-space:nowrap">'+(r.status==="Active"?'<button class="pm-btn rc-a" data-a="pause" data-n="'+esc(r.name)+'">Tạm dừng</button>':r.status==="Paused"?'<button class="pm-btn rc-a" data-a="resume" data-n="'+esc(r.name)+'">Tiếp tục</button>':'')+((r.status==="Active"||r.status==="Paused")?' <button class="pm-btn rc-a" data-a="cancel" data-n="'+esc(r.name)+'">Huỷ</button>':'')+'</td>':'')+'</tr>';}).join("")+'</tbody></table></div>';
    Array.prototype.forEach.call(host.querySelectorAll("[data-task]"),function(x){x.onclick=function(){openTask(x.getAttribute("data-task"));};});
    Array.prototype.forEach.call(host.querySelectorAll(".rc-a"),function(btn){btn.onclick=function(){api(PM+"recurrence."+btn.getAttribute("data-a"),{name:btn.getAttribute("data-n")}).then(function(){showRecurring();}).catch(function(e){toast("Lỗi: "+errOf(e),true);});};});}
  function showRecurring(){var c=el("pm-view");spin(c);
    Promise.all([api(PM+"recurrence.list"),api(PM+"tasks.list",{page_length:2000})]).then(function(res){
      var rules=(res[0]&&res[0].rows)||[];var tasks=(res[1]&&res[1].rows)||[];var tmap={};tasks.forEach(function(t){tmap[t.name]=t;});
      var today=new Date().toISOString().slice(0,10);function d10(v){return v?String(v).slice(0,10):null;}
      var h=head("Recurring","Quy tắc lặp và nhiệm vụ định kỳ hằng ngày");
      if(!rules.length){c.innerHTML=h+'<div class="panel"><div class="pm-state"><svg class="icon em-ic"><use href="#p-repeat"/></svg><div>Chưa có quy tắc lặp.<br>Mở một nhiệm vụ → bấm <b>Lặp lại</b> để tạo quy tắc.</div></div></div>';return;}
      var active=rules.filter(function(r){return r.status==="Active";});
      var paused=rules.filter(function(r){return r.status==="Paused";});
      var ended=rules.filter(function(r){return r.status==="Cancelled"||r.status==="Completed";});
      var genToday=rules.filter(function(r){return d10(r.last_run_date)===today&&r.last_task;}).map(function(r){return {r:r,t:tmap[r.last_task]};});
      var pendingToday=genToday.filter(function(x){return x.t&&dcActive(x.t);}).length;
      var overdueGen=rules.filter(function(r){var t=r.last_task&&tmap[r.last_task];return t&&dcIsOverdue(t);}).length;
      var noassGen=rules.filter(function(r){var t=r.last_task&&tmap[r.last_task];return t&&dcActive(t)&&names(t._assign).length===0;}).length;
      var blockedGen=rules.filter(function(r){var t=r.last_task&&tmap[r.last_task];return t&&t.workflow_state==="Blocked";}).length;
      var ruleRisk=active.filter(function(r){var hh=ruleHealth(r,r.last_task&&tmap[r.last_task]);return hh==="notgen"||hh==="risk"||hh==="attention";}).length;
      var alerts=recAlerts(rules,tmap);
      h+='<div class="stats-strip dc-block" style="grid-template-columns:repeat(7,1fr)">'+
        ccard("s-green","Đang chạy",active.length,"")+ccard("s-pink","Rule rủi ro",ruleRisk,"")+ccard("s-navy","Sinh hôm nay",genToday.length,"")+ccard("s-yellow","Chờ xử lý hôm nay",pendingToday,"")+ccard("s-pink","Quá hạn sinh ra",overdueGen,"")+ccard("s-yellow","Chưa giao sinh ra",noassGen,"")+ccard("s-pink","Blocked sinh ra",blockedGen,"")+'</div>';
      h+='<div class="dc-sec-title">Cảnh báo định kỳ'+(alerts.length?' <span style="color:var(--gray-400);font-weight:500">('+alerts.length+')</span>':'')+'</div><div class="panel dc-block" id="rec-alerts"></div>';
      h+='<div class="dc-sec-title">Nhiệm vụ sinh hôm nay</div><div class="dc-block" id="rec-today"></div>';
      h+='<div class="dc-sec-title">Quy tắc đang chạy</div><div class="dc-block" id="rec-active"></div>';
      h+='<details class="dc-analytics"><summary>Tạm dừng ('+paused.length+') / Đã huỷ-xong ('+ended.length+')</summary><div id="rec-other"></div></details>';
      c.innerHTML=h;
      recAlertList(el("rec-alerts"),alerts);
      recTodayTable(el("rec-today"),genToday);
      chkBadgesInto(el("rec-today"),genToday.map(function(x){return x.t&&x.t.name;})); /* G4 checklist progress badge */
      recRuleTable(el("rec-active"),active,tmap,true);
      recRuleTable(el("rec-other"),paused.concat(ended),tmap,true);
    }).catch(function(e){errBox(c,e);});}

  function tsSum(rows,pred){var s=0;rows.forEach(function(r){if(pred(r))s+=(r.hours||0);});return Math.round(s*100)/100;}
  function showTimesheet(){var c=el("pm-view");spin(c);
    api(PM+"timesheet.report",window._tsF||{}).then(function(d){renderTimesheet(c,d);}).catch(function(e){errBox(c,e);});}
  function renderTimesheet(c,d){var rows=d.rows||[];var F=window._tsF||{};
    var projs=uniq(rows.map(function(r){return r.project;}));var users=uniq(rows.map(function(r){return r.owner;}));
    var mon=new Date().toISOString().slice(0,7);
    var dd=new Date();var dow=(dd.getDay()+6)%7;var m0=new Date(dd);m0.setDate(dd.getDate()-dow);var ws=m0.toISOString().slice(0,10);var we=new Date(m0);we.setDate(m0.getDate()+6);var weStr=we.toISOString().slice(0,10);
    c.innerHTML=head("Timesheet","Tổng hợp worktime từ native Timesheet")+
      '<div class="pm-filters">'+
        '<select class="pm-sel" id="ts-user"><option value="">Mọi người</option>'+users.map(function(u){return opt(u,u,F.user);}).join("")+'</select>'+
        '<select class="pm-sel" id="ts-proj"><option value="">Mọi dự án</option>'+projs.map(function(p){return opt(p,p,F.project);}).join("")+'</select>'+
        '<input class="pm-input" id="ts-task" placeholder="Task..." value="'+esc(F.task||"")+'" style="background-image:none;padding-left:11px;min-width:140px">'+
        '<input class="pm-input" id="ts-from" type="date" value="'+esc(F.from_date||"")+'" style="background-image:none;padding-left:11px" title="Từ">'+
        '<input class="pm-input" id="ts-to" type="date" value="'+esc(F.to_date||"")+'" style="background-image:none;padding-left:11px" title="Đến">'+
        '<button class="pm-btn primary" id="ts-apply">Lọc</button><button class="pm-btn" id="ts-clear">Xoá lọc</button></div>'+
      '<div class="stats-strip">'+sc("s-navy","Tổng giờ",Math.round((d.total_hours||0)*100)/100)+sc("s-yellow","Tuần này",tsSum(rows,function(r){var x=(r.from_time||"").slice(0,10);return x>=ws&&x<=weStr;}))+sc("s-pink","Tháng này",tsSum(rows,function(r){return (r.from_time||"").slice(0,7)===mon;}))+sc("s-green","Số log",rows.length)+'</div>'+
      '<div class="panel"><div class="panel-header"><div class="panel-title">Tổng hợp</div><div class="seg"><button data-sum="by_month" class="active">Tháng</button><button data-sum="by_week">Tuần</button><button data-sum="by_day">Ngày</button></div></div><div id="ts-sum"></div></div>'+
      '<div class="panel"><div class="panel-header"><div class="panel-title">Chi tiết log</div></div><div id="ts-tbl"></div></div>';
    el("ts-apply").onclick=function(){window._tsF={user:el("ts-user").value||null,project:el("ts-proj").value||null,task:el("ts-task").value||null,from_date:el("ts-from").value||null,to_date:el("ts-to").value||null};showTimesheet();};
    el("ts-clear").onclick=function(){window._tsF={};showTimesheet();};
    Array.prototype.forEach.call(c.querySelectorAll("[data-sum]"),function(b){b.onclick=function(){Array.prototype.forEach.call(c.querySelectorAll("[data-sum]"),function(x){x.classList.toggle("active",x===b);});renderSum(d,b.getAttribute("data-sum"));};});
    renderSum(d,"by_month");
    var tb=el("ts-tbl");
    if(!rows.length){return emptyBox(tb,"Không có log worktime.");}
    tb.innerHTML='<table class="pm-tbl"><thead><tr><th>Ngày</th><th>Task</th><th>Dự án</th><th>Giờ</th><th>Mô tả</th><th>Người</th></tr></thead><tbody>'+
      rows.map(function(r){return '<tr><td>'+esc((r.from_time||"").slice(0,10))+'</td><td class="t-main" data-task="'+esc(r.task||"")+'" style="cursor:pointer">'+esc(r.task||"-")+'</td><td>'+esc(r.project||"-")+'</td><td>'+esc(r.hours)+'h</td><td>'+esc(r.description||"")+'</td><td>'+esc(r.owner||"")+'</td></tr>';}).join("")+'</tbody></table>';
    Array.prototype.forEach.call(tb.querySelectorAll("[data-task]"),function(x){x.onclick=function(){var t=x.getAttribute("data-task");if(t)openTask(t);};});}
  function renderSum(d,key){renderSumInto(el("ts-sum"),d[key]||{});}

  function notifBucket(cr){var d=(cr||"").slice(0,10);if(!d)return "Cũ hơn";
    var td=new Date().toISOString().slice(0,10);var y=new Date(Date.now()-86400000).toISOString().slice(0,10);
    if(d===td)return "Hôm nay";if(d===y)return "Hôm qua";
    var dt=new Date();var dow=(dt.getDay()+6)%7;var m0=new Date(dt);m0.setDate(dt.getDate()-dow);var ws=m0.toISOString().slice(0,10);
    if(d>=ws)return "Tuần này";return "Cũ hơn";}
  function notifType(s){s=s||"";if(s.indexOf("[Overdue]")>=0||s.toLowerCase().indexOf("qua han")>=0||s.indexOf("quá hạn")>=0)return ["Quá hạn","tg-overdue"];
    if(s.indexOf("->")>=0||s.indexOf("→")>=0)return ["Trạng thái","tg-medium"];
    if(s.indexOf("giao")>=0)return ["Giao việc","tg-recurring"];
    if(s.toLowerCase().indexOf("recurring")>=0||s.indexOf("Lặp")>=0)return ["Lặp","tg-low"];
    return ["Thông báo","tg-low"];}
  function showNotifications(){var c=el("pm-view");spin(c);
    api(PM+"notifications.list_mine",{limit:50}).then(function(d){var rows=d.rows||[];
      c.innerHTML=head("Thông báo","Bấm 1 thông báo để mở nhiệm vụ liên quan",(d.unread?'<button class="pm-btn" id="nt-readall">Đánh dấu đã đọc ('+d.unread+')</button>':''))+
        '<div class="panel"><div id="nt-list"></div></div>';
      if(el("nt-readall"))el("nt-readall").onclick=function(){api(PM+"notifications.mark_read",{}).then(function(){showNotifications();refreshBadge();}).catch(function(e){toast("Lỗi: "+errOf(e),true);});};
      var b=el("nt-list");
      if(!rows.length){return emptyBox(b,"Chưa có thông báo.");}
      var order=["Hôm nay","Hôm qua","Tuần này","Cũ hơn"];var groups={};rows.forEach(function(n){var g=notifBucket(n.creation);(groups[g]=groups[g]||[]).push(n);});
      var html="";order.forEach(function(g){var gr=groups[g];if(!gr||!gr.length)return;
        html+='<div class="nt-day-h">'+g+'</div>'+gr.map(function(n){var ty=notifType(n.subject);
          return '<div class="nt-item'+(n.read?"":" unread")+'" data-task="'+esc(n.document_name||"")+'"><span style="display:flex;align-items:center;gap:8px;min-width:0">'+(n.read?"":'<b style="color:var(--navy)">●</b>')+'<span class="pm-tag '+ty[1]+'">'+ty[0]+'</span><span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+esc(stripTags(n.subject))+'</span></span><span style="font-size:11px;color:var(--gray-400);white-space:nowrap">'+esc((n.creation||"").slice(0,16))+'</span></div>';}).join("");});
      b.innerHTML=html;
      Array.prototype.forEach.call(b.querySelectorAll("[data-task]"),function(x){x.onclick=function(){var t=x.getAttribute("data-task");if(t)openTask(t);};});
    }).catch(function(e){errBox(c,e);});}

  function soon(view){var c=el("pm-view");var map={gantt:["Gantt","Biểu đồ Gantt theo ngày bắt đầu/kết thúc của nhiệm vụ."],timesheet:["Timesheet","Ghi nhận giờ làm việc theo nhiệm vụ (native Timesheet)."],recurring:["Recurring","Nhiệm vụ lặp: daily / weekly / biweekly / monthly."],notifications:["Thông báo","Thông báo giao việc, cập nhật, quá hạn."]};
    var v=map[view]||["Sắp có",""]; c.innerHTML=head(v[0],v[1])+'<div class="panel"><div class="pm-state"><svg class="icon em-ic"><use href="#p-'+(view==="notifications"?"bell":view==="timesheet"?"clock":view==="recurring"?"repeat":"gantt")+'"/></svg><div>Đang phát triển — sẽ có ở bước tiếp theo của Phase này.</div></div></div>';}

  // PM notification UI retired: the topbar bell + sidebar "Thông báo" now use the
  // Global Notification Center. The sidebar item is kept for compatibility but
  // redirects to /app/notification-log instead of the old PM notifications view.
  function redirectToGlobalNotifications(){ window.location.href="/app/notification-log"; }
  var VIEWS={dashboard:showDashboard,mytasks:showMyTasks,projects:showProjects,work:showWork,tasks:showTasks,board:showBoard,gantt:showGantt,calendar:showCalendar,timesheet:showTimesheet,recurring:showRecurring,notifications:redirectToGlobalNotifications};
  function go(v){var WM={tasks:"list",board:"board",gantt:"gantt",calendar:"calendar",table:"table",work:null};var isW=Object.prototype.hasOwnProperty.call(WM,v);var navKey=isW?"work":v;
    window._curView=navKey;Array.prototype.forEach.call(el("pm-nav").querySelectorAll(".nav-item[data-view]"),function(b){b.classList.toggle("active",b.getAttribute("data-view")===navKey);});
    el("pm-crumb").textContent=isW?"Công việc":(CRUMB[v]||"Tổng quan");
    if(isW){if(WM[v])window._workView=WM[v];try{localStorage.setItem("pm_work_view",window._workView||"list");}catch(_){}showWork();}
    else (VIEWS[v]||showDashboard)();}
  Array.prototype.forEach.call(el("pm-nav").querySelectorAll(".nav-item[data-view]"),function(b){b.onclick=function(){go(b.getAttribute("data-view"));};});
  el("pm-search").addEventListener("keydown",function(e){if(e.key==="Enter"){F.q=this.value.trim().toLowerCase();go("tasks");}});

  function fillUser(){
    if(!LIVE){ window._pmUser="hoan.tran@ecentric.vn"; el("pm-av").textContent="PV"; el("pm-uname").textContent="Preview User"; el("pm-urole").textContent="Mock"; el("pm-preview").style.display="inline-block"; return; }
    api("frappe.auth.get_logged_user").then(function(u){ u=u||"User"; window._pmUser=u; el("pm-av").textContent=ini(u); el("pm-uname").textContent=u.split("@")[0]; el("pm-urole").textContent="Thành viên PM"; }).catch(function(){ el("pm-uname").textContent="Người dùng"; });
  }
  // PM badge retired -> Global Notification Center owns the unread badge on the bell.
  // No-op kept so existing call sites stay valid; PM notifications API is not called
  // from the frontend anymore (backend API itself is left untouched).
  function refreshBadge(){ /* retired: handled by Global Notification Center */ }
  function refreshTimerChip(){var chip=el("tb-timer");if(!chip)return;
    api(PM+"timer.get_active").then(function(ac){
      if(ac&&ac.active){window._activeTimer={task:ac.task,status:ac.status,base:ac.elapsed_seconds||0,t0:Date.now()};
        chip.style.display="inline-flex";
        chip.innerHTML='<span class="tg-dot"></span><span class="tt-name">'+esc(ac.task)+'</span><span class="tt-clock">'+fmtDur(ac.elapsed_seconds||0)+'</span>';
        startTimerClock(ac.status==="Running");
      } else {window._activeTimer=null;chip.style.display="none";stopTimerClock();}
    }).catch(function(){});}
  function startTimerClock(run){stopTimerClock();if(!run)return;window._tcTick=setInterval(function(){var cl=document.querySelector("#tb-timer .tt-clock");var at=window._activeTimer;if(!cl||!at){stopTimerClock();return;}cl.textContent=fmtDur(at.base+Math.floor((Date.now()-at.t0)/1000));},1000);}
  function stopTimerClock(){if(window._tcTick){clearInterval(window._tcTick);window._tcTick=null;}}
  if(el("tb-new"))el("tb-new").onclick=function(){newTask(null);};
  // tb-bell is now a canonical Global Notification Center bell (anchor +
  // data-ec-notification-bell="1"); the global asset handles plain-click (dropdown)
  // and Ctrl/Cmd/middle-click keeps the native /app/notification-log link. No PM handler.
  if(el("tb-timer"))el("tb-timer").onclick=function(){if(window._activeTimer&&window._activeTimer.task)openTask(window._activeTimer.task);};
  fillUser(); loadRecSet(); refreshTimerChip(); setInterval(refreshTimerChip,20000); go("dashboard");
})();
</script>

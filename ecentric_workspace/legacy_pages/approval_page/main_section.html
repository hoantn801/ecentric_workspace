
<script id="ec-csrf-fetch-patch">
(function(){
  if (window.ecFetchPatched) return;
  window.ecFetchPatched = true;
  var origFetch = window.fetch;
  function getCsrf() {
    return (window.frappe && window.frappe.csrf_token) ||
           (window.CTX && window.CTX.csrfToken) ||
           window.csrf_token ||
           (document.cookie.match(/csrf_token=([^;]+)/) || [])[1] ||
           'token';
  }
  window.fetch = function(url, opts) {
    opts = opts || {};
    var u = (typeof url === 'string') ? url : (url && url.url) || '';
    var method = (opts.method || 'GET').toUpperCase();
    var isApi = u.indexOf('/api/method/') >= 0 || u.indexOf('/api/resource/') >= 0;
    if (isApi && method !== 'GET' && method !== 'HEAD') {
      opts.headers = opts.headers || {};
      if (opts.headers.set && typeof opts.headers.set === 'function') {
        if (!opts.headers.get('X-Frappe-CSRF-Token')) {
          opts.headers.set('X-Frappe-CSRF-Token', getCsrf());
        }
      } else {
        var hasToken = false;
        for (var k in opts.headers) {
          if (k.toLowerCase() === 'x-frappe-csrf-token') { hasToken = true; break; }
        }
        if (!hasToken) {
          opts.headers['X-Frappe-CSRF-Token'] = getCsrf();
        }
      }
      if (opts.credentials === undefined) opts.credentials = 'include';
    }
    return origFetch.call(window, url, opts);
  };
  console.log('[ec-csrf] fetch wrapper installed');
})();
</script>

<script>
(function() {
  function setActive() {
    var path = window.location.pathname.replace(/\/+$/, '') || '/';
    var links = document.querySelectorAll('.ec-sb-link');
    links.forEach(function(a) {
      var href = (a.getAttribute('href') || '').replace(/\/+$/, '') || '/';
      a.classList.remove('active');
      // Strict exact match
      if (href === path) {
        a.classList.add('active');
      }
      // Special case: '/home' page should also activate links with href='/'
      else if ((path === '/home' || path === '/') && (href === '/' || href === '/home')) {
        a.classList.add('active');
      }
    });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', setActive);
  } else {
    setActive();
  }
})();
</script>

<script id="ec-approval-attach-fix">
(function(){
  // Flatten nested arrays (PA may wrap body('Get_attachments') one level deep)
  function flatten(arr) {
    if (!Array.isArray(arr)) return [];
    var out = [];
    arr.forEach(function(x) {
      if (Array.isArray(x)) x.forEach(function(y) { out.push(y); });
      else if (x && typeof x === 'object') out.push(x);
    });
    return out;
  }

  // Map SharePoint attachment shape -> UI shape
  function mapSpShape(arr) {
    var flat = flatten(arr);
    return flat.map(function(a) {
      if (!a) return null;
      var name = a.DisplayName || a.name || a.fileName || a.Title || '';
      var url  = a.AbsoluteUri || a.url || a.link || a.ServerRelativeUrl || '';
      // ServerRelativeUrl is relative, prepend host
      if (url && url.indexOf('http') !== 0 && url.indexOf('/sites/') === 0) {
        url = 'https://boxmeglobal.sharepoint.com' + url;
      }
      return { name: name, url: url };
    }).filter(function(x) { return x && x.url; });
  }

  // Monkey-patch fetch: intercept PA responses, inject mapped attachments into item
  if (window._ecApprovalFetchPatched) return;
  window._ecApprovalFetchPatched = true;

  var origFetch = window.fetch.bind(window);
  window.fetch = function(input, init) {
    var url = typeof input === 'string' ? input : (input && input.url) || '';
    var isPA = /powerautomate\.com|powerplatform\.com/i.test(url);
    var p = origFetch(input, init);
    if (!isPA) return p;
    return p.then(function(res) {
      // Clone so caller can also read response normally
      var cloned = res.clone();
      return cloned.json().then(function(data) {
        try {
          if (data && typeof data === 'object') {
            var atts = data.attachments;
            if (Array.isArray(atts)) {
              var mapped = mapSpShape(atts);
              try { console.log('[ec-approval-attach] mapped', mapped.length, 'attachments'); } catch(_) {}
              if (mapped.length) {
                // Place into item if exists, also into items[] for batch
                if (data.item && typeof data.item === 'object') {
                  data.item.attachments = mapped;
                }
                if (Array.isArray(data.items)) {
                  data.items.forEach(function(it) {
                    if (it && !it.attachments) it.attachments = mapped;
                  });
                }
                // Build a fresh Response with patched body
                var patchedBody = JSON.stringify(data);
                return new Response(patchedBody, {
                  status: res.status,
                  statusText: res.statusText,
                  headers: res.headers
                });
              }
            }
          }
        } catch(e) { try { console.warn('[ec-approval-attach] patch err', e); } catch(_) {} }
        return res;  // unmodified
      }).catch(function() { return res; });
    });
  };
  try { console.log('[ec-approval-attach] fetch patched'); } catch(_) {}
})();
</script>

<script>
(function () {
  'use strict';

  const ENDPOINTS = {
    getDetail: '/api/method/ecentric_workspace.api.get_ticket_detail',
    decision:  '/api/method/ecentric_workspace.api.approval_decision',
    lookup:    '/api/method/web_lookup'
  };

  const SERVICE_TYPE_LABELS = {
    'PRD-STD': 'Production - Standard',
    'PRD-PST': 'Production - Post-production',
    'PRD-VID': 'Production - Video',
    'PRD-PHO': 'Production - Photography',
    'PRD-AUD': 'Production - Audio',
    'PRD-LIV': 'Production - Livestream',
    'MED-STD': 'Media - Standard',
    'MED-CAM': 'Media - Campaign',
    'MED-CON': 'Media - Content',
    'MED-INF': 'Media - Influencer',
    'ECO-STD': 'E-commerce - Standard',
    'ECO-CAM': 'E-commerce - Campaign',
    'ECO-OPS': 'E-commerce - Operations',
    'MCD-STD': 'Merchandise - Standard',
    'MCD-DSG': 'Merchandise - Design',
    'MCD-CON': 'Merchandise - Content',
    'SVC-STD': 'Service - Standard',
    'SVC-CS':  'Service - Customer Support',
    'SVC-LOG': 'Service - Logistics',
    'ODS-STD': 'Operation, Data & System - Standard',
    'HRD-STD': 'HR - Standard',
    'FNA-STD': 'Finance & Accounting - Standard',
    'Setup':     'Setup (legacy)',
    'Campaign':  'Campaign (legacy)'
  };

  function fmtServiceType(code) {
    if (!code) return 'â';
    const label = SERVICE_TYPE_LABELS[code];
    return label ? code + ' â ' + label : code;
  }

  function detectTypeFromId(id) {
    if (!id) return null;
    const upper = String(id).toUpperCase();
    if (upper.startsWith('MSO-')) return 'mso';
    if (upper.startsWith('SO-')) return 'so';
    if (upper.startsWith('PO-')) return 'po';
    if (upper.startsWith('REC-')) return 'rec';
    if (upper.startsWith('VR-') || upper.startsWith('VENDOR-')) return 'vendor_request';
    return null;
  }

  function getQuery(name) {
    const u = new URLSearchParams(window.location.search);
    return u.get(name);
  }

  function getSessionEmail() {
    if (window.frappe && window.frappe.session && window.frappe.session.user_email) return window.frappe.session.user_email;
    if (window.frappe && window.frappe.session && window.frappe.session.user) {
      const u = window.frappe.session.user;
      if (typeof u === 'string' && u.includes('@')) return u;
    }
    return null;
  }

  function fmtMoney(n) {
    if (n === null || n === undefined || isNaN(Number(n))) return 'â';
    return Number(n).toLocaleString('vi-VN') + ' Ä';
  }

  function fmtDate(d) {
    if (!d) return 'â';
    try { return new Date(d).toLocaleString('vi-VN'); } catch (e) { return d; }
  }

  function val(item, ...keys) {
    for (const k of keys) {
      const v = item && item[k];
      if (v !== undefined && v !== null && v !== '') {
        if (typeof v === 'object' && v.Value !== undefined) return v.Value;
        return v;
      }
    }
    return null;
  }

  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.className = 'toast toast-' + (type === 'error' ? 'error' : 'success');
    if (type === 'error') {
      t.querySelector('svg').innerHTML = '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>';
    } else {
      t.querySelector('svg').innerHTML = '<polyline points="20 6 9 17 4 12"/>';
    }
    t.querySelector('span').textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 4500);
  }

  function parseChain(item) {
    const raw = val(item, 'approval_chain');
    if (!raw) return [];
    try {
      const parsed = typeof raw === 'string' ? JSON.parse(raw) : raw;
      return Array.isArray(parsed) ? parsed : [];
    } catch (e) { return []; }
  }

  function parseHistory(item) {
    const raw = val(item, 'approval_history');
    if (!raw) return [];
    try {
      const parsed = typeof raw === 'string' ? JSON.parse(raw) : raw;
      return Array.isArray(parsed) ? parsed : [];
    } catch (e) { return []; }
  }

  function parseAttachments(item) {
    // v2_1_strip_fragment_2026-06-02: extract name from URL #fragment (for display),
    // but strip fragment from URL field (for href) - SP viewer breaks when URL has
    // #filename appended. Browser-side fragment handling confuses SP routing.
    function v2_extractName(u) {
      if (!u) return '';
      var h = u.indexOf('#');
      var n = (h > 0) ? u.substring(h + 1) : (u.split('/').pop() || u);
      try { return decodeURIComponent(n); } catch(e) { return n; }
    }
    function v2_stripFragment(u) {
      if (!u) return u;
      var h = u.indexOf('#');
      return (h > 0) ? u.substring(0, h) : u;
    }
    const raw = val(item, 'attachment_url', 'attached_pdf', 'attachment', 'attachments');
    if (!raw) return [];
    if (Array.isArray(raw)) return raw.map(x => typeof x === 'string' ? { url: v2_stripFragment(x), name: v2_extractName(x) } : x);
    if (typeof raw === 'string') {
      const parts = raw.split(',').map(s => s.trim()).filter(s => s.startsWith('http'));
      if (parts.length > 0) {
        return parts.map(u => ({ url: v2_stripFragment(u), name: v2_extractName(u) }));
      }
    }
    if (typeof raw === 'object' && raw.Url) return [{ url: raw.Url, name: raw.Description || raw.Url.split('/').pop() }];
    return [];
  }

    }

    // ec-chain-fix-v2: derive approved/current from current_level + final_status (chain entries' status not updated by PA)
    const currentLevel = parseInt(val(item, 'current_level') || '1', 10);
    const finalStatus = (val(item, 'final_status', 'status') || 'Pending').trim();
    const doneCount = (finalStatus === 'Approved') ? chain.length : chain.filter((c, i) => {
      const lvl = c.level || (i + 1);
      return lvl < currentLevel;
    }).length;
    const total = chain.length;
    const isCurrentApprover = currentEmail && finalStatus === 'Pending' && chain.some((c, i) => {

    chain.forEach((step, idx) => {

      html += '</div></div>';

  async function submitDecision(type, ticketId, decision, approver, skipConfirm) {
    if (!skipConfirm && !confirm('Báº¡n xÃ¡c nháº­n ' + (decision === 'Approved' ? 'DUYá»T' : 'Tá»ª CHá»I') + ' ticket ' + ticketId + '?')) return;
    const comment = (document.getElementById('approvalComment').value || '').trim();
    const btnA = document.getElementById('btnApprove');
    const btnR = document.getElementById('btnReject');
    btnA.disabled = true; btnR.disabled = true;
    try {
      const res = await fetch(ENDPOINTS.decision, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ doctype: ({mso:'MSO Request',so:'Service Request',po:'Procurement Request',rec:'Reconciliation Request',vendor_request:'Vendor Code Request'}[type]||type), name: ticketId, decision: String(decision).toLowerCase(), approver_email: approver, caller_email: approver, comment })
      });
      // ec-friendly-error-v2: parse error body, show user-friendly Vietnamese toast
      if (!res.ok) {
        let errorMsg = 'L\u1ED7i kh\u00F4ng x\u00E1c \u0111\u1ECBnh';
        try {
          const txt = await res.text();
          console.error('[approval response]', txt); let errBody = JSON.parse(txt); if (errBody && typeof errBody.message === 'object' && errBody.message !== null) errBody = errBody.message;
          const code = (errBody.error || '').toLowerCase();
          const ERROR_MAP = {
            'not_authorized':       'B\u1EA1n ch\u01B0a ph\u1EA3i approver hi\u1EC7n t\u1EA1i \u2014 c\u1EA5p tr\u01B0\u1EDBc ph\u1EA3i approve tr\u01B0\u1EDBc',
            'already_decided':      'Ticket n\u00E0y \u0111\u00E3 \u0111\u01B0\u1EE3c quy\u1EBFt \u0111\u1ECBnh r\u1ED3i (' + (errBody.final_status || '?') + ')',
            'ticket_not_found':     'Kh\u00F4ng t\u00ECm th\u1EA5y ticket trong h\u1EC7 th\u1ED1ng',
            'invalid_decision':     'Quy\u1EBFt \u0111\u1ECBnh kh\u00F4ng h\u1EE3p l\u1EC7',
            'invalid_chain':        'Approval chain l\u1ED7i \u2014 li\u00EAn h\u1EC7 admin',
            'unauthorized':         'B\u1EA1n kh\u00F4ng c\u00F3 quy\u1EC1n th\u1EF1c hi\u1EC7n thao t\u00E1c n\u00E0y'
          };
          errorMsg = ERROR_MAP[code] || (errBody.message || ('L\u1ED7i: ' + (errBody.error || 'unknown')));
        } catch (e) {
          errorMsg = 'L\u1ED7i k\u1EBFt n\u1ED1i (HTTP ' + res.status + ')';
        }
        throw new Error(errorMsg);
      }
      const data = await res.json();
      if (!data.success) {
        const errCode = (data.error || '').toLowerCase();
        const errMap = {
          'not_authorized': 'Báº¡n khÃ´ng cÃ³ quyá»n xá»­ lÃ½ ticket nÃ y (pháº£i ÄÃºng approver theo chain)',
          'already_decided': 'Ticket ÄÃ£ ÄÆ°á»£c quyáº¿t Äá»nh rá»i',
          'ticket_not_found': 'KhÃ´ng tÃ¬m tháº¥y ticket',
          'invalid_decision': 'Quyáº¿t Äá»nh khÃ´ng há»£p lá»',
          'invalid_chain': 'Approval chain lá»i',
          'missing_params': 'Thiáº¿u thÃ´ng tin (doctype/name/decision)',
          'missing_caller': 'Thiáº¿u thÃ´ng tin ngÆ°á»i duyá»t',
          'no_current_level_entry': 'Chain khÃ´ng cÃ³ entry cho cáº¥p hiá»n táº¡i'
        };
        throw new Error(errMap[errCode] || data.error || 'Submit khÃ´ng thÃ nh cÃ´ng');
      }
      // AUTO-CASCADE: neu approve thanh cong va next level co cung email -> tu duyet tiep
      if (decision === 'Approved') {
        try {
          const detailRes = await fetch(ENDPOINTS.getDetail, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ type, id: ticketId })
          });
          if (detailRes.ok) {
            const detailData = await detailRes.json();
            const detailItem = detailData.item || detailData.data;
            if (detailItem) {
              const finalStatus = ((detailItem.final_status || detailItem.status) || '').trim();
              if (finalStatus === 'Pending') {
                let chain = detailItem.approval_chain;
                if (typeof chain === 'string') {
                  try { chain = JSON.parse(chain); } catch(e) { chain = []; }
                }
                const curLvl = parseInt(detailItem.current_level || '1', 10);
                const nextEntry = (chain || []).find(c => (c.level || 0) === curLvl);
                if (nextEntry && (nextEntry.approver || '').toLowerCase() === (approver || '').toLowerCase()) {
                  showToast('Auto-approve level ' + curLvl + ' (cung email)', 'success');
                  return submitDecision(type, ticketId, 'Approved', approver, true);
                }
              }
            }
          }
        } catch (e) { console.warn('cascade check failed:', e); }
      }
      showToast('â ÄÃ£ ' + (decision === 'Approved' ? 'duyá»t' : 'tá»« chá»i') + ' ticket ' + ticketId, 'success');
      setTimeout(() => loadTicket(type, ticketId), 1200);
    } catch (err) {
      console.error(err);
      showToast(err.message, 'error');
      btnA.disabled = false; btnR.disabled = false;
    }
  }

  async function submitBatchDecisions(batchId, batchItems, mode) {
    const decisions = [];
    batchItems.forEach(it => {
      const itemSoId = val(it, 'id', 'so_id');
      const itemStatus = (val(it, 'final_status', 'status') || 'Pending').trim().toLowerCase();
      if (itemStatus !== 'pending') return;
      let decision;
      let comment = '';
      if (mode === 'reject_all') {
        decision = 'Rejected';
      } else if (mode === 'approve_all') {
        decision = 'Approved';
      } else {
        const cb = document.querySelector('.item-check[data-so-id="' + itemSoId + '"]');
        if (!cb || !cb.checked) return;
        decision = 'Approved';
        const ct = document.querySelector('.item-comment[data-so-id="' + itemSoId + '"]');
        comment = ct ? ct.value.trim() : '';
      }
      if (mode !== 'selected') {
        const ct = document.querySelector('.item-comment[data-so-id="' + itemSoId + '"]');
        comment = ct ? ct.value.trim() : '';
      }
      decisions.push({ so_id: itemSoId, decision: decision, comment: comment });

  const TYPE_LABELS_FULL = { mso: 'MSO', so: 'SO', po: 'PO', rec: 'REC', vendor_request: 'Vendor', gbs_po: 'GBS PO', gbs_so: 'GBS SO' };

  const ListState = { allTickets: [], filter: { type: 'all', status: '', dept: '', search: '', dateFrom: '', dateTo: '', card: '', gbsPhase: '', mine: false } };

  async function fetchAllTypes() {
    const types = ['mso', 'so', 'po', 'rec', 'vendor_request', 'gbs_po', 'gbs_so'];
    const promises = types.map(t =>
      fetch(ENDPOINTS.lookup, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ type: t }) })
        .then(r => r.json()).catch(() => ({ items: [] }))
    );
    const results = await Promise.all(promises);
    const tickets = [];
    results.forEach((res, i) => {
      if (res && res.items) {
        res.items.forEach(item => { item._type = types[i]; tickets.push(item); });
      }
    });
    return tickets;
  }

  function computeListTimeline(ticket) {
    const status = (val(ticket, 'final_status', 'status') || 'Pending').trim();
    if (status === 'Approved' || status === 'Rejected') return null;
    const created = val(ticket, 'created_at', 'Created');
    if (!created) return 'ontime';
    const slaMs = (SLA_DAYS[ticket._type] || 5) * 86400000;
    const elapsed = Date.now() - new Date(created).getTime();
    const remaining = slaMs - elapsed;
    if (remaining < 0) return 'late';
    if (remaining < 2 * 86400000) return 'risk';
    return 'ontime';
  }

  // EC-GBS-FIN-v1: GBS-side phase tracking (Phase 2 after local Approved)
  function computeGbsListTimeline(ticket) {
    const status = (val(ticket, 'final_status', 'status') || '').trim();
    if (status !== 'Approved') return null;
    const gs = (val(ticket, 'gbs_status') || '').toLowerCase();
    if (!gs || gs === 'approved' || gs === 'completed' || gs === 'rejected' || gs === 'cancelled') return null;
    if (gs.indexOf('pending') < 0 && gs.indexOf('draft') < 0) return null;
    // EC-GBS-FIN-v1-creation: use immutable created timestamp; modified is touched by poll task every 15min
    const ref = val(ticket, 'created_at', 'Created') || val(ticket, 'modified');
    if (!ref) return 'gbs_pending';
    const refDate = new Date(ref);
    if (isNaN(refDate)) return 'gbs_pending';
    return (Date.now() - refDate.getTime()) > 86400000 ? 'gbs_overdue' : 'gbs_pending';
  }

    html += '<select id="listStatus"><option value="">Táº¥t cáº£ status</option><option value="Pending"' + (ListState.filter.status === 'Pending' ? ' selected' : '') + '>Pending</option><option value="Approved"' + (ListState.filter.status === 'Approved' ? ' selected' : '') + '>Approved</option><option value="Rejected"' + (ListState.filter.status === 'Rejected' ? ' selected' : '') + '>Rejected</option></select>';
    const depts = [...new Set(all.map(t => val(t, 'department')).filter(Boolean))].sort();
    html += '<select id="listDept"><option value="">Táº¥t cáº£ dept</option>';
    depts.forEach(d => { html += '<option value="' + escapeHtml(d) + '"' + (ListState.filter.dept === d ? ' selected' : '') + '>' + escapeHtml(d) + '</option>'; });
    html += '</select>';
    html += '<input type="date" id="listDateFrom" value="' + ListState.filter.dateFrom + '" />';
    html += '<input type="date" id="listDateTo" value="' + ListState.filter.dateTo + '" />';
    // EC-GBS-FIN-v1: GBS phase dropdown
    html += '<select id="listGbsPhase"><option value="">All GBS phase</option><option value="gbs_pending"' + (ListState.filter.gbsPhase === 'gbs_pending' ? ' selected' : '') + '>â³ Chá» GBS</option><option value="gbs_overdue"' + (ListState.filter.gbsPhase === 'gbs_overdue' ? ' selected' : '') + '>â Trá» GBS</option></select>';
    html += '<button class="filter-clear" id="listClear">Clear filters</button>';
    html += '</div>';

    html += '<div class="list-table-wrap"><table class="list-table">';
    html += '<thead><tr><th>ID</th><th>Title</th><th>Type</th><th>Department</th><th>Status</th><th>Timeline</th><th>Created</th><th>Submitted by</th></tr></thead>';

    html += '</table></div>';
    html += '</div>';

    document.getElementById('content').innerHTML = html;
    bindListEvents();
  }

  function getFilteredList() {
    const f = ListState.filter;
    // EC-GBS-FIN-v1: GBS card filters
    const cardFilters = {
      pending: t => (val(t, 'final_status', 'status') || '').trim() === 'Pending',
      approved: t => (val(t, 'final_status', 'status') || '').trim() === 'Approved',
      late: t => t._timeline === 'late',
      gbs_pending: t => t._gbsTimeline === 'gbs_pending' || t._gbsTimeline === 'gbs_overdue',
      gbs_overdue: t => t._gbsTimeline === 'gbs_overdue'
    };
    return ListState.allTickets.filter(t => {
      // EC-GBS-FIN-v1: My Approval filter
      if (f.mine) {
        const me = ((window.frappe && window.frappe.session && (window.frappe.session.user_email || window.frappe.session.user)) || '').toLowerCase();
        const sb = (val(t, 'submitted_by', 'created_by', 'requestor', 'requested_by') || '').toLowerCase();
        if (!me || sb !== me) return false;
      }
      // EC-GBS-FIN-v1: GBS phase dropdown filter
      if (f.gbsPhase === 'gbs_overdue' && t._gbsTimeline !== 'gbs_overdue') return false;
      if (f.gbsPhase === 'gbs_pending' && t._gbsTimeline !== 'gbs_pending' && t._gbsTimeline !== 'gbs_overdue') return false;
      if (f.card && cardFilters[f.card] && !cardFilters[f.card](t)) return false;
      if (f.type !== 'all' && t._type !== f.type) return false;
      if (f.status && (val(t, 'final_status', 'status') || '').trim() !== f.status) return false;
      if (f.dept && val(t, 'department') !== f.dept) return false;
      if (f.search) {
        const s = f.search.toLowerCase();
        const hay = ((val(t, 'id') || '') + ' ' + (val(t, 'Title', 'title') || '') + ' ' + (val(t, 'department') || '')).toLowerCase();
        if (!hay.includes(s)) return false;
      }
      if (f.dateFrom || f.dateTo) {
        const created = val(t, 'created_at', 'Created');
        if (!created) return false;
        const cd = new Date(created);
        if (f.dateFrom && cd < new Date(f.dateFrom)) return false;
        if (f.dateTo && cd > new Date(f.dateTo + 'T23:59:59')) return false;
      }
      return true;
    });
  }

  function renderListBody(tickets) {
    if (tickets.length === 0) return '<tr><td colspan="8" class="list-empty">KhÃ´ng cÃ³ ticket nÃ o match filter</td></tr>';
    const sorted = [...tickets].sort((a, b) => {
      const da = new Date(val(a, 'created_at', 'Created') || 0);
      const db = new Date(val(b, 'created_at', 'Created') || 0);
      return db - da;
    });
    return sorted.map(t => {
      const id = val(t, 'id') || '';
      const title = val(t, 'Title', 'title') || 'â';
      const dept = val(t, 'department') || 'â';
      const status = (val(t, 'final_status', 'status') || 'Pending').trim();
      const created = val(t, 'created_at', 'Created');
      const submittedBy = val(t, 'submitted_by', 'created_by', 'requestor', 'requested_by') || 'â';
      const tl = t._timeline;
      let tlText = 'â';
      if (tl === 'ontime') tlText = 'â± On time';
      else if (tl === 'risk') tlText = 'â  Risk';
      else if (tl === 'late') tlText = 'â Late';
      return '<tr data-id="' + escapeHtml(id) + '" data-type="' + escapeHtml(t._type) + '">' +
        '<td><a class="detail-id-link" href="/approval?id=' + encodeURIComponent(id) + '&type=' + encodeURIComponent(t._type) + '" onclick="event.stopPropagation();"><span class="id-cell">' + escapeHtml(id) + '</span></a></td>' +
        '<td>' + escapeHtml(title) + '</td>' +
        '<td><span class="type-pill t-' + t._type + '">' + (TYPE_LABELS_FULL[t._type] || t._type) + '</span></td>' +
        '<td>' + escapeHtml(dept) + '</td>' +
        '<td><span class="status-cell status-' + status.toLowerCase() + '">' + escapeHtml(status) + '</span></td>' +
        '<td><span class="timeline-cell tl-' + (tl || '') + '">' + tlText + '</span></td>' +
        '<td>' + (created ? new Date(created).toLocaleDateString('vi-VN') : 'â') + '</td>' +
        '<td style="font-size:12px;color:var(--gray-500)">' + escapeHtml(submittedBy) + '</td>' +
        '</tr>';
    }).join('');
  }

  function bindListEvents() {
    document.querySelectorAll('.stat-card').forEach(card => {
      card.addEventListener('click', () => {
        const id = card.dataset.card;
        ListState.filter.card = (ListState.filter.card === id || id === 'total') ? '' : id;
        renderList();
      });
    });
    document.querySelectorAll('.list-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        // EC-GBS-FIN-v1: handle My Approval tab
        if (tab.dataset.tab === 'mine') {
          ListState.filter.mine = true;
          ListState.filter.type = 'all';
        } else {
          ListState.filter.mine = false;
          ListState.filter.type = tab.dataset.tab;
        }
        renderList();
      });
    });
    // EC-GBS-FIN-v1: GbsPhase dropdown handler
    const gbsPhaseEl = document.getElementById('listGbsPhase');
    if (gbsPhaseEl) gbsPhaseEl.addEventListener('change', e => { ListState.filter.gbsPhase = e.target.value; refreshBody(); });
    const refreshBody = () => {
      document.getElementById('listBody').innerHTML = renderListBody(getFilteredList());
      bindRowClicks();
    };
    const search = document.getElementById('listSearch');
    if (search) search.addEventListener('input', e => { ListState.filter.search = e.target.value; refreshBody(); });
    const status = document.getElementById('listStatus');
    if (status) status.addEventListener('change', e => { ListState.filter.status = e.target.value; refreshBody(); });
    const dept = document.getElementById('listDept');
    if (dept) dept.addEventListener('change', e => { ListState.filter.dept = e.target.value; refreshBody(); });
    const dateFrom = document.getElementById('listDateFrom');
    if (dateFrom) dateFrom.addEventListener('change', e => { ListState.filter.dateFrom = e.target.value; refreshBody(); });
    const dateTo = document.getElementById('listDateTo');
    if (dateTo) dateTo.addEventListener('change', e => { ListState.filter.dateTo = e.target.value; refreshBody(); });
    const clearBtn = document.getElementById('listClear');
    if (clearBtn) clearBtn.addEventListener('click', () => {
      // EC-GBS-FIN-v1: reset gbsPhase + mine too
      ListState.filter = { type: 'all', status: '', dept: '', search: '', dateFrom: '', dateTo: '', card: '', gbsPhase: '', mine: false };
      renderList();
    });
    bindRowClicks();
  }

  function bindRowClicks() {
    document.querySelectorAll('#listBody tr[data-id]').forEach(row => {
      row.addEventListener('click', () => {
        const id = row.dataset.id;
        const type = row.dataset.type;
        window.location.href = '/approval?id=' + encodeURIComponent(id) + '&type=' + encodeURIComponent(type);
      });
    });
  }

  function fillUserInfo() {
    const email = getSessionEmail();
    if (!email) return;
    const av = document.getElementById('ecAvatar');
    const nm = document.getElementById('ecUserName');
    const localPart = email.split('@')[0];
    const firstName = localPart.split(/[._-]+/)[0] || localPart;
    const displayName = firstName.charAt(0).toUpperCase() + firstName.slice(1).toLowerCase();
    if (av) av.textContent = displayName.charAt(0);
    if (nm) nm.textContent = displayName;
  }

  document.addEventListener('DOMContentLoaded', function () {
    fillUserInfo();
    const id = getQuery('id');
    let type = (getQuery('type') || '').toLowerCase();
    if (!type && id) type = detectTypeFromId(id);

    if (id && ['mso','so','po','rec','vendor_request','gbs_po','gbs_so'].includes(type)) {
      loadTicket(type, id);
    } else {
      loadList();
    }
  });

})();
</script>

<script id="ec-listcols-fix">
(function(){
  // Patch fetch on lookup endpoint to normalize ticket items.
  // PA may return SP raw fields like Created, Author (object with EMail/Title) â JS expects
  // created_at, submitted_by. Add fallbacks here.
  if (window._ecListColsFixed) return;
  window._ecListColsFixed = true;

  var origFetch = window.fetch.bind(window);
  window.fetch = function(input, init) {
    var url = typeof input === 'string' ? input : (input && input.url) || '';
    var p = origFetch(input, init);
    if (!/lookup|3d602b4b38644fec9b3b66ff3bf028a8/.test(url)) return p;
    return p.then(function(res){
      var cloned = res.clone();
      return cloned.json().then(function(data){
        try {
          if (data && Array.isArray(data.items) && data.items.length > 0) {
            // Debug: log first item shape once
            if (!window._ecLogged) {
              window._ecLogged = true;
              try { console.log('[ec-listcols] sample item:', data.items[0]); } catch(_) {}
            }
            data.items.forEach(function(item){
              // ----- created_at normalization -----
              if (!item.created_at && !item.Created) {
                item.created_at = item.creation || item.created || item.CreatedDate || item['Created Date'] || item.created_on || '';
              } else if (!item.created_at && item.Created) {
                item.created_at = item.Created;
              }
              // ----- submitted_by normalization -----
              if (!item.submitted_by) {
                var sb = '';
                // SP Author/Editor fields are objects {Title, EMail, ...} OR strings
                if (item.Author && typeof item.Author === 'object') {
                  sb = item.Author.EMail || item.Author.Email || item.Author.Title || '';
                } else if (typeof item.Author === 'string') {
                  sb = item.Author;
                }
                if (!sb) {
                  sb = item.created_by || item['Created By'] || item.owner || item.Owner ||
                       item.requestor || item.requested_by || item.user_email || item.email || '';
                }
                if (sb) item.submitted_by = sb;
              }
            });
          }
        } catch(e) { try { console.warn('[ec-listcols] normalize err', e); } catch(_) {} }
        return new Response(JSON.stringify(data), {
          status: res.status, statusText: res.statusText, headers: res.headers
        });
      }).catch(function(){ return res; });
    });
  };
  try { console.log('[ec-listcols] fetch patched'); } catch(_) {}
})();
</script>

<script id="ec-userinfo-fix">
(function(){
  function getCookie(name){
    var m = document.cookie.match(new RegExp('(?:^|;\\s*)' + name + '=([^;]+)'));
    return m ? decodeURIComponent(m[1]).replace(/\+/g, ' ') : '';
  }
  function getEmail(){
    try {
      if (window.frappe && window.frappe.session) {
        var u = window.frappe.session.user_email || window.frappe.session.user || '';
        if (u && u !== 'Guest') return u;
      }
    } catch(_) {}
    var c = getCookie('user_id');
    if (c && c !== 'Guest') return c;
    return '';
  }
  function getFullName(email){
    // Frappe sets 'full_name' cookie on login (URL-encoded, + for space)
    var fn = getCookie('full_name');
    if (fn) return fn;
    // Fallback: derive from email
    if (!email) return '';
    var localPart = email.indexOf('@') >= 0 ? email.split('@')[0] : email;
    var firstName = localPart.split(/[._\- ]+/)[0] || localPart;
    return firstName.charAt(0).toUpperCase() + firstName.slice(1).toLowerCase();
  }
  function fillUser(){
    var email = getEmail();
    if (!email) return;
    var displayName = getFullName(email);
    if (!displayName) return;
    // Initial for avatar: first char of full name
    var initial = displayName.trim().charAt(0).toUpperCase() || 'U';

    // Update name labels (always overwrite \u2014 sync from Frappe is source of truth)
    var nameEls = document.querySelectorAll('#ecUserName, .ec-sb-user-name, .sidebar-user-name, .user-name');
    nameEls.forEach(function(el){ el.textContent = displayName; });
    // Update avatars
    var avEls = document.querySelectorAll('#ecAvatar, .ec-sb-avatar, .sidebar-user .avatar, .user-card .avatar, .avatar');
    avEls.forEach(function(el){
      var t = (el.textContent || '').trim();
      if (!t || t.length === 1) {
        el.textContent = initial;
      }
    });

    // Make user-card clickable -> Frappe user profile
    var profileUrl = '/app/user/' + encodeURIComponent(email);
    // \u1EDF = \u1EDF, \u0111 = \u0111, \u01B0 = \u01B0, \u1EDD = \u1EDD, \u00ED = \u00ED, \u00F3 = \u00F3, \u00E0 = \u00E0
    var tooltipText = 'M\u1EDF trang user trong Frappe';
    var cards = document.querySelectorAll('.ec-sb-footer .ec-sb-user-card, .ec-sb-user-card, .sidebar-footer .user-card, .sidebar-footer .sidebar-user');
    cards.forEach(function(el){
      if (el.tagName === 'A' || el.dataset.ecProfileWrapped === '1') return;
      if (el.parentElement && el.parentElement.tagName === 'A' && el.parentElement.href.indexOf('/app/user') >= 0) return;
      el.title = tooltipText;
      el.addEventListener('click', function(e){
        if (e.target.closest('.ec-sb-logout, .logout-btn, button')) return;
        location.href = profileUrl;
      });
      el.setAttribute('data-ec-profile-wrapped', '1');
    });
  }
  function init(){
    fillUser();
    setTimeout(fillUser, 250);
    setTimeout(fillUser, 800);
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', init);
  else init();
})();
</script>

<script id="ec-approval-perm-filter">
(function(){
  if (window._ecApprovalPerm) return;
  window._ecApprovalPerm = true;

  var GET_USER_PERM_URL = 'https://default16f5375c95a943f0ba2ce20bd5ec28.45.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/6a07f952d998407384a8a96246fd30e7/triggers/manual/paths/invoke?api-version=1&sp=%2Ftriggers%2Fmanual%2Frun&sv=1.0&sig=d6n7mRgoovyBVGhUhqWv7ppqEfP4vOFd39UTOBUnPEg';
  var DETAIL_URL_PREFIX = 'https://default16f5375c95a943f0ba2ce20bd5ec28.45.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/dc4cdd49b8ae429aaf5a8dbd78aba208';
  var LOOKUP_URL_PREFIX = 'https://default16f5375c95a943f0ba2ce20bd5ec28.45.environment.api.powerplatform.com:443/powerautomate/automations/direct/workflows/3d602b4b38644fec9b3b66ff3bf028a8';
  var TICKET_TYPES = ['mso', 'so', 'po', 'rec', 'vendor_request', 'gbs_po', 'gbs_so'];

  var _userPerm = null;
  var _userEmail = null;
  var _permPromise = null;

  window._ecPerm = {
    getEmail: function(){ return _userEmail; },
    getPerm: function(){ return _userPerm; },
    isRestricted: function(){ return window._ecApprovalRestricted === true; }
  };

  function getSessionEmail() {
    try {
      if (window.frappe && window.frappe.session) {
        var s = window.frappe.session;
        if (s.user_email && s.user_email.indexOf('@') >= 0) return s.user_email;
        if (s.user && s.user.indexOf('@') >= 0) return s.user;
      }
    } catch(_){}
    var el = document.querySelector('[data-user-email]');
    if (el && el.dataset.userEmail && el.dataset.userEmail.indexOf('@') >= 0) return el.dataset.userEmail;
    if (window._sessionEmail && window._sessionEmail.indexOf('@') >= 0) return window._sessionEmail;
    return null;
  }

  function loadUserPerm() {
    if (_userPerm && _userEmail) return Promise.resolve(_userPerm);
    _userEmail = getSessionEmail();
    if (!_userEmail) {
      return Promise.resolve({ effective_role: 'guest', scope: 'own', detail: 'own', _stale: true });
    }
    if (_permPromise) return _permPromise;
    _permPromise = fetch(GET_USER_PERM_URL, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ caller_email: _userEmail })
    }).then(function(r){ return r.json(); }).then(function(d){
      _userPerm = d;
      try { console.log('[ec-perm] role=' + d.effective_role + ' scope=' + d.scope); } catch(_){}
      return _userPerm;
    }).catch(function(e){
      console.warn('[ec-perm] fetch fail', e);
      _permPromise = null; _userEmail = null;
      return { effective_role: 'guest', scope: 'own', _stale: true };
    });
    return _permPromise;
  }

  function waitForFrappeAndInit(attempt) {
    attempt = attempt || 0;
    var email = getSessionEmail();
    if (email) {
      _userEmail = email;
      loadUserPerm();
      return;
    }
    if (attempt < 50) setTimeout(function(){ waitForFrappeAndInit(attempt + 1); }, 200);
  }

  function chainContainsEmail(chainRaw, email) {
    if (!chainRaw || !email) return false;
    try {
      var chain = typeof chainRaw === 'string' ? JSON.parse(chainRaw) : chainRaw;
      if (!Array.isArray(chain)) return false;
      var emailLow = email.toLowerCase();
      return chain.some(function(step){
        var ap = (step.approver || step.approver_email || '').toLowerCase();
        return ap === emailLow;
      });
    } catch(e) { return false; }
  }

  function computeCanViewFull(item, type, perm, email) {
    if (!perm) return false;
    // Scope=all â full view (CEO/HOF/admin/finance_team)
    if (perm.scope === 'all') return true;
    // MSO type â cross-team full view (per business rule)
    if (type === 'mso') return true;
    if (type === 'gbs_po' || type === 'gbs_so') return true;  // GBS: tat ca user xem duoc
    if (!email) return false;
    var emailLow = email.toLowerCase();
    // Submitter
    var sb = (item.submitted_by || '').toLowerCase();
    var cb = (item.created_by || '').toLowerCase();
    var rq = (item.requestor || '').toLowerCase();
    if (sb === emailLow || cb === emailLow || rq === emailLow) return true;
    // Manager of same dept
    if (perm.role === 'manager' || perm.effective_role === 'manager') {
      var itemDept = item.department || '';
      if (typeof itemDept === 'object' && itemDept.Value) itemDept = itemDept.Value;
      if (itemDept === perm.department) return true;
    }
    // Approver in chain
    if (chainContainsEmail(item.approval_chain, email)) return true;
    return false;
  }

  function filterListByPermission(items, type) {
    if (!Array.isArray(items)) return items;
    if (!_userPerm) return [];
    if (_userPerm.scope === 'all') return items;
    if (type === 'mso' && _userPerm.scope !== 'own' && _userPerm.effective_role !== 'guest') return items;
    if ((type === 'gbs_po' || type === 'gbs_so') && _userPerm.scope !== 'own') return items;
    var dept = _userPerm.department;
    var email = (_userEmail || '').toLowerCase();
    if ((_userPerm.scope === 'dept' || _userPerm.scope === 'dept_basic') && dept) {
      return items.filter(function(item){
        return (item.department || '') === dept;
      });
    }
    if (_userPerm.scope === 'own') {
      if (!email) return [];
      return items.filter(function(item){
        var sb = (item.submitted_by || '').toLowerCase();
        var cb = (item.created_by || '').toLowerCase();
        var rq = (item.requestor || '').toLowerCase();
        return sb === email || cb === email || rq === email;
      });
    }
    return [];
  }

  function stripSensitive(data) {
    // Keep only basic display fields
    if (data && data.item) {
      var keep = ['Title','final_status','status','department','submitted_by','created_by','Created','created_at',
                  'mso_id','so_id','po_id','rec_id','vrq_id','brand_code','requestor','type','current_level','ID'];
      var minimal = {};
      keep.forEach(function(k){
        if (data.item[k] !== undefined) minimal[k] = data.item[k];
      });
      data.item = minimal;
    }
    if (data) {
      data.attachments = [];
      if (data.auth) {
        data.auth.can_approve = false;
        data.auth.is_approver = false;
      }
      data._restricted = true;
    }
    window._ecApprovalRestricted = true;
    return data;
  }

  function showRestrictedBanner() {
    if (document.querySelector('.ec-restricted-banner')) return;
    var content = document.getElementById('content');
    if (!content) return;
    var banner = document.createElement('div');
    banner.className = 'ec-restricted-banner';
    banner.innerHTML = '<span>B\u1EA1n kh\u00F4ng c\u00F3 quy\u1EC1n xem chi ti\u1EBFt \u0111\u1EA7y \u0111\u1EE7 \u2014 ch\u1EC9 th\u1EA5y th\u00F4ng tin c\u01A1 b\u1EA3n. Li\u00EAn h\u1EC7 admin n\u1EBFu c\u1EA7n access.</span>';
    content.insertBefore(banner, content.firstChild);
  }

  function hideRestrictedBanner() {
    var b = document.querySelector('.ec-restricted-banner');
    if (b) b.remove();
  }

  function waitForValidPerm(attempt) {
    attempt = attempt || 0;
    return loadUserPerm().then(function(p){
      if (p && p._stale && attempt < 10) {
        return new Promise(function(res){ setTimeout(res, 300); }).then(function(){
          return waitForValidPerm(attempt + 1);
        });
      }
      return p;
    });
  }

  // Monkey-patch fetch \u2014 intercept BOTH Get_Ticket_Detail_Flow + Lookup_Parents
  // Re-apply periodically in case other scripts override window.fetch AFTER us
  var _origFetch = null;
  var EC_PERM_MARK = '__ecPermPatched';

  function _ecPermFetch(url, options) {
    // DEBUG: log fetch hit + condition state to diagnose filter miss
    try {
      if (typeof url === 'string' && url.indexOf('powerplatform') >= 0) {
        var matchPrefix = url.indexOf(LOOKUP_URL_PREFIX) === 0;
        var hasBody = !!(options && options.body);
        var bodyType = null;
        try { if (hasBody && typeof options.body === 'string') bodyType = JSON.parse(options.body).type; } catch(_){}
        var inTicketTypes = bodyType ? TICKET_TYPES.indexOf(bodyType) >= 0 : false;
        console.log('[ec-perm-DBG] urlStart=' + url.substring(0, 50) + ' | matchPrefix=' + matchPrefix + ' | hasBody=' + hasBody + ' | bodyType=' + bodyType + ' | inTypes=' + inTicketTypes);
      }
    } catch(_){}
    // Lookup_Parents (list view) \u2014 filter ticket types
    if (typeof url === 'string' && url.indexOf(LOOKUP_URL_PREFIX) === 0 && options && options.body) {
      try {
        var lBody = JSON.parse(options.body);
        if (lBody && lBody.type && TICKET_TYPES.indexOf(lBody.type) >= 0) {
          return waitForValidPerm().then(function(){
            return _origFetch(url, options).then(function(resp){
              if (!resp.ok) return resp;
              return resp.clone().json().then(function(data){
                try {
                  if (data && Array.isArray(data.items)) {
                    var before = data.items.length;
                    data.items = filterListByPermission(data.items, lBody.type);
                    console.log('[ec-perm] list filter type=' + lBody.type + ' ' + before + ' -> ' + data.items.length);
                  }
                  return new Response(JSON.stringify(data), {
                    status: 200,
                    headers: {'Content-Type': 'application/json'}
                  });
                } catch(e) {
                  console.error('[ec-perm] list filter error, denying:', e);
                  return new Response(JSON.stringify({ success: true, items: [] }), {
                    status: 200, headers: {'Content-Type': 'application/json'}
                  });
                }
              }).catch(function(e){
                console.error('[ec-perm] list parse error, denying:', e);
                return new Response(JSON.stringify({ success: true, items: [] }), {
                  status: 200, headers: {'Content-Type': 'application/json'}
                });
              });
            });
          });
        }
      } catch(_){}
    }
    // Get_Ticket_Detail_Flow \u2014 restrict ticket detail
    if (typeof url === 'string' && url.indexOf(DETAIL_URL_PREFIX) === 0 && options && options.body) {
      try {
        var body = JSON.parse(options.body);
        if (body && body.ticket_id && body.type) {
          return waitForValidPerm().then(function(perm){
            return _origFetch(url, options).then(function(resp){
              if (!resp.ok) return resp;
              return resp.clone().json().then(function(data){
                try {
                  var canView = computeCanViewFull(data.item || {}, body.type, perm, _userEmail);
                  console.log('[ec-perm] detail ' + body.ticket_id + ' canViewFull=' + canView);
                  window._ecApprovalRestricted = !canView;
                  if (!canView) {
                    data = stripSensitive(data);
                    setTimeout(showRestrictedBanner, 300);
                    setTimeout(showRestrictedBanner, 1200);
                  } else {
                    hideRestrictedBanner();
                  }
                  return new Response(JSON.stringify(data), {
                    status: 200,
                    headers: {'Content-Type': 'application/json'}
                  });
                } catch(filterErr) {
                  console.error('[ec-perm] detail filter error, denying:', filterErr);
                  return new Response(JSON.stringify({ success: false, error: 'Permission check failed' }), {
                    status: 403,
                    headers: {'Content-Type': 'application/json'}
                  });
                }
              }).catch(function(jsonErr){
                console.error('[ec-perm] parse error, denying:', jsonErr);
                return new Response(JSON.stringify({ success: false, error: 'Response parse failed' }), {
                  status: 500,
                  headers: {'Content-Type': 'application/json'}
                });
              });
            });
          });
        }
      } catch(_){}
    }
    return _origFetch(url, options);
  }
  _ecPermFetch[EC_PERM_MARK] = true;

  function applyFetchPatch() {
    if (window.fetch && window.fetch[EC_PERM_MARK]) return; // already mine
    _origFetch = window.fetch.bind(window);
    window.fetch = _ecPermFetch;
    try { console.log('[ec-perm] fetch re-patched'); } catch(_){}
  }
  applyFetchPatch();
  setTimeout(applyFetchPatch, 100);
  setTimeout(applyFetchPatch, 500);
  setTimeout(applyFetchPatch, 1500);
  setTimeout(applyFetchPatch, 3000);
  setTimeout(applyFetchPatch, 6000);
  if (document.readyState !== 'complete') {
    window.addEventListener('load', applyFetchPatch);
    document.addEventListener('DOMContentLoaded', applyFetchPatch);
  }

  waitForFrappeAndInit();
})();
</script>

    wrapper.style.cssText = 'max-width:900px;margin:24px auto;padding:0 24px;';
    wrapper.innerHTML = '<div style="background:white;border:1px solid #e5e7eb;border-radius:12px;padding:24px 28px;box-shadow:0 1px 3px rgba(15,23,42,0.06);"><h1 style="margin:0 0 4px 0;font-size:22px;font-weight:700;color:#1f2937;">Contract Approval</h1><p style="margin:0 0 18px 0;color:#6b7280;font-size:13px;">ID: <code style="color:#2C3DA6;font-weight:600;">' + contractId + '</code></p><div id="contractLoading" style="color:#6b7280;">Loading...</div><div id="contractDetail" style="display:none;"></div><div id="contractActions" style="display:none;margin-top:24px;padding-top:18px;border-top:1px solid #f3f4f6;display:flex;justify-content:flex-end;gap:10px;"></div></div>';

    // Remove existing content children except sidebar/header
    Array.from(mainContent.children).forEach(function(c){
      if (!c.classList.contains('ec-tb') && c.id !== 'ec-shell') c.remove();
    });
    mainContent.appendChild(wrapper);

    fetch('/api/method/web_lookup', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({type:'contract', id: contractId})})
      .then(function(r){return r.json();}).then(function(d){
        var resp = (d && d.success !== undefined) ? d : (d && d.message);
        if (!resp || !resp.success) {
          document.getElementById('contractLoading').textContent = 'Contract not found';
          return;
        }
        var c = resp.data;
        document.getElementById('contractLoading').style.display = 'none';
        var detail = document.getElementById('contractDetail');
        detail.style.display = 'block';
        var statusColor = c.workflow_status === 'Approved' || c.workflow_status === 'Active' ? '#166534' : (c.workflow_status === 'Pending' ? '#92400e' : '#dc2626');
        var statusBg = c.workflow_status === 'Approved' || c.workflow_status === 'Active' ? '#dcfce7' : (c.workflow_status === 'Pending' ? '#fef3c7' : '#fee2e2');
        detail.innerHTML = '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:18px;"><div><div style="font-size:11px;color:#6b7280;text-transform:uppercase;font-weight:600;">Title</div><div style="font-size:14px;font-weight:600;color:#1f2937;margin-top:4px;">' + (c.contract_title || '-') + '</div></div><div><div style="font-size:11px;color:#6b7280;text-transform:uppercase;font-weight:600;">Status</div><div style="margin-top:4px;"><span style="background:' + statusBg + ';color:' + statusColor + ';padding:3px 10px;border-radius:12px;font-size:11.5px;font-weight:600;">' + c.workflow_status + '</span></div></div><div><div style="font-size:11px;color:#6b7280;text-transform:uppercase;font-weight:600;">Vendor</div><div style="margin-top:4px;color:#1f2937;">' + (c.party_name || '-') + '</div></div><div><div style="font-size:11px;color:#6b7280;text-transform:uppercase;font-weight:600;">Total Value</div><div style="margin-top:4px;color:#1f2937;font-weight:600;">' + (parseFloat(c.total_value||0)).toLocaleString('vi-VN') + ' VND</div></div><div><div style="font-size:11px;color:#6b7280;text-transform:uppercase;font-weight:600;">Start &mdash; End</div><div style="margin-top:4px;color:#1f2937;">' + (c.start_date || '-') + ' &rarr; ' + (c.end_date || '-') + '</div></div><div><div style="font-size:11px;color:#6b7280;text-transform:uppercase;font-weight:600;">Procurement Type</div><div style="margin-top:4px;color:#1f2937;">' + (c.procurement_type || '-') + '</div></div></div><div style="margin-bottom:14px;"><div style="font-size:11px;color:#6b7280;text-transform:uppercase;font-weight:600;">Scope</div><div style="margin-top:4px;color:#1f2937;white-space:pre-wrap;">' + (c.scope || '-') + '</div></div><div style="margin-bottom:14px;"><div style="font-size:11px;color:#6b7280;text-transform:uppercase;font-weight:600;">Deliverables</div><div style="margin-top:4px;color:#1f2937;white-space:pre-wrap;">' + (c.deliverables || '-') + '</div></div>' + (c.attached_pdf ? '<div><a href="' + c.attached_pdf + '" target="_blank" style="color:#2C3DA6;font-weight:600;">View Attached PDF</a></div>' : '');

        if (c.workflow_status === 'Pending') {
          var actions = document.getElementById('contractActions');
          actions.style.display = 'flex';
          actions.innerHTML = '<button onclick="rejectContract()" style="padding:10px 20px;background:white;border:1px solid #dc2626;color:#dc2626;border-radius:8px;font-weight:600;cursor:pointer;">Reject</button><button onclick="approveContract()" style="padding:10px 20px;background:#10b981;color:white;border:none;border-radius:8px;font-weight:600;cursor:pointer;">Approve</button>';
        }
      });

    window.approveContract = function(){
      if (!confirm('Approve contract ' + contractId + '?')) return;
      fetch('/api/method/approve_contract', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contract_id: contractId, decision:'approve'})})
        .then(function(r){return r.json();}).then(function(d){
          var resp = (d&&d.success!==undefined)?d:(d&&d.message);
          if (resp && resp.success) { alert('Approved'); window.location.reload(); }
          else alert('Error: ' + (resp&&resp.error?resp.error:'Unknown'));
        });
    };
    window.rejectContract = function(){
      var reason = prompt('Reason for rejection:');
      if (!reason) return;
      fetch('/api/method/approve_contract', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({contract_id: contractId, decision:'reject', reason:reason})})
        .then(function(r){return r.json();}).then(function(d){
          var resp = (d&&d.success!==undefined)?d:(d&&d.message);
          if (resp && resp.success) { alert('Rejected'); window.location.reload(); }
          else alert('Error: ' + (resp&&resp.error?resp.error:'Unknown'));
        });
    };
  }
})();
</script>







<script>
/* gbs_wrapper_v6 - debug-friendly fill panel + try multiple methods */
(function(){
  'use strict';

  function _esc(s) {
    if (s === null || s === undefined) return '';
    return String(s).replace(/[&<>"']/g, function(c) {
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }
  function _val(item) {
    if (!item) return '';
    for (var i = 1; i < arguments.length; i++) {
      var v = item[arguments[i]];
      if (v !== null && v !== undefined && v !== '') return v;
    }
    return '';
  }
  function _fmtVnd(n) { return (Number(n) || 0).toLocaleString('vi-VN') + ' VND'; }

  function _section(title, rows) {
    var html = '<div style="margin-bottom:20px"><div style="font-size:11px;font-weight:700;color:#2C3DA6;text-transform:uppercase;letter-spacing:0.6px;border-left:3px solid #2C3DA6;padding:2px 0 2px 10px;margin-bottom:12px">' + _esc(title) + '</div>';
    rows.forEach(function(r) {
      html += '<div style="display:grid;grid-template-columns:180px 1fr;gap:14px;padding:8px 0;border-bottom:1px solid #f3f4f6">';
      html += '<div style="color:#6b7280;font-size:12.5px">' + _esc(r[0]) + '</div>';
      html += '<div style="font-size:13px;color:#111827">' + _esc(r[1] || '-') + '</div>';
      html += '</div>';
    });
    html += '</div>';
    return html;
  }

  function _itemsTable(items) {
    var html = '<div style="margin-bottom:20px"><div style="font-size:11px;font-weight:700;color:#2C3DA6;text-transform:uppercase;letter-spacing:0.6px;border-left:3px solid #2C3DA6;padding:2px 0 2px 10px;margin-bottom:12px">Items (' + items.length + ')</div>';
    html += '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12.5px">';
    html += '<thead><tr style="background:#f9fafb">';
    ['Item Code','Item Name','Qty','Rate','Amount','Warehouse'].forEach(function(h, i) {
      var align = (i >= 2 && i <= 4) ? 'right' : 'left';
      html += '<th style="text-align:' + align + ';padding:8px 10px;font-weight:600;color:#6b7280;text-transform:uppercase;font-size:11px;letter-spacing:0.4px">' + h + '</th>';
    });
    html += '</tr></thead><tbody>';
    items.forEach(function(it) {
      html += '<tr style="border-top:1px solid #e5e7eb">';
      html += '<td style="padding:8px 10px;font-family:monospace;font-size:12px">' + _esc(it.item_code || '') + '</td>';
      html += '<td style="padding:8px 10px">' + _esc(it.item_name || '') + '</td>';
      html += '<td style="padding:8px 10px;text-align:right">' + (it.qty || 0) + '</td>';
      html += '<td style="padding:8px 10px;text-align:right">' + (Number(it.rate) || 0).toLocaleString('vi-VN') + '</td>';
      html += '<td style="padding:8px 10px;text-align:right;font-weight:600">' + (Number(it.amount) || 0).toLocaleString('vi-VN') + '</td>';
      html += '<td style="padding:8px 10px">' + _esc(it.warehouse || '') + '</td>';
      html += '</tr>';
    });
    html += '</tbody></table></div></div>';
    return html;
  }

  function _buildBody(item, type) {
    var isPo = (type === 'gbs_po');
    var general = [
      ['Title', _val(item, isPo ? 'po_title' : 'so_title', 'title')],
      ['Department', _val(item, 'department')],
      ['Brand', _val(item, 'brand_name') || _val(item, 'brand_code')],
      ['Submitter', _val(item, 'submitted_by')],
    ];
    if (isPo) general.push(['Supplier', (_val(item, 'supplier_name') || '') + (_val(item, 'supplier') ? ' (' + _val(item, 'supplier') + ')' : '')]);
    else { general.push(['Customer', _val(item, 'customer')]); general.push(['Default Warehouse', _val(item, 'set_warehouse')]); }
    general.push(['Transaction Date', _val(item, 'transaction_date')]);
    general.push([isPo ? 'Schedule Date' : 'Delivery Date', _val(item, isPo ? 'schedule_date' : 'delivery_date')]);
    general.push(['Currency', _val(item, 'currency')]);
    general.push(['Grand Total', _fmtVnd(_val(item, 'grand_total'))]);
    general.push(['Notes', _val(item, 'notes')]);

    var sync = [
      ['GBS Doc Name', _val(item, 'gbs_doc_name') || '-- chua sync --'],
      ['GBS Status', _val(item, 'gbs_status') || '-'],
      ['GBS Grand Total', _val(item, 'gbs_grand_total') ? _fmtVnd(_val(item, 'gbs_grand_total')) : '-'],
      ['Last Sync', _val(item, 'gbs_last_sync') || '-'],
      ['Sync Attempts', _val(item, 'sync_attempts') || 0],
      ['Sync Error', _val(item, 'sync_error') || '-'],
    ];

    var html = _section('Thong tin chung', general);
    var items = item.items || [];
    if (items.length) html += _itemsTable(items);

    html += '<div style="margin-bottom:20px">';
    html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">';
    html += '<div style="font-size:11px;font-weight:700;color:#2C3DA6;text-transform:uppercase;letter-spacing:0.6px;border-left:3px solid #2C3DA6;padding:2px 0 2px 10px;flex:1">GBS Sync</div>';
    html += '<button id="gbsCheckBtn" type="button" style="background:#8B5CF6;color:#fff;border:none;padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;margin-right:8px">Check Status</button>';
    // Submit button - only show if gbs_doc_name exists AND gbs_status is Draft (not yet submitted)
    var gbsName = _val(item, 'gbs_doc_name');
    var gbsStat = (_val(item, 'gbs_status') || '').toLowerCase();
    var canSubmit = gbsName && (gbsStat === 'draft' || gbsStat === '' || gbsStat === 'pending');
    if (canSubmit) {
      html += '<button id="gbsSubmitBtn" type="button" style="background:#10b981;color:#fff;border:none;padding:6px 12px;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer">Submit on GBS</button>';
    }
    html += '</div>';
    sync.forEach(function(r) {
      html += '<div style="display:grid;grid-template-columns:180px 1fr;gap:14px;padding:8px 0;border-bottom:1px solid #f3f4f6">';
      html += '<div style="color:#6b7280;font-size:12.5px">' + _esc(r[0]) + '</div>';
      html += '<div style="font-size:13px;color:#111827">' + _esc(r[1] || '-') + '</div>';
      html += '</div>';
    });
    html += '</div>';
    return html;
  }

  var TAG = '[gbs_v6]';

  function _tryFetch(id, type) {
    // Try multiple methods - POST JSON, then POST form, then GET
    var url = '/api/method/ecentric_workspace.api.get_ticket_detail';
    var attempts = [
      {
        label: 'POST JSON',
        method: 'POST',
        headers: {'Content-Type': 'application/json', 'X-Requested-With': 'XMLHttpRequest'},
        body: JSON.stringify({name: id, type: type})
      },
      {
        label: 'POST form',
        method: 'POST',
        headers: {'Content-Type': 'application/x-www-form-urlencoded', 'X-Requested-With': 'XMLHttpRequest'},
        body: 'name=' + encodeURIComponent(id) + '&type=' + encodeURIComponent(type)
      },
      {
        label: 'GET',
        method: 'GET',
        headers: {'Accept': 'application/json', 'X-Requested-With': 'XMLHttpRequest'},
        url: url + '?name=' + encodeURIComponent(id) + '&type=' + encodeURIComponent(type)
      }
    ];
    var idx = 0;
    function next() {
      if (idx >= attempts.length) {
        return Promise.reject(new Error('All fetch attempts failed'));
      }
      var a = attempts[idx++];
      console.log(TAG, 'try', a.label);
      var opts = {method: a.method, credentials: 'include', headers: a.headers};
      if (a.body) opts.body = a.body;
      return fetch(a.url || url, opts)
        .then(function(r) {
          console.log(TAG, a.label, 'status', r.status);
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.text();
        })
        .then(function(t) {
          console.log(TAG, a.label, 'raw len', t.length, 'preview', t.substring(0, 200));
          var d;
          try { d = JSON.parse(t); } catch(e) { throw new Error('JSON parse fail: ' + e.message); }
          var msg = (d && d.message) || {};
          if (msg.success) return {data: msg, raw: t};
          // Not success - try next method
          console.log(TAG, a.label, 'no success, msg:', JSON.stringify(msg).substring(0, 200));
          return next();
        })
        .catch(function(e) {
          console.log(TAG, a.label, 'err', e.message);
          return next();
        });
    }
    return next();
  }

  function _fill(id, type) {
    var content = document.getElementById('content');
    if (!content) return false;
    var panels = content.querySelectorAll('.panel');
    if (panels.length === 0) return false;
    var detailPanel = panels[0];
    var body = detailPanel.querySelector('.panel-body');
    if (!body) return false;
    if (body.querySelector('[data-gbs-filled]')) return true;

    body.innerHTML = '<div data-gbs-filled="1" style="padding:6px 0;color:#6b7280">Loading GBS detail...</div>';

          var origS = submitBtn.innerHTML;
          submitBtn.disabled = true; submitBtn.innerHTML = 'Äang submit...';
          fetch('/api/method/submit_gbs_doc', {

          }).then(function(r){return r.json();}).then(function(d3) {

            if (m.success) {
              alert('ÄÃ£ submit trÃªn GBS!\nStatus: ' + (m.gbs_status || 'Submitted'));
              location.reload();
            } else {
              alert('Lá»i: ' + (m.error || 'unknown'));

          }).catch(function(e){alert('Lá»i: ' + e.message);}).finally(function(){

    });
    return true;
  }

  function _init() {
    var sp = new URLSearchParams(window.location.search);
    var id = sp.get('id'); var type = sp.get('type');
    console.log(TAG, 'init', type, id);
    if (type !== 'gbs_po' && type !== 'gbs_so') return;
    if (!id) return;
    var attempts = 0;
    function tryFill() {
      attempts++;
      if (_fill(id, type)) return;
      if (attempts < 80) setTimeout(tryFill, 200);
    }
    tryFill();
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', _init);
  else _init();
})();

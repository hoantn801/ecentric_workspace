<script id="ec-gbs-attach-button">
(function(){
  'use strict';
  if (window._gbsAttachButtonInstalled) return;
  window._gbsAttachButtonInstalled = true;

  function urlParam(k) {
    var m = location.search.match(new RegExp('[?&]' + k + '=([^&]*)'));
    return m ? decodeURIComponent(m[1]) : '';
  }
  var ticketType = urlParam('type');
  var ticketId   = urlParam('id');
  if (ticketType !== 'gbs_po' && ticketType !== 'gbs_so') return;
  if (!ticketId) return;
  var docType = (ticketType === 'gbs_po') ? 'GBS Purchase Order' : 'GBS Sales Order';
  console.log('[ec-gbs-attach-btn] active for', docType, ticketId);

  // ---- CSS ----
  if (!document.getElementById('ec-gbs-attach-css')) {
    var st = document.createElement('style');
    st.id = 'ec-gbs-attach-css';
    st.textContent = [
      '.ec-attach-wrap { margin-top:10px; padding-top:10px; border-top:1px dashed #e5e7eb; }',
      '.ec-attach-btn { display:inline-flex; align-items:center; gap:6px; background:#fff; color:#2C3DA6; border:1px dashed #2C3DA6; border-radius:6px; padding:8px 14px; font-weight:600; font-size:12.5px; cursor:pointer; }',
      '.ec-attach-btn:hover { background:#eef0fb; }',
      '.ec-attach-btn[disabled] { opacity:.55; cursor:not-allowed; }',
      '.ec-attach-hint { font-size:11px; color:#9ca3af; margin-top:6px; }',
      '.ec-attach-progress { margin-top:8px; font-size:12px; color:#4b5563; }',
      '.ec-attach-progress.ok { color:#166534; }',
      '.ec-attach-progress.err { color:#991b1b; }',
      '.ec-attach-progress .ec-file-row { padding:3px 0; }'
    ].join('\n');
    document.head.appendChild(st);
  }

  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  // ---- 1. Get pre-signed Graph upload URL for one file ----
  function getUploadUrl(filename) {
    return fetch('/api/method/gbs_attach_upload_session', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ doctype: docType, name: ticketId, filename: filename })
    }).then(function(r){ return r.json(); }).then(function(d){
      var msg = (d && d.message) || {};
      if (!msg.success) throw new Error(msg.error || 'upload_session_failed');
      return msg.upload_url;
    });
  }

  // ---- 2. PUT binary directly to Graph upload session URL ----
  // For files <= 60MB Graph accepts a single PUT with Content-Range covering full size.
  function putToGraph(uploadUrl, file) {
    return new Promise(function(resolve, reject){
      var xhr = new XMLHttpRequest();
      xhr.open('PUT', uploadUrl, true);
      xhr.setRequestHeader('Content-Range', 'bytes 0-' + (file.size - 1) + '/' + file.size);
      // Do NOT set Content-Type for binary; Graph infers
      xhr.onreadystatechange = function(){
        if (xhr.readyState !== 4) return;
        if (xhr.status >= 200 && xhr.status < 300) {
          try {
            var d = JSON.parse(xhr.responseText || '{}');
            resolve({
              name: file.name,
              webUrl: d.webUrl || '',
              sp_item_id: d.id || ''
            });
          } catch(e) { reject(new Error('Graph response parse: ' + e.message)); }
        } else {
          reject(new Error('Graph PUT ' + xhr.status + ': ' + (xhr.responseText || '').substring(0, 200)));
        }
      };
      xhr.onerror = function(){ reject(new Error('Graph PUT network error')); };
      xhr.send(file);
    });
  }

  // ---- 3. POST collected URLs to gbs_add_attachment ----
  function finalizeAttachments(items) {
    return fetch('/api/method/gbs_add_attachment', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ doctype: docType, name: ticketId, urls: items })
    }).then(function(r){
      return r.text().then(function(txt){
        var parsed;
        try { parsed = JSON.parse(txt); } catch(e) {
          return { success: false, error: 'http_' + r.status + ' non-JSON: ' + txt.substring(0, 200) };
        }
        if (parsed && parsed.message) {
          if (typeof parsed.message === 'string') {
            return { success: false, error: parsed.message, exc: parsed.exc };
          }
          return parsed.message;
        }
        return parsed || { success: false, error: 'empty response' };
      });
    }).then(function(v22b_result) {
      // v22b_marker: postattach_anon_2026-07-01 - auto anon convert after successful add
      try {
        if (v22b_result && (v22b_result.success === true || v22b_result.added > 0)) {
          fetch('/api/method/gbs_convert_attachments_to_anon', {
            method: 'POST',
            credentials: 'include',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ doc_name: ticketId, dt: docType, days: 365 })
          }).then(function(rr){ return rr.json(); })
          .then(function(dd){
            var mm = dd && dd.message;
            console.log('[ec-gbs-postattach-anon-v22b] converted', (mm && mm.converted) || 0, '/', (mm && mm.total) || 0);
          }).catch(function(err){ console.warn('[ec-gbs-postattach-anon-v22b] err:', err); });
        }
      } catch(e) {}
      return v22b_result;
    });
  }

  // ---- find the attachments panel ----
  function findAttachPanel() {
    var panels = document.querySelectorAll('.panel');
    for (var i = 0; i < panels.length; i++) {
      var t = (panels[i].querySelector('.panel-title') || {}).textContent || '';
      if (/T[aÃ ]i\s*li[eá»]u\s*[dÄ][Ã­i]nh\s*k[eÃ¨]m/i.test(t)) {
        return panels[i];
      }
    }
    return null;
  }

  function alreadyHasButton(panel) { return !!panel.querySelector('.ec-attach-wrap'); }

  function injectButton() {
    var panel = findAttachPanel();
    if (!panel) return false;
    if (alreadyHasButton(panel)) return true;
    var body = panel.querySelector('.panel-body') || panel;

    var wrap = document.createElement('div');
    wrap.className = 'ec-attach-wrap';
    wrap.innerHTML = [
      '<button type="button" class="ec-attach-btn" id="ec-attach-btn">',
      '  <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">',
      '    <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>',
      '  </svg>',
      '  ThÃªm file ÄÃ­nh kÃ¨m',
      '</button>',
      '<input type="file" id="ec-attach-input" multiple style="display:none" />',
      '<div class="ec-attach-hint">Tá»i Äa 20 file, má»i file â¤ 60MB. Upload trá»±c tiáº¿p lÃªn SharePoint + push GBS.</div>',
      '<div class="ec-attach-progress" id="ec-attach-progress"></div>'
    ].join('\n');
    body.appendChild(wrap);

    var btn   = document.getElementById('ec-attach-btn');
    var input = document.getElementById('ec-attach-input');
    var prog  = document.getElementById('ec-attach-progress');

    btn.addEventListener('click', function(){ input.click(); });
    input.addEventListener('change', function(){
      var files = input.files;
      if (!files || files.length === 0) return;
      if (files.length > 20) { prog.className = 'ec-attach-progress err'; prog.textContent = 'QuÃ¡ 20 file, chia nhá».'; return; }
      var oversize = [];
      for (var i = 0; i < files.length; i++) {
        if ((files[i].size || 0) > 60 * 1024 * 1024) oversize.push(files[i].name);
      }
      if (oversize.length) {
        prog.className = 'ec-attach-progress err';
        prog.textContent = 'VÆ°á»£t 60MB: ' + oversize.join(', ');
        input.value = '';
        return;
      }
      btn.disabled = true;
      prog.className = 'ec-attach-progress';
      prog.innerHTML = '<div class="ec-file-row">Báº¯t Äáº§u upload ' + files.length + ' file...</div>';

      // For each file: get session URL -> PUT to Graph -> collect result
      var jobs = Array.prototype.slice.call(files).map(function(f, idx){
        return getUploadUrl(f.name).then(function(uploadUrl){
          prog.innerHTML += '<div class="ec-file-row">â ' + escapeHtml(f.name) + ' (' + Math.round(f.size/1024) + ' KB)...</div>';
          return Promise.all([
            putToGraph(uploadUrl, f),
            new Promise(function(resolve, reject){
              var reader = new FileReader();
              reader.onload = function(e){
                var dataUrl = e.target.result || '';
                resolve((dataUrl.split(',')[1] || ''));
              };
              reader.onerror = function(){ reject(new Error('FileReader: ' + f.name)); };
              reader.readAsDataURL(f);
            })
          ]).then(function(arr){
            var spResult = arr[0];
            spResult.content_b64 = arr[1];
            return spResult;
          }); // EC-V4-BINARY-2026-06-09
        });
      });

      Promise.all(jobs).then(function(items){
        prog.innerHTML += '<div class="ec-file-row">Äang push sang GBS...</div>';
        return finalizeAttachments(items);
      }).then(function(msg){
        console.log('[ec-gbs-attach] response:', msg);
        if (msg.success) {
          prog.className = 'ec-attach-progress ok';
          var note = msg.note || ('ÄÃ£ thÃªm ' + (msg.added || 0) + ' file');
          var html = '<div class="ec-file-row">â ' + escapeHtml(note) + '</div>';
          if (msg.errors && msg.errors.length) {
            html += '<div class="ec-file-row" style="color:#92400e">â  ' + escapeHtml(msg.errors.join(' | ')) + '</div>';
          }
          prog.innerHTML = html;
          setTimeout(function(){ location.reload(); }, 1500);
        } else {
          prog.className = 'ec-attach-progress err';
          var errMsg = msg.error || msg.exc || 'unknown';
          if (typeof errMsg === 'object') errMsg = JSON.stringify(errMsg);
          var html = '<div class="ec-file-row">Lá»i: ' + escapeHtml(String(errMsg).substring(0, 400)) + '</div>';
          if (msg.trace && msg.trace.length) {
            html += '<div class="ec-file-row" style="font-size:10px;color:#6b7280">Trace: ' + escapeHtml(msg.trace.join(' -> ')) + '</div>';
          }
          if (msg.errors && msg.errors.length) {
            html += '<div class="ec-file-row" style="color:#92400e">' + escapeHtml(msg.errors.join(' | ')) + '</div>';
          }
          prog.innerHTML = html;
          btn.disabled = false;
        }
      }).catch(function(e){
        console.error('[ec-gbs-attach] err:', e);
        prog.className = 'ec-attach-progress err';
        prog.textContent = 'Lá»i: ' + e.message;
        btn.disabled = false;
      }).then(function(){ input.value = ''; });
    });

    console.log('[ec-gbs-attach-btn] button injected (fast path)');
    return true;
  }

  function init() {
    injectButton();
    var content = document.getElementById('content') || document.body;
    var obs = new MutationObserver(function(){ setTimeout(injectButton, 200); });
    obs.observe(content, { childList: true, subtree: true });
    setTimeout(injectButton, 500);
    setTimeout(injectButton, 1500);
    setTimeout(injectButton, 3000);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script><!-- /ec-gbs-attach-button -->



<script id="ec-unread-dots">
// Red dot indicator for unread changes on GBS PO/SO rows.
//   - On list pages (/all-ticket, /approval list view): batch-poll ec_get_unread every 60s,
//     add CSS dot to ID cell of unread rows.
//   - On detail pages (/approval?id=X&type=gbs_po|gbs_so): call ec_mark_seen on load.
// Scope: GBS PO + SO only (extendable).
(function(){
  'use strict';
  if (window._ecUnreadDotsInstalled) return;
  window._ecUnreadDotsInstalled = true;

  var DOCTYPE_MAP = { gbs_po: 'GBS Purchase Order', gbs_so: 'GBS Sales Order' };
  var POLL_MS = 60000;

  function urlParam(k) {
    var m = location.search.match(new RegExp('[?&]' + k + '=([^&]*)'));
    return m ? decodeURIComponent(m[1]) : '';
  }

  // CSS
  if (!document.getElementById('ec-unread-dots-css')) {
    var st = document.createElement('style');
    st.id = 'ec-unread-dots-css';
    st.textContent = [
      '/* Red dot indicator on ID cell of unread rows */',
      '.ec-id-dot-wrap { position:relative; display:inline-block; padding-right:14px; }',
      '.ec-id-dot { position:absolute; top:0px; right:0px; width:8px; height:8px; background:#dc2626; border-radius:50%; box-shadow:0 0 0 2px #fff; }',
      '.ec-id-dot.ec-id-dot-anim { animation: ec-dot-pulse 1.8s ease-in-out infinite; }',
      '@keyframes ec-dot-pulse { 0%,100% { box-shadow:0 0 0 2px #fff, 0 0 0 0 rgba(220,38,38,.45); } 50% { box-shadow:0 0 0 2px #fff, 0 0 0 4px rgba(220,38,38,0); } }',
      '/* Tooltip on hover */',
      '.ec-id-dot-wrap:hover .ec-id-dot::after { content: attr(data-msg); position:absolute; top:-26px; right:-4px; background:#1f2937; color:#fff; font-size:11px; padding:3px 8px; border-radius:4px; white-space:nowrap; pointer-events:none; }'
    ].join('\n');
    document.head.appendChild(st);
  }

  // ---- Page-context detection ----
  function getPageContext() {
    var p = (location.pathname || '').replace(/\/+$/, '');
    var hasId = !!urlParam('id');
    var hasType = !!urlParam('type');
    if ((p === '/approval') && hasId && hasType) {
      return { mode: 'detail', type: urlParam('type'), id: urlParam('id') };
    }
    if (p === '/all-tickets' || p === '/all-ticket' || p === '/approval') {
      // List context â figure out which tbody
      var ctx = { mode: 'list' };
      if (document.getElementById('detailBody')) {
        ctx.tbodySel = '#detailBody';
        ctx.rowSel = '#detailBody tr[data-id]';
        ctx.tabSel = '.tab';
        ctx.tabTypeAttr = 'data-type';
      } else if (document.getElementById('listBody')) {
        ctx.tbodySel = '#listBody';
        ctx.rowSel = '#listBody tr[data-id]';
        ctx.tabSel = '.list-tab';
        ctx.tabTypeAttr = 'data-tab';
      } else {
        return null;
      }
      return ctx;
    }
    return null;
  }

  function currentTabType(ctx) {
    var active = document.querySelector(ctx.tabSel + '.active');
    if (!active) return 'all';
    return active.getAttribute(ctx.tabTypeAttr) || 'all';
  }

  // ---- List mode: poll unread + render dots ----
  function collectGbsRefs(ctx) {
    var refs = [];
    var rows = document.querySelectorAll(ctx.rowSel);
    rows.forEach(function(tr){
      var id = tr.getAttribute('data-id') || '';
      var type = tr.getAttribute('data-type') || '';
      // Tab filter: if currently on a GBS tab, only that. Else infer from row data.
      var tabT = currentTabType(ctx);
      var refType = type || tabT;
      if (refType !== 'gbs_po' && refType !== 'gbs_so') return;
      if (!id) return;
      var dt = DOCTYPE_MAP[refType];
      if (!dt) return;
      refs.push({ doctype: dt, name: id, _row: tr, _type: refType });
    });
    return refs;
  }

  function findIdCell(tr) {
    // Heuristic: ID cell is the first cell that contains tr's data-id text (or it's the first <td>)
    var dataId = tr.getAttribute('data-id') || '';
    var cells = tr.querySelectorAll('td');
    for (var i = 0; i < cells.length; i++) {
      var txt = (cells[i].textContent || '').trim();
      // Strip zero-width sentinels added by other modules
      txt = txt.replace(/[ââ]/g, '');
      if (dataId && txt.indexOf(dataId) >= 0) return cells[i];
    }
    return cells[0] || null;
  }

  function applyDot(tr, msg) {
    var cell = findIdCell(tr);
    if (!cell) return;
    // Wrap inline content in span if not yet wrapped
    var wrap = cell.querySelector('.ec-id-dot-wrap');
    if (!wrap) {
      wrap = document.createElement('span');
      wrap.className = 'ec-id-dot-wrap';
      // Move all of cell's children into wrap
      while (cell.firstChild) wrap.appendChild(cell.firstChild);
      cell.appendChild(wrap);
    }
    var dot = wrap.querySelector('.ec-id-dot');
    if (!dot) {
      dot = document.createElement('span');
      dot.className = 'ec-id-dot ec-id-dot-anim';
      wrap.appendChild(dot);
    }
    dot.setAttribute('data-msg', msg || 'CÃ³ cáº­p nháº­t má»i');
  }

  function removeDot(tr) {
    var cell = findIdCell(tr);
    if (!cell) return;
    var dot = cell.querySelector('.ec-id-dot');
    if (dot) dot.remove();
  }

  var _pollTimer = null;
  function pollUnread(ctx) {
    var refs = collectGbsRefs(ctx);
    if (!refs.length) return;
    var payload = refs.map(function(r){ return { doctype: r.doctype, name: r.name }; });
    fetch('/api/method/ec_get_unread', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ refs: payload })
    }).then(function(r){ return r.json(); }).then(function(d){
      var msg = (d && d.message) || {};
      if (!msg.success) {
        console.warn('[ec-unread-dots] response not success', msg);
        return;
      }
      var unreadMap = msg.unread || {};
      refs.forEach(function(r){
        var u = unreadMap[r.name];
        if (u && u.is_unread) {
          var parts = [];
          if (u.comments) parts.push(u.comments + ' comment(s)');
          if (u.attachments) parts.push(u.attachments + ' file(s)');
          applyDot(r._row, parts.length ? 'Cáº­p nháº­t má»i â ' + parts.join(', ') : 'CÃ³ cáº­p nháº­t má»i');
        } else {
          removeDot(r._row);
        }
      });
    }).catch(function(e){
      console.warn('[ec-unread-dots] fetch err', e);
    });
  }

  function startListMode(ctx) {
    // Initial poll
    pollUnread(ctx);
    // Periodic poll
    if (_pollTimer) clearInterval(_pollTimer);
    _pollTimer = setInterval(function(){ pollUnread(ctx); }, POLL_MS);
    // Watch for row changes (tab switch, search, filter)
    var tbody = document.querySelector(ctx.tbodySel);
    if (tbody) {
      var mo = new MutationObserver(function(muts){
        var hasNewRows = false;
        for (var i = 0; i < muts.length; i++) {
          if (muts[i].addedNodes && muts[i].addedNodes.length > 0) { hasNewRows = true; break; }
        }
        if (hasNewRows) {
          setTimeout(function(){ pollUnread(ctx); }, 300);
        }
      });
      mo.observe(tbody, { childList: true });
    }
    // Watch Sync GBS button: piggyback gbs_force_poll_all so comment counts refresh too
    document.addEventListener('click', function(e){
      var t = e.target;
      if (!t || !t.closest) return;
      var syncBtn = t.closest('.gbs-sync-btn');
      if (!syncBtn) return;
      console.log('[ec-unread-dots] Sync GBS clicked - chaining gbs_force_poll_all');
      fetch('/api/method/gbs_force_poll_all', {
        method: 'POST', credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: '{}'
      }).then(function(r){ return r.json(); }).then(function(d){
        var m = (d && d.message) || {};
        if (m.success) {
          console.log('[ec-unread-dots] force_poll done:', m.stats);
          // Re-poll unread immediately to refresh dots
          setTimeout(function(){ pollUnread(ctx); }, 500);
        } else {
          console.warn('[ec-unread-dots] force_poll failed', m);
        }
      }).catch(function(err){
        console.warn('[ec-unread-dots] force_poll err', err);
      });
    }, true);
    // Watch tab clicks
    document.addEventListener('click', function(e){
      var t = e.target;
      if (t && t.closest && t.closest(ctx.tabSel)) {
        setTimeout(function(){ pollUnread(ctx); }, 400);
      }
    });
    console.log('[ec-unread-dots] list mode active');
  }

  // ---- Detail mode: mark seen on load ----
  function markSeen(ctx) {
    var docType = DOCTYPE_MAP[ctx.type];
    if (!docType) return;

      // Wait for tbody to populate
      function waitTbody(tries) {
        var rows = document.querySelectorAll(ctx.rowSel);
        if (rows.length > 0) { startListMode(ctx); return; }
        if (tries > 30) { startListMode(ctx); return; }

      }

  } else {

<script id="ec-gbs-detail-extra">
(function(){
  'use strict';
  if (window._gbsDetailExtraInstalled) return;
  window._gbsDetailExtraInstalled = true;

  function urlParam(k) {
    var m = location.search.match(new RegExp('[?&]' + k + '=([^&]*)'));
    return m ? decodeURIComponent(m[1]) : '';
  }
  var ticketType = urlParam('type');
  var ticketId   = urlParam('id');
  if (ticketType !== 'gbs_po' && ticketType !== 'gbs_so') return;
  if (!ticketId) return;
  var docType = (ticketType === 'gbs_po') ? 'GBS Purchase Order' : 'GBS Sales Order';
  console.log('[ec-gbs-detail-extra] active for', docType, ticketId);

  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  function buildRow(label, value) {
    var v = (value == null || value === '') ? '-' : value;
    return '<div class="ec-extra-row" style="display:grid;grid-template-columns:180px 1fr;gap:14px;padding:8px 0;border-bottom:1px solid #f3f4f6">' +
      '<div style="color:#6b7280;font-size:12.5px">' + escapeHtml(label) + '</div>' +
      '<div style="font-size:13px;color:#111827">' + escapeHtml(v) + '</div>' +
      '</div>';
  }

  function loadDoc() {
    return fetch('/api/resource/' + encodeURIComponent(docType) + '/' + encodeURIComponent(ticketId), {
      method: 'GET', credentials: 'include'
    }).then(function(r){ return r.json(); }).then(function(d){
      return (d && d.data) || null;
    }).catch(function(){ return null; });
  }

  // Find the "ThÃ´ng tin chung" section in the detail card and append rows after the last existing row.
  function findGeneralSection() {
    // The renderer creates a section header div with text content === "Thong tin chung" (no diacritics in snapshot).
    // We look for any div whose text starts with "Thong tin" or "ThÃ´ng tin chung".
    var hits = document.querySelectorAll('div');
    for (var i = 0; i < hits.length; i++) {
      var t = (hits[i].textContent || '').trim();
      // Match header text only (length cap so we don't grab the whole panel)
      if (t.length < 60 && /^th[oÃ´]ng\s*tin\s*chung/i.test(t)) {
        return hits[i];
      }
    }
    return null;
  }

  function findContainerAfterHeader(header) {
    // The renderer wraps section rows in a div directly after the header.
    // Walk siblings until we find one that contains rows like grid-template-columns:180px.
    var sib = header.nextElementSibling;
    var tries = 0;
    while (sib && tries < 10) {
      if (sib.querySelector && sib.querySelector('div[style*="grid-template-columns:180px"]')) {
        return sib;
      }
      sib = sib.nextElementSibling;
      tries++;
    }
    // Fallback: the parent of the header probably contains both header + rows
    var parent = header.parentNode;
    if (parent && parent.querySelector && parent.querySelector('div[style*="grid-template-columns:180px"]')) {
      return parent;
    }
    return null;
  }

  function alreadyInjected(container) {
    return !!container.querySelector('.ec-extra-row');
  }

  function injectRows(doc) {
    var header = findGeneralSection();
    if (!header) { console.log('[ec-gbs-detail-extra] header not found yet'); return false; }
    var container = findContainerAfterHeader(header);
    if (!container) { console.log('[ec-gbs-detail-extra] section container not found'); return false; }
    if (alreadyInjected(container)) return true;

    // Find the LAST row in the section to insert after (so order stays clean)
    var rows = container.querySelectorAll('div[style*="grid-template-columns:180px"]');
    if (!rows.length) { console.log('[ec-gbs-detail-extra] no existing rows in section'); return false; }
    var lastRow = rows[rows.length - 1];

    var html = '';
    // For PO: add Default Warehouse + Project (Customer panel already has DW for SO)
    if (ticketType === 'gbs_po') {
      html += buildRow('Default Warehouse', doc.set_warehouse);
    }
    html += buildRow('Project', doc.project);
    // Service period dates (2026-05-21): SO always has them; PO only when linked from SO
    var ssd = doc.service_start_date ? String(doc.service_start_date).substring(0, 10) : '';
    var sed = doc.service_end_date   ? String(doc.service_end_date).substring(0, 10)   : '';
    if (ssd || sed || ticketType === 'gbs_so') {
      html += buildRow('NgÃ y báº¯t Äáº§u DV', ssd);
      html += buildRow('NgÃ y káº¿t thÃºc DV', sed);
    }
    // Taxes template (2026-05-26): show on PO + SO if set
    if (doc.taxes_template) {
      html += buildRow('Sales Taxes Template', doc.taxes_template);
    }

    var wrap = document.createElement('div');
    wrap.innerHTML = html;
    // Insert each child after lastRow (in order)
    Array.prototype.slice.call(wrap.children).forEach(function(node){
      lastRow.parentNode.insertBefore(node, lastRow.nextSibling);
      lastRow = node;
    });
    console.log('[ec-gbs-detail-extra] injected DW=' + doc.set_warehouse + ', project=' + doc.project + ', svc_start=' + ssd + ', svc_end=' + sed);
    return true;
  }

  var _docCache = null;
  function tryInject() {
    if (!_docCache) {
      loadDoc().then(function(doc){
        if (!doc) return;
        _docCache = doc;
        injectRows(doc);
      });
      return;
    }
    injectRows(_docCache);
  }

  // Initial pass + observer (detail re-renders on Refresh / Check Status / etc.)
  function init() {
    tryInject();
    // Re-inject on DOM mutations to handle re-renders
    var content = document.getElementById('content') || document.body;
    var obs = new MutationObserver(function(muts){
      // Throttle: only react when significant child changes happen
      for (var i = 0; i < muts.length; i++) {
        if (muts[i].addedNodes && muts[i].addedNodes.length > 0) {
          // Defer slightly so renderer finishes
          setTimeout(tryInject, 200);
          return;
        }
      }
    });
    obs.observe(content, { childList: true, subtree: true });
    // Retry a few times if first pass missed
    setTimeout(tryInject, 500);
    setTimeout(tryInject, 1500);
    setTimeout(tryInject, 3000);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script><!-- /ec-gbs-detail-extra -->

          '<div class="scp-sub">Tá»« <b>' + escapeHtml(ticketId) + '</b> Â· ' + items.length + ' items Â· Tick item nÃ o Äá» chuyá»n sang PO má»i</div>' +

        '<div class="scp-card-body">' +
          '<table>' +
            '<thead><tr><th width="32"></th><th>Item Code</th><th>Name</th><th style="text-align:right">Qty</th><th>UOM</th><th style="text-align:right">Rate</th><th style="text-align:right">Amount</th></tr></thead>' +

          '</table>' +
        '</div>' +
        '<div class="scp-card-f">' +
          '<div class="scp-running" id="scp-running">ChÆ°a chá»n item nÃ o</div>' +
          '<div class="scp-actions">' +
            '<button class="btn-cancel" id="scp-cancel">Huá»·</button>' +
            '<button class="btn-confirm" id="scp-confirm" disabled>Táº¡o PO â</button>' +
          '</div>' +
        '</div>' +
      '</div>';
    document.body.appendChild(modal);

    function recalcRunning() {
      var checks = modal.querySelectorAll('.scp-item-check:checked');
      var total = 0;
      checks.forEach(function(ch){
        var idx = parseInt(ch.dataset.idx, 10);
        var it = items[idx];
        if (it) total += (Number(it.amount) || 0);
      });
      var run = document.getElementById('scp-running');
      var btn = document.getElementById('scp-confirm');
      if (checks.length === 0) {
        run.textContent = 'ChÆ°a chá»n item nÃ o';
        btn.disabled = true;
      } else {
        run.innerHTML = 'ÄÃ£ chá»n <b>' + checks.length + '</b> items Â· Total: <b>' + total.toLocaleString('vi-VN') + ' VND</b>';
        btn.disabled = false;
      }
    }
    modal.querySelectorAll('.scp-item-check').forEach(function(ch){
      ch.addEventListener('change', recalcRunning);
    });

    document.getElementById('scp-cancel').addEventListener('click', function(){
      modal.remove();
    });
    modal.addEventListener('click', function(e){
      if (e.target === modal) modal.remove();
    });
    document.getElementById('scp-confirm').addEventListener('click', function(){
      var checks = modal.querySelectorAll('.scp-item-check:checked');
      if (checks.length === 0) return;
      var selectedItems = [];
      var selectedCodes = [];
      checks.forEach(function(ch){
        var idx = parseInt(ch.dataset.idx, 10);
        var it = items[idx];
        if (it) {
          selectedItems.push(it);
          selectedCodes.push(it.item_code);
        }
      });
      // Save to sessionStorage so PO form can read on next page
      try {
        sessionStorage.setItem('gbs_po_from_so', JSON.stringify({
          parent_so: ticketId,
          so:        soData.so,
          items:     selectedItems,
          item_codes: selectedCodes,
          ts:        Date.now()
        }));

        console.error('[ec-gbs-so-child-po] sessionStorage err', e);
        alert('Lá»i: khÃ´ng lÆ°u ÄÆ°á»£c session â ' + e.message);
        return;
      }
      // Redirect to PO form with from_so URL param
      location.href = '/gbs-po-form?from_so=' + encodeURIComponent(ticketId);
    });
  }

  // ---- Init ----
  function init() {
    fetchSoData().then(function(){
      buildPanel();
      // GD9 (2026-05-28): auto-poll boxme status on mount if SO is local-approved
      // + synced (hasGbsDoc) but boxme not yet Approved. Saves user from manually
      // waiting up to 10 min for scheduler. Rate-limited 3s in case of remounts.
      var so = (soData && soData.so) || {};
      if (so.status === 'Approved' && so.gbs_doc_name && so.gbs_status !== 'Approved') {
        setTimeout(function(){ refreshBoxmeStatus(false); }, 600);
      }
      // Observe content re-renders (approval-page does innerHTML=html)
      var content = document.getElementById('content');
      if (content) {
        var obs = new MutationObserver(function(){
          // If our panel was wiped, re-insert
          if (!document.getElementById('ec-so-child-po-panel')) {
            setTimeout(buildPanel, 100);
          }
        });
        obs.observe(content, { childList: true, subtree: false });
      }
    }).catch(function(e){
      console.error('[ec-gbs-so-child-po] fetch err', e);
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();

      '#ec-sendback-modal-bg { position:fixed; inset:0; background:rgba(0,0,0,0.5); display:flex; align-items:center; justify-content:center; z-index:9999; }',
      '#ec-sendback-modal { background:#fff; border-radius:10px; padding:20px; min-width:420px; max-width:560px; box-shadow:0 10px 30px rgba(0,0,0,0.2); }',

      '#ec-sendback-modal .ec-mbtn { padding:8px 16px; border-radius:6px; font-weight:600; font-size:13px; cursor:pointer; border:none; }',

      '#ec-sendback-modal .ec-mbtn-confirm:hover { background:#d97706; }',
      '#ec-sendback-modal .ec-mbtn-confirm[disabled] { background:#9ca3af; cursor:not-allowed; }'
    ].join('\n');
    document.head.appendChild(st);
  }

  // ---- Helpers ----
  function escapeHtml(s){
    return String(s == null ? '' : s)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }
  function getSessionEmail(){
    if (window.frappe && window.frappe.session && window.frappe.session.user_email) return window.frappe.session.user_email;
    if (window.frappe && window.frappe.session && window.frappe.session.user) {
      var u = window.frappe.session.user;
      if (typeof u === 'string' && u.indexOf('@') > 0) return u;
    }
    return null;
  }
  function fetchDoc(){
    var encName = encodeURIComponent(DOCTYPE) + '/' + encodeURIComponent(ticketId);
    return fetch('/api/resource/' + encName, {
      method: 'GET', credentials: 'include',
      headers: { 'Accept': 'application/json' }
    }).then(function(r){ return r.json(); }).then(function(d){
      docData = (d && d.data) || null;
      return docData;
    }).catch(function(e){
      console.warn('[ec-gbs-send-back] fetchDoc err', e);
      return null;

  function currentApproverEmail(){
    if (!docData || !docData.approval_chain) return null;
    var chain = docData.approval_chain;
    try {
      if (typeof chain === 'string') chain = JSON.parse(chain);
    } catch(e){ return null; }
    if (!Array.isArray(chain)) return null;
    var lvl = Number(docData.current_level || 1);
    for (var i = 0; i < chain.length; i++) {
      if (Number(chain[i].level || (i+1)) === lvl) return (chain[i].approver || '').toLowerCase();

    return null;

  // ---- Send Back modal ----
  function openSendBackModal(){
    if (document.getElementById('ec-sendback-modal-bg')) return;
    var bg = document.createElement('div');
    bg.id = 'ec-sendback-modal-bg';
    bg.innerHTML = '' +
      '<div id="ec-sendback-modal">' +
        '<h3>Send back</h3>' +
        '<textarea id="ec-sendback-reason" placeholder="LÃ½ do send back (tá»i thiá»u 10 kÃ½ tá»±, mÃ´ táº£ rÃµ chá» cáº§n sá»­a)..."></textarea>' +
        '<div class="ec-mhint" id="ec-sendback-counter">0 / 10 kÃ½ tá»± tá»i thiá»u</div>' +
        '<div class="ec-mactions">' +
          '<button class="ec-mbtn ec-mbtn-cancel" id="ec-sendback-cancel">Huá»·</button>' +
          '<button class="ec-mbtn ec-mbtn-confirm" id="ec-sendback-confirm" disabled>Send back</button>' +
        '</div>' +
      '</div>';
    document.body.appendChild(bg);

    var ta = document.getElementById('ec-sendback-reason');
    var counter = document.getElementById('ec-sendback-counter');
    var btnConfirm = document.getElementById('ec-sendback-confirm');
    ta.focus();
    ta.addEventListener('input', function(){
      var l = ta.value.trim().length;
      counter.textContent = l + ' / 10 kÃ½ tá»± tá»i thiá»u' + (l < 10 ? ' (chÆ°a Äá»§)' : ' â');
      btnConfirm.disabled = (l < 10);
    });
    document.getElementById('ec-sendback-cancel').addEventListener('click', function(){ bg.remove(); });
    bg.addEventListener('click', function(e){ if (e.target === bg) bg.remove(); });
    btnConfirm.addEventListener('click', function(){
      var reason = ta.value.trim();
      if (reason.length < 10) return;
      btnConfirm.disabled = true;
      btnConfirm.textContent = 'Äang gá»­i...';
      var callerEmail = getSessionEmail();
      var body = new URLSearchParams();
      body.append('doctype', ticketType);
      body.append('name', ticketId);
      body.append('decision', 'send_back');
      body.append('caller_email', callerEmail || '');
      body.append('comment', reason);
      fetch('/api/method/ecentric_workspace.api.approval_decision', {
        method: 'POST', credentials: 'include',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: body.toString()
      }).then(function(r){ return r.json(); }).then(function(d){
        var msg = (d && d.message) || d || {};
        if (msg.success) {
          bg.remove();
          alert('ÄÃ£ gá»­i láº¡i doc cho submitter. Tráº¡ng thÃ¡i: ' + msg.status);
          location.reload();
        } else {
          alert('Lá»i: ' + (msg.error || 'unknown'));
          btnConfirm.disabled = false;
          btnConfirm.textContent = 'Send back';
        }
      }).catch(function(e){
        alert('Lá»i máº¡ng: ' + e.message);
        btnConfirm.disabled = false;
        btnConfirm.textContent = 'Send back';
      });

  // ---- Inject Send Back button next to Reject ----
  function injectSendBackButton(){
    var btnReject = document.getElementById('btnReject');
    if (!btnReject) return false;
    if (document.getElementById('btnSendBack')) return true;
    // Show button alongside Approve/Reject (same visibility convention).
    // Backend approval_decision_override validates caller_email == current

    var btn = document.createElement('button');

  // ---- Render Cáº§n sá»­a banner (replaces wrong "ÄÃ£ tá»« chá»i" panel) ----
  function injectCanSuaBanner(){
    if (!docData) return false;
    var status = (docData.status || '').trim();
    if (status !== 'Cáº§n sá»­a') return true;

    // v2 2026-05-31: avoid double-inject (idempotent across primary AND fallback)
    // Marker: csb_fallback_2026-05-31
    if (document.getElementById('ec-can-sua-banner')) return true;

    // PRIMARY anchor: decided-panel.rejected (replace-mode, original behavior)
    var rejectedPanels = document.querySelectorAll('.decided-panel.rejected');
    var targetPanel = null;
    for (var i = 0; i < rejectedPanels.length; i++) {
      if (!rejectedPanels[i].dataset.ecCanSuaApplied) {
        targetPanel = rejectedPanels[i];
        break;
      }
    }

    // Build banner HTML (shared between primary and fallback paths)
    var reason = docData.revision_reason || '(khÃ´ng cÃ³ lÃ½ do â Finance cÃ³ thá» chÆ°a nháº­p)';
    var revCount = docData.revision_count || 0;
    var submitter = (docData.submitted_by || '').toLowerCase();
    var currentUser = (getSessionEmail() || '').toLowerCase();
    var isSubmitter = (currentUser === submitter);

    var sentBy = 'â', sentAt = 'â';
    try {
      var h = docData.approval_history;
      if (typeof h === 'string') h = JSON.parse(h);
      if (Array.isArray(h)) {
        for (var j = h.length - 1; j >= 0; j--) {
          if (h[j] && h[j].event === 'send_back') {
            sentBy = h[j].by || 'â';
            sentAt = h[j].at || 'â';
            break;
          }
        }
      }
    } catch(e){}

    var html = '<div id="ec-can-sua-banner">' +
      '<div class="csb-title">â ï¸ Cáº§n sá»­a</div>' +
      '<div class="csb-reason">' + escapeHtml(reason) + '</div>' +
      '<div class="csb-meta">YÃªu cáº§u bá»i <b>' + escapeHtml(sentBy) + '</b> Â· ' + escapeHtml(sentAt) + ' Â· Láº§n thá»© ' + revCount + '</div>';
    if (isSubmitter) {
      html += '<button class="csb-btn" id="ec-csb-resubmit-btn">Sá»­a & Submit láº¡i</button>';
    } else {
      html += '<div style="font-size:11.5px; color:#92400e;">(Chá» submitter <b>' + escapeHtml(submitter) + '</b> má»i sá»­a ÄÆ°á»£c)</div>';
    }
    html += '</div>';

    if (targetPanel) {
      // PRIMARY path: replace the wrong decision card
      targetPanel.dataset.ecCanSuaApplied = '1';
      var parentPanel = targetPanel.closest('.panel') || targetPanel.parentNode;
      if (parentPanel) {
        parentPanel.outerHTML = html;
      } else {
        targetPanel.outerHTML = html;
      }
      console.log('[ec-gbs-send-back] Cáº§n sá»­a banner injected via primary path (isSubmitter=' + isSubmitter + ')');
    } else {
      // FALLBACK path csb_fallback_2026-05-31: inject at top of #content.
      // Fires when user navigated back from form edit and decided-panel.rejected
      // is no longer rendered. Without this, user has no button to re-enter edit form.
      var fallbackAnchor = document.querySelector('#content') ||
                           document.querySelector('main') ||
                           document.body;
      if (!fallbackAnchor) return false;
      var wrap = document.createElement('div');
      wrap.innerHTML = html;
      var banner = wrap.firstChild;
      if (banner) {
        if (fallbackAnchor.firstChild) {
          fallbackAnchor.insertBefore(banner, fallbackAnchor.firstChild);
        } else {
          fallbackAnchor.appendChild(banner);
        }
      }
      console.log('[ec-gbs-send-back] Cáº§n sá»­a banner injected via FALLBACK path csb_fallback_2026-05-31 (isSubmitter=' + isSubmitter + ')');
    }

    if (isSubmitter) {
      var btn = document.getElementById('ec-csb-resubmit-btn');
      if (btn) {
        btn.addEventListener('click', function(){
          window.location.href = FORM_ROUTE + '?edit=' + encodeURIComponent(ticketId);
        });
      }
    }
    return true;
  }


  // ---- Init + observe ----
  function tick(){
    injectSendBackButton();
    injectCanSuaBanner();
  }
  function init(){
    fetchDoc().then(function(){
      tick();
      // Observe re-renders of approval panel
      var content = document.getElementById('content');
      if (content) {
        var obs = new MutationObserver(function(){ setTimeout(tick, 50); });
        obs.observe(content, { childList: true, subtree: true });
      }
      // Re-fetch + tick after delays to catch late renders
      setTimeout(tick, 300);
      setTimeout(tick, 1200);
      setTimeout(tick, 3000);
    });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();

  function setStatus(msg, isErr) {
    var s = document.getElementById('tl-status');

    s.textContent = msg || '';
    s.className = 'tl-status ' + (msg ? (isErr ? 'tl-err' : 'tl-ok') : '');

  }

  function fmtTime(s) {
    if (!s) return '';
    try {
      var d = new Date(String(s).replace(' ', 'T'));
      var now = new Date();
      var diffMs = now - d;
      var diffMin = Math.floor(diffMs / 60000);
      if (diffMin < 1) return 'vá»«a xong';
      if (diffMin < 60) return diffMin + ' phÃºt trÆ°á»c';
      var diffHr = Math.floor(diffMin / 60);
      if (diffHr < 24) return diffHr + ' giá» trÆ°á»c';
      var diffDay = Math.floor(diffHr / 24);
      if (diffDay < 7) return diffDay + ' ngÃ y trÆ°á»c';
      return d.toLocaleString('vi-VN');
    } catch(e) { return s; }
  }

  function avatarOf(email) {
    if (!email) return '?';
    var n = String(email).split('@')[0];
    return (n.charAt(0) || '?').toUpperCase();

  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }
  function parseOrigin(content) {
    var m = String(content || '').match(/^\[ecentric:\s*([^\]]+)\]\s*\n?([\s\S]*)$/);
    if (m) return { origin: 'ecentric', user: m[1].trim(), body: m[2] };
    return { origin: 'gbs', user: null, body: content || '' };
  }

  // ---- Event building from doc ----
  function eventsFromDoc(doc) {
    var events = [];
    // 1. Created
    if (doc.creation) {
      events.push({
        type: 'create',
        at: doc.creation,
        actor: doc.submitted_by || doc.owner || 'system',
        text: T.eventCreate + ' ' + (doc.po_title || doc.name)
      });
    }
    // 2. approval_history entries
    try {
      var ah = JSON.parse(doc.approval_history || '[]');
      if (Array.isArray(ah)) {
        ah.forEach(function(h){
          if (!h || typeof h !== 'object') return;
          var evType = 'approve';
          var evText = T.eventApprove;
          var ev = (h.event || h.action || '').toLowerCase();
          // v3_attach_branch_2026-06-03: catch 'added_attachment'/'attach' events so they
          // don't fall through to default 'approve' label. Plus prior v2 fix:
          // check 'resubmit' substring BEFORE 'reject' (event 'resubmit_after_gbs_reject'
          // contains both - reject was matching first).
          if (ev.indexOf('send_back') >= 0 || ev.indexOf('sendback') >= 0)
                                              { evType = 'reject';   evText = T.eventSendBack + (h.level ? ' (L' + h.level + ')' : ''); }
          else if (ev.indexOf('resubmit') >= 0){ evType = 'resubmit'; evText = T.eventResubmit + (h.revision_count ? ' (láº§n ' + h.revision_count + ')' : ''); }
          else if (ev.indexOf('reject') >= 0)      { evType = 'reject';   evText = T.eventReject; }
          else if (ev.indexOf('attach') >= 0 || ev.indexOf('added_') >= 0)
                                              { evType = 'attach';   evText = T.eventAttach + (h.count ? ' (' + h.count + ' file)' : ''); }
          else if (ev.indexOf('approve') >= 0) { evType = 'approve';  evText = T.eventApprove + (h.level ? ' (L' + h.level + ')' : ''); }
          else if (ev.indexOf('create') >= 0)  { evType = 'create';   evText = T.eventCreate; }
          else if (h.decision === 'approved')  { evType = 'approve';  evText = T.eventApprove + (h.level ? ' (L' + h.level + ')' : ''); }
          else if (h.decision === 'rejected')  { evType = 'reject';   evText = T.eventReject; }
          else if (h.decision === 'send_back') { evType = 'reject';   evText = T.eventSendBack + (h.level ? ' (L' + h.level + ')' : ''); }
          events.push({
            type: evType,
            at: h.at || h.timestamp || doc.creation,
            actor: h.by || h.approver || h.actor || 'unknown',
            text: evText,
            content: h.reason || h.comment || ''
          });
        });
      }
    } catch(e) { /* ignore */ }
    // 3. Sync to GBS (gbs_last_sync + gbs_doc_name)
    if (doc.gbs_doc_name && doc.gbs_last_sync) {
      events.push({
        type: 'sync',
        at: doc.gbs_last_sync,
        actor: 'system',
        text: T.eventSync + ' as ' + doc.gbs_doc_name + (doc.gbs_status ? ' (' + doc.gbs_status + ')' : '')
      });
    }
    if (doc.sync_error) {
      events.push({
        type: 'reject',
        at: doc.gbs_last_sync || doc.modified,
        actor: 'system',
        text: T.eventSyncErr,
        content: doc.sync_error
      });
    }
    // 4. Attachment sync
    if (doc.attachments_synced && doc.attachments_last_sync) {
      events.push({
        type: 'attach',
        at: doc.attachments_last_sync,
        actor: 'system',
        text: T.eventAttach + ' (' + (doc.attachments_sync_count || 0) + ' file)'
      });
    }
    return events;
  }

  function eventsFromComments(comments) {
    var events = [];
    (comments || []).forEach(function(c){
      var ctype = c.comment_type || 'Comment';
      var actor = c.comment_email || c.comment_by || 'unknown';
      if (ctype === 'Comment') {
        // User comment - parse [ecentric:] prefix + render as bubble
        var parsed = parseOrigin(c.content || '');
        actor = parsed.user || actor;
        events.push({
          type: parsed.origin === 'ecentric' ? 'comment_ec' : 'comment_gbs',
          at: c.creation,
          actor: actor,
          text: parsed.origin === 'ecentric' ? T.eventCommentEC : T.eventCommentGBS,
          content: parsed.body,
          contentOrigin: parsed.origin,
          is_html: true
        });
      } else if (ctype === 'Workflow' || ctype === 'Label') { /* v27_marker_label_render_2026-07-06 */
        // Workflow state change from boxme - text only, no bubble.
        // Content is the state name e.g. "Báº£n nhÃ¡p", "Tá»« chá»i"
        events.push({
          type: 'workflow',
          at: c.creation,
          actor: actor,
          text: (c.content || '').trim() || 'workflow event'
        });
      } else {
        // Other types (Edit, Attachment, Created, etc.) - treat as informational
        events.push({
          type: 'workflow',
          at: c.creation,
          actor: actor,
          text: ctype + ': ' + ((c.content || '').trim() || '')
        });
      }
    });
    return events;
  }

  function renderFeed(events, gbsDocName, warning) {
    var sub = document.getElementById('tl-sub');
    if (sub) {
      if (gbsDocName) sub.textContent = T.docPrefix + gbsDocName + ' - ' + events.length + ' event(s)';
      else sub.textContent = T.notSynced;
    }
    var feed = document.getElementById('tl-feed');
    if (!feed) return;

    // Remove old warning
    var oldWarn = document.querySelector('#ec-gbs-timeline-panel .tl-warn');
    if (oldWarn) oldWarn.remove();
    if (warning) {
      var w = document.createElement('div');
      w.className = 'tl-warn';
      w.textContent = warning;
      var body = document.querySelector('#ec-gbs-timeline-panel .tl-body');
      if (body) body.parentNode.insertBefore(w, body);
    }

    if (!events || events.length === 0) {
      feed.innerHTML = '<div class="tl-empty">' + T.empty + '</div>';
      return;
    }
    // Sort: newest first
    events.sort(function(a, b){
      var ta = new Date(String(a.at).replace(' ', 'T')).getTime();
      var tb = new Date(String(b.at).replace(' ', 'T')).getTime();
      return tb - ta;
    });

    feed.innerHTML = events.map(function(ev){
      var content = '';
      if (ev.content) {
        var cls = 'tl-content';
        if (ev.contentOrigin === 'ecentric') cls += ' tl-content-ecentric';
        else if (ev.contentOrigin === 'gbs') cls += ' tl-content-gbs';
        content = '<div class="' + cls + '">' + (ev.is_html ? ev.content : escapeHtml(ev.content)) + '</div>';
      }
      // Row-level highlight: workflow events get yellow, sync events get blue
      var rowCls = 'tl-row';
      if (ev.type === 'workflow') rowCls += ' tl-row-workflow';
      else if (ev.type === 'sync') rowCls += ' tl-row-sync';
      return [
        '<div class="tl-item">',
        '  <div class="tl-icon ' + iconClass(ev.type) + '">' + iconChar(ev.type) + '</div>',
        '  <div class="' + rowCls + '">',
        '    <span class="tl-actor">' + escapeHtml(ev.actor) + '</span>',
        '    <span class="tl-text">' + escapeHtml(ev.text) + '</span>',
        '    <span class="tl-time">' + escapeHtml(fmtTime(ev.at)) + '</span>',
        '  </div>',
        content,
        '</div>'
      ].join('');
    }).join('');
  }

  // ---- Fetch local doc + boxme comments + merge ----
  function refreshTimeline() {
    setStatus('');
    var localPromise = fetch('/api/resource/' + encodeURIComponent(docType) + '/' + encodeURIComponent(ticketId), {
      method: 'GET',
      credentials: 'include'
    }).then(function(r){ return r.json(); }).then(function(d){
      return (d && d.data) || {};
    }).catch(function(e){
      console.error('[ec-gbs-timeline] local fetch err', e);
      return {};
    });

    var commentsPromise = fetch('/api/method/gbs_fetch_comments', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ doctype: docType, name: ticketId })
    }).then(function(r){ return r.json(); }).then(function(d){
      var msg = (d && d.message) || {};
      return { comments: msg.comments || [], warning: msg.warning || '', gbs_doc_name: msg.gbs_doc_name || '' };
    }).catch(function(e){
      console.warn('[ec-gbs-timeline] comments fetch err', e);
      return { comments: [], warning: 'KhÃ´ng fetch ÄÆ°á»£c comments: ' + e.message, gbs_doc_name: '' };
    });

    return Promise.all([localPromise, commentsPromise]).then(function(arr){
      var doc = arr[0]; var cm = arr[1];
      var events = eventsFromDoc(doc).concat(eventsFromComments(cm.comments));
      renderFeed(events, cm.gbs_doc_name || doc.gbs_doc_name || '', cm.warning);
    });
  }

  // v24_marker_paste_image_2026-07-06: contenteditable + paste image support
  function _ecInsertTextAt(text) {
    var sel = window.getSelection();
    if (!sel || sel.rangeCount === 0) { document.getElementById('tl-input').appendChild(document.createTextNode(text)); return; }
    var range = sel.getRangeAt(0);
    range.deleteContents();
    var node = document.createTextNode(text);
    range.insertNode(node);
    range.setStartAfter(node); range.collapse(true);
    sel.removeAllRanges(); sel.addRange(range);
  }
  function _ecInsertPastedImage(file) {
    var reader = new FileReader();
    reader.onload = function(ev) {
      var dataUrl = ev.target.result;
      var inp = document.getElementById('tl-input');
      if (!inp) return;
      var img = document.createElement('img');
      img.src = dataUrl;
      img.setAttribute('data-uploading', '1');
      // Insert at cursor if inside input, else append
      var sel = window.getSelection();
      var inside = sel && sel.anchorNode && inp.contains(sel.anchorNode);
      if (inside && sel.rangeCount > 0) {
        var range = sel.getRangeAt(0);
        range.deleteContents();
        range.insertNode(img);
        range.setStartAfter(img); range.collapse(true);
        sel.removeAllRanges(); sel.addRange(range);
      } else {
        inp.appendChild(img);
      }
      inp.focus();
      // Upload to boxme via app method
      fetch('/api/method/ecentric_workspace.gbs_comment_proxy.upload_image_to_boxme', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          base64_data: dataUrl,
          filename: (file && file.name) || ('pasted_image_' + Date.now() + '.png')
        })
      }).then(function(r){ return r.json(); }).then(function(d){
        var msg = (d && d.message) || {};
        if (!msg.success) {
          img.setAttribute('data-error', msg.error || 'upload_failed');
          img.removeAttribute('data-uploading');
          setStatus('Upload Ã¡ÂºÂ£nh fail: ' + (msg.error || 'unknown'), true);
          return;
        }
        img.src = msg.proxy_url;
        img.setAttribute('data-boxme-src', msg.file_url);
        img.removeAttribute('data-uploading');
      }).catch(function(err){
        img.setAttribute('data-error', String(err));
        img.removeAttribute('data-uploading');
        setStatus('Upload Ã¡ÂºÂ£nh fail: ' + String(err), true);
      });
    };
    reader.readAsDataURL(file);
  }
  function _ecHandlePaste(e) {
    var cd = e.clipboardData;
    if (!cd) return;
    var items = cd.items || [];
    // Prefer image if present in clipboard
    for (var i = 0; i < items.length; i++) {
      var it = items[i];
      if (it.kind === 'file' && it.type && it.type.indexOf('image/') === 0) {
        e.preventDefault();
        var file = it.getAsFile();
        if (file) _ecInsertPastedImage(file);
        return;
      }
    }
    // Plain-text paste (strip formatting so we don't inherit external CSS)
    var text = cd.getData('text/plain');
    if (text !== null && text !== undefined && text !== '') {
      e.preventDefault();
      _ecInsertTextAt(text);
    }
  }
  function postComment() {
    var inp = document.getElementById('tl-input');
    var btn = document.getElementById('tl-send');
    if (!inp || !btn) return;
    // Prevent send while an image is still uploading

      var raw = inp.innerHTML;
      raw = raw.replace(/src="\/api\/method\/ecentric_workspace\.gbs_comment_proxy\.proxy_boxme_file\?path=([^"]+)"/g, function(m, p){

      raw = raw.replace(/\s*data-uploading="[^"]*"/g, '');
      raw = raw.replace(/\s*data-error="[^"]*"/g, '');
      htmlContent = raw;
    } else {
      // Text-only: send plain text through legacy path (server escapes)
      htmlContent = textOnly;
    }

      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        doctype: docType,
        name: ticketId,
        content: htmlContent,
        is_html: hasImage ? 1 : 0
      })
    }).then(function(r){ return r.json(); }).then(function(d){
      var msg = (d && d.message) || {};
      if (!msg.success) throw new Error(msg.error || 'post_failed');
      setStatus(T.sent, false);
      inp.innerHTML = '';
      return refreshTimeline();
    }).catch(function(e){
      setStatus(T.errSend + e.message, true);
    }).then(function(){

    });
  }

  // ---- Insert anchor ----
  // User wants Timeline FULL WIDTH BELOW the 2-col grid (Chi tiáº¿t / Approval Chain).
  // We append as the last child of #content, which is the parent of the grid.
  // This makes Timeline a sibling AFTER the grid -> full width.
  // MutationObserver below re-injects when approval page does #content.innerHTML=html.
  function findAnchor() {
    var content = document.getElementById('content');
    if (!content) return null;
    // Only succeed if #content has been populated by approval page render
    // (avoids inserting into empty #content that will be wiped).
    if (content.children.length === 0) return null;
    console.log('[ec-gbs-timeline] using #content tail (full-width below grid)');
    return { container: content, after: null };
  }

  function insertPanel() {
    if (document.querySelector('div#ec-gbs-timeline-panel')) return true;
    var anchor = findAnchor();
    if (!anchor) {
      console.log('[ec-gbs-timeline] anchor not found yet');
      return false;
    }
    var panel = buildPanel();
    var mode = '';
    if (anchor.before) {
      anchor.container.insertBefore(panel, anchor.before);
      mode = 'before .decision-panel';
    } else if (anchor.after && anchor.after.nextSibling) {
      anchor.container.insertBefore(panel, anchor.after.nextSibling);
      mode = 'after target sibling';
    } else if (anchor.after) {
      anchor.container.appendChild(panel);
      mode = 'append (after has no nextSibling)';
    } else {
      anchor.container.appendChild(panel);
      mode = 'append to ' + (anchor.container.id || anchor.container.className || '?');
    }
    var refresh = document.getElementById('tl-refresh');
    if (refresh) refresh.addEventListener('click', refreshTimeline);
    var send = document.getElementById('tl-send');
    if (send) send.addEventListener('click', postComment);
    var inp = document.getElementById('tl-input');
    if (inp) {
      inp.addEventListener('keydown', function(e){
        if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { postComment(); }
      });
      inp.addEventListener('paste', _ecHandlePaste);
    }
    console.log('[ec-gbs-timeline] panel inserted (mode=' + mode + ')');
    return true;
  }

  var _initTries = 0;
  var _refreshInterval = null;
  function init() {
    _initTries++;
    if (_initTries % 10 === 1) {
      console.log('[ec-gbs-timeline] init() called, try=' + _initTries + ' readyState=' + document.readyState);
    }
    if (!insertPanel()) {
      if (_initTries < 60) {
        setTimeout(init, 500);
      } else {
        console.warn('[ec-gbs-timeline] gave up after 60 tries (30s); .decision-panel never appeared');
      }
      return;
    }
    console.log('[ec-gbs-timeline] init() success - panel rendered, starting refresh + observer');
    refreshTimeline();
    if (!_refreshInterval) _refreshInterval = setInterval(refreshTimeline, 60000);

    // MutationObserver: if approval page re-renders #content (innerHTML replaced),
    // our panel gets wiped. Detect that and re-inject.
    var contentEl = document.getElementById('content');
    if (contentEl && !window._gbsTimelineObserver) {
      var obs = new MutationObserver(function(){
        // If our panel is no longer in DOM, re-inject
        if (!document.querySelector('div#ec-gbs-timeline-panel')) {
          console.log('[ec-gbs-timeline] panel removed by re-render, re-inserting...');
          _initTries = 0;
          setTimeout(init, 200);
        }
      });
      obs.observe(contentEl, { childList: true, subtree: true });
      window._gbsTimelineObserver = obs;
      console.log('[ec-gbs-timeline] MutationObserver attached to #content');
    }
  }
  console.log('[ec-gbs-timeline] IIFE setup complete, registering init. readyState=' + document.readyState);
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();

<script id="ec-all-tickets-gbs-cols">

                      gbs_status:      it.gbs_status      || existing.gbs_status      || '',
                      gbs_last_sync:   it.gbs_last_sync   || existing.gbs_last_sync   || '',
                      gbs_grand_total: it.gbs_grand_total || existing.gbs_grand_total || '',

  //
  // Native column order detected dynamically (label-based, not hardcoded).
  function augmentHead(ctx) {

  // ---- Augment rows â one-pass per row, idempotent ----
  // Steps per row (only when row layout != 'v2'):
  //   1. Strip zero-width title marker
  //   2. Strip prior gbs-extra-cell
  //   3. Move Created TD (native idx 6) to position 0
  //   4. Insert GBS Status TD right after Status TD
  //   5. Append GBS Doc + GBS Doc SO (po only) + Last Sync at end
  //   6. Mark row data-ec-layout-v2="1"
  // For non-GBS tabs: revert layout (move Created TD back to native idx 6)
  function augmentRows(ctx) {
    var rows = document.querySelectorAll(ctx.rowSel);

      // Always strip extras + title marker before re-render

        if (row.cells.length <= NATIVE_COLS.createdIdx) return;

      compactTitleCell(row, 2);

      var info = gbsCache[row.dataset.id] || {};
      var stat    = info.gbs_status   || '';

      // Look up by header label to be robust.
      var statusTd = null;
      var thead = document.querySelector(ctx.theadRowSel);
      if (thead) {

        var nonExtraIdx = -1;
        for (var i = 0; i < ths.length; i++) {
          if (ths[i].classList.contains('gbs-extra-col')) continue;
          nonExtraIdx++;
          if ((ths[i].textContent || '').trim().toLowerCase() === 'status') {

            break;
          }
        }

      if (stat) {
        tdGbsStatus.innerHTML = '<span class="gbs-status-pill ' + statusPillClass(stat) + '">' + escapeHtml(stat) + '</span>';
      } else {
        tdGbsStatus.textContent = 'â';
      }
      if (statusTd && statusTd.nextSibling) {
        row.insertBefore(tdGbsStatus, statusTd.nextSibling);
      } else {
        row.appendChild(tdGbsStatus);
      }

      // Step 4: append GBS Doc / GBS Doc SO (po) / Last Sync at end
      var tdDoc = document.createElement('td');
      tdDoc.className = 'gbs-extra-cell gbs-doc';
      tdDoc.textContent = info.gbs_doc_name || 'â';
      row.appendChild(tdDoc);

      if (tabType === 'gbs_po' || tabType === 'mine') { // EC-GBS-FIN-v1-mine
        var tdSo = document.createElement('td');
        tdSo.className = 'gbs-extra-cell gbs-doc-so';
        var parentSo = info.parent_so || '';
        if (parentSo) {
          var a = document.createElement('a');
          a.href = '/approval?type=gbs_so&id=' + encodeURIComponent(parentSo);
          a.textContent = parentSo;
          a.style.cssText = 'color:#2C3DA6;text-decoration:none;font-size:12px';
          a.addEventListener('mouseover', function(){ this.style.textDecoration='underline'; });
          a.addEventListener('mouseout', function(){ this.style.textDecoration='none'; });
          tdSo.appendChild(a);
        } else {
          tdSo.textContent = 'â';
        }
        row.appendChild(tdSo);
      }

      var tdSync = document.createElement('td');
      tdSync.className = 'gbs-extra-cell gbs-sync';
      tdSync.textContent = info.gbs_last_sync ? fmtTime(info.gbs_last_sync) : 'â';
      row.appendChild(tdSync);
    });
  }

  // ---- Move Created column to position 1 (all tabs, visual reorder only) ----
  // CRITICAL: TH and TD reorder MUST be in sync. Earlier bug: TH was reordered
  // first refresh (rows not yet ready), subsequent refreshes early-returned via
  // idempotency check â TD never reordered â header/data mismatch.
  // Fix: per-row sentinel attribute tracks reorder state independently.
  var _ecOriginalCreatedIdx = null;
  function reorderCreatedColumn(ctx) {
    var thead = document.querySelector(ctx.theadRowSel);
    if (!thead) return;
    var ths = Array.prototype.slice.call(thead.children);

    // Step 1: ensure TH at position 0. Remember original index.
    var firstLabel = (ths[0] && ths[0].textContent || '').trim().toLowerCase();
    var thAlreadyFirst = (firstLabel === 'created' || firstLabel === 'táº¡o lÃºc' || firstLabel === 'táº¡o ngÃ y');
    if (!thAlreadyFirst) {
      var createdIdx = -1;
      for (var i = 0; i < ths.length; i++) {
        var label = (ths[i].textContent || '').trim().toLowerCase();
        if (label === 'created' || label === 'táº¡o lÃºc' || label === 'táº¡o ngÃ y') {
          createdIdx = i;
          break;
        }
      }
      if (createdIdx > 0) {
        if (_ecOriginalCreatedIdx === null) _ecOriginalCreatedIdx = createdIdx;
        thead.insertBefore(ths[createdIdx], ths[0]);
      } else {
        return; // Created TH not found
      }
    }

    // Step 2: reorder TD on each row. Track per-row with data attr to avoid
    // double-move + handle rows that were rendered AFTER first reorder.
    var origIdx = _ecOriginalCreatedIdx;
    if (origIdx === null || origIdx <= 0) return;
    var rows = document.querySelectorAll(ctx.rowSel);
    rows.forEach(function(row){
      if (row.dataset.ecCreatedReordered === '1') return; // already done
      if (row.cells && row.cells.length > origIdx) {
        row.insertBefore(row.cells[origIdx], row.cells[0]);
        row.dataset.ecCreatedReordered = '1';
      }
    });
  }

  // ---- CSS: title compact via inner div + scroll wrap with tooltip space ----
  function ensureCompactTitleCss() {
    if (document.getElementById('ec-gbs-cols-css')) return;
    var st = document.createElement('style');
    st.id = 'ec-gbs-cols-css';
    st.textContent = [
      '/* Title cell inner wrapper - works in table-layout:auto via inline-block */',
      '.ec-title-compact {',
      '  display: inline-block;',
      '  max-width: 260px;',
      '  white-space: nowrap;',
      '  overflow: hidden;',
      '  text-overflow: ellipsis;',
      '  vertical-align: middle;',
      '}',
      '/* GBS Doc SO link column compact */',
      'table .gbs-doc-so {',
      '  font-size: 12px;',
      '  white-space: nowrap;',
      '}',
      '/* Horizontal scroll wrapper with padding-bottom hack for tooltip space */',
      '/* overflow-y is implicitly auto when overflow-x is auto, but padding-bottom */',
      '/* gives content extra room before clip kicks in */',
      '.ec-table-scroll-wrap {',
      '  overflow-x: auto;',
      '  width: 100%;',
      '  padding-bottom: 60px;',
      '  margin-bottom: -60px;',
      '  -webkit-overflow-scrolling: touch;',
      '}',
      '.ec-table-scroll-wrap > table {',
      '  min-width: max-content;',
      '}'
    ].join('\n');
    document.head.appendChild(st);
  }

  // ---- Wrap title cell content in inner div for proper ellipsis clipping ----
  function compactTitleCell(row, titleIdx) {
    if (!row || row.cells.length <= titleIdx) return;
    var cell = row.cells[titleIdx];
    if (!cell || cell.dataset.ecTitleCompact === '1') return;
    // Move all children into inner wrapper
    var wrap = document.createElement('div');
    wrap.className = 'ec-title-compact';
    wrap.title = (cell.textContent || '').trim(); // tooltip on hover for full text
    while (cell.firstChild) {
      wrap.appendChild(cell.firstChild);
    }
    cell.appendChild(wrap);
    cell.dataset.ecTitleCompact = '1';
  }

  // ---- Ensure table scrolls horizontally (wrap table in scroll div) ----
  // Use NEW wrapper div around the table, not the existing parent. This isolates
  // scroll context so other content on page isn't affected. padding-bottom: 60px
  // provides space for tooltips (~30px) inside the scroll area before clip.
  function ensureTableScrollable(ctx) {
    var table = document.querySelector(ctx.tableSel);
    if (!table) return;
    if (table.dataset.ecScrollWrapped === '1') return;
    var parent = table.parentNode;
    if (!parent) return;
    // If already wrapped (parent IS our wrap), skip
    if (parent.classList && parent.classList.contains('ec-table-scroll-wrap')) {
      table.dataset.ecScrollWrapped = '1';
      return;
    }
    // Create new wrap div ONLY around table (isolated scroll context)
    var wrap = document.createElement('div');
    wrap.className = 'ec-table-scroll-wrap';
    parent.insertBefore(wrap, table);
    wrap.appendChild(table);
    table.dataset.ecScrollWrapped = '1';
  }

  function refresh() {
    var ctx = getPageContext();
    if (!ctx) return;
    ensureCompactTitleCss();
    ensureTableScrollable(ctx);  // horizontal scroll wrapper (both all-ticket + approval)
    augmentHead(ctx);  // Created TH reorder (all tabs) + GBS extras (GBS tabs only)
    augmentRows(ctx);  // Created TD reorder (all tabs) + GBS extras (GBS tabs only)
    ensureSyncButton(ctx);
  }

  // ---- Manual "Sync GBS" button ----
  function ensureSyncButton(ctx) {
    // EC-GBS-FIN-v1-mine: hide sync button on My Approval (mixed types)
    var _ecCurTab = currentTabType(ctx);
    if (!isGbsTab(ctx) || _ecCurTab === 'mine') {
      var existing = document.getElementById('gbs-sync-all-btn');
      if (existing) {
        var wrap = existing.closest('.gbs-sync-wrap');
        if (wrap) wrap.remove();
      }
      return;
    }
    if (document.getElementById('gbs-sync-all-btn')) return;
    // Anchor: place after filter bar or last tab
    var anchor = document.querySelector('.filter-bar') ||
                 document.querySelector('#activeFilters') ||
                 document.querySelector('.tab.active') ||
                 document.querySelector('.list-tab.active');
    if (!anchor) return;
    var scope = currentTabType(ctx);  // 'gbs_po' or 'gbs_so' or 'all'

    var wrap = document.createElement('span');
    wrap.className = 'gbs-sync-wrap';
    wrap.style.cssText = 'display:inline-flex;align-items:center;margin-left:6px;';
    wrap.innerHTML =
      '<button type="button" class="gbs-sync-btn" id="gbs-sync-all-btn" title="Force-sync all GBS docs (bypass 15-min auto-poll throttle)">' +
      '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">' +
      '<polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>' +
      '</svg>' +
      '<span class="gbs-sync-label">Sync GBS</span>' +
      '</button>' +
      '<span class="gbs-sync-meta" id="gbs-sync-meta">Auto-sync má»i 15 phÃºt</span>' +
      '<span class="gbs-sync-msg" id="gbs-sync-msg" style="display:none"></span>';
    // Insert after anchor
    if (anchor.nextSibling) {
      anchor.parentNode.insertBefore(wrap, anchor.nextSibling);
    } else {
      anchor.parentNode.appendChild(wrap);
    }
    var btn  = document.getElementById('gbs-sync-all-btn');
    var msg  = document.getElementById('gbs-sync-msg');
    var meta = document.getElementById('gbs-sync-meta');
    btn.addEventListener('click', function(){
      var t0 = Date.now();
      btn.disabled = true;
      btn.querySelector('.gbs-sync-label').textContent = 'Äang sync...';
      var icon = btn.querySelector('svg');
      if (icon) icon.style.display = 'none';
      var spin = document.createElement('span');
      spin.className = 'ec-spin';
      btn.insertBefore(spin, btn.firstChild);
      msg.style.display = 'none';
      if (meta) meta.style.display = 'none';

      fetch('/api/method/gbs_sync_all', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ scope: scope })
      }).then(function(r){ return r.json(); }).then(function(d){
        var m = (d && d.message) || d || {};
        var dur = Math.round((Date.now() - t0) / 1000);
        if (m.success) {
          msg.className = 'gbs-sync-msg ok';
          msg.textContent = 'â Sync ' + (m.updated || 0) + '/' + (m.polled || 0) + ' docs ' +
                             (m.skipped_finalized ? '(skip ' + m.skipped_finalized + ' finalized) ' : '') +
                             '(' + dur + 's)';
          msg.style.display = 'inline-block';
          // Reload page to re-render with fresh data
          setTimeout(function(){ location.reload(); }, 1200);
        } else {
          msg.className = 'gbs-sync-msg err';
          msg.textContent = 'â Lá»i: ' + (m.error || 'unknown');
          msg.style.display = 'inline-block';
          btn.disabled = false;
          var spinNode = btn.querySelector('.ec-spin');
          if (spinNode) spinNode.remove();
          if (icon) icon.style.display = '';
          btn.querySelector('.gbs-sync-label').textContent = 'Sync GBS';
          if (meta) meta.style.display = 'inline-block';
        }
      }).catch(function(e){
        msg.className = 'gbs-sync-msg err';
        msg.textContent = 'â Lá»i máº¡ng: ' + e.message;
        msg.style.display = 'inline-block';
        btn.disabled = false;
        var spinNode = btn.querySelector('.ec-spin');
        if (spinNode) spinNode.remove();
        if (icon) icon.style.display = '';
        btn.querySelector('.gbs-sync-label').textContent = 'Sync GBS';
        if (meta) meta.style.display = 'inline-block';
      });
    });
  }

  // ---- Init ----
  function init() {
    refresh();

    // Kick off supplemental fetch as soon as possible, then refresh
    fetchSyncInfo().then(refresh);

    // Observe each known body separately (we don't know which page yet, both may toggle)
    ['detailBody', 'listBody'].forEach(function(id){
      var n = document.getElementById(id);
      if (!n) return;
      var obs = new MutationObserver(function(){ setTimeout(refresh, 30); });
      obs.observe(n, { childList: true });
    });

    // Also observe #content for full re-render (approval-page does innerHTML=html)
    var content = document.getElementById('content');
    if (content) {
      var obs2 = new MutationObserver(function(){ setTimeout(refresh, 80); });
      obs2.observe(content, { childList: true, subtree: true });
    }

    // Click on tabs may not trigger tbody mutation (cheap re-render). Listen:
    function bindTabs() {
      document.querySelectorAll('.tab, .list-tab').forEach(function(tab){
        if (tab._gbsBound) return;
        tab._gbsBound = true;
        tab.addEventListener('click', function(){ setTimeout(refresh, 120); });
      });
    }
    bindTabs();
    setTimeout(bindTabs, 1000);
    setTimeout(bindTabs, 3000);

    // Backstop refreshes (data may arrive async after our observer attaches)
    setTimeout(refresh, 500);
    setTimeout(refresh, 2000);
    setTimeout(refresh, 5000);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();

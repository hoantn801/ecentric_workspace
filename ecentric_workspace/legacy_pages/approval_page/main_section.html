<script id="ec-gbs-detail-fields-pad">
// N15 Phase 1 (2026-05-28) â Pad GBS SO/PO approval detail page with fields missing
// from gbs_wrapper_v6 + ec_gbs_detail_extra. Independent script â does NOT touch
// either of those. If this script breaks, those two continue working unchanged.
//
// Adds to "ThÃ´ng tin chung" section, AFTER all existing rows:
//   - Order Type        (SO + PO, if doc has it)
//   - Price List        (SO only â PO doc doesn't have this custom field)
//   - Store (Platform)  (SO only â V-code from custom_store, local field name = store_name)
//   - Parent Service Order  (PO only, as clickable link â /approval?id=<SO>&type=gbs_so)
//
// Augments items table with UOM column (between Item Name and Qty for read ergonomics).
//
// Safety:
//   - Idempotent via _ecGbsDetailFieldsPadInstalled guard.
//   - Only runs on /approval?type=gbs_so|gbs_po pages.
//   - Each insertion is wrapped in try/catch â never throws past observer.
//   - Uses .ec-fp-* class to mark its injections (so we can detect duplicates).
(function(){
  'use strict';
  if (window._ecGbsDetailFieldsPadInstalled) return;
  window._ecGbsDetailFieldsPadInstalled = true;

  function urlParam(k){ var m=location.search.match(new RegExp('[?&]'+k+'=([^&]*)')); return m?decodeURIComponent(m[1]):''; }
  var ticketType = urlParam('type');
  var ticketId   = urlParam('id');
  if (ticketType !== 'gbs_so' && ticketType !== 'gbs_po') return;
  if (!ticketId) return;
  var docType = (ticketType === 'gbs_po') ? 'GBS Purchase Order' : 'GBS Sales Order';
  console.log('[ec-gbs-detail-fields-pad] active for', docType, ticketId);

  function escapeHtml(s){ return String(s==null?'':s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

  function buildRow(label, valueHtml, isRawHtml) {
    // Match the row visual style used by gbs_wrapper_v6 + ec_gbs_detail_extra (grid 180px 1fr).
    return '<div class="ec-fp-row" style="display:grid;grid-template-columns:180px 1fr;gap:14px;padding:8px 0;border-bottom:1px solid #f3f4f6">' +
      '<div style="color:#6b7280;font-size:12.5px">' + escapeHtml(label) + '</div>' +
      '<div style="font-size:13px;color:#111827">' + (isRawHtml ? valueHtml : escapeHtml(valueHtml)) + '</div>' +
      '</div>';
  }

  function loadDoc() {
    return fetch('/api/resource/' + encodeURIComponent(docType) + '/' + encodeURIComponent(ticketId), {
      method: 'GET', credentials: 'include'
    }).then(function(r){ return r.json(); }).then(function(d){
      return (d && d.data) || null;
    }).catch(function(){ return null; });
  }

  // ====== Locate ThÃ´ng tin chung section + last existing row ======
  function findGeneralSection() {
    // gbs_wrapper_v6 uses _section() with header text "Thong tin chung" (no diacritics)
    // ec_gbs_detail_extra checks both with + without diacritics
    var divs = document.querySelectorAll('div');
    for (var i = 0; i < divs.length; i++) {
      var t = (divs[i].textContent || '').trim();
      if (t.length < 60 && /^th[oÃ´]ng\s*tin\s*chung/i.test(t)) return divs[i];
    }
    return null;
  }
  function findContainerOfRows(header) {
    var sib = header.nextElementSibling;
    var tries = 0;
    while (sib && tries < 10) {
      if (sib.querySelector && sib.querySelector('div[style*="grid-template-columns:180px"]')) return sib;
      sib = sib.nextElementSibling; tries++;
    }
    if (header.parentNode && header.parentNode.querySelector &&
        header.parentNode.querySelector('div[style*="grid-template-columns:180px"]')) {
      return header.parentNode;
    }
    return null;
  }

  function injectExtraFields(doc) {
    try {
      var header = findGeneralSection();
      if (!header) return false;
      var container = findContainerOfRows(header);
      if (!container) return false;
      // Idempotency: don't re-inject our own rows
      if (container.querySelector('.ec-fp-row')) return true;

      var rows = container.querySelectorAll('div[style*="grid-template-columns:180px"]');
      if (!rows.length) return false;
      var lastRow = rows[rows.length - 1];

      var html = '';
      // Order Type â both SO + PO doc types (PO may have it via custom field too; if absent, value=='' â '-' rendered)
      if (doc.order_type) html += buildRow('Order Type', doc.order_type);
      // SO-only: Price List + Store (Platform)
      if (ticketType === 'gbs_so') {
        if (doc.price_list) html += buildRow('Price List', doc.price_list);
        if (doc.store_name) html += buildRow('Store (Platform)', doc.store_name);
      }
      // PO-only: Parent SO link
      if (ticketType === 'gbs_po' && doc.parent_so) {
        var href = '/approval?id=' + encodeURIComponent(doc.parent_so) + '&type=gbs_so';
        var linkHtml = '<a href="' + escapeHtml(href) + '" style="color:#2C3DA6;text-decoration:none;font-family:DM Mono,monospace;font-weight:600">' + escapeHtml(doc.parent_so) + '</a>';
        html += buildRow('Parent SO', linkHtml, true);
      }
      if (!html) return true;  // nothing to add â leave as-is

      var wrap = document.createElement('div');
      wrap.innerHTML = html;
      Array.prototype.slice.call(wrap.children).forEach(function(node){
        lastRow.parentNode.insertBefore(node, lastRow.nextSibling);
        lastRow = node;
      });
      console.log('[ec-gbs-detail-fields-pad] injected', wrap.childElementCount, 'rows');
      return true;
    } catch (e) {
      console.warn('[ec-gbs-detail-fields-pad] inject error', e);
      return false;
    }
  }

  // ====== Augment items table with UOM column ======
  // The table is rendered by gbs_wrapper_v6 with columns:
  //   Item Code | Item Name | Qty | Rate | Amount | Warehouse
  // We add a UOM column AFTER "Item Name" (so qty/rate/amount stay grouped).
  function augmentItemsTable(doc) {
    try {
      if (!doc || !Array.isArray(doc.items) || doc.items.length === 0) return false;
      // Locate the items table: <table> whose <thead> has "Item Code" + "Warehouse" headers
      var tables = document.querySelectorAll('table');
      var target = null;
      for (var i = 0; i < tables.length; i++) {
        var ths = tables[i].querySelectorAll('thead th');
        if (ths.length < 4) continue;
        var headers = Array.prototype.map.call(ths, function(th){ return (th.textContent||'').trim().toLowerCase(); });
        if (headers.indexOf('item code') >= 0 && headers.indexOf('warehouse') >= 0) {
          target = tables[i]; break;
        }
      }
      if (!target) return false;
      // Don't double-augment
      if (target.querySelector('th.ec-fp-uom-th')) return true;

      // Find "Item Name" column index
      var ths = target.querySelectorAll('thead th');
      var itemNameIdx = -1;
      ths.forEach(function(th, i){
        var t = (th.textContent||'').trim().toLowerCase();
        if (t === 'item name') itemNameIdx = i;
      });
      if (itemNameIdx < 0) return false;

      // Insert UOM header after Item Name
      var uomTh = document.createElement('th');
      uomTh.className = 'ec-fp-uom-th';
      uomTh.style.cssText = 'text-align:left;padding:8px 10px;font-weight:600;color:#6b7280;text-transform:uppercase;font-size:11px;letter-spacing:0.4px';
      uomTh.textContent = 'UOM';
      var refTh = ths[itemNameIdx];
      refTh.parentNode.insertBefore(uomTh, refTh.nextSibling);

      // Insert UOM cell into each row, mapping by row index â doc.items[i].uom
      var bodyRows = target.querySelectorAll('tbody tr');
      bodyRows.forEach(function(tr, rowIdx){
        var item = doc.items[rowIdx] || {};
        var tds = tr.querySelectorAll('td');
        if (tds.length === 0) return;
        var refTd = tds[itemNameIdx];
        if (!refTd) return;
        var uomTd = document.createElement('td');
        uomTd.className = 'ec-fp-uom-td';
        uomTd.style.cssText = 'padding:8px 10px';
        uomTd.textContent = item.uom || '';
        refTd.parentNode.insertBefore(uomTd, refTd.nextSibling);
      });
      console.log('[ec-gbs-detail-fields-pad] augmented items table with UOM column');
      return true;
    } catch (e) {
      console.warn('[ec-gbs-detail-fields-pad] table augment error', e);
      return false;
    }
  }

  // ====== Orchestration ======
  var _docCache = null;
  function tryAll() {
    if (!_docCache) {
      loadDoc().then(function(doc){
        if (!doc) return;
        _docCache = doc;
        injectExtraFields(doc);
        augmentItemsTable(doc);
      });
      return;
    }
    injectExtraFields(_docCache);
    augmentItemsTable(_docCache);
  }

  function init() {
    tryAll();
    // Detail page re-renders on Check Status / Refresh / etc. â observe content area.
    var content = document.getElementById('content') || document.body;
    var obs = new MutationObserver(function(muts){
      for (var i = 0; i < muts.length; i++) {
        if (muts[i].addedNodes && muts[i].addedNodes.length > 0) {
          setTimeout(tryAll, 220);
          return;
        }
      }
    });
    obs.observe(content, { childList: true, subtree: true });
    // Safety retries
    setTimeout(tryAll,  600);
    setTimeout(tryAll, 1600);
    setTimeout(tryAll, 3200);
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script><!-- /ec-gbs-detail-fields-pad -->
<script id="ec-gbs-resubmit-button">
(function(){

    ].join('\n');

  // Find "Submit on GBS" button by text - the existing button on GBS SYNC panel
  function findSubmitBtn() {
    var btns = document.querySelectorAll('button');
    for (var i = 0; i < btns.length; i++) {
      var t = (btns[i].textContent || '').trim();
      if (/Submit\s+on\s+GBS/i.test(t)) return btns[i];
    }
    return null;
  }

  // Check current local + remote state to decide UI
  function fetchState() {
    return fetch('/api/method/frappe.client.get_value', {
      method: 'POST',
      credentials: 'include',
      headers: { 'Content-Type': 'application/json', 'X-Frappe-CSRF-Token': (window.frappe && window.frappe.csrf_token) || '' },
      body: JSON.stringify({
        doctype: docType,
        filters: ticketId,
        // v3 (2026-05-29): include gbs_resubmit_pushed_count so button can hide
        // after user resubmits + Finance approves + sync pushes data to boxme.
        fieldname: ['status', 'gbs_status', 'gbs_doc_name', 'resubmit_count', 'gbs_resubmit_pushed_count']
      })
    }).then(function(r){ return r.json(); }).then(function(d){
      var msg = (d && d.message) || {};
      return msg.message || msg;
    }).catch(function(){ return {}; });
  }

  function openModal(state) {
    var modal = document.createElement('div');
    modal.className = 'ec-gbs-resubmit-modal';
    var rc = (state && state.resubmit_count) || 0;
    modal.innerHTML = [
      '<div class="modal-card">',
      '  <h3>Resubmit doc sang GBS</h3>',
      '  <div class="modal-info">',
      '    Doc <b>' + ticketId + '</b> bá» GBS reject. Resubmit sáº½:<br>',
      '    1. Má» form á» cháº¿ Äá» <b>Chá»nh sá»­a</b> â báº¡n cÃ³ thá» sá»­a fields, items, attachments<br>',
      '    2. Sau khi báº¡n submit form, Finance sáº½ <b>duyá»t láº¡i</b><br>',
      '    3. Khi Finance duyá»t, há» thá»ng tá»± push sang GBS<br>',
      '    ÄÃ¢y lÃ  láº§n resubmit thá»© <b>' + (rc + 1) + '</b>.',
      '  </div>',
      '  <textarea id="resubmit-reason" placeholder="LÃ½ do resubmit (optional)..."></textarea>',
      '  <div class="modal-actions">',
      '    <button class="btn-cancel" id="resubmit-cancel">Huá»·</button>',
      '    <button class="btn-confirm" id="resubmit-confirm">XÃ¡c nháº­n resubmit</button>',
      '  </div>',
      '</div>'
    ].join('\n');
    document.body.appendChild(modal);

    document.getElementById('resubmit-cancel').addEventListener('click', function(){
      modal.remove();
    });
    modal.addEventListener('click', function(e){
      if (e.target === modal) modal.remove();
    });
    document.getElementById('resubmit-confirm').addEventListener('click', function(){
      var btn = document.getElementById('resubmit-confirm');
      var reason = document.getElementById('resubmit-reason').value.trim();
      btn.disabled = true; btn.textContent = 'Äang resubmit...';
      fetch('/api/method/resubmit_gbs_doc', {
        method: 'POST',
        credentials: 'include',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ doctype: docType, name: ticketId, reason: reason })
      }).then(function(r){ return r.json(); }).then(function(d){
        var msg = (d && d.message) || {};
        if (!msg.success) throw new Error(msg.error || msg.hint || 'resubmit_failed');
        modal.remove();
        // v2 (2026-05-29): redirect to form edit mode so user can update fields/items/attachments
        // before re-submitting. After form Submit â resubmit_gbs_so/po â status=Pending â Finance approve â sync to boxme.
        var redirect = msg.redirect_to || ((docType === 'GBS Sales Order' ? '/gbs-so-form?edit=' : '/gbs-po-form?edit=') + encodeURIComponent(ticketId));
        location.href = redirect;
      }).catch(function(e){
        btn.disabled = false; btn.textContent = 'XÃ¡c nháº­n resubmit';
        alert('Lá»i: ' + e.message);
      });
    });
  }

  function ensureButton() {
    fetchState().then(function(state){
      var gbsStatus = ((state.gbs_status || '') + '').toLowerCase();
      var locStatus = ((state.status || '') + '').toLowerCase();
      var hasDoc = !!state.gbs_doc_name;
      // v3 (2026-05-29): hide button after user has resubmitted + sync has pushed.
      // Show again only when GBS rejects a NEW version (next resubmit cycle).
      var resubmitCount = parseInt(state.resubmit_count || 0, 10);
      var pushedCount   = parseInt(state.gbs_resubmit_pushed_count || 0, 10);
      // v4 (2026-06-02): show button on EVERY rejection (incl re-rejection after prior cycle).
      // v3 hid button when counts matched (cycle "done"), but boxme can re-reject after
      // push - then gbs_status=Rejected stays with counts matched. New logic: show whenever
      // boxme is Rejected AND no pending push (sync caught up).
      // v4_btn_visibility_2026-06-02
      var hasPendingPush = resubmitCount > pushedCount;

      // Show Resubmit when:
      //   - local Approved AND
      //   - has gbs_doc_name AND
      //   - boxme rejected (gbs_status contains 'reject') AND
      //   - this rejection hasn't been resubmitted+pushed yet
      var shouldShow = (locStatus === 'approved' && hasDoc && gbsStatus.indexOf('reject') >= 0); /* v5_no_pending_check_2026-07-14: hasPendingPush check removed - counter reset by unknown writer blocks button */

      // Remove existing Resubmit button if exists
      var existing = document.getElementById('ec-gbs-resubmit-btn');
      if (existing && !shouldShow) {
        existing.remove();
      }

      if (!shouldShow) {
        // Re-check every 3s in case state changes
        setTimeout(ensureButton, 3000);
        return;
      }

      if (existing) return;

      // Find anchor: Submit on GBS button OR Check Status button - inject Resubmit nearby
      var submitBtn = findSubmitBtn();
      var anchor = submitBtn;
      if (!anchor) {
        // Fallback: find Check Status button
        var btns = document.querySelectorAll('button');
        for (var i = 0; i < btns.length; i++) {
          if (/Check\s+Status/i.test((btns[i].textContent || '').trim())) { anchor = btns[i]; break; }
        }
      }
      if (!anchor) {
        // No anchor yet, retry
        setTimeout(ensureButton, 1000);
        return;
      }

      // Hide Submit on GBS (it would 417 anyway in Rejected state)
      if (submitBtn) submitBtn.style.display = 'none';

      var btn = document.createElement('button');
      btn.id = 'ec-gbs-resubmit-btn';
      btn.className = 'ec-gbs-resubmit-btn';
      btn.textContent = 'Resubmit';
      btn.addEventListener('click', function(){ openModal(state); });
      if (anchor.parentNode) {
        anchor.parentNode.insertBefore(btn, anchor.nextSibling);
      }
      console.log('[ec-gbs-resubmit] button inserted (gbs_status=' + state.gbs_status + ')');
    });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', ensureButton);
  } else {
    ensureButton();
  }
})();
</script><!-- /ec-gbs-resubmit-button -->
<script id="ec-gbs-poll-on-load">
(function(){
  if (window._ecGbsPollOnLoadFired) return;
  window._ecGbsPollOnLoadFired = true;
  var params = new URLSearchParams(window.location.search);
  var docId = params.get('id');
  var docType = params.get('type');
  if (!docId) return;
  if (docType !== 'gbs_po' && docType !== 'gbs_so') return;
  var doctype = (docType === 'gbs_po') ? 'GBS Purchase Order' : 'GBS Sales Order';
  function poll() {
    fetch('/api/method/gbs_poll_one_doc', {
      method: 'POST',
      credentials: 'include',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({doctype: doctype, name: docId})
    })
    .then(function(r){ return r.json(); })
    .then(function(d){
      var msg = d && d.message;
      if (msg && msg.success) {
        console.log('[ec-gbs-poll-on-load] refreshed:', msg.updated);
      } else {
        console.warn('[ec-gbs-poll-on-load] failed:', msg && msg.error);
      }
    })
    .catch(function(err){ console.error('[ec-gbs-poll-on-load] err:', err); });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', poll);
  } else {
    setTimeout(poll, 100);
  }
})();
</script>

<script id="ec-approval-list-url-state">
(function(){
  'use strict';
  if (window._ecApprovalListV1Installed) return;
  window._ecApprovalListV1Installed = true;

  // Only run on /approval list (no ?id query)
  var isListView = function(){
    var p = (location.pathname || '').replace(/\/+$/, '');
    if (p !== '/approval') return false;
    var q = new URLSearchParams(location.search);
    return !q.get('id');
  };

  // Inject CSS
  if (!document.getElementById('ec-approval-list-css')) {
    var st = document.createElement('style');
    st.id = 'ec-approval-list-css';
    st.textContent = [
      '.detail-id-link { text-decoration: none; color: inherit; display: inline-block; }',
      '.detail-id-link:hover .id-cell { text-decoration: underline; }'
    ].join('\n');
    document.head.appendChild(st);
  }

  var FIELDS = ['type', 'status', 'dept', 'search', 'dateFrom', 'dateTo', 'card', 'gbsPhase', 'mine'];

  window._ecSyncApprovalFilterToURL = function(){
    try {
      if (!isListView()) return;
      var LS = window.ListState;
      if (!LS || !LS.filter) return;
      var f = LS.filter;
      var params = new URLSearchParams();
      if (f.type && f.type !== 'all') params.set('type', f.type);
      if (f.status) params.set('status', f.status);
      if (f.dept) params.set('dept', f.dept);
      if (f.search) params.set('q', f.search);
      if (f.dateFrom) params.set('from', f.dateFrom);
      if (f.dateTo) params.set('to', f.dateTo);
      if (f.card) params.set('card', f.card);
      if (f.gbsPhase) params.set('gbsPhase', f.gbsPhase);
      if (f.mine) params.set('mine', '1');
      var qs = params.toString();
      var newUrl = location.pathname + (qs ? ('?' + qs) : '');
      if (newUrl !== location.pathname + location.search) {
        history.replaceState(null, '', newUrl);
      }
    } catch (e) {}
  };

  window._ecRestoreApprovalFilterFromURL = function(){
    try {
      if (!isListView()) return;
      var LS = window.ListState;
      if (!LS || !LS.filter) return;
      var params = new URLSearchParams(location.search);
      if (params.has('type')) LS.filter.type = params.get('type');
      if (params.has('status')) LS.filter.status = params.get('status');
      if (params.has('dept')) LS.filter.dept = params.get('dept');
      if (params.has('q')) LS.filter.search = params.get('q');
      if (params.has('from')) LS.filter.dateFrom = params.get('from');
      if (params.has('to')) LS.filter.dateTo = params.get('to');
      if (params.has('card')) LS.filter.card = params.get('card');
      if (params.has('gbsPhase')) LS.filter.gbsPhase = params.get('gbsPhase');
      if (params.has('mine')) LS.filter.mine = params.get('mine') === '1';
    } catch (e) {}
  };

  // Wait for ListState + first renderList completion, then restore + re-render
  var restored = false;
  var attempt = 0;
  var maxAttempts = 60; // 30 sec
  function attemptRestore(){
    attempt++;
    if (attempt > maxAttempts) return;
    if (!isListView()) return;
    var LS = window.ListState;
    var listBody = document.getElementById('listBody');
    if (!LS || !LS.filter || !listBody || restored) {
      setTimeout(attemptRestore, 500);
      return;
    }
    // Check URL has any filter param
    var q = location.search;
    if (q.length <= 1) { restored = true; return; } // no params - keep defaults
    window._ecRestoreApprovalFilterFromURL();
    restored = true;
    // Update DOM controls to reflect restored state
    var setEl = function(id, v){ var el = document.getElementById(id); if (el) el.value = v || ''; };
    setEl('listSearch', LS.filter.search);
    setEl('listStatus', LS.filter.status);
    setEl('listDept', LS.filter.dept);
    setEl('listDateFrom', LS.filter.dateFrom);
    setEl('listDateTo', LS.filter.dateTo);
    var fgp = document.getElementById('listGbsPhase'); if (fgp) fgp.value = LS.filter.gbsPhase || '';
    // Update active tab
    var activeTab = LS.filter.mine ? 'mine' : LS.filter.type;
    document.querySelectorAll('.list-tab').forEach(function(tab){
      tab.classList.toggle('active', tab.dataset.tab === activeTab);
    });
    // Trigger re-render via refreshBody if exposed, else click clear+re-apply
    try {
      var lb = document.getElementById('listBody');
      // Find the refreshBody by triggering a filter change: simulate input event on search
      // Actually simpler: dispatch change on listStatus (which calls refreshBody in wire-up)
      var s = document.getElementById('listStatus');
      if (s) s.dispatchEvent(new Event('change', { bubbles: true }));
    } catch(e){}
    console.log('[ec-approval-list-v1] filter restored from URL', LS.filter);
  }

  // Watch #listBody for changes to sync URL after re-renders
  var obs = new MutationObserver(function(){
    window._ecSyncApprovalFilterToURL();
  });
  function attachObs(){
    var lb = document.getElementById('listBody');
    if (!lb) { setTimeout(attachObs, 500); return; }
    obs.observe(lb, { childList: true, subtree: false });
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', function(){ attemptRestore(); attachObs(); });
  } else {
    attemptRestore(); attachObs();
  }
})();
</script><!-- /v1_approval_list_url_state -->

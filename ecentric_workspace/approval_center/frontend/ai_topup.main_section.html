<!--
  AI Topup page. Route /approvals/ai-topup (Web Page "approval-center-ai-topup").
  Reuses the eCentric shell (.ec-sidebar/.ec-main + tokens). B3.2: Create/Edit
  draft, Save, Submit, My Requests, Detail read view + dynamic approval stepper.
  All data via ecentric_workspace.approval_center.api.ai_topup.* (nothing
  hardcoded). Marker: ec-aitopup-root. Does NOT touch /approval.
-->
<style>
  body > header, body > footer, body > nav.navbar, header.navbar, .navbar.navbar-light,
  .web-page-header, #navbarSupportedContent, .navbar-collapse, .web-footer, footer.web-footer { display:none !important; }
  body { background:#f7f8fb !important; padding:0 !important; margin:0 !important; }
  .page-content,.common-page-style,.container,main,.web-page-content,.page_content,.main-section,main.container,main.fluid{ padding:0 !important; margin:0 !important; max-width:none !important; }
</style>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  #ec-ait-root{ --navy:#2C3DA6;--navy-50:#eef0fb;--navy-700:#1f2d80;--yellow:#FFC000;--yellow-50:#fff8e1;
    --pink:#EF7CAF;--green:#10b981;--green-50:#ecfdf5;--red:#dc2626;--red-50:#fef2f2;--amber:#b45309;
    --gray-50:#fafbfc;--gray-100:#f3f4f6;--gray-200:#e5e7eb;--gray-300:#d1d5db;--gray-400:#9ca3af;
    --gray-500:#6b7280;--gray-600:#4b5563;--gray-700:#374151;--gray-800:#1f2937;--gray-900:#111827;--bg:#f7f8fb; }
  #ec-ait-root,#ec-ait-root *{ box-sizing:border-box; }
  #ec-ait-root{ font-family:'Inter',-apple-system,sans-serif; background:var(--bg); color:var(--gray-800);
    font-size:14px; line-height:1.5; display:grid; grid-template-columns:248px 1fr; min-height:100vh; }
  #ec-ait-root .icon{ width:18px;height:18px;flex-shrink:0;stroke:currentColor;fill:none;stroke-width:1.75;stroke-linecap:round;stroke-linejoin:round; }
  #ec-ait-root .ec-sidebar{ background:#fff;border-right:1px solid var(--gray-200);display:flex;flex-direction:column;position:sticky;top:0;height:100vh; }
  #ec-ait-root .sb-head{ padding:16px;display:flex;align-items:center;gap:10px; }
  #ec-ait-root .logo{ width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--navy),var(--pink));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800; }
  #ec-ait-root .brand-name{ font-size:15px;font-weight:700;color:var(--gray-900); }
  #ec-ait-root .nav{ padding:6px 8px;display:flex;flex-direction:column;gap:2px; }
  #ec-ait-root a.nav-item{ display:flex;align-items:center;justify-content:flex-start;text-align:left;gap:14px;width:100%;padding:9px 14px;border-radius:8px;text-decoration:none;color:var(--gray-700);font-size:13.5px;font-weight:500; }
  #ec-ait-root a.nav-item:hover{ background:var(--gray-100);color:var(--gray-900); }
  #ec-ait-root a.nav-item.active{ background:var(--navy-50);color:var(--navy);font-weight:600; }
  #ec-ait-root .nav-ic{ flex:0 0 24px;display:flex;align-items:center;justify-content:center; }
  #ec-ait-root .ec-main{ min-width:0;display:flex;flex-direction:column; }
  #ec-ait-root .topbar{ background:#fff;border-bottom:1px solid var(--gray-200);min-height:60px;padding:0 24px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:20; }
  #ec-ait-root .crumb{ font-size:13px;color:var(--gray-500); } #ec-ait-root .crumb strong{ color:var(--gray-900); }
  #ec-ait-root .content{ padding:22px 24px 48px;max-width:1180px;width:100%; }
  #ec-ait-root h1.pg{ font-size:22px;font-weight:800;color:var(--gray-900);margin:0 0 2px;letter-spacing:-.3px; }
  #ec-ait-root .pg-sub{ font-size:13px;color:var(--gray-500);margin:0 0 16px; }
  /* tabs */
  #ec-ait-root .tabs{ display:flex;gap:4px;border-bottom:1px solid var(--gray-200);margin-bottom:18px;flex-wrap:wrap; }
  #ec-ait-root .tab{ padding:10px 16px;font-size:13.5px;font-weight:600;color:var(--gray-500);cursor:pointer;border:none;background:none;border-bottom:2px solid transparent; }
  #ec-ait-root .tab:hover{ color:var(--gray-800); }
  #ec-ait-root .tab.active{ color:var(--navy);border-bottom-color:var(--navy); }
  #ec-ait-root .tab[disabled]{ color:var(--gray-300);cursor:not-allowed; }
  /* cards / form */
  #ec-ait-root .card{ background:#fff;border:1px solid var(--gray-200);border-radius:12px;padding:18px 20px;margin-bottom:16px; }
  #ec-ait-root .card h3{ font-size:14px;font-weight:700;color:var(--gray-900);margin:0 0 14px;display:flex;align-items:center;gap:8px; }
  #ec-ait-root .grid2{ display:grid;grid-template-columns:1fr 1fr;gap:14px 20px; }
  #ec-ait-root .fld{ display:flex;flex-direction:column;gap:5px; }
  #ec-ait-root .fld label{ font-size:12.5px;font-weight:600;color:var(--gray-600); }
  #ec-ait-root .fld label .req{ color:var(--red); }
  #ec-ait-root .fld input,#ec-ait-root .fld select,#ec-ait-root .fld textarea{ width:100%;padding:8px 11px;border:1px solid var(--gray-200);border-radius:8px;font-size:13.5px;font-family:inherit;background:#fff; }
  #ec-ait-root .fld input:focus,#ec-ait-root .fld select:focus,#ec-ait-root .fld textarea:focus{ outline:none;border-color:var(--navy);box-shadow:0 0 0 3px var(--navy-50); }
  #ec-ait-root .fld input[readonly],#ec-ait-root .fld .ro{ background:var(--gray-50);color:var(--gray-600); }
  #ec-ait-root .fld .err{ font-size:12px;color:var(--red); }
  #ec-ait-root .fld.invalid input,#ec-ait-root .fld.invalid select{ border-color:var(--red); }
  #ec-ait-root .full{ grid-column:1/-1; }
  #ec-ait-root .hint{ font-size:12px;color:var(--gray-500); }
  #ec-ait-root .banner{ padding:11px 14px;border-radius:9px;font-size:13px;display:flex;gap:9px;align-items:flex-start;margin-bottom:14px; }
  #ec-ait-root .banner.warn{ background:var(--yellow-50);color:var(--amber);border:1px solid #fde68a; }
  #ec-ait-root .banner.err{ background:var(--red-50);color:var(--red);border:1px solid #fecaca; }
  #ec-ait-root .banner.info{ background:var(--navy-50);color:var(--navy-700);border:1px solid #dbe0f5; }
  /* buttons */
  #ec-ait-root .btn{ display:inline-flex;align-items:center;gap:7px;padding:9px 15px;border-radius:9px;font-size:13.5px;font-weight:600;cursor:pointer;border:1px solid var(--gray-200);background:#fff;color:var(--gray-700); }
  #ec-ait-root .btn:hover{ background:var(--gray-50); }
  #ec-ait-root .btn.primary{ background:var(--navy);border-color:var(--navy);color:#fff; } #ec-ait-root .btn.primary:hover{ background:var(--navy-700); }
  #ec-ait-root .btn[disabled]{ opacity:.55;cursor:not-allowed; }
  #ec-ait-root .actions{ display:flex;gap:10px;flex-wrap:wrap;margin-top:6px; }
  /* table */
  #ec-ait-root .filters{ display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px;align-items:center; }
  #ec-ait-root .filters input,#ec-ait-root .filters select{ padding:8px 11px;border:1px solid var(--gray-200);border-radius:8px;font-size:13px;font-family:inherit; }
  #ec-ait-root table.tbl{ width:100%;border-collapse:collapse;background:#fff;border:1px solid var(--gray-200);border-radius:12px;overflow:hidden; }
  #ec-ait-root .tbl th{ text-align:left;font-size:11.5px;text-transform:uppercase;letter-spacing:.4px;color:var(--gray-500);padding:11px 14px;background:var(--gray-50);border-bottom:1px solid var(--gray-200); }
  #ec-ait-root .tbl td{ padding:12px 14px;font-size:13px;border-bottom:1px solid var(--gray-100); }
  #ec-ait-root .tbl tr.clickable{ cursor:pointer; } #ec-ait-root .tbl tr.clickable:hover{ background:var(--navy-50); }
  #ec-ait-root .badge{ display:inline-flex;align-items:center;gap:5px;font-size:11.5px;font-weight:700;padding:3px 9px;border-radius:999px; }
  #ec-ait-root .badge .dot{ width:7px;height:7px;border-radius:50%; }
  #ec-ait-root .b-gray{ background:var(--gray-100);color:var(--gray-600); } #ec-ait-root .b-gray .dot{ background:var(--gray-400); }
  #ec-ait-root .b-navy{ background:var(--navy-50);color:var(--navy); } #ec-ait-root .b-navy .dot{ background:var(--navy); }
  #ec-ait-root .b-amber{ background:var(--yellow-50);color:var(--amber); } #ec-ait-root .b-amber .dot{ background:var(--yellow); }
  #ec-ait-root .b-green{ background:var(--green-50);color:var(--green); } #ec-ait-root .b-green .dot{ background:var(--green); }
  #ec-ait-root .b-red{ background:var(--red-50);color:var(--red); } #ec-ait-root .b-red .dot{ background:var(--red); }
  #ec-ait-root .pager{ display:flex;gap:8px;align-items:center;justify-content:flex-end;margin-top:12px;font-size:13px;color:var(--gray-600); }
  /* states */
  #ec-ait-root .skel-row{ height:44px;border-bottom:1px solid var(--gray-100);background:linear-gradient(90deg,#f3f4f6 25%,#e9ebef 37%,#f3f4f6 63%);background-size:400% 100%;animation:aitsh 1.3s ease infinite; }
  @keyframes aitsh{0%{background-position:100% 0}100%{background-position:-100% 0}}
  #ec-ait-root .state{ padding:44px 20px;text-align:center;color:var(--gray-500); } #ec-ait-root .state h4{ color:var(--gray-700);margin:0 0 6px; }
  /* stepper */
  #ec-ait-root .stepper{ display:flex;gap:0;overflow-x:auto;padding:6px 2px 12px; }
  #ec-ait-root .step{ min-width:170px;flex:1;position:relative;padding:0 10px; }
  #ec-ait-root .step:not(:last-child)::after{ content:"";position:absolute;top:16px;right:-2px;left:50%;height:2px;background:var(--gray-200); }
  #ec-ait-root .step.done::after{ background:var(--green); }
  #ec-ait-root .step-top{ display:flex;flex-direction:column;align-items:center;gap:6px;position:relative;z-index:1; }
  #ec-ait-root .step-dot{ width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;background:#fff;border:2px solid var(--gray-300);color:var(--gray-500);font-weight:700;font-size:13px; }
  #ec-ait-root .step.current .step-dot{ border-color:var(--navy);color:var(--navy);box-shadow:0 0 0 4px var(--navy-50); }
  #ec-ait-root .step.done .step-dot{ background:var(--green);border-color:var(--green);color:#fff; }
  #ec-ait-root .step.rejected .step-dot{ background:var(--red);border-color:var(--red);color:#fff; }
  #ec-ait-root .step.info .step-dot{ background:var(--yellow);border-color:var(--yellow);color:#fff; }
  #ec-ait-root .step.skipped .step-dot{ border-style:dashed; }
  #ec-ait-root .step-name{ font-size:12.5px;font-weight:700;color:var(--gray-800);text-align:center; }
  #ec-ait-root .step-state{ font-size:11px;font-weight:600; }
  #ec-ait-root .step-meta{ font-size:11px;color:var(--gray-500);text-align:center;margin-top:2px;line-height:1.4; }
  #ec-ait-root .step-meta .ov{ color:var(--red);font-weight:600; }
  #ec-ait-root .summary-row{ display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px dashed var(--gray-200);font-size:13px; }
  #ec-ait-root .summary-row b{ color:var(--gray-900); }
  #ec-ait-root .toast{ position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--gray-900);color:#fff;padding:11px 18px;border-radius:10px;font-size:13.5px;opacity:0;pointer-events:none;transition:.2s;z-index:60; }
  #ec-ait-root .toast.show{ opacity:1;transform:translateX(-50%) translateY(0); }
  #ec-ait-root .toast.err{ background:var(--red); }
  @media (max-width:900px){ #ec-ait-root{ grid-template-columns:1fr; } #ec-ait-root .ec-sidebar{ display:none; } #ec-ait-root .grid2{ grid-template-columns:1fr; } }
</style>

<div id="ec-ait-root">
  <aside class="ec-sidebar">
    <div class="sb-head"><span class="logo">eC</span><span class="brand-name">eCentric</span></div>
    <nav class="nav">
      <a class="nav-item" href="/home"><span class="nav-ic"><svg class="icon" viewBox="0 0 24 24"><path d="M3 12l9-9 9 9M5 10v10h14V10"/></svg></span><span>Trang chủ</span></a>
      <a class="nav-item" href="/approvals"><span class="nav-ic"><svg class="icon" viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></span><span>Approval Center</span></a>
      <a class="nav-item active" href="/approvals/ai-topup"><span class="nav-ic"><svg class="icon" viewBox="0 0 24 24"><path d="M12 2v20M2 12h20"/></svg></span><span>AI Topup</span></a>
    </nav>
  </aside>
  <main class="ec-main">
    <div class="topbar"><div class="crumb">Approval Center / <strong>AI Topup</strong></div></div>
    <div class="content">
      <h1 class="pg">AI Topup</h1>
      <p class="pg-sub">Gửi và theo dõi yêu cầu nạp/đăng ký công cụ AI của công ty.</p>
      <div class="tabs" id="ait-tabs"></div>
      <div id="ait-body"></div>
    </div>
    <div class="toast" id="ait-toast"></div>
  </main>
</div>

<script id="ec-aitopup">
(function(){
  "use strict";
  var NS="ecentric_workspace.approval_center.api.ai_topup.";
  var state={ boot:null, tab:"create", id:null, draft:null, dirty:false, busy:false, list:null, listFilters:{}, page:0, PAGE:20 };
  function $(id){ return document.getElementById(id); }
  function esc(s){ return (s==null?"":String(s)).replace(/[&<>"']/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];}); }
  function toast(m,err){ var t=$("ait-toast"); if(!t)return; t.textContent=m; t.className="toast show"+(err?" err":""); clearTimeout(t._t); t._t=setTimeout(function(){t.className="toast";},2800); }
  function call(method,args){ var fr=window.frappe; if(!fr||!fr.call) return Promise.reject(new Error("no frappe"));
    return fr.call({method:NS+method,args:args||{},type:(/get_|list_|search_/.test(method)?"GET":"POST")}).then(function(r){return r&&r.message;}); }

  // ---- routing ----
  function readRoute(){ var q=new URLSearchParams(window.location.search); state.id=q.get("id")||null;
    var t=q.get("tab"); state.tab = state.id?"detail":(t||"create"); }
  function go(params,replace){ var q=new URLSearchParams(); Object.keys(params).forEach(function(k){ if(params[k])q.set(k,params[k]); });
    var url=window.location.pathname+(q.toString()?("?"+q.toString()):""); window.history[replace?"replaceState":"pushState"]({},"",url); route(); }
  function route(){ readRoute(); render(); }
  window.addEventListener("popstate", route);

  function tabAllowed(t){ var tb=state.boot&&state.boot.tabs||{}; return t==="create"||t==="my-requests"||(t==="my-approvals"&&tb.my_approvals)||(t==="fulfillment"&&tb.fulfillment); }
  function renderTabs(){ var box=$("ait-tabs"); if(!box)return;
    var defs=[["create","Tạo yêu cầu",true],["my-requests","Yêu cầu của tôi",true],
      ["my-approvals","Cần tôi duyệt",tabAllowed("my-approvals")],["fulfillment","Chờ Operation xử lý",tabAllowed("fulfillment")]];
    box.innerHTML=defs.map(function(d){ var act=(state.tab===d[0]||(state.tab==="detail"&&d[0]==="my-requests"))?" active":"";
      return '<button class="tab'+act+'"'+(d[2]?'':' disabled')+' data-tab="'+d[0]+'">'+esc(d[1])+'</button>'; }).join(""); }

  // ---- render dispatch ----
  function render(){ renderTabs(); var b=$("ait-body"); if(!b)return;
    if(state.tab==="detail"&&state.id) return renderDetail(b);
    if(state.tab==="my-requests") return renderMyRequests(b);
    if(state.tab==="my-approvals"||state.tab==="fulfillment") { b.innerHTML='<div class="card"><div class="state"><h4>Sắp ra mắt</h4><p>Chức năng này sẽ có ở bước tiếp theo.</p></div></div>'; return; }
    return renderCreate(b); }

  // ======================= CREATE =======================
  function opt(list,val){ return (list||[]).map(function(o){ var v=(o.value!=null?o.value:o), l=(o.label!=null?o.label:o);
    return '<option value="'+esc(v)+'"'+(String(val)===String(v)?" selected":"")+'>'+esc(l)+'</option>'; }).join(""); }
  function fld(id,label,ctrl,req,err){ return '<div class="fld'+(err?" invalid":"")+'" data-fld="'+id+'"><label>'+esc(label)+(req?' <span class="req">*</span>':'')+'</label>'+ctrl+(err?'<div class="err">'+esc(err)+'</div>':'')+'</div>'; }

  function renderCreate(b){
    var fo=state.boot&&state.boot.form_options||{}; var c=state.boot&&state.boot.context||{}; var d=state.draft||{};
    var mgrBlock = c && !c.manager_resolvable;
    b.innerHTML =
      (mgrBlock?'<div class="banner err"><svg class="icon" viewBox="0 0 24 24"><path d="M12 9v4M12 17h.01"/><circle cx="12" cy="12" r="9"/></svg><div>Không thể gửi yêu cầu vì chưa xác định được quản lý trực tiếp. Vui lòng cập nhật <b>Employee.reports_to</b>.</div></div>':'')
      + '<div class="card"><h3>Người yêu cầu</h3><div class="grid2">'
        + fld("_r1","Người yêu cầu",'<input class="ro" readonly value="'+esc(c.employee_name||c.user||"")+'">')
        + fld("_r2","Phòng ban",'<input class="ro" readonly value="'+esc(c.department||"—")+'">')
        + fld("_r3","Công ty",'<input class="ro" readonly value="'+esc(c.company||"—")+'">')
        + fld("_r4","Quản lý trực tiếp",'<input class="ro" readonly value="'+esc(c.manager_user||"Chưa xác định")+'">')
      + '</div></div>'
      + '<div class="card"><h3>Tài khoản AI</h3><div class="grid2">'
        + fld("account_mode","Hình thức tài khoản",'<select data-model="account_mode"><option value="Existing Account"'+(d.account_mode!=="New Account"?" selected":"")+'>Tài khoản hiện có</option><option value="New Account"'+(d.account_mode==="New Account"?" selected":"")+'>Tài khoản mới</option></select>',true)
        + '<div></div>'
        + '<div class="full" id="acct-sub"></div>'
      + '</div></div>'
      + '<div class="card"><h3>Thông tin yêu cầu</h3><div class="grid2">'
        + fld("request_type","Loại yêu cầu",'<select data-model="request_type"><option value="">—</option>'+opt(fo.request_types,d.request_type)+'</select>')
        + fld("requested_plan","Gói/plan yêu cầu",'<input data-model="requested_plan" value="'+esc(d.requested_plan||"")+'">')
        + fld("requested_amount","Số tiền yêu cầu",'<input type="number" min="0" data-model="requested_amount" value="'+esc(d.requested_amount||"")+'">')
        + fld("currency","Tiền tệ",'<select data-model="currency">'+opt((fo.currencies||[]).map(function(x){return {value:x,label:x};}),d.currency||"VND")+'</select>')
        + fld("needed_by","Ngày cần hoàn thành",'<input type="date" data-model="needed_by" value="'+esc(d.needed_by||"")+'">')
        + fld("purpose","Mục đích sử dụng",'<input data-model="purpose" value="'+esc(d.purpose||"")+'">')
        + fld("requester_note","Ghi chú",'<textarea data-model="requester_note" rows="2">'+esc(d.requester_note||"")+'</textarea>',false,null).replace('class="fld','class="fld full')
      + '</div><p class="hint" style="margin-top:8px">File đính kèm: dùng nút đính kèm của trang sau khi lưu nháp.</p></div>'
      + '<div class="card"><h3>Thời hạn sử dụng</h3><div class="grid2">'
        + fld("subscription_start_date","Ngày bắt đầu",'<input type="date" data-model="subscription_start_date" value="'+esc(d.subscription_start_date||"")+'">')
        + fld("subscription_end_date","Ngày kết thúc",'<input type="date" data-model="subscription_end_date" value="'+esc(d.subscription_end_date||"")+'">')
        + fld("billing_cycle","Chu kỳ thanh toán",'<select data-model="billing_cycle"><option value="">—</option>'+opt((fo.billing_cycles||[]).map(function(x){return{value:x,label:({Monthly:"Hàng tháng",Quarterly:"Hàng quý","Semi-annual":"6 tháng",Annual:"Hàng năm","One-time":"Một lần",Custom:"Tùy chỉnh"})[x]||x};}),d.billing_cycle)+'</select>')
        + fld("auto_renewal_expected","Dự kiến tự động gia hạn",'<select data-model="auto_renewal_expected"><option value="0"'+(!d.auto_renewal_expected?" selected":"")+'>Không</option><option value="1"'+(d.auto_renewal_expected?" selected":"")+'>Có</option></select>')
      + '</div></div>'
      + '<div class="card"><h3>Tóm tắt</h3><div id="ait-summary"></div></div>'
      + '<div class="actions">'
        + '<button class="btn" id="ait-cancel-changes">Hủy thay đổi</button>'
        + '<button class="btn" id="ait-save">Lưu nháp</button>'
        + '<button class="btn primary" id="ait-submit"'+(mgrBlock?" disabled":"")+'>Gửi phê duyệt</button>'
      + '</div>';
    renderAcctSub(); renderSummary(); wireCreate();
  }

  function renderAcctSub(){ var host=$("acct-sub"); if(!host)return; var fo=state.boot.form_options||{}; var d=state.draft||{};
    if(d.account_mode==="New Account"){
      host.innerHTML='<div class="grid2">'
        + fld("ai_tool","AI Tool",'<select data-model="ai_tool"><option value="">—</option>'+opt(fo.ai_tools,d.ai_tool)+'</select>',true)
        + fld("proposed_account_email","Email account dự kiến",'<input data-model="proposed_account_email" value="'+esc(d.proposed_account_email||"")+'">',true)
        + fld("proposed_account_manager","Người quản lý account dự kiến",'<input data-model="proposed_account_manager" list="ait-users" placeholder="tìm theo tên/email" value="'+esc(d.proposed_account_manager||"")+'"><datalist id="ait-users"></datalist>',true)
        + fld("proposed_plan","Gói đề xuất",'<input data-model="proposed_plan" value="'+esc(d.proposed_plan||"")+'">')
      +'</div>';
    } else {
      host.innerHTML='<div class="grid2">'
        + fld("ai_account","AI Account",'<input data-model="ai_account" list="ait-accts" placeholder="tìm account đang hoạt động" value="'+esc(d.ai_account||"")+'"><datalist id="ait-accts"></datalist>',true)
        + fld("ai_tool","AI Tool",'<input class="ro" readonly value="'+esc(d.ai_tool||"")+'">')
        + fld("account_email","Account email",'<input class="ro" readonly value="'+esc(d.account_email||"")+'">')
        + fld("account_manager","Người quản lý account",'<input class="ro" readonly value="'+esc(d.account_manager||"")+'">')
        + fld("current_plan","Gói hiện tại",'<input class="ro" readonly value="'+esc(d.current_plan||"")+'">')
        + fld("_p","Thời hạn hiện tại",'<input class="ro" readonly value="'+esc((d.subscription_start_date||"—")+" → "+(d.subscription_end_date||"—"))+'">')
      +'</div>';
    }
    wireDynamicLists();
  }
  function renderSummary(){ var h=$("ait-summary"); if(!h)return; var d=state.draft||{}; var c=state.boot.context||{};
    var rows=[["Tool",d.ai_tool],["Account",d.account_mode==="New Account"?d.proposed_account_email:d.ai_account],
      ["Account manager",d.account_mode==="New Account"?d.proposed_account_manager:d.account_manager],
      ["Gói",d.requested_plan||d.proposed_plan],["Số tiền",(d.requested_amount?d.requested_amount+" "+(d.currency||""):"")],
      ["Thời hạn",(d.subscription_start_date||"—")+" → "+(d.subscription_end_date||"—")],["Quản lý trực tiếp",c.manager_user||"—"],
      ["Luồng duyệt","Direct Manager → Operation Review → Finance Review → Operation Fulfillment (theo cấu hình)"]];
    h.innerHTML=rows.map(function(r){ return '<div class="summary-row"><span>'+esc(r[0])+'</span><b>'+esc(r[1]||"—")+'</b></div>'; }).join(""); }

  function setModel(k,v){ state.draft=state.draft||{}; state.draft[k]=v; state.dirty=true; }
  function wireCreate(){ var b=$("ait-body");
    b.querySelectorAll("[data-model]").forEach(function(el){ el.addEventListener("input",function(){
      var k=el.getAttribute("data-model"); var v=el.type==="number"?(el.value===""?null:Number(el.value)):(el.tagName==="SELECT"&&(k==="auto_renewal_expected")?Number(el.value):el.value);
      setModel(k,v);
      if(k==="account_mode"){ renderAcctSub(); }
      renderSummary(); validateDates(); }); });
    $("ait-save").onclick=function(){ saveDraft(false); };
    $("ait-submit").onclick=function(){ saveDraft(true); };
    $("ait-cancel-changes").onclick=function(){ if(!state.dirty||confirm("Hủy các thay đổi chưa lưu?")){ state.draft=state.id?state.draft:{}; state.dirty=false; render(); } };
  }
  function wireDynamicLists(){
    var acc=document.querySelector('[data-model="ai_account"]');
    if(acc){ acc.addEventListener("input",function(){ call("search_ai_accounts",{query:acc.value}).then(function(rows){
      var dl=$("ait-accts"); if(dl) dl.innerHTML=(rows||[]).map(function(r){return '<option value="'+esc(r.name)+'">'+esc(r.account_email)+'</option>';}).join("");
      var m=(rows||[]).find(function(r){return r.name===acc.value;});
      if(m){ ["ai_tool","account_email","current_plan","subscription_start_date","subscription_end_date"].forEach(function(k){ setModel(k, k==="account_email"?m.account_email:m[k]); }); setModel("account_manager",m.account_manager); setModel("ai_account",m.name); renderAcctSub(); renderSummary(); } }); }); }
    var mgr=document.querySelector('[data-model="proposed_account_manager"]');
    if(mgr){ mgr.addEventListener("input",function(){ call("search_active_users",{query:mgr.value}).then(function(rows){
      var dl=$("ait-users"); if(dl) dl.innerHTML=(rows||[]).map(function(r){return '<option value="'+esc(r.value)+'">'+esc(r.label)+' ('+esc(r.email)+')</option>';}).join(""); }); }); }
  }
  function validateDates(){ var d=state.draft||{}; var f=document.querySelector('[data-fld="subscription_end_date"]');
    if(!f)return true; var bad=d.subscription_start_date&&d.subscription_end_date&&d.subscription_end_date<d.subscription_start_date;
    f.classList.toggle("invalid",!!bad); var e=f.querySelector(".err"); if(bad&&!e){ e=document.createElement("div"); e.className="err"; f.appendChild(e);} if(e) e.textContent=bad?"Ngày kết thúc không thể trước ngày bắt đầu.":""; return !bad; }

  function saveDraft(thenSubmit){ if(state.busy)return; if(!validateDates()){ toast("Vui lòng sửa lỗi ngày.",true); return; }
    state.busy=true; setBusy(true);
    call("save_draft",{name:state.id||null,payload:JSON.stringify(state.draft||{})}).then(function(res){
      state.id=res.name; state.dirty=false;
      if(thenSubmit){ return call("submit_request",{name:state.id}).then(function(){ toast("Đã gửi phê duyệt."); go({id:state.id}); }); }
      toast("Đã lưu nháp."); go({id:state.id});
    }).catch(function(e){ toast(errMsg(e),true); }).then(function(){ state.busy=false; setBusy(false); }); }
  function setBusy(on){ ["ait-save","ait-submit","ait-cancel-changes"].forEach(function(id){ var el=$(id); if(el) el.disabled=on; }); }
  function errMsg(e){ var m=(e&&e.message)||""; if(/quản lý trực tiếp|manager/i.test(m)) return "Không thể gửi: chưa xác định quản lý trực tiếp."; return m||"Đã có lỗi. Vui lòng thử lại."; }

  // ======================= MY REQUESTS =======================
  function renderMyRequests(b){
    b.innerHTML='<div class="filters">'
      +'<input id="f-q" placeholder="Tìm..." value="'+esc(state.listFilters.q||"")+'">'
      +'<select id="f-tool"><option value="">Tất cả tool</option></select>'
      +'<select id="f-type"><option value="">Tất cả loại</option></select>'
      +'<input type="date" id="f-from"><input type="date" id="f-to">'
      +'<label style="font-size:13px;display:flex;gap:6px;align-items:center"><input type="checkbox" id="f-ov"> Chỉ quá hạn</label>'
      +'<button class="btn" id="f-apply">Lọc</button><button class="btn" id="f-refresh">Làm mới</button></div>'
      +'<div id="ait-list"></div><div class="pager" id="ait-pager"></div>';
    var fo=state.boot&&state.boot.form_options||{}; var ts=$("f-tool");
    (fo.ai_tools||[]).forEach(function(o){ var op=document.createElement("option"); op.value=o.value; op.textContent=o.label; ts.appendChild(op); });
    var ty=$("f-type"); (fo.request_types||[]).forEach(function(t){ var op=document.createElement("option"); op.value=t; op.textContent=t; ty.appendChild(op); });
    $("f-apply").onclick=function(){ state.page=0; loadList(); }; $("f-refresh").onclick=function(){ loadList(); };
    loadList();
  }
  function loadList(){ var host=$("ait-list"); if(!host)return; host.innerHTML=skeleton(6);
    var f={ q:$("f-q")?$("f-q").value:"", ai_tool:$("f-tool")?$("f-tool").value:"", request_type:$("f-type")?$("f-type").value:"",
      from_date:$("f-from")?$("f-from").value:"", to_date:$("f-to")?$("f-to").value:"", overdue_only:$("f-ov")&&$("f-ov").checked?1:0 };
    state.listFilters=f;
    call("list_my_requests",{filters:JSON.stringify(f),start:state.page*state.PAGE,page_length:state.PAGE}).then(function(res){
      renderList(res); }).catch(function(){ host.innerHTML='<div class="card"><div class="state"><h4>Không tải được danh sách</h4><button class="btn" id="ait-retry">Thử lại</button></div></div>'; var r=$("ait-retry"); if(r)r.onclick=loadList; }); }
  function renderList(res){ var host=$("ait-list"); var rows=res&&res.rows||[];
    if(!rows.length){ host.innerHTML='<div class="card"><div class="state"><h4>Chưa có yêu cầu</h4><p>Bấm “Tạo yêu cầu” để bắt đầu.</p></div></div>'; $("ait-pager").innerHTML=""; return; }
    host.innerHTML='<table class="tbl"><thead><tr><th>Mã</th><th>AI Tool</th><th>Account</th><th>Loại</th><th>Số tiền</th><th>Trạng thái</th><th>Bước</th><th>Cập nhật</th></tr></thead><tbody>'
      + rows.map(function(r){ return '<tr class="clickable" data-id="'+esc(r.name)+'"><td>'+esc(r.name)+'</td><td>'+esc(r.ai_tool||"—")+'</td><td>'+esc(r.account_email||"—")+'</td><td>'+esc(r.request_type||"—")+'</td><td>'+esc((r.requested_amount||"")+" "+(r.currency||""))+'</td><td>'+statusBadge(r)+'</td><td>'+esc(r.current_level?("Level "+r.current_level):"—")+'</td><td>'+esc(fmt(r.modified))+'</td></tr>'; }).join("")
      + '</tbody></table>';
    host.querySelectorAll("tr[data-id]").forEach(function(tr){ tr.onclick=function(){ go({id:tr.getAttribute("data-id")}); }; });
    var total=res.total||rows.length, pages=Math.ceil(total/state.PAGE);
    $("ait-pager").innerHTML='Trang '+(state.page+1)+'/'+Math.max(1,pages)+' &nbsp; <button class="btn" '+(state.page<=0?"disabled":"")+' id="pg-prev">‹</button> <button class="btn" '+(state.page+1>=pages?"disabled":"")+' id="pg-next">›</button>';
    var pv=$("pg-prev"),nx=$("pg-next"); if(pv)pv.onclick=function(){ if(state.page>0){state.page--;loadList();} }; if(nx)nx.onclick=function(){ state.page++; loadList(); };
  }
  function statusBadge(r){ var st=r.approval_status||"Draft"; if(st==="Approved"&&r.fulfillment_status&&r.fulfillment_status!=="Not Started") st=r.fulfillment_status;
    return badge(st); }

  // ======================= DETAIL =======================
  function renderDetail(b){ b.innerHTML=skeleton(4);
    call("get_request_detail",{name:state.id}).then(function(det){ drawDetail(b,det); })
    .catch(function(e){ var perm=/access|permission/i.test((e&&e.message)||""); b.innerHTML='<div class="card"><div class="state"><h4>'+(perm?"Bạn không có quyền xem yêu cầu này":"Không tải được yêu cầu")+'</h4><button class="btn" id="d-back">Quay lại</button></div></div>'; var bk=$("d-back"); if(bk)bk.onclick=function(){ go({tab:"my-requests"}); }; }); }
  function drawDetail(b,det){ window.__lastDetail=det; var biz=det.business||{}, ap=det.approval||{}, ff=det.fulfillment||{};
    b.innerHTML='<div style="margin-bottom:12px"><button class="btn" id="d-back">‹ Danh sách</button></div>'
      +'<div class="card"><div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px"><div><h3 style="margin:0">'+esc(biz.name||state.id)+'</h3><div class="hint">'+esc(biz.ai_tool||"")+' · '+esc(biz.requested_by||"")+' · '+esc(biz.department||"")+'</div></div><div>'+badge(ap.approval_status==="Approved"&&ff.status&&ff.status!=="Not Started"?ff.status:(ap.approval_status||"Draft"))+'</div></div></div>'
      +'<div class="card"><h3>Tiến trình phê duyệt</h3><div class="stepper" id="d-stepper"></div></div>'
      +'<div class="card"><h3>Thông tin yêu cầu</h3><div class="grid2">'+kv("Loại",biz.request_type)+kv("Gói yêu cầu",biz.requested_plan||biz.proposed_plan)+kv("Số tiền yêu cầu",(biz.requested_amount||"")+" "+(biz.currency||""))+kv("Số tiền duyệt",biz.approved_amount)+kv("Cần trước",biz.needed_by)+kv("Mục đích",biz.purpose)+'</div></div>'
      +'<div class="card"><h3>Tài khoản</h3><div class="grid2">'+kv("Hình thức",biz.account_mode)+kv("AI Account",biz.ai_account||biz.proposed_account_email)+kv("Email",biz.account_email||biz.proposed_account_email)+kv("Account manager",biz.account_manager||biz.proposed_account_manager)+'</div></div>'
      +'<div class="card"><h3>Thời hạn</h3><div class="grid2">'+kv("Bắt đầu",biz.subscription_start_date)+kv("Kết thúc",biz.subscription_end_date)+kv("Chu kỳ",biz.billing_cycle)+kv("Tự gia hạn",biz.auto_renewal_expected?"Có":"Không")+'</div></div>'
      +'<div class="card"><h3>Đính kèm</h3>'+renderAttachments(det.attachments)+'</div>'
      +'<div class="card"><h3>Hành động</h3><div class="hint">Các hành động duyệt và xử lý sẽ có ở bước tiếp theo (B3.3/B3.4).</div></div>'
      +'<div class="card"><h3>Lịch sử</h3><div class="hint">Dòng thời gian đầy đủ sẽ hiển thị ở bước tiếp theo.</div></div>';
    $("d-back").onclick=function(){ go({tab:"my-requests"}); };
    $("d-stepper").innerHTML=buildStepper(det);
  }
  function kv(k,v){ return '<div class="fld"><label>'+esc(k)+'</label><input class="ro" readonly value="'+esc(v==null||v===""?"—":v)+'"></div>'; }
  function renderAttachments(list){ if(!list||!list.length) return '<div class="hint">Chưa có tệp đính kèm.</div>';
    return '<table class="tbl"><tbody>'+list.map(function(f){ return '<tr><td>'+esc(f.file_name)+'</td><td>'+esc(f.owner)+'</td><td>'+esc(fmt(f.creation))+'</td><td><a href="'+esc(f.file_url)+'" target="_blank">Mở</a></td></tr>'; }).join("")+'</tbody></table>'; }

  // ---- DYNAMIC STEPPER ----
  function buildStepper(det){
    var levels=det.levels||[], approvers=det.approvers||[], ap=det.approval||{}, ff=det.fulfillment||{};
    var steps=[{name:"Đã gửi",state:(ap.approval_status?"done":"upcoming"),meta:""}];
    levels.forEach(function(l){
      var rows=approvers.filter(function(a){ return a.level_no===l.level_no; });
      var st="upcoming", meta="";
      if(l.level_status==="Approved"){ st="done"; var who=rows.filter(function(r){return r.status==="Approved";}).map(function(r){return r.approver;});
        meta=(who.length?("Duyệt bởi "+who.join(", ")):"")+ (l.completed_at?(" · "+fmt(l.completed_at)):"");
        var sk=rows.filter(function(r){return r.status==="Skipped";}).map(function(r){return r.approver;});
        if(sk.length) meta+=" · Bỏ qua: "+sk.join(", ")+" (không cần xử lý vì level đã được duyệt)"; }
      else if(l.level_status==="Rejected"){ st="rejected"; var rj=rows.filter(function(r){return r.status==="Rejected";}); meta="Từ chối"+(rj[0]&&rj[0].comment?(": "+rj[0].comment):""); }
      else if(l.level_status==="Information Requested"||(ap.approval_status==="Information Required"&&ap.current_level===l.level_no)){ st="info"; meta="Cần bổ sung thông tin"; }
      else if(l.level_status==="Skipped"){ st="skipped"; meta="Bỏ qua"; }
      else if(l.level_status==="In Progress"||ap.current_level===l.level_no){ st="current";
        var elig=rows.filter(function(r){return r.status==="Pending";}).map(function(r){return r.approver;});
        meta=(elig.length? (l.approval_mode==="Any One"? elig.join(" hoặc ") : elig.join(", ")) : "Đang chờ");
      }
      if(l.due_at && st==="current" && new Date(l.due_at)<new Date()){ meta+=' · <span class="ov">Quá hạn</span>'; }
      else if(l.due_at && st==="current"){ meta+=" · Hạn: "+fmt(l.due_at); }
      steps.push({name:l.level_name||("Level "+l.level_no),state:st,meta:meta,mode:l.approval_mode});
    });
    // fulfillment step
    var fst="upcoming", fmeta="";
    if(ff.status==="Completed"){ fst="done"; fmeta="Hoàn tất"+(ff.completed_by?(" bởi "+ff.completed_by):""); }
    else if(ff.status==="In Progress"){ fst="current"; fmeta="Đang xử lý"+(ff.owner?(" · "+ff.owner):""); }
    else if(ff.status==="Assigned"){ fst="current"; fmeta="Đã giao Operation"; }
    steps.push({name:"Operation Fulfillment",state:fst,meta:fmeta});
    steps.push({name:"Hoàn tất",state:(ff.status==="Completed"?"done":"upcoming"),meta:""});
    var LBL={done:"Hoàn thành",current:"Đang xử lý",upcoming:"Chờ",rejected:"Từ chối",info:"Cần bổ sung",skipped:"Bỏ qua"};
    return steps.map(function(s,i){ return '<div class="step '+s.state+'"><div class="step-top"><div class="step-dot">'+(s.state==="done"?"✓":(s.state==="rejected"?"✕":(i+1)))+'</div>'
      +'<div class="step-name">'+esc(s.name)+'</div><div class="step-state" style="color:'+stColor(s.state)+'">'+esc(LBL[s.state]||s.state)+'</div></div>'
      +'<div class="step-meta">'+ (s.meta||"") +'</div></div>'; }).join("");
  }
  function stColor(s){ return {done:"var(--green)",current:"var(--navy)",rejected:"var(--red)",info:"var(--amber)",skipped:"var(--gray-400)",upcoming:"var(--gray-400)"}[s]||"var(--gray-400)"; }

  // ---- helpers ----
  function skeleton(n){ var s=""; for(var i=0;i<n;i++) s+='<div class="skel-row"></div>'; return '<div class="card" style="padding:0;overflow:hidden">'+s+'</div>'; }
  function fmt(d){ if(!d)return "—"; try{ return String(d).replace("T"," ").slice(0,16); }catch(e){ return String(d); } }
  function badge(st){ var map={ "Draft":["b-gray","Nháp"],"Pending":["b-navy","Đang phê duyệt"],"Information Required":["b-amber","Cần bổ sung"],
    "Approved":["b-green","Đã duyệt"],"Rejected":["b-red","Bị từ chối"],"Cancelled":["b-gray","Đã hủy"],
    "Assigned":["b-navy","Đã giao"],"In Progress":["b-navy","Đang xử lý"],"Completed":["b-green","Hoàn tất"],"Not Started":["b-gray","Chưa xử lý"] };
    var m=map[st]||["b-gray",st]; return '<span class="badge '+m[0]+'"><span class="dot"></span>'+esc(m[1])+'</span>'; }

  // unsaved-change warning
  window.addEventListener("beforeunload", function(e){ if(state.dirty){ e.preventDefault(); e.returnValue=""; } });

  function boot(){ var t=$("ait-tabs"); if(t){ t.addEventListener("click",function(e){ var b=e.target.closest("[data-tab]"); if(b&&!b.disabled){ state.page=0; go({tab:b.getAttribute("data-tab")}); } }); }
    call("get_bootstrap").then(function(bootData){ state.boot=bootData||{tabs:{},context:{},form_options:{}}; route(); })
    .catch(function(){ var bd=$("ait-body"); if(bd) bd.innerHTML='<div class="card"><div class="state"><h4>Không tải được trang</h4><button class="btn" id="b-retry">Thử lại</button></div></div>'; var r=$("b-retry"); if(r)r.onclick=boot; }); }

  window.AITopup={ state:state, buildStepper:buildStepper, render:render, route:route, _boot:boot, _call:call, badge:badge };
  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded", boot); else boot();
})();
</script>

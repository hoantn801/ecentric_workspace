<script id="ec-aitopup">
(function(){
  "use strict";
  var NS="ecentric_workspace.approval_center.api.ai_topup.";
  var state={ boot:null, tab:"create", id:null, draft:null, dirty:false, busy:false, list:null, listFilters:{}, page:0, PAGE:20 };
  function $(id){ return document.getElementById(id); }
  function esc(s){ return (s==null?"":String(s)).replace(/[&<>"']/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];}); }
  function toast(m,err){ var t=$("ait-toast"); if(!t)return; t.textContent=m; t.className="toast show"+(err?" err":""); clearTimeout(t._t); t._t=setTimeout(function(){t.className="toast";},2800); }
  function call(method,args){ var fr=window.frappe; if(!fr||!fr.call) return Promise.reject(new Error("no frappe"));
    return fr.call({method:NS+method,args:args||{},type:(/get_|list_|search_/.test(method)?"GET":"POST")}).then(function(r){return r&&r.message;}); }

  // ---- routing ----
  function readRoute(){ state.mode="create"; var q=new URLSearchParams(window.location.search); state.id=q.get("id")||null;
    var t=q.get("tab"); state.tab = state.id?"detail":(t||"create"); }
  function go(params,replace){ var q=new URLSearchParams(); Object.keys(params).forEach(function(k){ if(params[k])q.set(k,params[k]); });
    var url=window.location.pathname+(q.toString()?("?"+q.toString()):""); window.history[replace?"replaceState":"pushState"]({},"",url); route(); }
  function route(){ readRoute(); render(); }
  window.addEventListener("popstate", route);

  function tabAllowed(t){ var tb=state.boot&&state.boot.tabs||{}; return t==="create"||t==="my-requests"||(t==="my-approvals"&&tb.my_approvals)||(t==="fulfillment"&&tb.fulfillment); }
  function renderTabs(){ var box=$("ait-tabs"); if(!box)return;
    var defs=[["create","Tạo yêu cầu",true],["my-requests","Yêu cầu của tôi",true],
      ["my-approvals","Cần tôi duyệt",tabAllowed("my-approvals")],["fulfillment","Chờ Operation xử lý",tabAllowed("fulfillment")]];
    box.innerHTML=defs.map(function(d){ var act=(state.tab===d[0]||(state.tab==="detail"&&d[0]==="my-requests"))?" active":"";
      return '<button class="tab'+act+'"'+(d[2]?'':' disabled')+' data-tab="'+d[0]+'">'+esc(d[1])+'</button>'; }).join(""); }

  // ---- render dispatch ----
  function render(){ renderTabs(); var b=$("ait-body"); if(!b)return;
    if(state.tab==="detail"&&state.id) return renderDetail(b);
    if(state.tab==="my-requests") return renderMyRequests(b);
    if(state.tab==="my-approvals") return renderMyApprovals(b);
    if(state.tab==="fulfillment") return renderFulfillment(b);
    return renderCreate(b); }

  function opt(list,val){ return (list||[]).map(function(o){ var v=(o.value!=null?o.value:o), l=(o.label!=null?o.label:o);

  function renderCreate(b){
    var fo=state.boot&&state.boot.form_options||{}; var c=state.boot&&state.boot.context||{}; var d=state.draft||{};
    var editing=state.mode==="edit"; var mgrBlock=!editing && c && !c.manager_resolvable;
    var head = editing
      ? (infoRequiredBannerHTML()+'<div class="banner info" id="ait-material-warn" style="display:none"><svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 8v5"/></svg><div>Các thay đổi quan trọng sẽ làm yêu cầu được duyệt lại từ bước đầu.</div></div>')
      : (mgrBlock?blockAlertHTML(c):'');
    var actions = editing
      ? '<div class="actions"><button class="btn" id="ait-edit-cancel">Hủy</button><button class="btn primary" id="ait-resubmit">Gửi lại</button></div>'
      : '<div class="actions"><button class="btn" id="ait-cancel-changes">Hủy thay đổi</button><button class="btn" id="ait-save">Lưu nháp</button><button class="btn primary" id="ait-submit"'+(mgrBlock?" disabled":"")+'>Gửi phê duyệt</button></div>';
    // roadmap always visible on Create (not on edit/resubmit); sits below tabs, above the blocking alert + form.
    b.innerHTML = '<div class="ait-formwrap">' + (editing?"":roadmapHTML()) + head + formCardsHTML(d,c,fo) + actions + '</div>';
    if(editing) state._origMaterial=materialSnap(d);

  function renderAcctSub(){ var host=$("acct-sub"); if(!host)return; var fo=state.boot.form_options||{}; var d=state.draft||{};
    var noTools = !(fo.ai_tools && fo.ai_tools.length);

      ? '<select data-model="ai_tool" disabled><option value="">—</option></select><div class="err">Chưa có AI Tool nào. Vui lòng tạo EC AI Tool trong Desk trước khi gửi yêu cầu.</div>'
      : '<select data-model="ai_tool"><option value="">—</option>'+opt(fo.ai_tools,d.ai_tool)+'</select>';
    if(d.account_mode==="New Account"){
      host.innerHTML='<div class="grid2">'
        + fld("ai_tool","AI Tool",toolCtrl,true)
        + fld("proposed_account_email","Email account dự kiến",'<input data-model="proposed_account_email" value="'+esc(d.proposed_account_email||"")+'">',true)
        + fld("proposed_account_manager","Người quản lý account dự kiến",'<input data-model="proposed_account_manager" list="ait-users" placeholder="tìm theo tên/email" value="'+esc(d.proposed_account_manager||"")+'"><datalist id="ait-users"></datalist>',true)
        + fld("proposed_plan","Gói đề xuất",'<input data-model="proposed_plan" value="'+esc(d.proposed_plan||"")+'">')
      +'</div>';
    } else {
      host.innerHTML='<div class="grid2">'
        + fld("ai_account","AI Account",'<input data-model="ai_account" list="ait-accts" placeholder="tìm account đang hoạt động" value="'+esc(d.ai_account||"")+'"><datalist id="ait-accts"></datalist>',true)
        + fld("ai_tool","AI Tool",'<input class="ro" readonly value="'+esc(d.ai_tool||"")+'">')
        + fld("account_email","Account email",'<input class="ro" readonly value="'+esc(d.account_email||"")+'">')
        + fld("account_manager","Người quản lý account",'<input class="ro" readonly value="'+esc(d.account_manager||"")+'">')
        + fld("current_plan","Gói hiện tại",'<input class="ro" readonly value="'+esc(d.current_plan||"")+'">')
        + fld("_p","Thời hạn hiện tại của account",'<input class="ro" readonly value="'+esc(d.ai_account?((d.subscription_start_date||"—")+" → "+(d.subscription_end_date||"—")):"Chưa chọn account")+'">')
      +'</div>';

  function renderSummary(){ var h=$("ait-summary"); if(!h)return; var d=state.draft||{}; var c=state.boot.context||{};
    var isNew=d.account_mode==="New Account";
    var acct=isNew?d.proposed_account_email:(d.account_email||d.ai_account);
    var mgr=isNew?d.proposed_account_manager:d.account_manager;
    var plan=isNew?(d.requested_plan||d.proposed_plan):(d.current_plan||d.requested_plan);
    var rows=[["Tiêu đề",d.request_title],["Tool",d.ai_tool],["Account",acct],["Account manager",mgr],
      ["Gói",plan],["Số tiền",(d.requested_amount?d.requested_amount+" "+(d.currency||""):"")],["Cơ sở VAT/thuế/phí",taxBasisLabel(d.tax_fee_basis)],
      ["Thời hạn",(d.subscription_start_date||"—")+" → "+(d.subscription_end_date||"—")],["Quản lý trực tiếp",c.manager_user||"—"],
      ["Luồng duyệt","Direct Manager → Operation Review → Finance Review → Operation Fulfillment (theo cấu hình)"]];
    h.innerHTML=rows.map(function(r){ return '<div class="summary-row"><span>'+esc(r[0])+'</span><b>'+esc(r[1]||"—")+'</b></div>'; }).join(""); }

  function setModel(k,v){ state.draft=state.draft||{}; state.draft[k]=v; state.dirty=true; }
  function setBusyIds(ids,on){ ids.forEach(function(id){ var el=$(id); if(el) el.disabled=on; }); }
  function attachModel(el){ if(el.__ecw) return; el.__ecw=true;
    el.addEventListener("input",function(){ var editing=state.mode==="edit";
      var k=el.getAttribute("data-model"); var v=el.type==="number"?(el.value===""?null:Number(el.value)):((el.tagName==="SELECT"&&k==="auto_renewal_expected")?Number(el.value):el.value);
      setModel(k,v);
      if(k==="request_title") state.titleTouched=((el.value||"").trim()!=="");
      if(k==="account_mode") renderAcctSub();
      if(k!=="request_title") maybeAutoTitle();
      renderSummary(); validateDates(); clearFieldError(k);
      if(editing){ var w=$("ait-material-warn"); if(w) w.style.display=(materialSnap(state.draft)!==state._origMaterial)?"flex":"none"; } }); }
  function wireModels(scope){ (scope||document).querySelectorAll("[data-model]").forEach(attachModel); }
  function suggestTitle(d){ d=d||{}; var acct=d.account_mode==="New Account"?d.proposed_account_email:d.account_email;
    var parts=[d.request_type,d.ai_tool,acct].filter(function(x){return x&&String(x).trim();});
    return parts.length?parts.join(" - ").slice(0,140):""; }
  function maybeAutoTitle(){ if(state.titleTouched)return; var sug=suggestTitle(state.draft||{}); if(!sug)return;
    state.draft=state.draft||{}; state.draft.request_title=sug; state.dirty=true;
    var t=document.querySelector('[data-model="request_title"]'); if(t&&t.value!==sug) t.value=sug; }
  function setFieldError(id,msg){ var f=document.querySelector('[data-fld="'+id+'"]'); if(!f)return;
    f.classList.toggle("invalid",!!msg); var e=f.querySelector(".err");
    if(msg){ if(!e){ e=document.createElement("div"); e.className="err"; f.appendChild(e);} e.textContent=msg; } else if(e){ e.textContent=""; } }
  function clearFieldError(id){ setFieldError(id,null); }
  function showFieldErrors(errs){ ["request_title","requested_amount","ai_tool","proposed_account_email","proposed_account_manager","ai_account"].forEach(function(id){ setFieldError(id,(errs&&errs[id])||null); });
    var first=errs&&Object.keys(errs)[0]; if(first){ var el=document.querySelector('[data-fld="'+first+'"] input,[data-fld="'+first+'"] select'); if(el&&el.focus){ try{el.focus();}catch(e){} } } }
  function validateSubmit(){ var d=state.draft||{}; var errs={};
    if(!((d.request_title||"").toString().trim())) errs.request_title="Vui lòng nhập tiêu đề yêu cầu.";
    if(d.requested_amount==null||d.requested_amount==="") errs.requested_amount="Vui lòng nhập số tiền đề nghị thanh toán.";
    if(d.account_mode==="New Account"){
      if(!((d.ai_tool||"").toString().trim())) errs.ai_tool="Vui lòng chọn AI Tool.";
      if(!((d.proposed_account_email||"").toString().trim())) errs.proposed_account_email="Vui lòng nhập email account dự kiến.";
      if(!((d.proposed_account_manager||"").toString().trim())) errs.proposed_account_manager="Vui lòng nhập người quản lý account dự kiến.";
    } else { if(!((d.ai_account||"").toString().trim())) errs.ai_account="Vui lòng chọn account."; }
    return Object.keys(errs).length?errs:null; }
  function applyBackendError(e){ var m=(e&&e.message)||"";
    if(/New Account requests require/i.test(m)){ var errs={};
      if(/ai_tool/.test(m)) errs.ai_tool="Vui lòng chọn AI Tool.";
      if(/proposed_account_email/.test(m)) errs.proposed_account_email="Vui lòng nhập email account dự kiến.";
      if(/proposed_account_manager/.test(m)) errs.proposed_account_manager="Vui lòng nhập người quản lý account dự kiến.";
      showFieldErrors(errs); toast("Vui lòng bổ sung thông tin tài khoản mới.",true); return true; }
    if(/Existing Account requests require/i.test(m)){ showFieldErrors({ai_account:"Vui lòng chọn account hiện có."}); toast("Vui lòng chọn account hiện có.",true); return true; }
    if(/request title|tiêu đề/i.test(m)){ showFieldErrors({request_title:"Vui lòng nhập tiêu đề yêu cầu."}); toast("Vui lòng nhập tiêu đề yêu cầu.",true); return true; }
    return false; }
  function friendlyErr(e){ var m=(e&&e.message)||"";
    if(/not Active/i.test(m)) return "Account đã chọn không còn hoạt động.";
    if(/end date cannot be before/i.test(m)) return "Ngày kết thúc không thể trước ngày bắt đầu.";
    if(/quản lý trực tiếp|manager/i.test(m)) return "Không thể gửi: chưa xác định quản lý trực tiếp.";
    return "Đã có lỗi khi lưu/gửi yêu cầu. Vui lòng thử lại."; }
  function wireCreate(){ var b=$("ait-body"); var editing=state.mode==="edit";
    wireModels(b);
    if(editing){
      $("ait-edit-cancel").onclick=function(){ state.mode="create"; renderDetail($("ait-body")); };
      $("ait-resubmit").onclick=function(){ if(!validateDates()){ toast("Vui lòng sửa lỗi ngày.",true); return; } setBusyIds(["ait-resubmit","ait-edit-cancel"],true);
        call("resubmit",{name:state.id,payload:JSON.stringify(state.draft)}).then(function(res){ toast(res&&res.restarted?"Đã gửi lại — duyệt lại từ đầu.":"Đã gửi lại — tiếp tục ở cấp yêu cầu."); state.mode="create"; renderDetail($("ait-body")); }).catch(function(e){ toast(mapErr(e),true); setBusyIds(["ait-resubmit","ait-edit-cancel"],false); }); };
      return;
    }
    $("ait-save").onclick=function(){ saveDraft(false); };
    $("ait-submit").onclick=function(){ saveDraft(true); };
    $("ait-cancel-changes").onclick=function(){ if(!state.dirty||confirm("Hủy các thay đổi chưa lưu?")){ state.draft=state.id?state.draft:{}; state.dirty=false; render(); } };
  }
  function wireDynamicLists(){
    var acc=document.querySelector('[data-model="ai_account"]');
    if(acc){ acc.addEventListener("input",function(){ call("search_ai_accounts",{query:acc.value}).then(function(rows){
      var dl=$("ait-accts"); if(dl) dl.innerHTML=(rows||[]).map(function(r){return '<option value="'+esc(r.name)+'">'+esc(r.account_email)+'</option>';}).join("");
      var m=(rows||[]).find(function(r){return r.name===acc.value;});
      if(m){ ["ai_tool","account_email","current_plan","subscription_start_date","subscription_end_date"].forEach(function(k){ setModel(k, k==="account_email"?m.account_email:m[k]); }); setModel("account_manager",m.account_manager); setModel("ai_account",m.name); renderAcctSub(); maybeAutoTitle(); renderSummary(); } }); }); }
    var mgr=document.querySelector('[data-model="proposed_account_manager"]');
    if(mgr){ mgr.addEventListener("input",function(){ call("search_active_users",{query:mgr.value}).then(function(rows){
      var dl=$("ait-users"); if(dl) dl.innerHTML=(rows||[]).map(function(r){return '<option value="'+esc(r.value)+'">'+esc(r.label)+' ('+esc(r.email)+')</option>';}).join(""); }); }); }
  }
  function validateDates(){ var d=state.draft||{}; var f=document.querySelector('[data-fld="subscription_end_date"]');
    if(!f)return true; var bad=d.subscription_start_date&&d.subscription_end_date&&d.subscription_end_date<d.subscription_start_date;
    f.classList.toggle("invalid",!!bad); var e=f.querySelector(".err"); if(bad&&!e){ e=document.createElement("div"); e.className="err"; f.appendChild(e);} if(e) e.textContent=bad?"Ngày kết thúc không thể trước ngày bắt đầu.":""; return !bad; }

  function saveDraft(thenSubmit){ if(state.busy)return; if(!validateDates()){ toast("Vui lòng sửa lỗi ngày.",true); return; }
    if(thenSubmit){ var verrs=validateSubmit(); if(verrs){ showFieldErrors(verrs); toast("Vui lòng kiểm tra các trường bắt buộc.",true); return; } }

  // Draft / pre-submit preview: no runtime EC Approval Request yet -> show the configured flow.
  function buildDraftStepper(det){
    var prev=det.process_preview||[];
    var steps=[{name:"Tạo yêu cầu",state:"current",statusLabel:"Đang thực hiện",meta:""}];
    if(prev.length){ prev.forEach(function(l){ steps.push({name:l.level_name||("Level "+l.level_no),state:"upcoming",statusLabel:"Chờ",meta:""}); }); }
    else { ["Manager duyệt","Operation duyệt","Finance duyệt"].forEach(function(n){ steps.push({name:n,state:"upcoming",statusLabel:"Chờ",meta:""}); }); }
    steps.push({name:"Operation xử lý",state:"upcoming",statusLabel:"Chờ",meta:""});
    steps.push({name:"Hoàn tất",state:"upcoming",statusLabel:"Chờ",meta:""});
    return renderStepsHTML(steps);

  function buildStepper(det){
    var ap=det.approval||{};
    // No runtime approval request (Draft / not yet submitted) -> configured preview.
    if(!ap.name) return buildDraftStepper(det);
    var levels=det.levels||[], approvers=det.approvers||[], ff=det.fulfillment||{};
    var steps=[{name:"Đã gửi",state:"done",meta:""}];
    levels.forEach(function(l){
      var rows=approvers.filter(function(a){ return a.level_no===l.level_no; });
      var st="upcoming", meta="";
      if(l.level_status==="Approved"){ st="done"; var who=rows.filter(function(r){return r.status==="Approved";}).map(function(r){return r.approver;});
        meta=(who.length?("Duyệt bởi "+who.join(", ")):"")+ (l.completed_at?(" · "+fmt(l.completed_at)):"");
        var sk=rows.filter(function(r){return r.status==="Skipped";}).map(function(r){return r.approver;});
        if(sk.length) meta+=" · Bỏ qua: "+sk.join(", ")+" (không cần xử lý vì level đã được duyệt)"; }
      else if(l.level_status==="Rejected"){ st="rejected"; var rj=rows.filter(function(r){return r.status==="Rejected";}); meta="Từ chối"+(rj[0]&&rj[0].comment?(": "+rj[0].comment):""); }
      else if(l.level_status==="Information Requested"||(ap.approval_status==="Information Required"&&ap.current_level===l.level_no)){ st="info"; meta="Cần bổ sung thông tin"; }
      else if(l.level_status==="Skipped"){ st="skipped"; meta="Bỏ qua"; }
      else if(l.level_status==="In Progress"||ap.current_level===l.level_no){ st="current";
        var elig=rows.filter(function(r){return r.status==="Pending";}).map(function(r){return r.approver;});
        meta=(elig.length? (l.approval_mode==="Any One"? elig.join(" hoặc ") : elig.join(", ")) : "Đang chờ");
      }
      if(l.due_at && st==="current" && new Date(l.due_at)<new Date()){ meta+=' · <span class="ov">Quá hạn</span>'; }
      else if(l.due_at && st==="current"){ meta+=" · Hạn: "+fmt(l.due_at); }
      steps.push({name:l.level_name||("Level "+l.level_no),state:st,meta:meta,mode:l.approval_mode});
    });
    // fulfillment step
    var fst="upcoming", fmeta="";
    var ovF = ff.due_at && new Date(ff.due_at)<new Date() && (ff.status==="Assigned"||ff.status==="In Progress");
    if(ff.status==="Completed"){ fst="done"; fmeta="Hoàn tất"+(ff.completed_by?(" bởi "+ff.completed_by):"")+(ff.completed_at?(" · "+fmt(ff.completed_at)):""); }
    else if(ff.status==="In Progress"){ fst="current"; fmeta="Đang xử lý"+(ff.owner?(" · "+ff.owner):""); }
    else if(ff.status==="Assigned"){ fst="current"; fmeta="Đã giao Operation"+((ff.eligible_fulfillers&&ff.eligible_fulfillers.length)?(" · "+ff.eligible_fulfillers.join(" hoặc ")):""); }
    else if(ff.status==="Cancelled"){ fst="rejected"; fmeta="Đã hủy"; }
    if(ovF) fmeta+=' · <span class="ov">Quá hạn</span>'; else if(ff.due_at && fst==="current") fmeta+=" · Hạn: "+fmt(ff.due_at);
    steps.push({name:"Operation Fulfillment",state:fst,meta:fmeta});
    steps.push({name:"Hoàn tất",state:(ff.status==="Completed"?"done":"upcoming"),meta:""});
    return renderStepsHTML(steps);
  }

  // Robust delegated dispatch: bound ONCE on document, so detail action buttons keep working after
  // every detail/action-panel re-render (per-element onclick was being lost on re-render in-browser).
  function handleActionClick(e){
    var el = e.target && e.target.closest ? e.target.closest("[data-act],[data-action]") : null;
    if(!el) return;
    var a = el.getAttribute("data-act") || el.getAttribute("data-action");
    if(!a || el.disabled) return;
    if(document.querySelector(".ec-ait-overlay")) return;   // OUR modal already open -> ignore (dup-click guard; scoped so theme .overlay never blocks)
    e.preventDefault();
    var det=state.detail||window.__lastDetail||{};
    var name=(det.business||{}).name||state.id;
    if(a==="editdraft"||a==="edit_draft") return startEditDraft(det);
    if(a==="submitdraft"||a==="submit_draft"||a==="submit") return doSubmitDraft(name);
    if(a==="edit") return startEditResubmit(det);
    if(a==="approve") return doApprove(name,det);
    if(a==="reject") return doReject(name);
    if(a==="reqinfo"||a==="request_info") return doRequestInfo(name);
    if(a==="adminapprove"||a==="admin_override") return doAdminApprove(name);
    if(a==="cancel") return doCancel(name);
  }
  // Delegate on document in CAPTURE phase so no ancestor stopPropagation can swallow the click; idempotent.
  function bindActionDelegation(){ if(document.__ecActBound) return; document.__ecActBound=true; document.addEventListener("click", handleActionClick, true); }
  function ensureActionHandlers(){ bindActionDelegation(); }   // safe to call after every detail render
  function wireActionPanel(det){ state.detail=det; ensureActionHandlers(); }

    var fd=new FormData(); fd.append("file",file,newName); fd.append("file_name",newName); fd.append("is_private","1"); fd.append("doctype","EC AI Topup Request"); fd.append("docname",state.id);
    var lbl=$(labelId); if(lbl) lbl.textContent="Đang tải...";
    fetch("/api/method/upload_file",{method:"POST",headers:{"X-Frappe-CSRF-Token":(window.frappe&&frappe.csrf_token)||""},body:fd})
      .then(function(r){return r.json();}).then(function(j){ var m=j&&j.message; var url=m&&m.file_url; state.comp=state.comp||{}; state.comp[field]=url; state.comp[field+"_name"]=(m&&m.file_name)||newName; if(lbl) lbl.textContent=url?("Đã tải: "+((m&&m.file_name)||newName)):"Lỗi tải"; })
      .catch(function(){ if(lbl) lbl.textContent="Lỗi tải"; }); }
  function wireFulfillment(det){ var name=(det.business||{}).name;
    var cl=$("ait-claim"); if(cl){ cl.onclick=function(){ cl.disabled=true; call("claim_fulfillment",{name:name}).then(function(){ toast("Đã nhận xử lý."); refreshDetail(); }).catch(function(e){ toast(mapErr(e),true); refreshDetail(); }); }; }
    state.comp=state.comp||{};
    document.querySelectorAll("[data-comp]").forEach(function(el){ var k=el.getAttribute("data-comp"); if(state.comp[k]==null||state.comp[k]==="") state.comp[k]=el.value; el.addEventListener("input",function(){ state.comp=state.comp||{}; state.comp[el.getAttribute("data-comp")]=el.value; }); });
    var pp=document.querySelector('[data-upload="payment_proof"]'); if(pp) pp.addEventListener("change",function(){ uploadFile(pp,"payment_proof","pp-name","PaymentProof",det); });
    var ir=document.querySelector('[data-upload="invoice_receipt"]'); if(ir) ir.addEventListener("change",function(){ uploadFile(ir,"invoice_receipt","ir-name","Invoice",det); });
    var inv=document.querySelector('[data-comp="invoice_status"]'); if(inv) inv.addEventListener("change",function(){ state.comp=state.comp||{}; state.comp.invoice_status=inv.value; applyInvoiceConditional(); });
    applyInvoiceConditional();
    var mgr=document.querySelector('[data-comp="confirmed_account_manager"]'); if(mgr) mgr.addEventListener("input",function(){ call("search_active_users",{query:mgr.value}).then(function(rows){ var dl=$("ait-users"); if(dl) dl.innerHTML=(rows||[]).map(function(r){return '<option value="'+esc(r.value)+'">'+esc(r.label)+'</option>';}).join(""); }); });
    var cb=$("ait-complete"); if(cb){ cb.onclick=function(){ doComplete(name); }; } }
  function completionErrors(){ var c=state.comp||{}; var e=[];
    if(!c.payment_proof) e.push("Vui lòng bổ sung chứng từ thanh toán.");        // always required
    if(!c.actual_amount) e.push("Vui lòng nhập số tiền thực.");
    if(!c.transaction_reference) e.push("Vui lòng nhập mã giao dịch.");           // backend requires it always
    if(!c.invoice_status) e.push("Vui lòng chọn tình trạng hóa đơn.");
    if(c.invoice_status==="Invoice Available" && !c.invoice_receipt) e.push("Vui lòng tải hóa đơn/biên nhận.");
    if(c.invoice_status==="No Invoice Issued" && !c.no_invoice_reason) e.push("Vui lòng nhập lý do không phát hành hóa đơn.");
    return e; }
  // Conditional fulfillment invoice UI: show reason only for "No Invoice Issued"; hide invoice upload then.
  function applyInvoiceConditional(){ var st=(state.comp&&state.comp.invoice_status)||"";
    var noInv = st==="No Invoice Issued";
    var ir=document.querySelector('[data-fld="invoice_receipt"]'); var nr=document.querySelector('[data-fld="no_invoice_reason"]');
    if(ir) ir.style.display = noInv ? "none" : "";
    if(nr) nr.style.display = noInv ? "" : "none";
    if(!noInv){ if(state.comp) state.comp.no_invoice_reason=""; var nri=document.querySelector('[data-comp="no_invoice_reason"]'); if(nri) nri.value=""; }
  }
  // Business-readable evidence file name (renames at upload; keeps file_url safe; no account email).
  function _fileExt(n){ var m=String(n||"").match(/\.[A-Za-z0-9]{1,8}$/); return m?m[0].toLowerCase():""; }
  function _shortCode(nm){ var num=(String(nm||"").match(/(\d+)\s*$/)||[])[1]||"00000"; return "AITOP_"+num; }
  function _sanTok(x){ return String(x==null?"":x).replace(/[^A-Za-z0-9]+/g,""); }
  function normalizeEvidenceName(det, evidenceType, origName, seq){
    var b=(det&&det.business)||{};
    var d=new Date(); var p=function(n){return String(n).padStart(2,"0");};
    var ddmmyy=p(d.getDate())+p(d.getMonth()+1)+String(d.getFullYear()).slice(-2);
    var mode=b.account_mode==="New Account"?"NewAccount":(b.account_mode==="Existing Account"?"ExistingAccount":"Account");
    var rtype=_sanTok(b.request_type)||"Request";
    var ev=_sanTok(evidenceType)||"Other";
    var sq=("0"+(seq||1)).slice(-2);
    var base=[ddmmyy,_shortCode(b.name),mode,rtype,ev,sq].join("_").replace(/[^A-Za-z0-9_]/g,"").replace(/_+/g,"_").slice(0,120);
    return base+_fileExt(origName);
  }
  function doComplete(name){ var errs=completionErrors(); if(errs.length){ toast(errs[0],true); return; }
    var c=state.comp||{}; var body='<div class="summary-row"><span>Số tiền thực</span><b>'+esc((c.actual_amount||"")+" "+(c.actual_currency||""))+'</b></div><div class="summary-row"><span>Mã giao dịch</span><b>'+esc(c.transaction_reference||"—")+'</b></div><div class="summary-row"><span>Hóa đơn</span><b>'+esc(c.invoice_status||"—")+'</b></div>';
    modal("Xác nhận hoàn tất", body, {okLabel:"Hoàn tất", onConfirm:function(){ return call("complete_fulfillment",{name:name,payload:JSON.stringify(c)}).then(function(){ toast("Đã hoàn tất xử lý."); state.comp={}; refreshDetail(); }).catch(function(e){ toast(mapErr(e),true); refreshDetail(); return Promise.reject(e); }); }}); }
  function renderFulfillment(b){ if(!(state.boot&&state.boot.tabs&&state.boot.tabs.fulfillment)){ b.innerHTML='<div class="card"><div class="state"><h4>Không khả dụng</h4><p>Bạn không thuộc nhóm Operation xử lý.</p></div></div>'; return; }
    b.innerHTML='<div id="ff-unclaimed"></div><div id="ff-mine"></div>'+(state.boot.is_system_manager?'<div id="ff-others"></div>':'');
    loadFulfill("unclaimed","ff-unclaimed","Chưa có người nhận"); loadFulfill("mine","ff-mine","Tôi đang xử lý"); if(state.boot.is_system_manager) loadFulfill("others","ff-others","Đang được người khác xử lý"); }
  function loadFulfill(section,host,title){ var h=$(host); if(!h)return; h.innerHTML='<div class="sect-h">'+esc(title)+'</div>'+skeleton(2);
    call("list_fulfillment_queue",{section:section}).then(function(res){ var rows=res&&res.rows||[];
      if(!rows.length){ h.innerHTML='<div class="sect-h">'+esc(title)+'</div><div class="card"><div class="state"><h4>Không có mục nào</h4></div></div>'; return; }
      h.innerHTML='<div class="sect-h">'+esc(title)+'</div><table class="tbl"><thead><tr><th>Mã</th><th>Người yêu cầu</th><th>AI Tool</th><th>Account</th><th>Số tiền duyệt</th><th>SLA</th><th>Owner</th><th></th></tr></thead><tbody>'
        + rows.map(function(r){ var ov=r.fulfillment_due_at&&new Date(r.fulfillment_due_at)<new Date();
          var act='<button class="btn" data-open="'+esc(r.name)+'">Chi tiết</button>';
          if(section==="unclaimed") act+=' <button class="btn primary" data-claim="'+esc(r.name)+'">Nhận xử lý</button>';
          else if(section==="mine") act+=' <button class="btn primary" data-open2="'+esc(r.name)+'">Hoàn tất xử lý</button>';
          return '<tr><td>'+esc(r.name)+'</td><td>'+esc(r.requested_by||"—")+'</td><td>'+esc(r.ai_tool||"—")+'</td><td>'+esc(r.account_email||"—")+'</td><td>'+esc(r.approved_amount||"—")+'</td><td>'+(ov?'<span style="color:var(--red)">Quá hạn</span>':esc(fmt(r.fulfillment_due_at)))+'</td><td>'+esc(r.fulfillment_owner||"—")+'</td><td>'+act+'</td></tr>'; }).join("")
        +'</tbody></table>';
      h.querySelectorAll("[data-open],[data-open2]").forEach(function(el){ el.onclick=function(){ go({id:el.getAttribute("data-open")||el.getAttribute("data-open2")}); }; });
      h.querySelectorAll("[data-claim]").forEach(function(el){ el.onclick=function(){ el.disabled=true; call("claim_fulfillment",{name:el.getAttribute("data-claim")}).then(function(){ toast("Đã nhận xử lý."); renderFulfillment($("ait-body")); }).catch(function(e){ toast(mapErr(e),true); renderFulfillment($("ait-body")); }); }; });
    }).catch(function(){ h.innerHTML='<div class="sect-h">'+esc(title)+'</div><div class="card"><div class="state"><h4>Không tải được</h4><button class="btn" data-r>Thử lại</button></div></div>'; var r=h.querySelector("[data-r]"); if(r)r.onclick=function(){ loadFulfill(section,host,title); }; }); }

  function boot(){ bindActionDelegation(); var t=$("ait-tabs"); if(t){ t.addEventListener("click",function(e){ var b=e.target.closest("[data-tab]"); if(b&&!b.disabled){ state.page=0; go({tab:b.getAttribute("data-tab")}); } }); }
    call("get_bootstrap").then(function(bootData){ state.boot=bootData||{tabs:{},context:{},form_options:{}}; route(); })
    .catch(function(){ var bd=$("ait-body"); if(bd) bd.innerHTML='<div class="card"><div class="state"><h4>Không tải được trang</h4><button class="btn" id="b-retry">Thử lại</button></div></div>'; var r=$("b-retry"); if(r)r.onclick=boot; }); }

  window.AITopup={ state:state, buildStepper:buildStepper, render:render, route:route, _boot:boot, _call:call, badge:badge, timelineHTML:timelineHTML, actionPanelHTML:actionPanelHTML, mapErr:mapErr, materialSnap:materialSnap, modal:modal, fulfillmentSectionHTML:fulfillmentSectionHTML, completionErrors:completionErrors, renderFulfillment:renderFulfillment, suggestTitle:suggestTitle, validateSubmit:validateSubmit, applyBackendError:applyBackendError, roadmapHTML:roadmapHTML, startEditDraft:startEditDraft, doSubmitDraft:doSubmitDraft, headerStatusHTML:headerStatusHTML, doAdminApprove:doAdminApprove, doApprove:doApprove, stepLabel:stepLabel, normalizeEvidenceName:normalizeEvidenceName, applyInvoiceConditional:applyInvoiceConditional, taxBasisLabel:taxBasisLabel, taxBasisOptions:taxBasisOptions, currencyOptions:currencyOptions };
  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded", boot); else boot();
})();
</script>

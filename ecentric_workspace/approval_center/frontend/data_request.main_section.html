<script id="ec-data-request">
(function(){
  "use strict";
  var NS="ecentric_workspace.approval_center.api.data_request.";
  var state={ boot:null, tab:"create", id:null, mode:"create", draft:null, dirty:false, busy:false, page:0, PAGE:20, listFilters:{}, titleTouched:false, detail:null, _editDet:null, comp:{} };
  function $(id){ return document.getElementById(id); }
  function esc(s){ return (s==null?"":String(s)).replace(/[&<>"']/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];}); }
  function toast(m,err){ var t=$("dreq-toast"); if(!t)return; t.textContent=m; t.className="toast show"+(err?" err":""); clearTimeout(t._t); t._t=setTimeout(function(){t.className="toast";},3000); }
  function call(method,args){ var fr=window.frappe; if(!fr||!fr.call) return Promise.reject(new Error("no frappe"));
    return fr.call({method:NS+method,args:args||{},type:(/get_|list_|search_/.test(method)?"GET":"POST")}).then(function(r){return r&&r.message;}); }
  function fmt(d){ if(!d)return "—"; try{ return String(d).replace("T"," ").slice(0,16); }catch(e){ return String(d); } }
  function fmtDT(v){ if(!v) return "—"; var s=(""+v).replace(" ","T"); var d=new Date(s); if(isNaN(d.getTime())) return esc(""+v); function p(n){return (n<10?"0":"")+n;} return p(d.getDate())+"/"+p(d.getMonth()+1)+"/"+d.getFullYear()+" "+p(d.getHours())+":"+p(d.getMinutes()); }
  function fld(id,label,ctrl,req,err){ return '<div class="fld'+(err?" invalid":"")+'" data-fld="'+id+'"><label>'+esc(label)+(req?' <span class="req">*</span>':'')+'</label>'+ctrl+(err?'<div class="err">'+esc(err)+'</div>':'')+'</div>'; }
  function opt(list,val){ return (list||[]).map(function(o){ var v=(o.value!=null?o.value:o), l=(o.label!=null?o.label:o);
    return '<option value="'+esc(v)+'"'+(String(val)===String(v)?" selected":"")+'>'+esc(l)+'</option>'; }).join(""); }

  // ---- routing ----
  function readRoute(){ state.mode="create"; var q=new URLSearchParams(window.location.search); state.id=q.get("id")||null;
    var t=q.get("tab"); state.tab = state.id?"detail":(t||"create"); }
  function go(params,replace){ var q=new URLSearchParams(); Object.keys(params).forEach(function(k){ if(params[k])q.set(k,params[k]); });
    var url=window.location.pathname+(q.toString()?("?"+q.toString()):""); window.history[replace?"replaceState":"pushState"]({},"",url); route(); }
  function route(){ readRoute(); render(); }
  window.addEventListener("popstate", route);

  function tabAllowed(t){ var tb=state.boot&&state.boot.tabs||{}; return t==="create"||t==="my-requests"||(t==="my-approvals"&&tb.my_approvals)||(t==="fulfillment"&&tb.fulfillment); }
  function renderTabs(){ var box=$("dreq-tabs"); if(!box)return;
    var defs=[["create","Tạo yêu cầu",true],["my-requests","Yêu cầu của tôi",true],["my-approvals","Cần tôi duyệt",tabAllowed("my-approvals")],["fulfillment","Chờ Data xử lý",tabAllowed("fulfillment")]];
    box.innerHTML=defs.map(function(d){ var act=(state.tab===d[0]||(state.tab==="detail"&&d[0]==="my-requests"))?" active":"";
      return '<button class="tab'+act+'"'+(d[2]?'':' disabled')+' data-tab="'+d[0]+'">'+esc(d[1])+'</button>'; }).join(""); }

  function render(){ renderTabs(); var b=$("dreq-body"); if(!b)return;
    if(state.tab==="detail"&&state.id) return renderDetail(b);
    if(state.tab==="my-requests") return renderMyRequests(b);
    if(state.tab==="my-approvals") return renderMyApprovals(b);
    if(state.tab==="fulfillment") return renderFulfillment(b);
    return renderCreate(b); }

  // ======================= CREATE =======================
  function infoRequiredBannerHTML(){ var i=state._infoCtx||{}; return '<div class="banner warn"><svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 9v4M12 17h.01"/></svg><div><b>Cần bổ sung thông tin.</b> Cấp: '+esc(i.level||"—")+(i.approver?(' · '+esc(i.approver)):'')+(i.comment?('<br>“'+esc(i.comment)+'”'):'')+'</div></div>'; }

  function formCardsHTML(d,c,fo){
    return '<div class="card"><h3>Tiêu đề yêu cầu</h3><div class="grid2">'
      + fld("request_title","Tiêu đề yêu cầu",'<input data-model="request_title" maxlength="180" placeholder="Ví dụ: New BI report - 2026-07-20" value="'+esc(d.request_title||"")+'">',true).replace('class="fld','class="fld full')
      + '</div></div><div class="card"><h3>Người yêu cầu</h3><div class="grid2">'
      + fld("_r1","Người yêu cầu",'<input class="ro" readonly value="'+esc(c.employee_name||c.user||"")+'">')

  function extractServerMsg(e){ if(!e) return "";
    function _strip(s){ return String(s==null?"":s).replace(/<[^>]*>/g," ").replace(/\s+/g," ").trim(); }
    var sm=e._server_messages||(e.responseJSON&&e.responseJSON._server_messages);
    if(sm){ try{ var arr=(typeof sm==="string")?JSON.parse(sm):sm; for(var i=0;i<arr.length;i++){ var f=arr[i], o=f; if(typeof f==="string"){ try{ o=JSON.parse(f); }catch(_a){ o={message:f}; } } var mm=o&&(o.message||o.title); if(mm) return _strip(mm); } }catch(_b){} }
    var rj=e.responseJSON||{};
    if(typeof e.message==="string"&&e.message) return _strip(e.message);
    if(typeof rj.message==="string"&&rj.message) return _strip(rj.message);
    if(rj.message&&rj.message.message) return _strip(rj.message.message);
    var exc=rj.exception||e.exception||""; if(exc){ var p=String(exc).split(": "); return _strip(p.length>1?p.slice(1).join(": "):exc); }
    return ""; }
  function mapErr(e){ var m=extractServerMsg(e);
    if(/IntegrityError|pymysql|Duplicate entry|must be unique|OperationalError|ProgrammingError|Traceback|1062|1048|1054/i.test(m)) return "Không thể thực hiện do dữ liệu không hợp lệ. Vui lòng kiểm tra lại hoặc liên hệ quản trị viên.";
    if(/pending approver|not a pending|không còn quyền/i.test(m)) return "Bạn không còn quyền thực hiện hành động này.";
    if(/no further action|is Approved|is Rejected|is Cancelled|vừa được cập nhật|already been claimed|đã được người khác/i.test(m)) return "Yêu cầu vừa được cập nhật bởi người khác. Dữ liệu đã được làm mới.";
    if(/mandatory|required|bắt buộc|Vui lòng|đầy đủ|Tóm tắt/i.test(m)) return m;
    if(/access|permission|allowed|quyền|nhóm Data/i.test(m)) return m || "Bạn không còn quyền thực hiện hành động này.";
    return m || "Đã có lỗi. Vui lòng thử lại."; }
  function resubmitErr(e){ var m=extractServerMsg(e);
    if(/no further action|is Approved|is Rejected|is Cancelled|moved|next level|vừa được cập nhật/i.test(m)) return "Yêu cầu vừa được cập nhật bởi người khác. Vui lòng tải lại.";
    if(/Information Required|is mandatory|is required|bắt buộc|Vui lòng|permission|quyền/i.test(m)) return m;
    return "Không thể gửi lại yêu cầu. Vui lòng thử lại hoặc liên hệ quản trị viên."; }
  function friendlyErr(e){ return mapErr(e); }
  function applyBackendError(e){ var m=extractServerMsg(e);

    return false; }

      .catch(function(){ if(lbl) lbl.textContent="Lỗi tải"; }); }

        call("resubmit",{name:state.id,payload:JSON.stringify(state.draft)}).then(function(res){ toast(res&&res.restarted?"Đã gửi lại — duyệt lại từ đầu.":"Đã gửi lại — tiếp tục ở cấp Data Review."); state._editDet=null; state.mode="create"; renderDetail($("dreq-body")); }).catch(function(e){ if(window.console&&console.error) console.error("Data Request resubmit error:",e); toast(resubmitErr(e),true); setBusyIds(["dreq-resubmit","dreq-edit-cancel"],false); }); };

            return '<tr><td>'+esc(r.name)+'</td><td>'+esc(r.request_title||"—")+'</td><td>'+esc(r.requested_by||"—")+'</td><td>'+esc(r.request_type||"—")+'</td><td>'+(ov?'<span style="color:var(--red)">'+esc(r.expected_resolution_date)+'</span>':esc(r.expected_resolution_date||"—"))+'</td><td>'+badge({approval_status:"Approved",fulfillment_status:r.fulfillment_status})+'</td><td>'+esc(r.fulfillment_owner||"—")+'</td><td>'+act+'</td></tr>'; }).join("")
        +'</tbody></table>';
      h.querySelectorAll("[data-open]").forEach(function(el){ el.onclick=function(){ go({id:el.getAttribute("data-open")}); }; });
      h.querySelectorAll("[data-claim]").forEach(function(el){ el.onclick=function(){ el.disabled=true; call("claim_fulfillment",{name:el.getAttribute("data-claim")}).then(function(){ toast("Đã nhận xử lý."); loadQueue(section); }).catch(function(e){ toast(mapErr(e),true); loadQueue(section); }); }; });
    }).catch(function(){ h.innerHTML='<div class="card"><div class="state"><h4>Không tải được</h4></div></div>'; }); }

  // ======================= DETAIL =======================
  function renderDetail(b){ b.innerHTML=skeleton(4);
    call("get_detail",{name:state.id}).then(function(det){ drawDetail(b,det); })
    .catch(function(e){ var perm=/quyền|access|permission/i.test((e&&e.message)||""); b.innerHTML='<div class="card"><div class="state"><h4>'+(perm?"Bạn không có quyền xem yêu cầu này":"Không tải được yêu cầu")+'</h4><button class="btn" id="d-back">Quay lại</button></div></div>'; var bk=$("d-back"); if(bk)bk.onclick=function(){ go({tab:"my-requests"}); }; }); }
  function kv(k,v){ return '<div class="fld"><label>'+esc(k)+'</label><input class="ro" readonly value="'+esc(v==null||v===""?"—":v)+'"></div>'; }
  function drawDetail(b,det){ state.detail=det; var biz=det.business||{}, ap=det.approval||{}, ff=det.fulfillment||{};
    b.innerHTML='<div style="margin-bottom:12px"><button type="button" class="btn" id="d-back">‹ Danh sách</button></div>'
      +'<div class="card"><div style="display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px"><div><h3 style="margin:0">'+esc(biz.request_title||biz.name||state.id)+'</h3><div class="hint">'+esc(biz.name||"")+' · '+esc(biz.request_type||"")+' · '+esc(biz.requested_by||"")+' · '+esc(biz.department||"")+'</div></div><div>'+badge({approval_status:ap.approval_status||"Draft",fulfillment_status:biz.fulfillment_status})+'</div></div></div>'
      +'<div class="card"><h3>Tiến trình xử lý</h3><div class="stepper" id="d-stepper"></div></div>'
      +'<div class="card"><h3>Thông tin yêu cầu</h3><div class="grid2">'+kv("Loại yêu cầu",biz.request_type)+kv("Ngày mong muốn hoàn thành",biz.expected_resolution_date)+kv("Mức độ khẩn cấp",biz.urgency)+kv("Mức độ quan trọng",biz.importance)+'</div><div class="fld" style="margin-top:10px"><label>Mô tả chi tiết</label><textarea class="ro" readonly rows="3">'+esc(biz.detailed_description||"")+'</textarea></div></div>'
      +'<div class="card"><h3>Xử lý Data</h3>'+fulfillmentSectionHTML(det)+'</div>'
      +'<div class="card"><h3>Đính kèm</h3>'+renderAttachments(det.attachments)+'</div>'
      +'<div class="card"><h3>Hành động</h3>'+actionPanelHTML(det)+'</div>'
      +'<div class="card"><h3>Lịch sử</h3>'+timelineHTML(det.timeline)+'</div>';
    $("d-back").onclick=function(){ go({tab:"my-requests"}); };
    $("d-stepper").innerHTML=buildStepper(det);
    ensureActionHandlers();
  }
  function renderAttachments(list){ if(!list||!list.length) return '<div class="hint">Chưa có tệp đính kèm.</div>';
    return '<table class="tbl"><tbody>'+list.map(function(f){ return '<tr><td>'+esc(f.file_name)+'</td><td>'+esc(f.owner)+'</td><td>'+esc(fmt(f.creation))+'</td><td><a href="'+esc(f.file_url)+'" target="_blank">Mở</a></td></tr>'; }).join("")+'</tbody></table>'; }

  // ---- fulfillment section in detail ----
  function completedInfoHTML(det){ var ff=det.fulfillment||{};
    return '<div class="summary-row"><span>Tóm tắt kết quả xử lý</span><b>'+esc(ff.summary||"—")+'</b></div>'
      +'<div class="summary-row"><span>Link kết quả</span><b>'+(ff.output_link?('<a href="'+esc(ff.output_link)+'" target="_blank">'+esc(ff.output_link)+'</a>'):"—")+'</b></div>'
      +'<div class="summary-row"><span>Tệp kết quả</span><b>'+(ff.output_attachment?('<a href="'+esc(ff.output_attachment)+'" target="_blank">Mở</a>'):"—")+'</b></div>'
      +'<div class="summary-row"><span>Hoàn tất bởi</span><b>'+esc(ff.completed_by||"—")+' · '+esc(fmt(ff.completed_at))+'</b></div>'; }
  function fulfillmentSectionHTML(det){ var ff=det.fulfillment||{}, ap=det.approval||{}, cap=det.capabilities||{};
    if(ff.status==="Completed") return completedInfoHTML(det);
    if(ap.approval_status!=="Approved") return '<div class="hint">Yêu cầu chưa được duyệt xong nên chưa vào bước xử lý.</div>';
    var info='<div class="hint">Trạng thái xử lý: '+esc({Assigned:"Chờ Data nhận xử lý","In Progress":"Đang xử lý"}[ff.status]||ff.status||"—")+(ff.owner?(" · Người xử lý: "+esc(ff.owner)):"")+'</div>';
    var btns=[]; if(cap.can_claim) btns.push('<button type="button" class="btn primary" data-act="claim">Nhận xử lý</button>');
    if(cap.can_complete) btns.push('<button type="button" class="btn primary" data-act="complete">Hoàn tất xử lý</button>');
    return info+(btns.length?'<div class="actions" style="margin-top:8px">'+btns.join("")+'</div>':''); }

  // ---- stepper ----
  function buildDraftStepper(det){ var prev=det.process_preview||[];
    var steps=[{name:"Tạo yêu cầu",state:"current",statusLabel:"Đang thực hiện",meta:""}];
    if(prev.length){ prev.forEach(function(l){ steps.push({name:l.level_name||("Cấp "+l.level_no),state:"upcoming",statusLabel:"Chờ",meta:""}); }); }
    else { steps.push({name:"Data Review",state:"upcoming",statusLabel:"Chờ",meta:""}); }
    steps.push({name:"Data xử lý",state:"upcoming",statusLabel:"Chờ",meta:""});
    steps.push({name:"Hoàn tất",state:"upcoming",statusLabel:"Chờ",meta:""});
    return renderStepsHTML(steps); }
  function buildStepper(det){ var ap=det.approval||{}; if(!ap.name) return buildDraftStepper(det);
    var levels=det.levels||[], approvers=det.approvers||[], ff=det.fulfillment||{};
    var steps=[{name:"Đã gửi",state:"done",meta:""}];
    levels.forEach(function(l){ var rows=approvers.filter(function(a){return a.level_no===l.level_no;}); var st="upcoming", meta="";
      if(l.level_status==="Approved"){ st="done"; var who=rows.filter(function(r){return r.status==="Approved";}).map(function(r){return r.approver;}); meta=(who.length?("Duyệt bởi "+who.join(", ")):"")+(l.completed_at?(" · "+fmt(l.completed_at)):""); }
      else if(l.level_status==="Rejected"){ st="rejected"; var rj=rows.filter(function(r){return r.status==="Rejected";}); meta="Từ chối"+(rj[0]&&rj[0].comment?(": "+rj[0].comment):""); }
      else if(l.level_status==="Information Requested"||(ap.approval_status==="Information Required"&&ap.current_level===l.level_no)){ st="info"; meta="Cần bổ sung thông tin"; }
      else if(l.level_status==="Skipped"){ st="skipped"; meta="Bỏ qua"; }
      else if(l.level_status==="In Progress"||ap.current_level===l.level_no){ st="current"; var elig=rows.filter(function(r){return r.status==="Pending";}).map(function(r){return r.approver;}); meta=(elig.length?(l.approval_mode==="Any One"?elig.join(" hoặc "):elig.join(", ")):"Đang chờ"); }
      if(l.due_at&&st==="current"&&new Date(l.due_at)<new Date()){ meta+=' · <span class="ov">Quá hạn</span>'; } else if(l.due_at&&st==="current"){ meta+=" · Hạn: "+fmt(l.due_at); }
      steps.push({name:l.level_name||("Cấp "+l.level_no),state:st,meta:meta}); });
    // fulfillment step (Data xử lý)
    var fst="upcoming", fmeta=""; var allApproved=ap.approval_status==="Approved";
    if(ff.status==="Completed"){ fst="done"; fmeta="Hoàn tất"+(ff.completed_by?(" bởi "+ff.completed_by):"")+(ff.completed_at?(" · "+fmt(ff.completed_at)):""); }
    else if(ff.status==="In Progress"){ fst="current"; fmeta="Đang xử lý"+(ff.owner?(" · "+ff.owner):""); }
    else if(allApproved){ fst="current"; fmeta="Chờ Data nhận xử lý"; }
    steps.push({name:"Data xử lý",state:fst,meta:fmeta});
    steps.push({name:"Hoàn tất",state:(ff.status==="Completed"?"done":"upcoming"),meta:""});
    return renderStepsHTML(steps); }
  var _STEP_LBL={done:"Hoàn thành",current:"Đang xử lý",upcoming:"Chờ",rejected:"Từ chối",info:"Cần bổ sung",skipped:"Bỏ qua"};
  function stColor(s){ return {done:"var(--green)",current:"var(--navy)",rejected:"var(--red)",info:"var(--amber)",skipped:"var(--gray-400)",upcoming:"var(--gray-400)"}[s]||"var(--gray-400)"; }
  function renderStepsHTML(steps){ var n=steps.length, k=0; steps.forEach(function(s,i){ if(s.state!=="upcoming") k=i; });
    var inner=steps.map(function(s,i){ return '<div class="step '+s.state+'"><div class="step-top"><div class="step-dot">'+(s.state==="done"?"✓":(s.state==="rejected"?"✕":(i+1)))+'</div><div class="step-name">'+esc(s.name)+'</div><div class="step-state" style="color:'+stColor(s.state)+'">'+esc(s.statusLabel||_STEP_LBL[s.state]||s.state)+'</div></div><div class="step-meta">'+(s.meta||"")+'</div></div>'; }).join("");
    return '<div class="stepline" style="--n:'+n+';--k:'+k+'">'+inner+'</div>'; }

  function timelineHTML(items){ if(!items||!items.length) return '<div class="hint">Chưa có hoạt động.</div>';
    var LBL={Submitted:"Đã gửi",Approved:"Đã duyệt","Information Requested":"Yêu cầu bổ sung",Rejected:"Từ chối",Resubmitted:"Gửi lại",Restarted:"Duyệt lại từ đầu",Skipped:"Bỏ qua",Cancelled:"Đã hủy",Commented:"Ghi chú",Started:"Nhận xử lý"};
    return items.map(function(a){ return '<div class="tl-item"><div class="tl-dot"></div><div><div class="tl-act">'+esc(LBL[a.action]||a.action)+(a.level_no?(' · Cấp '+a.level_no):'')+'</div><div class="tl-meta">'+esc(a.actor||"")+' · '+esc(fmt(a.action_time))+(a.previous_status&&a.new_status&&a.previous_status!==a.new_status?(' · '+esc(a.previous_status)+" → "+esc(a.new_status)):'')+'</div>'+(a.comment?('<div class="tl-cmt">'+esc(a.comment)+'</div>'):'')+'</div></div>'; }).join(""); }

  // ---- action panel + modal (namespaced, delegated) ----
  function actionPanelHTML(det){ var cap=det.capabilities||{}; var ap=det.approval||{}; var btns=[];
    if(cap.can_submit){ return '<div class="actions"><button type="button" class="btn primary" data-act="submitdraft">Gửi yêu cầu</button><button type="button" class="btn" data-act="editdraft">Tiếp tục chỉnh sửa</button><button type="button" class="btn" data-act="cancel">Hủy yêu cầu</button></div><div class="hint" style="margin-top:8px">Yêu cầu đang ở trạng thái nháp — chưa gửi phê duyệt.</div>'; }
    if(cap.can_edit&&ap.approval_status==="Information Required") btns.push('<button type="button" class="btn primary" data-act="edit">Chỉnh sửa & gửi lại</button>');
    else if(cap.can_edit) btns.push('<button type="button" class="btn" data-act="edit">Chỉnh sửa</button>');
    if(cap.can_approve) btns.push('<button type="button" class="btn primary" data-act="approve">Duyệt</button>');
    if(cap.can_request_information) btns.push('<button type="button" class="btn" data-act="reqinfo">Yêu cầu bổ sung</button>');
    if(cap.can_reject) btns.push('<button type="button" class="btn" data-act="reject">Từ chối</button>');
    if(cap.can_admin_approve_current_level) btns.push('<button type="button" class="btn warn" data-act="adminapprove">Duyệt thay bước hiện tại</button>');
    if(cap.can_cancel) btns.push('<button type="button" class="btn" data-act="cancel">Hủy yêu cầu</button>');
    return btns.length? '<div class="actions">'+btns.join("")+'</div>' : '<div class="hint">Không có hành động khả dụng cho bạn ở trạng thái hiện tại.</div>'; }
  function handleActionClick(e){ var el=e.target&&e.target.closest?e.target.closest("[data-act]"):null; if(!el) return;
    var a=el.getAttribute("data-act"); if(!a||el.disabled) return; if(document.querySelector(".ec-dreq-overlay")) return; e.preventDefault();
    var det=state.detail||{}; var name=(det.business||{}).name||state.id;
    if(a==="editdraft") return startEditDraft(det); if(a==="submitdraft") return doSubmitDraft(name);
    if(a==="edit") return startEditResubmit(det); if(a==="approve") return doApprove(name,det);
    if(a==="reject") return doReject(name); if(a==="reqinfo") return doRequestInfo(name);
    if(a==="adminapprove") return doAdminApprove(name); if(a==="cancel") return doCancel(name);
    if(a==="claim") return doClaim(name); if(a==="complete") return doComplete(name,det); }
  function ensureActionHandlers(){ if(document.__dreqActBound) return; document.__dreqActBound=true; document.addEventListener("click", handleActionClick, true); }

  function modal(title, bodyHTML, opts){ opts=opts||{}; var prevFocus=document.activeElement;
    var ov=document.createElement("div"); ov.className="ec-dreq-overlay";
    ov.innerHTML='<div class="ec-dreq-modal" role="dialog" aria-modal="true" aria-labelledby="dreq-modal-title"><div class="ec-dreq-modal-h" id="dreq-modal-title">'+esc(title)+'</div><div class="ec-dreq-modal-b">'+bodyHTML+'</div><div class="ec-dreq-modal-f"><button type="button" class="btn" data-x>Đóng</button><button type="button" class="btn primary" data-ok>'+esc(opts.okLabel||"Xác nhận")+'</button></div></div>';
    (document.getElementById("ec-dreq-root")||document.body).appendChild(ov);
    function close(){ if(ov.parentNode) ov.parentNode.removeChild(ov); if(prevFocus&&prevFocus.focus) try{prevFocus.focus();}catch(e){} }
    var first=ov.querySelector(".ec-dreq-modal-b input,.ec-dreq-modal-b select,.ec-dreq-modal-b textarea")||ov.querySelector("[data-ok]"); if(first&&first.focus) try{first.focus();}catch(e){}
    ov.addEventListener("keydown",function(e){ if(e.key==="Escape") close(); });
    ov.querySelector("[data-x]").onclick=close; ov.addEventListener("click",function(e){ if(e.target===ov) close(); });
    var ok=ov.querySelector("[data-ok]"); ok.onclick=function(){ if(!opts.onConfirm){ close(); return; } ok.disabled=true; var p=opts.onConfirm(ov); if(p&&p.then){ p.then(function(){ close(); }).catch(function(){ ok.disabled=false; }); } else { close(); } };
    return {ov:ov, close:close}; }

  function refreshDetail(){ if(state.tab==="detail"&&state.id) renderDetail($("dreq-body")); }
  function refreshApprovals(){ if(state.tab==="my-approvals") renderMyApprovals($("dreq-body")); }
  function nextLevelName(det){ if(!det) return ""; var ap=det.approval||{}; if(ap.approval_status!=="Pending"||!ap.current_level) return ""; var l=(det.levels||[]).filter(function(x){return Number(x.level_no)===Number(ap.current_level);})[0]; return l?(l.level_name||("Cấp "+ap.current_level)):""; }
  function summaryRows(det){ var b=det.business||{}; return '<div class="summary-row"><span>Người yêu cầu</span><b>'+esc(b.requested_by||"—")+'</b></div><div class="summary-row"><span>Loại yêu cầu</span><b>'+esc(b.request_type||"—")+'</b></div><div class="summary-row"><span>Mong muốn hoàn thành</span><b>'+esc(b.expected_resolution_date||"—")+'</b></div>'; }
  function doApprove(name,det){ modal("Duyệt yêu cầu", summaryRows(det)+'<div class="fld"><label>Ghi chú (không bắt buộc)</label><textarea id="m-cmt" rows="2"></textarea></div>', {okLabel:"Duyệt", onConfirm:function(ov){ var cmt=(ov.querySelector("#m-cmt").value||"");
    return call("approve",{name:name,comment:cmt}).then(function(res){ var nx=nextLevelName(res&&res.detail); toast(nx?("Đã duyệt. Yêu cầu đã chuyển sang "+nx+"."):"Đã duyệt. Yêu cầu chuyển sang Data xử lý."); refreshDetail(); refreshApprovals(); }).catch(function(e){ toast(mapErr(e),true); refreshDetail(); refreshApprovals(); return Promise.reject(e); }); }}); }
  function doReject(name){ modal("Từ chối yêu cầu", '<div class="banner err">Sau khi từ chối, yêu cầu sẽ kết thúc.</div><div class="fld"><label>Lý do <span class="req">*</span></label><textarea id="m-cmt" rows="3"></textarea></div>', {okLabel:"Từ chối", onConfirm:function(ov){ var c=(ov.querySelector("#m-cmt").value||"").trim(); if(!c){ toast("Bắt buộc nhập lý do.",true); return Promise.reject(); }
    return call("reject",{name:name,comment:c}).then(function(){ toast("Đã từ chối."); refreshDetail(); refreshApprovals(); }).catch(function(e){ toast(mapErr(e),true); refreshDetail(); refreshApprovals(); return Promise.reject(e); }); }}); }
  function doRequestInfo(name){ modal("Yêu cầu bổ sung thông tin", '<div class="banner info">Yêu cầu sẽ được trả lại người gửi để bổ sung.</div><div class="fld"><label>Nội dung cần bổ sung <span class="req">*</span></label><textarea id="m-cmt" rows="3"></textarea></div>', {okLabel:"Gửi yêu cầu", onConfirm:function(ov){ var c=(ov.querySelector("#m-cmt").value||"").trim(); if(!c){ toast("Bắt buộc nhập nội dung.",true); return Promise.reject(); }
    return call("request_information",{name:name,comment:c}).then(function(){ toast("Đã gửi yêu cầu bổ sung."); refreshDetail(); refreshApprovals(); }).catch(function(e){ toast(mapErr(e),true); refreshDetail(); refreshApprovals(); return Promise.reject(e); }); }}); }
  function doCancel(name){ modal("Hủy yêu cầu", '<div class="banner warn">Hủy yêu cầu sẽ kết thúc luồng phê duyệt.</div><div class="fld"><label>Lý do <span class="req">*</span></label><textarea id="m-cmt" rows="2"></textarea></div>', {okLabel:"Xác nhận hủy", onConfirm:function(ov){ var c=(ov.querySelector("#m-cmt").value||"").trim(); if(!c){ toast("Bắt buộc nhập lý do.",true); return Promise.reject(); }
    return call("cancel",{name:name,reason:c}).then(function(res){ toast("Đã hủy yêu cầu."); if(res&&res.deleted) go({tab:"my-requests"}); else { refreshDetail(); refreshApprovals(); } }).catch(function(e){ toast(mapErr(e),true); refreshDetail(); return Promise.reject(e); }); }}); }
  function doAdminApprove(name){ modal("Duyệt thay bước hiện tại", '<div class="banner warn"><svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 9v4M12 17h.01"/></svg><div>Bạn đang duyệt thay cho bước phê duyệt hiện tại bằng quyền System Manager. Hành động này sẽ được ghi nhận trong lịch sử và không giả lập người duyệt gốc.</div></div><div class="fld"><label>Lý do <span class="req">*</span></label><textarea id="m-cmt" rows="3"></textarea></div>', {okLabel:"Xác nhận duyệt thay", onConfirm:function(ov){ var c=(ov.querySelector("#m-cmt").value||"").trim(); if(!c){ toast("Bắt buộc nhập lý do.",true); return Promise.reject(); }
    return call("admin_approve_current_level",{name:name,reason:c}).then(function(){ toast("Đã duyệt thay bước hiện tại."); refreshDetail(); refreshApprovals(); }).catch(function(e){ toast(mapErr(e),true); refreshDetail(); refreshApprovals(); return Promise.reject(e); }); }}); }

  function doClaim(name){ call("claim_fulfillment",{name:name}).then(function(){ toast("Đã nhận xử lý."); refreshDetail(); }).catch(function(e){ toast(mapErr(e),true); refreshDetail(); }); }
  function completionErrors(c){ c=c||state.comp||{}; var errs={}; if(!((c.fulfillment_summary||"").toString().trim())) errs.fulfillment_summary="Vui lòng nhập tóm tắt kết quả xử lý."; return Object.keys(errs).length?errs:null; }
  function doComplete(name,det){ state.comp={ fulfillment_summary:"", output_link:"", output_attachment:"" };
    var body='<div class="fld"><label>Tóm tắt kết quả xử lý <span class="req">*</span></label><textarea id="c-summary" rows="3"></textarea></div>'
      +'<div class="fld"><label>Link kết quả</label><input id="c-link" placeholder="https://..."></div>'
      +'<div class="fld"><label>Tệp kết quả</label><input type="file" id="c-file"><div class="hint" id="c-file-name">Không bắt buộc</div></div>';
    var m=modal("Hoàn tất xử lý", body, {okLabel:"Hoàn tất", onConfirm:function(ov){
      state.comp.fulfillment_summary=(ov.querySelector("#c-summary").value||""); state.comp.output_link=(ov.querySelector("#c-link").value||"");
      var errs=completionErrors(state.comp); if(errs){ toast(errs.fulfillment_summary,true); return Promise.reject(); }
      return call("complete_fulfillment",{name:name,payload:JSON.stringify(state.comp)}).then(function(){ toast("Đã hoàn tất xử lý."); state.comp={}; refreshDetail(); }).catch(function(e){ toast(mapErr(e),true); refreshDetail(); return Promise.reject(e); }); }});
    var fi=m.ov.querySelector("#c-file"); if(fi) fi.addEventListener("change",function(){ var file=fi.files&&fi.files[0]; if(!file)return; var lbl=m.ov.querySelector("#c-file-name"); if(lbl)lbl.textContent="Đang tải...";
      var fd=new FormData(); fd.append("file",file); fd.append("is_private","1"); fd.append("doctype","EC Data Request"); fd.append("docname",name);
      fetch("/api/method/upload_file",{method:"POST",headers:{"X-Frappe-CSRF-Token":(window.frappe&&frappe.csrf_token)||""},body:fd}).then(function(r){return r.json();}).then(function(j){ state.comp.output_attachment=(j&&j.message&&j.message.file_url)||""; if(lbl)lbl.textContent=state.comp.output_attachment?("Đã tải: "+file.name):"Lỗi tải"; }).catch(function(){ if(lbl)lbl.textContent="Lỗi tải"; }); }); }

  function startEditDraft(det){ state.draft=Object.assign({}, det.business||{}); state.id=(det.business||{}).name; state.mode="create"; renderCreate($("dreq-body")); }
  function doSubmitDraft(name){ if(state.busy)return; state.busy=true; var btns=Array.prototype.slice.call(document.querySelectorAll('[data-act="submitdraft"],[data-act="editdraft"]')); btns.forEach(function(b){ b.disabled=true; });
    call("submit_request",{name:name}).then(function(){ toast("Gửi yêu cầu thành công. Yêu cầu đã được chuyển đến Data Review."); refreshDetail(); }).catch(function(e){ if(!applyBackendError(e)){ if(window.console&&console.error) console.error("Data Request submit error:",e); toast(friendlyErr(e),true); } btns.forEach(function(b){ b.disabled=false; }); }).then(function(){ state.busy=false; }); }
  function startEditResubmit(det){ var ap=det.approval||{}; var lvl=(det.levels||[]).find(function(l){return l.level_no===ap.information_requested_from_level;});
    var ia=(det.approvers||[]).filter(function(a){return a.status==="Information Requested";})[0]||{};
    state._infoCtx={ level:(lvl?lvl.level_name:ap.information_requested_from_level), approver:ia.approver, comment:ia.comment };
    state._editDet=det; state.draft=Object.assign({}, det.business||{}); state.id=det.business.name; state.mode="edit"; renderCreate($("dreq-body")); }

  function boot(){ ensureActionHandlers(); var t=$("dreq-tabs"); if(t){ t.addEventListener("click",function(e){ var b=e.target.closest("[data-tab]"); if(b&&!b.disabled){ state.page=0; go({tab:b.getAttribute("data-tab")}); } }); }
    call("get_bootstrap").then(function(bd){ state.boot=bd||{tabs:{},context:{},form_options:{}}; route(); })
    .catch(function(){ var bd=$("dreq-body"); if(bd) bd.innerHTML='<div class="card"><div class="state"><h4>Không tải được trang</h4><button class="btn" id="b-retry">Thử lại</button></div></div>'; var r=$("b-retry"); if(r)r.onclick=boot; }); }

  window.DataRequest={ state:state, render:render, route:route, _boot:boot, _call:call, badge:badge, buildStepper:buildStepper, timelineHTML:timelineHTML, actionPanelHTML:actionPanelHTML, mapErr:mapErr, resubmitErr:resubmitErr, modal:modal, validateSubmit:validateSubmit, suggestTitle:suggestTitle, stepLabel:stepLabel, nextLevelName:nextLevelName, doApprove:doApprove, doAdminApprove:doAdminApprove, startEditResubmit:startEditResubmit, startEditDraft:startEditDraft, renderFulfillment:renderFulfillment, fulfillmentSectionHTML:fulfillmentSectionHTML, completionErrors:completionErrors, doComplete:doComplete, doClaim:doClaim };
  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded", boot); else boot();
})();
</script>

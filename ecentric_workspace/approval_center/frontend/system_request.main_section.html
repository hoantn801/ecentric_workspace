<script id="ec-system-request">
(function(){
  "use strict";
  var NS="ecentric_workspace.approval_center.api.system_request.";
  var state={ boot:null, tab:"create", id:null, mode:"create", draft:null, dirty:false, busy:false, page:0, PAGE:20, listFilters:{}, titleTouched:false, detail:null, _editDet:null, comp:{} };

  function esc(s){ return (s==null?"":String(s)).replace(/[&<>"']/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c];}); }
  function toast(m,err){ var t=$("sysr-toast"); if(!t)return; t.textContent=m; t.className="toast show"+(err?" err":""); clearTimeout(t._t); t._t=setTimeout(function(){t.className="toast";},3000); }
  function call(method,args){ var fr=window.frappe; if(!fr||!fr.call) return Promise.reject(new Error("no frappe"));
    return fr.call({method:NS+method,args:args||{},type:(/get_|list_|search_/.test(method)?"GET":"POST")}).then(function(r){return r&&r.message;}); }
  function fmt(d){ if(!d)return "—"; try{ return String(d).replace("T"," ").slice(0,16); }catch(e){ return String(d); } }
  function fld(id,label,ctrl,req,err){ return '<div class="fld'+(err?" invalid":"")+'" data-fld="'+id+'"><label>'+esc(label)+(req?' <span class="req">*</span>':'')+'</label>'+ctrl+(err?'<div class="err">'+esc(err)+'</div>':'')+'</div>'; }
  function opt(list,val){ return (list||[]).map(function(o){ var v=(o.value!=null?o.value:o), l=(o.label!=null?o.label:o);
    return '<option value="'+esc(v)+'"'+(String(val)===String(v)?" selected":"")+'>'+esc(l)+'</option>'; }).join(""); }

  // ---- routing ----
  function readRoute(){ state.mode="create"; var q=new URLSearchParams(window.location.search); state.id=q.get("id")||null;
    var t=q.get("tab"); state.tab = state.id?"detail":(t||"create"); }
  function go(params,replace){ var q=new URLSearchParams(); Object.keys(params).forEach(function(k){ if(params[k])q.set(k,params[k]); });
    var url=window.location.pathname+(q.toString()?("?"+q.toString()):""); window.history[replace?"replaceState":"pushState"]({},"",url); route(); }
  function route(){ readRoute(); render(); }
  window.addEventListener("popstate", route);

  function tabAllowed(t){ var tb=state.boot&&state.boot.tabs||{}; return t==="create"||t==="my-requests"||(t==="my-approvals"&&tb.my_approvals)||(t==="fulfillment"&&tb.fulfillment); }
  function renderTabs(){ var box=$("sysr-tabs"); if(!box)return;

    box.innerHTML=defs.map(function(d){ var act=(state.tab===d[0]||(state.tab==="detail"&&d[0]==="my-requests"))?" active":"";
      return '<button type="button" class="tab'+act+'"'+(d[2]?'':' disabled')+' data-tab="'+d[0]+'">'+esc(d[1])+'</button>'; }).join(""); }

  function render(){ renderTabs(); var b=$("sysr-body"); if(!b)return;
    if(state.tab==="detail"&&state.id) return renderDetail(b);
    if(state.tab==="my-requests") return renderMyRequests(b);

    if(state.tab==="fulfillment") return renderFulfillment(b);
    return renderCreate(b); }

  // ======================= CREATE =======================
  function infoRequiredBannerHTML(){ var i=state._infoCtx||{}; return '<div class="banner warn"><svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 9v4M12 17h.01"/></svg><div><b>Cần bổ sung thông tin.</b> Cấp: '+esc(i.level||"—")+(i.approver?(' · '+esc(i.approver)):'')+(i.comment?('<br>“'+esc(i.comment)+'”'):'')+'</div></div>'; }

  function formCardsHTML(d,c,fo){
    var isOther=d.request_type==="Other";
    return '<div class="card"><h3>Tiêu đề yêu cầu</h3><div class="grid2">'
      + fld("request_title","Tiêu đề yêu cầu",'<input data-model="request_title" maxlength="180" placeholder="Ví dụ: Access, permission - CRM" value="'+esc(d.request_title||"")+'">',true).replace('class="fld','class="fld full')

  function mapErr(e){ var m=(e&&e.message)||"";

    if(/no further action|is Approved|is Rejected|is Cancelled|vừa được cập nhật|already been claimed|đã được người khác/i.test(m)) return "Yêu cầu vừa được cập nhật bởi người khác. Dữ liệu đã được làm mới.";

  // ---- stepper ----
  function buildDraftStepper(det){ var prev=det.process_preview||[];
    var steps=[{name:"Tạo yêu cầu",state:"current",statusLabel:"Đang thực hiện",meta:""}];
    if(prev.length){ prev.forEach(function(l){ steps.push({name:l.level_name||("Cấp "+l.level_no),state:"upcoming",statusLabel:"Chờ",meta:""}); }); }
    else { steps.push({name:"Operation Review",state:"upcoming",statusLabel:"Chờ",meta:""}); }
    steps.push({name:"Operation xử lý",state:"upcoming",statusLabel:"Chờ",meta:""});
    steps.push({name:"Hoàn tất",state:"upcoming",statusLabel:"Chờ",meta:""});
    return renderStepsHTML(steps); }
  function buildStepper(det){ var ap=det.approval||{}; if(!ap.name) return buildDraftStepper(det);
    var levels=det.levels||[], approvers=det.approvers||[], ff=det.fulfillment||{};
    var steps=[{name:"Đã gửi",state:"done",meta:""}];
    levels.forEach(function(l){ var rows=approvers.filter(function(a){return a.level_no===l.level_no;}); var st="upcoming", meta="";
      if(l.level_status==="Approved"){ st="done"; var who=rows.filter(function(r){return r.status==="Approved";}).map(function(r){return r.approver;}); meta=(who.length?("Duyệt bởi "+who.join(", ")):"")+(l.completed_at?(" · "+fmt(l.completed_at)):""); }
      else if(l.level_status==="Rejected"){ st="rejected"; var rj=rows.filter(function(r){return r.status==="Rejected";}); meta="Từ chối"+(rj[0]&&rj[0].comment?(": "+rj[0].comment):""); }
      else if(l.level_status==="Information Requested"||(ap.approval_status==="Information Required"&&ap.current_level===l.level_no)){ st="info"; meta="Cần bổ sung thông tin"; }
      else if(l.level_status==="Skipped"){ st="skipped"; meta="Bỏ qua"; }
      else if(l.level_status==="In Progress"||ap.current_level===l.level_no){ st="current"; var elig=rows.filter(function(r){return r.status==="Pending";}).map(function(r){return r.approver;}); meta=(elig.length?(l.approval_mode==="Any One"?elig.join(" hoặc "):elig.join(", ")):"Đang chờ"); }
      if(l.due_at&&st==="current"&&new Date(l.due_at)<new Date()){ meta+=' · <span class="ov">Quá hạn</span>'; } else if(l.due_at&&st==="current"){ meta+=" · Hạn: "+fmt(l.due_at); }
      steps.push({name:l.level_name||("Cấp "+l.level_no),state:st,meta:meta}); });
    // fulfillment step (Operation xử lý)
    var fst="upcoming", fmeta=""; var allApproved=ap.approval_status==="Approved";
    if(ff.status==="Completed"){ fst="done"; fmeta="Hoàn tất"+(ff.completed_by?(" bởi "+ff.completed_by):"")+(ff.completed_at?(" · "+fmt(ff.completed_at)):""); }
    else if(ff.status==="In Progress"){ fst="current"; fmeta="Đang xử lý"+(ff.owner?(" · "+ff.owner):""); }
    else if(allApproved){ fst="current"; fmeta="Chờ Operation nhận xử lý"; }
    steps.push({name:"Operation xử lý",state:fst,meta:fmeta});
    steps.push({name:"Hoàn tất",state:(ff.status==="Completed"?"done":"upcoming"),meta:""});
    return renderStepsHTML(steps); }
  var _STEP_LBL={done:"Hoàn thành",current:"Đang xử lý",upcoming:"Chờ",rejected:"Từ chối",info:"Cần bổ sung",skipped:"Bỏ qua"};
  function stColor(s){ return {done:"var(--green)",current:"var(--navy)",rejected:"var(--red)",info:"var(--amber)",skipped:"var(--gray-400)",upcoming:"var(--gray-400)"}[s]||"var(--gray-400)"; }
  function renderStepsHTML(steps){ var n=steps.length, k=0; steps.forEach(function(s,i){ if(s.state!=="upcoming") k=i; });
    var inner=steps.map(function(s,i){ return '<div class="step '+s.state+'"><div class="step-top"><div class="step-dot">'+(s.state==="done"?"✓":(s.state==="rejected"?"✕":(i+1)))+'</div><div class="step-name">'+esc(s.name)+'</div><div class="step-state" style="color:'+stColor(s.state)+'">'+esc(s.statusLabel||_STEP_LBL[s.state]||s.state)+'</div></div><div class="step-meta">'+(s.meta||"")+'</div></div>'; }).join("");
    return '<div class="stepline" style="--n:'+n+';--k:'+k+'">'+inner+'</div>'; }

  function timelineHTML(items){ if(!items||!items.length) return '<div class="hint">Chưa có hoạt động.</div>';
    var LBL={Submitted:"Đã gửi",Approved:"Đã duyệt","Information Requested":"Yêu cầu bổ sung",Rejected:"Từ chối",Resubmitted:"Gửi lại",Restarted:"Duyệt lại từ đầu",Skipped:"Bỏ qua",Cancelled:"Đã hủy",Commented:"Ghi chú",Started:"Nhận xử lý"};
    return items.map(function(a){ return '<div class="tl-item"><div class="tl-dot"></div><div><div class="tl-act">'+esc(LBL[a.action]||a.action)+(a.level_no?(' · Cấp '+a.level_no):'')+'</div><div class="tl-meta">'+esc(a.actor||"")+' · '+esc(fmt(a.action_time))+(a.previous_status&&a.new_status&&a.previous_status!==a.new_status?(' · '+esc(a.previous_status)+" → "+esc(a.new_status)):'')+'</div>'+(a.comment?('<div class="tl-cmt">'+esc(a.comment)+'</div>'):'')+'</div></div>'; }).join(""); }

  // ---- action panel + modal (namespaced, delegated) ----

  function handleActionClick(e){ var el=e.target&&e.target.closest?e.target.closest("[data-act]"):null; if(!el) return;
    var a=el.getAttribute("data-act"); if(!a||el.disabled) return; if(document.querySelector(".ec-sysr-overlay")) return; e.preventDefault();

  function ensureActionHandlers(){ if(document.__sysrActBound) return; document.__sysrActBound=true; document.addEventListener("click", handleActionClick, true); }

  function modal(title, bodyHTML, opts){ opts=opts||{}; var prevFocus=document.activeElement;
    var ov=document.createElement("div"); ov.className="ec-sysr-overlay";
    ov.innerHTML='<div class="ec-sysr-modal" role="dialog" aria-modal="true" aria-labelledby="sysr-modal-title"><div class="ec-sysr-modal-h" id="sysr-modal-title">'+esc(title)+'</div><div class="ec-sysr-modal-b">'+bodyHTML+'</div><div class="ec-sysr-modal-f"><button type="button" class="btn" data-x>Đóng</button><button type="button" class="btn primary" data-ok>'+esc(opts.okLabel||"Xác nhận")+'</button></div></div>';
    (document.getElementById("ec-sysr-root")||document.body).appendChild(ov);
    function close(){ if(ov.parentNode) ov.parentNode.removeChild(ov); if(prevFocus&&prevFocus.focus) try{prevFocus.focus();}catch(e){} }
    var first=ov.querySelector(".ec-sysr-modal-b input,.ec-sysr-modal-b select,.ec-sysr-modal-b textarea")||ov.querySelector("[data-ok]"); if(first&&first.focus) try{first.focus();}catch(e){}
    ov.addEventListener("keydown",function(e){ if(e.key==="Escape") close(); });
    ov.querySelector("[data-x]").onclick=close; ov.addEventListener("click",function(e){ if(e.target===ov) close(); });
    var ok=ov.querySelector("[data-ok]"); ok.onclick=function(){ if(!opts.onConfirm){ close(); return; } ok.disabled=true; var p=opts.onConfirm(ov); if(p&&p.then){ p.then(function(){ close(); }).catch(function(){ ok.disabled=false; }); } else { close(); } };
    return {ov:ov, close:close}; }

  function nextLevelName(det){ if(!det) return ""; var ap=det.approval||{}; if(ap.approval_status!=="Pending"||!ap.current_level) return ""; var l=(det.levels||[]).filter(function(x){return Number(x.level_no)===Number(ap.current_level);})[0]; return l?(l.level_name||("Cấp "+ap.current_level)):""; }
  function summaryRows(det){ var b=det.business||{}; return '<div class="summary-row"><span>Người yêu cầu</span><b>'+esc(b.requested_by||"—")+'</b></div><div class="summary-row"><span>Loại yêu cầu</span><b>'+esc(b.request_type||"—")+'</b></div><div class="summary-row"><span>Mong muốn hoàn thành</span><b>'+esc(b.requester_expected_resolution_date||"—")+'</b></div>'; }
  function doApprove(name,det){ var ap=det.approval||{}; var curL=(det.levels||[]).filter(function(l){return l.level_no===ap.current_level;})[0]||{}; var isOp=curL.level_name==="Operation Review"; var existing=(det.business||{}).operation_expected_completion_date||"";

  function doRequestInfo(name){ modal("Yêu cầu bổ sung thông tin", '<div class="banner info">Yêu cầu sẽ được trả lại người gửi để bổ sung.</div><div class="fld"><label>Nội dung cần bổ sung <span class="req">*</span></label><textarea id="m-cmt" rows="3"></textarea></div>', {okLabel:"Gửi yêu cầu", onConfirm:function(ov){ var c=(ov.querySelector("#m-cmt").value||"").trim(); if(!c){ toast("Bắt buộc nhập nội dung.",true); return Promise.reject(); }

  function doAdminApprove(name){ modal("Duyệt thay bước hiện tại", '<div class="banner warn"><svg class="icon" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 9v4M12 17h.01"/></svg><div>Bạn đang duyệt thay cho bước phê duyệt hiện tại bằng quyền System Manager. Hành động này sẽ được ghi nhận trong lịch sử và không giả lập người duyệt gốc.</div></div><div class="fld"><label>Lý do <span class="req">*</span></label><textarea id="m-cmt" rows="3"></textarea></div>', {okLabel:"Xác nhận duyệt thay", onConfirm:function(ov){ var c=(ov.querySelector("#m-cmt").value||"").trim(); if(!c){ toast("Bắt buộc nhập lý do.",true); return Promise.reject(); }
    return call("admin_approve_current_level",{name:name,reason:c}).then(function(res){ toast("Đã duyệt thay bước hiện tại."); applyDetail(res); }).catch(function(e){ toast(mapErr(e),true); refreshDetail(); refreshApprovals(); return Promise.reject(e); }); }}); }

  function doClaim(name){ call("claim_fulfillment",{name:name}).then(function(res){ toast("Đã nhận xử lý."); applyDetail(res); }).catch(function(e){ toast(mapErr(e),true); refreshDetail(); }); }
  function completionErrors(c){ c=c||state.comp||{}; var errs={}; if(!((c.fulfillment_summary||"").toString().trim())) errs.fulfillment_summary="Vui lòng nhập tóm tắt kết quả xử lý."; return Object.keys(errs).length?errs:null; }
  function doComplete(name,det){ var b0=det.business||{}; state.comp={ fulfillment_summary:"", output_link:"", completed_attachment:"", operation_note:(b0.operation_note||"") };
    var body='<div class="fld"><label>Tóm tắt kết quả xử lý <span class="req">*</span></label><textarea id="c-summary" rows="3"></textarea></div>'
      +'<div class="fld"><label>Link kết quả</label><input id="c-link" placeholder="https://..."></div>'
      +'<div class="fld"><label>Ghi chú Operation</label><textarea id="c-opnote" rows="2">'+esc(state.comp.operation_note)+'</textarea></div>'
      +'<div class="fld"><label>Tệp kết quả</label><input type="file" id="c-file"><div class="hint" id="c-file-name">Không bắt buộc</div></div>';
    var m=modal("Hoàn tất xử lý", body, {okLabel:"Hoàn tất", onConfirm:function(ov){
      state.comp.fulfillment_summary=(ov.querySelector("#c-summary").value||""); state.comp.output_link=(ov.querySelector("#c-link").value||""); state.comp.operation_note=(ov.querySelector("#c-opnote").value||"");
      var errs=completionErrors(state.comp); if(errs){ toast(errs.fulfillment_summary,true); return Promise.reject(); }
      return call("complete_fulfillment",{name:name,payload:JSON.stringify(state.comp)}).then(function(res){ toast("Đã hoàn tất xử lý."); state.comp={}; applyDetail(res); }).catch(function(e){ toast(mapErr(e),true); refreshDetail(); return Promise.reject(e); }); }});
    var fi=m.ov.querySelector("#c-file"); if(fi) fi.addEventListener("change",function(){ var file=fi.files&&fi.files[0]; if(!file)return; var lbl=m.ov.querySelector("#c-file-name"); if(lbl)lbl.textContent="Đang tải...";
      var fd=new FormData(); fd.append("file",file); fd.append("is_private","1"); fd.append("doctype","EC System Request"); fd.append("docname",name);
      fetch("/api/method/upload_file",{method:"POST",headers:{"X-Frappe-CSRF-Token":(window.frappe&&frappe.csrf_token)||""},body:fd}).then(function(r){return r.json();}).then(function(j){ state.comp.completed_attachment=(j&&j.message&&j.message.file_url)||""; if(lbl)lbl.textContent=state.comp.completed_attachment?("Đã tải: "+file.name):"Lỗi tải"; }).catch(function(){ if(lbl)lbl.textContent="Lỗi tải"; }); }); }

  function startEditDraft(det){ state.draft=Object.assign({}, det.business||{}); state.id=(det.business||{}).name; state.mode="create"; renderCreate($("sysr-body")); }
  function doSubmitDraft(name){ if(state.busy)return; state.busy=true; var btns=Array.prototype.slice.call(document.querySelectorAll('[data-act="submitdraft"],[data-act="editdraft"]')); btns.forEach(function(b){ b.disabled=true; });
    call("submit_request",{name:name}).then(function(){ toast("Gửi yêu cầu thành công. Yêu cầu đã được chuyển đến Operation Review."); refreshDetail(); }).catch(function(e){ if(!applyBackendError(e)){ if(window.console&&console.error) console.error("System Request submit error:",e); toast(friendlyErr(e),true); } btns.forEach(function(b){ b.disabled=false; }); }).then(function(){ state.busy=false; }); }
  function startEditResubmit(det){ var ap=det.approval||{}; var lvl=(det.levels||[]).find(function(l){return l.level_no===ap.information_requested_from_level;});
    var ia=(det.approvers||[]).filter(function(a){return a.status==="Information Requested";})[0]||{};
    state._infoCtx={ level:(lvl?lvl.level_name:ap.information_requested_from_level), approver:ia.approver, comment:ia.comment };
    state._editDet=det; state.draft=Object.assign({}, det.business||{}); state.id=det.business.name; state.mode="edit"; renderCreate($("sysr-body")); }

  function boot(){ try {
    ensureActionHandlers();
    var t=$("sysr-tabs"); if(t&&!t.__ecBound){ t.__ecBound=true; t.addEventListener("click",function(e){ var b=e.target.closest("[data-tab]"); if(b&&!b.disabled){ state.page=0; go({tab:b.getAttribute("data-tab")}); } }); }
    call("get_bootstrap").then(function(bd){ state.boot=bd||{tabs:{},context:{},form_options:{}}; route(); })
    .catch(function(){ var bd=$("sysr-body"); if(bd) bd.innerHTML='<div class="card"><div class="state"><h4>Không tải được trang</h4><button type="button" class="btn" id="b-retry">Thử lại</button></div></div>'; var r=$("b-retry"); if(r)r.onclick=boot; });
  } catch(e){ if(window.console&&console.error) console.error("System Request boot error:",e); } }

  window.SystemRequest={ state:state, render:render, route:route, _boot:boot, _call:call, badge:badge, buildStepper:buildStepper, timelineHTML:timelineHTML, actionPanelHTML:actionPanelHTML, mapErr:mapErr, resubmitErr:resubmitErr, modal:modal, validateSubmit:validateSubmit, suggestTitle:suggestTitle, stepLabel:stepLabel, nextLevelName:nextLevelName, doApprove:doApprove, doAdminApprove:doAdminApprove, startEditResubmit:startEditResubmit, startEditDraft:startEditDraft, renderFulfillment:renderFulfillment, fulfillmentSectionHTML:fulfillmentSectionHTML, completionErrors:completionErrors, doComplete:doComplete, doClaim:doClaim, applyDetail:applyDetail, loadApprovals:loadApprovals, renderMyApprovals:renderMyApprovals };
  if(document.readyState==="loading") document.addEventListener("DOMContentLoaded", boot); else boot();
})();
</script>

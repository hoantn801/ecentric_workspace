<!-- Copyright (c) 2026, eCentric and contributors
     Phase A2 - unified "Tài liệu & ký số" business section for the Payment Request page.
     Consumes the deployed A1 read/write (document_setup_state / set_document_requires_signature)
     and B1 signer_plan resolvers - NO Approval Engine logic in JS, NO package/lock/placement
     terminology. Native multi-file upload creates normal File rows attached to the request.
     The placement drawer is a SHELL only (signer cards + viewer placeholder) - no placement
     writes, no drag/drop, no editor mount (Phase C). Mounts INSIDE #ec-payr-root .content and
     never at body/grid-root level. Governed writes go only to whitelisted endpoints. -->
<div id="ec-docsign" class="ec-docsign" style="display:none">

       uploader on the Payment Request page. UI-only: the <input> stays in the DOM (still

       representative-pointer logic are all preserved. */

    .ecd-ro-banner{padding:8px 12px;border-radius:8px;font-size:12.5px;background:#fff8c5;color:#6b5900;margin:0 12px 8px}

    .ec-docsign .ecd-row:first-of-type{border-top:none}

    .ec-docsign .ecd-btn.primary{background:var(--navy,#0a2540);border-color:var(--navy,#0a2540);color:#fff}

    .ecd-drawer header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--gray-200,#d9dee3)}

  <div class="ecd-card">

  <div class="ecd-drawer-ov" id="ecdDrawerOv">

      <header>
        <div><strong id="ecdDrawerName">Thiết lập chữ ký</strong>
          <div class="ecd-meta" id="ecdDrawerSummary"></div></div>
        <button class="ecd-btn" id="ecdDrawerClose" type="button">Đóng</button>
      </header>
      <div id="ecdRoBanner" class="ecd-ro-banner" style="display:none">Yêu cầu đã được gửi — chỉ xem, không thể chỉnh sửa vị trí ký.</div>

</div>
<script id="ec-docsign-script">
(function () {
  "use strict";
  var root = document.getElementById("ec-docsign");
  if (!root) return;
  var API = "ecentric_workspace.approval_center.esign.api.";
  function callReady() { return !!(window.frappe && typeof window.frappe.call === "function"); }
  function esc(s) { return window.frappe ? frappe.utils.escape_html(s == null ? "" : String(s))
    : String(s == null ? "" : s); }
  function pr() {
    var q; try { q = new URLSearchParams(location.search); } catch (e) { q = null; }
    var id = q && (q.get("id") || q.get("name") || q.get("payment_request_name"));
    if (!id) id = window.EC_PPH_PR
      || (window.PaymentRequest && window.PaymentRequest.state && window.PaymentRequest.state.id);
    id = (id == null ? "" : ("" + id)).trim();
    return id || null;
  }
  function relocate() {
    // Mount INSIDE the Payment Request business-content region - the .content wrapper that holds
    // #payr-body under the Shared ERP Shell. Never the shell nav (.ec-shell-mount), header-right
    // (.ec-shell-tbright) or breadcrumb; never inside #payr-body itself (re-rendered
    // destructively), so we use its parent as a stable sibling host.
    var pb = document.getElementById("payr-body");
    var host = (pb && pb.parentNode)
      || document.querySelector("#ec-payr-root .ec-main .content")
      || document.querySelector("#ec-payr-root .content");
    if (host && root.parentNode !== host) host.appendChild(root);
  }
  function call(method, args, type) {
    return window.frappe.call({ method: API + method, args: args, type: type || "GET" })
      .then(function (r) { return r && r.message; });
  }

  var STATE = null, PLAN = null;

  function statePill(d) {
    var s = d.setup_state;
    if (s === "supporting_document") return ['p-support', 'Bộ chứng từ'];
    if (s === "unsupported") return ['p-review', 'Định dạng chưa hỗ trợ ký'];
    if (s === "legacy_unmapped") return ['p-review', 'Có cấu hình ký cũ — cần rà soát'];
    if (s === "complete") return ['p-done', 'Đã thiết lập'];
    if (s === "in_progress") return ['p-doing', 'Đang thiết lập'];
    return ['p-none', 'Chưa thiết lập'];
  }
  function progressText(d) {
    if (!d.requires_signature) return 'Không yêu cầu chữ ký';
    if (d.setup_state === 'unsupported') return 'Không thể ký trực tiếp định dạng này';
    // REAL progress (Phase C): covered signer slots / required slots.
    return (d.covered_slot_count || 0) + '/' + (d.required_signer_slots || 0) + ' người ký đã thiết lập';
  }

  function rowHtml(d) {
    var pill = statePill(d);
    var supporting = !d.requires_signature;
    var canEdit = STATE && STATE.can_classify;
    var act;
    if (d.requires_signature && d.direct_signing_supported) {
      act = '<button class="ecd-btn primary" data-setup="' + esc(d.document_ref) + '">Thiết lập chữ ký</button>';
    } else {
      act = '<button class="ecd-btn" data-open="' + esc(d.file_url || '') + '">Mở file</button>';
    }
    var dup = (d.duplicate_count > 1) ? ' · ' + d.duplicate_count + ' bản trùng (gộp)' : '';
    return '<div class="ecd-row">'
      + '<div class="ecd-main"><div class="ecd-name" title="' + esc(d.display_name) + '">'
        + esc(d.display_name) + '</div>'
      + '<div class="ecd-meta"><span class="ec-docsign ecd-pill ' + pill[0] + '">' + pill[1] + '</span> · '
        + esc(progressText(d)) + dup + '</div></div>'
      + '<label class="ecd-chk"><input type="checkbox" data-support="' + esc(d.document_ref) + '"'
        + (supporting ? ' checked' : '') + (canEdit ? '' : ' disabled') + '> Bộ chứng từ</label>'
      + act + '</div>';
  }

  function render() {
    if (!STATE) return;
    var sm = STATE.summary || {}, plan = STATE.signer_plan || {};
    var totalSlots = 0;
    var totalCovered = 0;
    (STATE.documents || []).forEach(function (d) {
      if (d.requires_signature) { totalSlots += (d.required_signer_slots || 0);
        totalCovered += (d.covered_slot_count || 0); }
    });
    document.getElementById("ecdCount").textContent = (sm.documents || 0) + ' tài liệu';
    document.getElementById("ecdSummary").textContent =
      (sm.requires_signature || 0) + ' cần ký · ' + (sm.supporting_documents || 0)
      + ' bộ chứng từ · 0/' + totalSlots + ' người ký đã thiết lập';
    var banner = document.getElementById("ecdBanner");
    if (STATE.needs_review) {
      banner.innerHTML = '<div class="ecd-banner b-review">Cấu hình ký đang mơ hồ — cần rà soát trước khi tiếp tục.</div>';
    } else if (!STATE.editable) {
      banner.innerHTML = '<div class="ecd-banner b-info">Gói ký đã được chốt — không thể chỉnh phân loại tài liệu.</div>';
    } else if (plan.resolved === false) {
      banner.innerHTML = '<div class="ecd-banner b-info">Chưa xác định được người ký. Hoàn tất thông tin yêu cầu để hệ thống xác định quy trình ký.</div>';
    } else { banner.innerHTML = ""; }
    document.getElementById("ecdRows").innerHTML =
      (STATE.documents || []).map(rowHtml).join("") || '<div class="ecd-meta">Chưa có tài liệu.</div>';
    var upBtn = document.getElementById("ecdUploadBtn");
    upBtn.disabled = !(STATE.editable && STATE.can_classify);
    wire();
  }

  function wire() {
    root.querySelectorAll("[data-support]").forEach(function (c) {
      c.onchange = function () { classify(c.getAttribute("data-support"), !c.checked, c); };
    });
    root.querySelectorAll("[data-setup]").forEach(function (b) {
      b.onclick = function () { openDrawer(b.getAttribute("data-setup")); };
    });
    root.querySelectorAll("[data-open]").forEach(function (b) {
      b.onclick = function () { var u = b.getAttribute("data-open"); if (u) window.open(u, "_blank"); };
    });
  }

  // classify: requires_signature = !supporting. Handle confirmation + unsupported + no-op.
  function classify(ref, requiresSig, chk, confirm) {
    if (!callReady()) return;
    window.frappe.call({ method: API + "set_document_requires_signature", type: "POST",
      args: { payment_request_name: pr(), document_ref: ref,
              requires_signature: requiresSig ? "true" : "false", confirm: confirm ? 1 : 0 } })
      .then(function (r) {
        var out = r && r.message || {};
        if (out.confirmation_required) {
          if (window.confirm("File này đang có cấu hình chữ ký. Chuyển thành Bộ chứng từ sẽ xoá "
              + "cấu hình ký. Tiếp tục?")) { classify(ref, requiresSig, chk, true); }
          else { if (chk) chk.checked = !chk.checked; }        // revert
          return;
        }
        if (out.ok === false) {
          if (out.reason === "unsupported_signable_format") {
            frappe.show_alert({ message: "Định dạng này chưa hỗ trợ ký trực tiếp.", indicator: "orange" });
          } else {
            frappe.show_alert({ message: "Không cập nhật được phân loại (" + esc(out.reason) + ").",
              indicator: "red" });
          }
          if (chk) chk.checked = !chk.checked;                 // revert on failure
          return;
        }
        load();
      })
      .catch(function () { if (chk) chk.checked = !chk.checked; });
  }

  // native multi-file upload -> normal File rows attached to the request (no schema change)
  function uploadFiles(files) {
    var name = pr(); if (!name || !files || !files.length) return;   // no persisted name -> no POST
    var hint = document.getElementById("ecdUploadHint");
    var done = 0, total = files.length, failed = 0, firstUrl = null;
    hint.textContent = "Đang tải 0/" + total + "…";
    Array.prototype.forEach.call(files, function (file) {
      var fd = new FormData();
      fd.append("file", file, file.name);
      fd.append("is_private", 1);
      fd.append("doctype", "EC Payment Request");
      fd.append("docname", name);
      fetch("/api/method/upload_file", { method: "POST",
        headers: { "X-Frappe-CSRF-Token": (window.frappe && frappe.csrf_token) || "" }, body: fd })
        .then(function (r) { return r.json(); })
        .then(function (j) {
          if (j && j.message && j.message.file_url) { if (!firstUrl) firstUrl = j.message.file_url; }
          else failed++; })
        .catch(function () { failed++; })
        .then(function () {
          done++; hint.textContent = "Đang tải " + done + "/" + total + "…";
          if (done !== total) return;
          hint.textContent = failed ? (failed + " tệp lỗi") : "";
          // set the backward-compatible representative pointer ONLY if empty (server-guarded);
          // never overwrites an existing pointer, never touches other fields, then refresh.
          if (firstUrl) {
            // The native File uploads already succeeded. The representative pointer is a best-
            // effort compatibility nicety: if it fails we NEVER delete the File or claim the
            // upload failed - we surface a recoverable warning and reload (A1 still shows the
            // uploaded native File); retrying the pointer is idempotent (empty-only server-side).
            function _ptrWarn() {
              frappe.show_alert({ message: "Đã tải tài liệu. Chưa đặt được tệp đại diện — "
                + "bạn có thể tải lại hoặc thử lại.", indicator: "orange" }); }
            window.frappe.call({ method: API + "set_representative_attachment", type: "POST",
              args: { payment_request_name: name, file_url: firstUrl } })
              .then(function (r) { if (((r && r.message) || {}).ok === false) _ptrWarn(); load(); })
              .catch(function () { _ptrWarn(); load(); });
          } else { load(); }
        });
    });
  }

  // drawer SHELL: signer cards from the B1 plan + viewer placeholder. NO writes.
  function slotLabel(s) {
    if (s.kind === "requester") return "Người đề nghị";
    var m = s.approval_mode === "Any One" ? " (một trong)"
      : (s.approval_mode === "Minimum Count" ? " (tối thiểu)" : "");
    return (s.level_name || ("Cấp " + s.level_no)) + m;
  }
  // -------- functional placement workspace (Phase C) --------
  var DRW = { ref: null, st: null, slot: null, pdf: null, page: 1, scale: 1.0, pagePt: [612, 792],
              pending: {}, appliedRev: {}, rev: 0, docToken: 0, geom: {} };
  function _cancelPending() {   // close / switch document / open: cancel in-flight autosaves
    for (var k in DRW.pending) { if (DRW.pending[k] && DRW.pending[k].timer) clearTimeout(DRW.pending[k].timer); }
    DRW.pending = {}; DRW.appliedRev = {}; DRW.docToken++; DRW.geom = {};   // drop local overrides on open/close/switch
  }
  // ISSUE 1: local latest geometry is authoritative the instant the user moves/resizes; a stale
  // server placement_state (e.g. a slower earlier save response, or reselecting a signer) must
  // never reset it. drawBoxes overlays DRW.geom[name] over server geometry until cleared.
  function _localGeom(name, g) { if (g) { DRW.geom[name] = g; } return DRW.geom[name]; }
  // ISSUE 2: clamp/normalize geometry client-side so we never send zero/negative/inverted or
  // out-of-page boxes (backend stays authoritative and re-validates).
  function _clampBox(box) {
    var W = DRW.pagePt[0] || 612, H = DRW.pagePt[1] || 792, minW = 20, minH = 12;
    var w = Math.max(minW, Math.abs(+box.width || 0)), h = Math.max(minH, Math.abs(+box.height || 0));
    var x = Math.min(Math.max(0, +box.x || 0), Math.max(0, W - minW));
    var y = Math.min(Math.max(0, +box.y || 0), Math.max(0, H - minH));
    w = Math.max(minW, Math.min(w, W - x)); h = Math.max(minH, Math.min(h, H - y));
    box.x = x; box.y = y; box.width = w; box.height = h; return box;
  }
  function drawerErr(msg) {
    var el = document.getElementById("ecdDrawerErr"); if (!el) return;
    if (msg) { el.textContent = msg; el.style.display = "block"; }
    else { el.textContent = ""; el.style.display = "none"; }
  }
  var _SAVE_REASON = {                                        // structured backend reasons -> drawer copy
    invalid_slot_key: "Người ký không hợp lệ — hãy tải lại trang.",
    not_pdf: "Định dạng này chưa hỗ trợ đặt vị trí ký.",
    supporting_document: "Tài liệu đã đặt là bộ chứng từ — không cần chữ ký.",
    stale_or_foreign_attachment: "Tài liệu không còn hợp lệ — hãy tải lại trang.",
    foreign_placement: "Vị trí ký không thuộc tài liệu này.",
    already_submitted: "Yêu cầu đã được gửi — không thể thay đổi vị trí ký.",
    package_locked: "Gói ký đã được chốt — không thể thay đổi.",
    needs_review: "Cấu hình ký đang cần rà soát." };
  function saveFail(o) {                                      // o = {ok:false, reason} or null
    var r = o && o.reason; saveState("fail");
    drawerErr(_SAVE_REASON[r] || "Không thể lưu vị trí chữ ký — thử lại.");
  }
  var PDFJS_BASE = "/assets/ecentric_workspace/vendor/pdfjs/";
  var pdfjsLib = null;
  function loadPdfjs() {
    return new Promise(function (res) {
      if (pdfjsLib) return res(true);
      import(PDFJS_BASE + "pdf.js").then(function (m) {
        pdfjsLib = m; m.GlobalWorkerOptions.workerSrc = PDFJS_BASE + "pdf.worker.js"; res(true);
      }).catch(function () { res(false); });
    });
  }
  function saveState(kind) {
    var el = document.getElementById("ecdSaveState");
    el.textContent = kind === "saving" ? "Đang lưu…" : kind === "saved" ? "Đã lưu"
      : kind === "fail" ? "Lưu lỗi — thử lại" : "Sẵn sàng";
    el.style.color = kind === "fail" ? "#b35900" : (kind === "saved" ? "#116329" : "#57606a");
  }
  function progressText() {
    var st = DRW.st || {}; return (st.covered_slot_count || 0) + "/" + (st.required_slot_count || 0);
  }
  function renderCards() {
    var st = DRW.st || {}, covered = {}, cnt = {};
    (st.placements || []).forEach(function (p) {
      if (p.signer_slot_key) { covered[p.signer_slot_key] = 1; cnt[p.signer_slot_key] = (cnt[p.signer_slot_key] || 0) + 1; } });
    var ro = st.editable === false;                          // sent/locked => view-only (ISSUE 4)
    document.getElementById("ecdProg").textContent = progressText();
    document.getElementById("ecdSignerCards").innerHTML = (st.required_slots || []).map(function (sl) {
      var done = covered[sl.slot_key] ? ' ✓' : '';
      var cands = (sl.candidates || []).map(function (c) {
        var w = c.scts_mapping_status === "verified" ? "" : '<div class="warn">Chưa có cấu hình chữ ký số</div>';
        return '<div>' + esc(c.display_name || c.user) + w + '</div>'; }).join("");
      var n = cnt[sl.slot_key] || 0;
      var posline = n ? '<div class="ecd-poscount">' + n + ' vị trí đã đặt</div>' : '';
      // one signer may need to sign several positions/pages; ADD is explicit (ISSUE 3), hidden read-only
      var add = ro ? '' : '<button class="ecd-addpos" type="button" data-add="' + esc(sl.slot_key) + '">'
        + (n ? '+ Thêm vị trí ký' : 'Đặt vị trí ký') + '</button>';
      return '<div class="ecd-scard' + (DRW.slot === sl.slot_key ? ' sel' : '') + '" data-slot="'
        + esc(sl.slot_key) + '"><div class="role">' + esc(sl.label) + done + '</div>'
        + '<div class="cand">' + cands + '</div>' + posline + add + '</div>';
    }).join("") || '<div class="ecd-meta">Chưa xác định được người ký.</div>';
    if (!ro) {
      root.querySelectorAll("[data-add]").forEach(function (btn) {
        btn.onclick = function (e) { e.stopPropagation();     // explicit intent to place another box
          DRW.slot = btn.getAttribute("data-add"); drawerErr(""); renderCards(); }; });
    }
  }
  function slotLabelFor(key) {
    var s = (DRW.st.required_slots || []).filter(function (x) { return x.slot_key === key; })[0];
    return s ? s.label : key;
  }
  function drawBoxes() {
    var layer = document.getElementById("ecdLayer"); layer.innerHTML = "";
    var cw = document.getElementById("ecdCanvas").width, ch = document.getElementById("ecdCanvas").height;
    var sx = cw / DRW.pagePt[0], sy = ch / DRW.pagePt[1];   // pt -> px (top-left origin)
    var ro = DRW.st.editable === false;                     // ISSUE 4: view-only after submit
    (DRW.st.placements || []).forEach(function (p) {
      if (!p.signer_slot_key) return;                        // legacy shown as unmapped elsewhere
      var g = (p.name && DRW.geom[p.name]) || p;             // ISSUE 1: local geometry wins over stale server
      var b = document.createElement("div"); b.className = "ecd-box" + (ro ? " ro" : "");
      b.style.left = (g.x * sx) + "px"; b.style.top = (g.y * sy) + "px";
      b.style.width = (g.width * sx) + "px"; b.style.height = (g.height * sy) + "px";
      b.innerHTML = '<div class="lbl">' + esc(slotLabelFor(p.signer_slot_key)) + '</div>'
        + (ro ? '' : '<div class="del" title="Xoá">×</div><div class="rsz"></div>');
      if (!ro) _wireBox(b, p, sx, sy);
      layer.appendChild(b);
    });
  }
  function _persist(cid, box) {                               // debounced, race-safe autosave
    var pend = DRW.pending[cid] || (DRW.pending[cid] = {});
    if (pend.timer) clearTimeout(pend.timer);                 // newer edit supersedes older debounce
    if (pend.deleted) return;                                 // never recreate a deleted box
    var myRev = ++DRW.rev, myToken = DRW.docToken; pend.rev = myRev;
    pend.timer = setTimeout(function () {
      saveState("saving");
      window.frappe.call({ method: API + "save_placement", type: "POST",
        args: { payment_request_name: pr(), document_ref: DRW.ref, box: JSON.stringify(box) } })
        .then(function (r) {
          if (myToken !== DRW.docToken) return;               // drawer closed / switched document
          if (DRW.pending[cid] && DRW.pending[cid].deleted) return;   // box deleted meanwhile
          if (myRev < (DRW.appliedRev[cid] || 0)) return;      // out-of-order: a newer response won
          var o = (r && r.message) || {};
          if (o.ok === false) { saveFail(o); return; }
          DRW.appliedRev[cid] = myRev; drawerErr("");
          DRW.st = o.state; saveState("saved"); renderCards(); drawBoxes(); refreshRow();
        })
        .catch(function () { if (myToken === DRW.docToken) saveFail(null); });
    }, 500);
  }
  function _wireBox(b, p, sx, sy) {
    var cid = p.name;
    b.querySelector(".del").onclick = function (e) {
      e.stopPropagation();
      var pend = DRW.pending[cid] || (DRW.pending[cid] = {});
      if (pend.timer) clearTimeout(pend.timer);               // cancel any pending save for THIS box
      pend.deleted = true; pend.rev = ++DRW.rev;               // supersede any in-flight save
      var myToken = DRW.docToken;
      saveState("saving");
      window.frappe.call({ method: API + "delete_placement", type: "POST",
        args: { payment_request_name: pr(), document_ref: DRW.ref, placement_name: p.name } })
        .then(function (r) { if (myToken !== DRW.docToken) return;
          var o = (r && r.message) || {};
          if (o.ok === false) { saveFail(o); return; }
          if (p.name) delete DRW.geom[p.name];               // drop local override for the removed box
          DRW.st = o.state || DRW.st; saveState("saved"); drawerErr("");
          renderCards(); drawBoxes(); refreshRow(); })
        .catch(function () { if (myToken === DRW.docToken) saveFail(null); });
    };
    var drag = null;
    b.addEventListener("mousedown", function (e) {
      if (e.target.className === "del") return;
      drag = { rsz: e.target.className === "rsz", sx: e.clientX, sy: e.clientY,
               l: b.offsetLeft, t: b.offsetTop, w: b.offsetWidth, h: b.offsetHeight };
      e.preventDefault();
    });
    document.addEventListener("mousemove", function (e) {
      if (!drag) return;
      var dx = e.clientX - drag.sx, dy = e.clientY - drag.sy;
      if (drag.rsz) { b.style.width = Math.max(24, drag.w + dx) + "px"; b.style.height = Math.max(14, drag.h + dy) + "px"; }
      else { b.style.left = (drag.l + dx) + "px"; b.style.top = (drag.t + dy) + "px"; }
    });
    document.addEventListener("mouseup", function () {
      if (!drag) return; drag = null;
      var box = _clampBox({ x: b.offsetLeft / sx, y: b.offsetTop / sy,
                            width: b.offsetWidth / sx, height: b.offsetHeight / sy });
      p.x = box.x; p.y = box.y; p.width = box.width; p.height = box.height;
      // reflect the clamp back into the DOM so the box can never show inverted/off-page geometry
      b.style.left = (box.x * sx) + "px"; b.style.top = (box.y * sy) + "px";
      b.style.width = (box.width * sx) + "px"; b.style.height = (box.height * sy) + "px";
      _localGeom(p.name, { x: box.x, y: box.y, width: box.width, height: box.height });  // ISSUE 1
      _persist(cid, { name: p.name, page_index: DRW.page, x: box.x, y: box.y,
                     width: box.width, height: box.height, signer_slot_key: p.signer_slot_key });
    });
  }
  function placeAt(px, py) {
    if (DRW.st && DRW.st.editable === false) {                // ISSUE 4: no placing after submit
      drawerErr("Yêu cầu đã được gửi — không thể thêm vị trí ký."); return; }
    if (!DRW.slot) { drawerErr("Hãy chọn một người ký, rồi bấm lên tài liệu để đặt vị trí."); return; }
    var cw = document.getElementById("ecdCanvas").width, ch = document.getElementById("ecdCanvas").height;
    var sx = cw / DRW.pagePt[0], sy = ch / DRW.pagePt[1];
    var box = _clampBox({ page_index: DRW.page, x: px / sx, y: py / sy, width: 120, height: 40 });
    box.signer_slot_key = DRW.slot;
    drawerErr("");
    _persist("new:" + (++DRW.rev), box);                     // fresh box -> debounced save
    DRW.slot = null; renderCards();                          // ISSUE 3: exit placement mode after ONE box
  }
  function renderPdf() {
    if (!DRW.pdf) return;
    DRW.pdf.getPage(DRW.page).then(function (pg) {
      var vp = pg.getViewport({ scale: DRW.scale });
      var mb = pg.getViewport({ scale: 1 }); DRW.pagePt = [mb.width, mb.height];
      var cv = document.getElementById("ecdCanvas"); cv.width = vp.width; cv.height = vp.height;
      var layer = document.getElementById("ecdLayer"); layer.style.width = vp.width + "px"; layer.style.height = vp.height + "px";
      pg.render({ canvasContext: cv.getContext("2d"), viewport: vp }).promise.then(function () { drawBoxes(); });
    });
  }
  function openDrawer(ref) {
    _cancelPending();                                          // switching document cancels prior timers
    DRW.ref = ref; DRW.slot = null;
    var doc = (STATE.documents || []).filter(function (d) { return d.document_ref === ref; })[0];
    document.getElementById("ecdDrawerName").textContent = "Thiết lập chữ ký — " + (doc ? doc.display_name : "");
    document.getElementById("ecdDrawerOv").style.display = "block";
    document.getElementById("ecdViewerMsg").textContent = "Đang tải tài liệu…";
    saveState("");
    Promise.all([call("placement_state", { payment_request_name: pr(), document_ref: ref }), loadPdfjs()])
      .then(function (res) {
        DRW.st = res[0] || {}; var ok = res[1];
        drawerErr("");
        document.getElementById("ecdRoBanner").style.display =
          DRW.st.editable === false ? "block" : "none";     // ISSUE 4: view-only after submit
        document.getElementById("ecdDrawerSummary").textContent =
          (DRW.st.required_slot_count || 0) + " người ký cần thiết lập · " + progressText();
        renderCards();
        var canPdf = ok && DRW.st.is_pdf && DRW.st.file_url;
        document.getElementById("ecdStage").style.display = canPdf ? "" : "none";
        if (!ok) { document.getElementById("ecdViewerMsg").textContent =
          "Không tải được trình xem PDF. Hãy tải lại trang."; return; }
        if (!DRW.st.is_pdf) { document.getElementById("ecdViewerMsg").textContent =
          "Định dạng này chưa hỗ trợ đặt vị trí ký."; return; }
        document.getElementById("ecdViewerMsg").textContent = "";
        // native private file - Frappe's /private/files handler enforces read permission for
        // the requester (owner/attached-to). PDF.js fetches same-origin with the session cookie.
        pdfjsLib.getDocument({ url: DRW.st.file_url, isEvalSupported: false }).promise.then(function (pdf) {
          DRW.pdf = pdf; DRW.page = 1; renderPdf();
        }).catch(function () { document.getElementById("ecdViewerMsg").textContent =
          "Không tải được nội dung PDF (kiểm tra quyền)."; });
      });
    // click on the placement layer -> place a box for the selected signer
    document.getElementById("ecdLayer").onclick = function (e) {
      if (e.target !== this) return;                          // ignore clicks on existing boxes
      var r = this.getBoundingClientRect(); placeAt(e.clientX - r.left, e.clientY - r.top);
    };
  }
  function refreshRow() { /* update the document row progress without a full reload */ load(); }
  function closeDrawer() { _cancelPending(); DRW.pdf = null; document.getElementById("ecdDrawerOv").style.display = "none"; }

  function _renderUnsaved() {
    relocate(); root.style.display = "block";
    document.getElementById("ecdCount").textContent = "";
    document.getElementById("ecdSummary").textContent = "";
    document.getElementById("ecdBanner").innerHTML =
      '<div class="ecd-banner b-info">Vui lòng lưu nháp yêu cầu trước khi tải tài liệu.</div>';
    document.getElementById("ecdRows").innerHTML = "";
    document.getElementById("ecdUploadBtn").disabled = true;   // upload disabled; handler also guards
  }
  function load() {
    if (!callReady()) return;
    var name = pr();
    if (!name) { _renderUnsaved(); return; }
    Promise.all([call("document_setup_state", { payment_request_name: name }),
                 call("signer_plan", { payment_request_name: name }),
                 call("signing_readiness", { payment_request_name: name })])
      .then(function (res) {
        STATE = res[0] || {}; PLAN = res[1] || {};
        var rd = res[2] || {}, ck = rd.checks || {};
        relocate(); root.style.display = "block";
        // Approver panel visibility uses the AUTHORITATIVE existing governed signal: the current
        // user is the active pending approver at the current level
        // (service.signing_readiness.checks.active_approver, i.e. perms.pending_approver_row on
        // the Approval Engine's frozen rows). NOT can_classify, NOT roles, NOT "not requester".
        // The wrapper ships default-hidden (no flash); we only reveal for the actual current
        // approver. The panel then self-gates its Duyệt & Ký button.
        var apw = document.getElementById("ec-approver-wrap");
        if (apw) apw.style.display = ck.active_approver ? "" : "none";
        render();
      })
      .catch(function () {});
  }

  // one-time wiring (idempotent across re-sync/navigation)
  if (root.getAttribute("data-ec-bound") !== "1") {
    root.setAttribute("data-ec-bound", "1");
    document.getElementById("ecdUploadBtn").onclick = function () {
      document.getElementById("ecdUpload").click(); };
    document.getElementById("ecdUpload").onchange = function (e) {
      uploadFiles(e.target.files); e.target.value = ""; };
    document.getElementById("ecdDrawerClose").onclick = closeDrawer;
    document.getElementById("ecdDrawerOv").onclick = function (e) {
      if (e.target === document.getElementById("ecdDrawerOv")) closeDrawer(); };
  }

  // bounded, idempotent init (frappe.call may be installed after this inline script)
  var _t = null, _n = 0;
  function _try() { if (callReady()) { if (_t) { clearInterval(_t); _t = null; } load(); return true; } return false; }
  if (!_try()) {
    _t = setInterval(function () {
      _n++;
      if (_try()) return;
      if (_n >= 40) { clearInterval(_t); _t = null; }
    }, 150);
  }
  // SPA: if the request is not yet persisted, watch for its id to appear (after save-draft) and
  // (re)load. Bounded; cleared once an id is seen.
  var _wn = 0, _w = setInterval(function () {
    _wn++;
    if (callReady() && pr()) { clearInterval(_w); load(); return; }
    if (_wn >= 400) clearInterval(_w);
  }, 1500);
})();
</script>

<!-- Copyright (c) 2026, eCentric and contributors
     Requester pre-approval signing entry point (Prepare Signing Package / Set Placement /
     Lock Signing Package). Visibility + status are decided by the governed backend readiness
     (requester_signing_readiness), which returns bare-boolean checks; the browser never
     computes authorization. Visibility depends ONLY on the requester + requester stage +
     policy - NEVER on overall `ready`, gates, package or placement state, so a requester who
     still has to prepare/place/lock always sees the panel. The local package/placement/lock
     actions work while Document Creation / Signing gates are OFF and make NO SCTS call / NO
     DSR. Only the actual requester sees the actions - never another user, Administrator or
     System Manager (unless they are the requester), never completed/cancelled requests,
     never approval-level stages. Closed provider gates are shown as information only and do
     NOT hide the local actions. -->
<div id="ec-req-sign" class="ec-req-sign" style="display:none;margin:8px 0">
  <style>
    .ec-req-sign{border:1px solid #d9dee3;border-radius:8px;padding:12px;font-size:13px;background:#f6f8fa}
    .ec-req-sign h4{margin:0 0 6px}
    .ec-req-sign .ec-pill{padding:1px 8px;border-radius:10px;background:#eaeef2;font-size:11px}
    .ec-req-sign .ec-msg{margin:6px 0;color:#57606a}
    .ec-req-sign .ec-warn{color:#9a6700;background:#fff8c5;padding:6px 8px;border-radius:6px}
    .ec-req-sign .ec-info{color:#0550ae;background:#ddf4ff;padding:6px 8px;border-radius:6px;margin:6px 0}
    .ec-req-sign .ec-sub{margin-left:6px}
  </style>
  <h4>Ký của người đề nghị <span id="ecReqStatus" class="ec-pill">-</span></h4>
  <div id="ecReqMsg" class="ec-msg"></div>
  <div id="ecReqGate" class="ec-info" style="display:none"></div>
  <button id="ecReqPrepare" class="btn btn-sm btn-primary">Chuẩn bị gói ký</button>
  <button id="ecReqLock" class="btn btn-sm ec-sub" style="display:none">Khoá gói ký</button>
  <button id="ecReqFix" class="btn btn-sm ec-sub" style="display:none">Khôi phục gói</button>
</div>
<script id="ec-req-sign-script">
(function () {
  "use strict";
  var root = document.getElementById("ec-req-sign");
  if (!root) return;
  // frappe.call may not be installed yet on a Website route even though window.frappe
  // exists; every call site below is guarded by this and uses window.frappe.call.
  function callReady() {
    return !!(window.frappe && typeof window.frappe.call === "function");
  }
  var elStatus = document.getElementById("ecReqStatus");
  var elMsg = document.getElementById("ecReqMsg");
  var elGate = document.getElementById("ecReqGate");
  var btnPrep = document.getElementById("ecReqPrepare");
  var btnLock = document.getElementById("ecReqLock");
  var btnFix = document.getElementById("ecReqFix");
  function relocate() {
    // mount the panel INSIDE the Payment Request content column (never body/grid-root
    // level, which overlaps the left navigation).
    var host = document.querySelector("#ec-payr-root .content");
    if (host && root.parentNode !== host) host.appendChild(root);
  }

  // Resolve the Payment Request name using the governed URL convention (?id=), with
  // backward-compatible fallbacks (?name, ?payment_request_name) and any existing page
  // state/config. Never inferred from arbitrary DOM text; must be a non-empty string.
  function pr() {
    var q = null;
    try { q = new URLSearchParams(location.search); } catch (e) { q = null; }
    var id = q && (q.get("id") || q.get("name") || q.get("payment_request_name"));
    if (!id) {
      id = window.EC_PPH_PR
        || (window.PaymentRequest && window.PaymentRequest.state && window.PaymentRequest.state.id);
    }
    id = (id == null ? "" : ("" + id)).trim();
    return id || null;
  }
  // readiness returns bare booleans (checks[k] === true/false), NOT {ok:true} objects.
  function b(c, k) { return !!(c && c[k]); }
  function msg(t, warn) {
    elMsg.innerHTML = t
      ? (warn ? '<div class="ec-warn">' : "<span>") + frappe.utils.escape_html(t)
        + (warn ? "</div>" : "</span>")
      : "";
  }

  function refresh() {
    if (!callReady()) return;
    var name = pr();
    if (!name) {
      // No Payment Request identifier in the URL/state: keep the panel hidden, never throw.
      if (frappe.boot && frappe.boot.developer_mode && window.console) {
        console.debug("[ec-req-sign] no Payment Request id in URL/state; panel stays hidden");
      }
      return;
    }
    window.frappe.call({ method: "ecentric_workspace.approval_center.esign.api.requester_signing_readiness",
      args: { payment_request_name: name } })
      .then(function (r) {
        var m = r.message || {}, c = m.checks || {};
        // VISIBILITY (governed): requester + requester stage + policy ONLY. Never coupled to
        // ready / gates_enabled / package / placement state.
        var visible = b(c, "is_requester") && b(c, "pending_requester_signature")
          && b(c, "requester_signature_required");
        // Pre-submission: tell the OWNER, clearly, that signing applies once submitted -
        // instead of showing nothing (fresh-request UX). No leak of any other request's state.
        var preSubmit = b(c, "not_submitted") && b(c, "is_owner")
          && b(c, "requester_signature_required");
        if (!visible && preSubmit) {
          relocate(); root.style.display = "block";
          elStatus.textContent = "Chưa gửi duyệt";
          btnPrep.style.display = "none"; btnLock.style.display = "none";
          btnFix.style.display = "none"; elGate.style.display = "none";
          msg("Yêu cầu chưa gửi duyệt. Sau khi gửi, bạn sẽ chuẩn bị và ký gói tài liệu tại đây.");
          return;
        }
        root.style.display = visible ? "block" : "none";
        if (!visible) return;
        relocate();

        var invalid = b(c, "package_invalid");
        var locked = b(c, "package_locked");
        var readyToLock = b(c, "placements_ready");
        var present = b(c, "package_present");

        // status + primary action per local package state (gate-independent).
        var status, prepText, prepShow, lockShow, fixShow = false;
        if (invalid) {
          status = "Gói lỗi (0 vị trí ký)"; prepShow = false; lockShow = false; fixShow = true;
        } else if (locked) {
          status = "Gói đã khoá"; prepShow = false; lockShow = false;
        } else if (readyToLock) {
          status = "Sẵn sàng khoá"; prepText = "Chỉnh vị trí ký"; prepShow = true; lockShow = true;
        } else if (present) {
          status = "Thiếu vị trí ký"; prepText = "Đặt vị trí chữ ký"; prepShow = true; lockShow = false;
        } else {
          status = "Chưa chuẩn bị gói"; prepText = "Chuẩn bị gói ký"; prepShow = true; lockShow = false;
        }
        elStatus.textContent = status;
        if (prepText) btnPrep.textContent = prepText;
        btnPrep.style.display = prepShow ? "inline-block" : "none";
        btnLock.style.display = lockShow ? "inline-block" : "none";
        btnFix.style.display = fixShow ? "inline-block" : "none";

        // Closed provider gates: INFORMATION ONLY - must not hide the local actions above.
        if (!b(c, "gates_enabled")) {
          elGate.textContent = "Cổng ký số đang tắt. Bạn vẫn chuẩn bị, đặt vị trí và khoá "
            + "gói ký cục bộ; quản trị sẽ bật cổng để gửi ký thật.";
          elGate.style.display = "block";
        } else {
          elGate.style.display = "none";
        }

        if (invalid) {
          msg("Gói ký đang lỗi (đã khoá nhưng chưa có vị trí ký). Nhấn 'Khôi phục gói' để tạo "
            + "lại gói mới rồi đặt vị trí ký.", true);
        } else if (locked) {
          msg("Đã khoá gói ký. Chờ quản trị bật cổng ký để gửi ký thật.");
        } else if (!b(c, "verified_mapping")) {
          msg("Người đề nghị chưa có ánh xạ chữ ký đã xác minh.", true);
        } else {
          msg("");
        }
      });
  }

  // Bind click handlers EXACTLY ONCE. A repeated page sync / navigation re-runs this IIFE;
  // the data flag stops duplicate handlers from stacking (refresh() below stays safe to call
  // on every init).
  if (root.getAttribute("data-ec-bound") !== "1") {
    root.setAttribute("data-ec-bound", "1");
  // Prepare / Set placement: create-or-reuse the package (idempotent) and open the existing
  // placement editor by reloading with the returned config. Repeated clicks reuse the same
  // package. No SCTS call / no DSR (works with the write gates OFF).
  btnPrep.onclick = function () {
    var name = pr();
    if (!name || !callReady()) return;
    window.frappe.call({ method: "ecentric_workspace.approval_center.esign.api.prepare_requester_signing_package",
      type: "POST", args: { payment_request_name: name }, freeze: true,
      freeze_message: "Đang chuẩn bị gói ký…" })
      .then(function (r) {
        var out = r.message || {};
        if (out.config && (!out.config.files || !out.config.files.length)) {
          msg("Không có tệp PDF riêng tư hợp lệ trong phiếu để ký. Vui lòng đính kèm PDF.", true);
          return;
        }
        window.EC_PPH_CONFIG = out.config;
        // Open the editor IN PLACE (no page reload, which would drop the config + navigate
        // away from the editor).
        if (typeof window.ecMountPlacementEditor === "function") {
          window.ecMountPlacementEditor(out.config);
        }
        frappe.show_alert({ message: "Đã chuẩn bị gói ký. Đang mở trình đặt vị trí…",
          indicator: "green" });
        refresh();
      })
      .catch(function () { msg("Không chuẩn bị được gói ký (kiểm tra quyền / ánh xạ).", true); });
  };

  // Lock: freeze the package locally (no SCTS). Requester-only + idempotent server-side.
  btnLock.onclick = function () {
    var name = pr();
    if (!name || !callReady()) return;
    window.frappe.call({ method: "ecentric_workspace.approval_center.esign.api.requester_lock_signing_package",
      type: "POST", args: { payment_request_name: name }, freeze: true,
      freeze_message: "Đang khoá gói ký…" })
      .then(function () {
        frappe.show_alert({ message: "Đã khoá gói ký.", indicator: "green" });
        refresh();
      })
      .catch(function () { msg("Khoá gói ký thất bại (cần ít nhất một vị trí ký hợp lệ).", true); });
  };

  // Recovery: cancel an INVALID locked package (governed, requester/SM) so a fresh Draft can
  // be prepared. No provider/SCTS mutation.
  btnFix.onclick = function () {
    var name = pr();
    if (!name || !callReady()) return;
    window.frappe.call({ method: "ecentric_workspace.approval_center.esign.api.requester_reset_invalid_package",
      type: "POST", args: { payment_request_name: name }, freeze: true,
      freeze_message: "Đang khôi phục gói…" })
      .then(function () {
        frappe.show_alert({ message: "Đã khôi phục. Hãy chuẩn bị lại gói ký.", indicator: "green" });
        refresh();
      })
      .catch(function () { msg("Không khôi phục được gói (kiểm tra quyền).", true); });
  };

    // Bounded, idempotent initial refresh: on a Website route frappe.call can be installed
    // AFTER this inline script runs. Attempt immediately, then poll at a modest interval up to
    // a bounded timeout; invoke refresh() exactly once when the call API is ready; clear the
    // timer on success or timeout. The bind-once guard above means only one timer is ever
    // created per panel element (no duplicate timers on re-sync / navigation).
    var _pollTimer = null, _tries = 0;
    var _MAX_TRIES = 40, _INTERVAL_MS = 150;  // ~6s bounded window
    function _clearPoll() { if (_pollTimer) { clearInterval(_pollTimer); _pollTimer = null; } }
    function _tryInit() {
      if (callReady()) { _clearPoll(); refresh(); return true; }
      return false;
    }
    if (!_tryInit()) {
      _pollTimer = setInterval(function () {
        _tries++;
        if (_tryInit()) return;
        if (_tries >= _MAX_TRIES) {
          _clearPoll();
          if (window.frappe && window.frappe.boot && window.frappe.boot.developer_mode
              && window.console) {
            console.debug("[ec-req-sign] frappe.call unavailable within bounded window; "
              + "panel stays hidden");
          }
        }
      }, _INTERVAL_MS);
    }
  }
})();
</script>
